<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>Leons Group · Configuración</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:wght@300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
<style>
  .cfg-sec { background: var(--bg-1); border: 1px solid var(--border-soft); border-radius: var(--r); padding: var(--s3); margin-bottom: var(--s3); }
  .cfg-sec h3 { font-family: var(--f-title); font-size: 13px; letter-spacing: .1em; text-transform: uppercase; color: var(--gold); margin-bottom: 6px; }
  .cfg-sec p { font-size: 12.5px; color: var(--text-3); margin-bottom: var(--s2); }
  .cfg-field { margin-bottom: 14px; }
  .cfg-field label { display: block; font-size: 10.5px; color: var(--text-3); text-transform: uppercase; letter-spacing: .1em; margin-bottom: 6px; }
  .cfg-field input, .cfg-field textarea { width: 100%; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 10px 12px; font-family: var(--f-ui); font-size: 13.5px; outline: none; resize: vertical; }
  .cfg-field input:focus, .cfg-field textarea:focus { border-color: var(--gold-line); }
  .cfg-save { height: 38px; padding: 0 22px; background: var(--gold); color: #000; border: none; border-radius: var(--r-sm); font-weight: 600; font-size: 13px; cursor: pointer; font-family: var(--f-ui); }
  .cfg-save:disabled { opacity: .4; }
  .cfg-hint { font-size: 11.5px; color: var(--text-3); margin-top: 5px; }
</style>
</head>
<body>
<script src="/os/sp-shell.js"></script>
<script>
(async function () {
  'use strict';
  const { api, toast } = SPOS;

  const ctx = await SPOS.mount({ active: 'settings', title: 'Configuración', crumb: 'Ajustes del sistema', padded: true, adminOnly: true });
  if (!ctx) return;

  const cfg = await api('/api/config') || {};
  const v = k => String(cfg[k] || '').replace(/"/g, '&quot;');
  const esc = s => String(s == null ? '' : s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');

  // Cargar templates de WhatsApp para el selector de reactivación
  let waTemplates = [];
  try { waTemplates = await api('/api/wa-templates') || []; } catch (e) { waTemplates = []; }
  let tplVarsCatalog = [];
  try { tplVarsCatalog = await api('/api/template-vars') || []; } catch (e) { tplVarsCatalog = []; }

  ctx.content.innerHTML = `
   <div class="os-content__max" style="max-width:720px">

    <form class="cfg-sec" id="fBienvenida">
      <h3>Mensaje de bienvenida</h3>
      <p>Respuesta automática que recibe cada cliente nuevo al escribir por primera vez al número oficial.</p>
      <div class="cfg-field">
        <textarea id="welcome" rows="4" maxlength="1000" placeholder="Hola 👋 Gracias por contactar a SP Inmobiliaria…">${String(cfg.welcome_message || '')}</textarea>
        <div class="cfg-hint">Si se deja vacío, se usa el mensaje por defecto del sistema.</div>
      </div>
      <button type="submit" class="cfg-save">Guardar mensaje</button>
    </form>

    <div class="cfg-sec" id="secPlantillas">
      <h3>Plantillas de WhatsApp (Meta)</h3>
      <p>Sincroniza el catálogo real de plantillas aprobadas en Meta Business Suite (nunca se escriben a mano). Luego asigna qué dato del CRM llena cada variable de cada plantilla — así el vendedor puede iniciar conversaciones con los datos reales del lead ya completados.</p>
      <button type="button" class="cfg-save" id="btnSyncTpl">Sincronizar desde Meta</button>
      <div id="tplList" style="margin-top:14px"></div>
    </div>

    <form class="cfg-sec" id="fReengagement">
      <h3>Template de reactivación (ventana 24h)</h3>
      <p>Cuando la ventana de 24 horas del cliente está cerrada, el sistema envía este template automáticamente antes del mensaje de texto para reabrir la conversación.</p>
      <div class="cfg-field">
        <label>Template de WhatsApp</label>
        <select id="reengagement_template" style="width:100%;background:var(--bg-3);border:1px solid var(--border);border-radius:var(--r-sm);color:var(--text);padding:10px 12px;font-family:var(--f-ui);font-size:13.5px">
          <option value="">Sin template (mensaje fallará si ventana cerrada)</option>
        </select>
        <div class="cfg-hint">Debes tener templates aprobados en Meta Business Suite. Si no aparecen, créalos en WhatsApp → Plantillas.</div>
      </div>
      <button type="submit" class="cfg-save">Guardar template</button>
    </form>

    <form class="cfg-sec" id="fIntegraciones">
      <h3>Integraciones opcionales</h3>
      <p>Credenciales para llamadas (Twilio) y alertas (Slack). Solo se usan si están completas.</p>
      <div class="cfg-field"><label>Twilio Account SID</label><input id="twilio_account_sid" type="password" autocomplete="off" value="${v('twilio_account_sid')}"></div>
      <div class="cfg-field"><label>Twilio Auth Token</label><input id="twilio_auth_token" type="password" autocomplete="off" value="${v('twilio_auth_token')}"></div>
      <div class="cfg-field"><label>Twilio Número</label><input id="twilio_numero" placeholder="+57…" value="${v('twilio_numero')}"></div>
      <div class="cfg-field"><label>Slack Webhook URL</label><input id="slack_webhook" type="password" autocomplete="off" value="${v('slack_webhook')}"></div>
      <button type="submit" class="cfg-save">Guardar integraciones</button>
    </form>

    <form class="cfg-sec" id="fEscalation">
      <h3>⏰ Escalado inteligente</h3>
      <p>Tiempos para alertar y reasignar leads cuando un vendedor no responde. Los leads nuevos se reasignan automáticamente; los recurrentes solo reciben alertas.</p>
      <div class="cfg-field"><label>Alerta al vendedor (minutos)</label><input id="escalation_alerta_min" value="${v('escalation_alerta_min') || '15'}" placeholder="15"></div>
      <div class="cfg-field"><label>Reasignar lead nuevo (minutos)</label><input id="escalation_reasignar_min" value="${v('escalation_reasignar_min') || '30'}" placeholder="30"></div>
      <div class="cfg-field"><label>Notificar admin (minutos)</label><input id="escalation_admin_min" value="${v('escalation_admin_min') || '60'}" placeholder="60"></div>
      <div class="cfg-field"><label>Lead se considera "asentado" (horas)</label><input id="escalation_asentado_horas" value="${v('escalation_asentado_horas') || '24'}" placeholder="24">
      <div class="cfg-hint">Después de este tiempo, el lead ya no se reasigna — solo recibe alertas el vendedor actual.</div></div>
      <button type="submit" class="cfg-save">Guardar tiempos de escalado</button>
    </form>

    <form class="cfg-sec" id="fIA">
      <h3>🤖 IA Copiloto</h3>
      <p>El Copiloto SP usa modelos de IA para analizar leads, sugerir respuestas y ayudarte a vender más. Agrega uno o más proveedores abajo — para empezar, elige un preset y pega tu API Key.</p>
      <div class="cfg-field" style="display:flex;align-items:center;gap:10px;margin-bottom:16px">
        <label style="margin:0;cursor:pointer">
          <input type="checkbox" id="ai_enabled" ${cfg.ai_enabled !== 'false' ? 'checked' : ''} style="width:18px;height:18px;accent-color:var(--gold);margin-right:8px;vertical-align:middle">
          Copiloto activado
        </label>
      </div>
      <div style="margin-bottom:14px">
        <label style="font-size:10.5px;color:var(--text-3);text-transform:uppercase;letter-spacing:.1em;margin-bottom:8px;display:block">Agregar proveedor con un clic:</label>
        <div style="display:flex;gap:8px;flex-wrap:wrap" id="presetBtns"></div>
      </div>
      <div id="providerList"></div>
      <div id="noProviders" style="display:none;padding:14px;text-align:center;color:var(--text-3);font-size:13px;border:1px dashed var(--border);border-radius:12px">Aún no hay proveedores. Haz clic en uno de los presets de arriba para empezar.</div>
      <div style="display:flex;gap:10px;margin-top:14px">
        <button type="submit" class="cfg-save">Guardar configuración IA</button>
        <button type="button" class="cfg-save" id="btnTestIA" style="background:var(--bg-3);color:var(--text);border:1px solid var(--border)">Probar conexión</button>
      </div>
      <div id="iaTestResult" style="margin-top:10px;font-size:12px;display:none"></div>
    </form>

    <div class="cfg-sec">
      <h3>Canales y equipo</h3>
      <p>La conexión de WhatsApp/Messenger/Instagram se gestiona en <a href="/os/integraciones.html" style="color:var(--gold)">Integraciones</a>. Los vendedores, PIN y plantillas en <a href="/os/equipo.html" style="color:var(--gold)">Equipo</a>.</p>
    </div>
   </div>`;

  document.getElementById('fBienvenida').addEventListener('submit', async ev => {
    ev.preventDefault();
    const btn = ev.target.querySelector('button');
    btn.disabled = true;
    const r = await api('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ welcome_message: document.getElementById('welcome').value.trim() }) });
    btn.disabled = false;
    if (r) toast('Mensaje de bienvenida guardado', 'ok'); else toast('Error al guardar', 'err');
  });

  document.getElementById('fIntegraciones').addEventListener('submit', async ev => {
    ev.preventDefault();
    const btn = ev.target.querySelector('button');
    btn.disabled = true;
    const body = {};
    ['twilio_account_sid', 'twilio_auth_token', 'twilio_numero', 'slack_webhook'].forEach(k => {
      body[k] = document.getElementById(k).value.trim();
    });
    const r = await api('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    btn.disabled = false;
    if (r) toast('Integraciones guardadas', 'ok'); else toast('Error al guardar', 'err');
  });

  // Poblar selector de template de reactivación
  const sel = document.getElementById('reengagement_template');
  function poblarSelectReactivacion() {
    if (!sel) return;
    sel.innerHTML = '<option value="">Sin template (mensaje fallará si ventana cerrada)</option>';
    waTemplates.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.nombre; opt.textContent = t.nombre;
      if (cfg.reengagement_template === t.nombre) opt.selected = true;
      sel.appendChild(opt);
    });
  }
  poblarSelectReactivacion();

  // ===== Plantillas de WhatsApp: sincronización + mapeo de variables =====
  function renderTplList() {
    const box = document.getElementById('tplList');
    if (!box) return;
    if (!waTemplates.length) { box.innerHTML = '<div class="cfg-hint">Aún no hay plantillas sincronizadas. Debes tener plantillas APROBADAS en Meta Business Suite y las variables WHATSAPP_TOKEN / WHATSAPP_BUSINESS_ACCOUNT_ID configuradas.</div>'; return; }
    box.innerHTML = waTemplates.map(t => {
      let vars = []; try { vars = JSON.parse(t.variables || '[]'); } catch (e) {}
      let mapping = {}; try { mapping = JSON.parse(t.var_mapping || '{}'); } catch (e) {}
      return `<div class="pm-card" style="border:1px solid var(--border-soft);border-radius:12px;padding:14px;margin-bottom:10px;background:var(--bg-2)">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
          <strong style="font-size:13px">${esc(t.nombre)}</strong>
          <span class="cfg-hint" style="margin:0">${esc(t.idioma || '')} · ${esc(t.categoria || '')} · ${esc(t.estado || '')}</span>
        </div>
        ${vars.length ? vars.map(ph => `
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:6px">
            <span style="font-size:12px;color:var(--text-3);min-width:90px">{{${esc(ph)}}}</span>
            <select data-tpl="${t.id}" data-ph="${esc(ph)}" style="flex:1;background:var(--bg-0);border:1px solid var(--border);border-radius:8px;color:var(--text);padding:7px 9px;font-size:12.5px">
              <option value="">Sin asignar (se pedirá a mano al enviar)</option>
              ${tplVarsCatalog.map(v => `<option value="${v.key}" ${mapping[ph] === v.key ? 'selected' : ''}>${esc(v.label)}</option>`).join('')}
            </select>
          </div>`).join('') : '<div class="cfg-hint">Esta plantilla no tiene variables.</div>'}
      </div>`;
    }).join('');
    box.querySelectorAll('select[data-tpl]').forEach(selEl => selEl.onchange = async () => {
      const tplId = selEl.dataset.tpl;
      const t = waTemplates.find(x => String(x.id) === String(tplId));
      let mapping = {}; try { mapping = JSON.parse(t.var_mapping || '{}'); } catch (e) {}
      mapping[selEl.dataset.ph] = selEl.value;
      t.var_mapping = JSON.stringify(mapping);
      const r = await api('/api/wa-templates/' + tplId + '/mapping', { method: 'PUT', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ mapping }) });
      if (r) toast('Variable asignada', 'ok'); else toast('Error al guardar', 'err');
    });
  }
  renderTplList();

  document.getElementById('btnSyncTpl')?.addEventListener('click', async () => {
    const btn = document.getElementById('btnSyncTpl');
    btn.disabled = true; btn.textContent = 'Sincronizando...';
    const r = await api('/api/wa-templates/sync', { method: 'POST' });
    btn.disabled = false; btn.textContent = 'Sincronizar desde Meta';
    if (r && r.ok) {
      toast(`${r.synced} de ${r.total} plantilla(s) aprobada(s) sincronizada(s)`, 'ok');
      waTemplates = await api('/api/wa-templates') || [];
      renderTplList();
      poblarSelectReactivacion();
    } else {
      toast('Error al sincronizar: ' + (r && r.detalle || 'revisa WHATSAPP_TOKEN / WHATSAPP_BUSINESS_ACCOUNT_ID'), 'err');
    }
  });

  document.getElementById('fReengagement')?.addEventListener('submit', async ev => {
    ev.preventDefault();
    const btn = ev.target.querySelector('button');
    btn.disabled = true;
    const r = await api('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ reengagement_template: sel.value }) });
    btn.disabled = false;
    if (r) toast('Template de reactivación guardado', 'ok'); else toast('Error al guardar', 'err');
  });

  // ===== Escalado inteligente =====
  document.getElementById('fEscalation')?.addEventListener('submit', async ev => {
    ev.preventDefault();
    const btn = ev.target.querySelector('button');
    btn.disabled = true;
    const keys = ['escalation_alerta_min', 'escalation_reasignar_min', 'escalation_admin_min', 'escalation_asentado_horas'];
    const body = {};
    keys.forEach(k => { body[k] = document.getElementById(k).value.trim() || ''; });
    const r = await api('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(body) });
    btn.disabled = false;
    if (r) toast('Tiempos de escalado guardados', 'ok'); else toast('Error al guardar', 'err');
  });

  // ===== IA Copiloto — Multi-proveedor inline =====
  const PRESETS = {
    openrouter: { name: 'OpenRouter', baseUrl: 'https://openrouter.ai/api/v1', keyUrl: 'https://openrouter.ai/keys', models: ['google/gemini-2.0-flash-001', 'deepseek/deepseek-chat', 'mistralai/mistral-7b-instruct', 'meta-llama/llama-3.2-3b-instruct'] },
    openai: { name: 'OpenAI', baseUrl: 'https://api.openai.com/v1', keyUrl: 'https://platform.openai.com/api-keys', models: ['gpt-4o-mini', 'gpt-4o', 'gpt-4-turbo'] },
    deepseek: { name: 'DeepSeek', baseUrl: 'https://api.deepseek.com/v1', keyUrl: 'https://platform.deepseek.com/api_keys', models: ['deepseek-chat', 'deepseek-reasoner'] },
    groq: { name: 'Groq', baseUrl: 'https://api.groq.com/openai/v1', keyUrl: 'https://console.groq.com/keys', models: ['llama-3.3-70b-versatile', 'llama-3.1-8b-instant', 'mixtral-8x7b-32768'] },
  };
  let iaProviders = [], iaDefaultId = '';
  const $pL = document.getElementById('providerList'), $noP = document.getElementById('noProviders'), $pB = document.getElementById('presetBtns');

  function renderProviderList() {
    if (!iaProviders.length) { $pL.innerHTML = ''; $noP.style.display = 'block'; return; }
    $noP.style.display = 'none';
    $pL.innerHTML = iaProviders.map((p, i) =>
      '<div class="pm-card" style="border:1px solid var(--border-soft);border-radius:12px;padding:14px;margin-bottom:10px;background:var(--bg-2)">' +
        '<div style="display:flex;gap:10px;align-items:center;margin-bottom:8px">' +
          '<div style="flex:1"><label style="font-size:10.5px;color:var(--text-3);display:block;margin-bottom:3px">Nombre</label>' +
          '<input data-idx="' + i + '" data-fld="name" value="' + esc(p.name || '') + '" style="width:100%;background:var(--bg-0);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 11px;font-size:12.5px;outline:none"></div>' +
          '<button data-rm="' + i + '" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:12px;padding:4px 8px;align-self:flex-end">Quitar</button></div>' +
        '<div style="display:flex;gap:10px;margin-bottom:8px">' +
          '<div style="flex:1"><label style="font-size:10.5px;color:var(--text-3);display:block;margin-bottom:3px">Base URL</label>' +
          '<input data-idx="' + i + '" data-fld="baseUrl" value="' + esc(p.baseUrl || '') + '" style="width:100%;background:var(--bg-0);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 11px;font-size:12.5px;outline:none"></div>' +
          '<div style="flex:1"><label style="font-size:10.5px;color:var(--text-3);display:block;margin-bottom:3px">API Key</label>' +
          '<input data-idx="' + i + '" data-fld="apiKey" type="password" autocomplete="off" value="" placeholder="' + (p.hasKey ? esc(p.keyMask) + ' (deja vacío para conservar)' : 'sk-...') + '" style="width:100%;background:var(--bg-0);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 11px;font-size:12.5px;outline:none"></div></div>' +
        '<div style="display:flex;gap:10px;align-items:center;margin-bottom:4px">' +
          '<div style="flex:1"><label style="font-size:10.5px;color:var(--text-3);display:block;margin-bottom:3px">Modelos (separados por coma)</label>' +
          '<input data-idx="' + i + '" data-fld="models" value="' + esc((p.models || []).join(', ')) + '" placeholder="google/gemini-2.0-flash-001, deepseek/deepseek-chat" style="width:100%;background:var(--bg-0);border:1px solid var(--border);border-radius:9px;color:var(--text);padding:9px 11px;font-size:12.5px;outline:none"></div>' +
          '<label style="font-size:11.5px;color:var(--text-2);cursor:pointer;white-space:nowrap"><input type="radio" name="defprov" data-def="' + esc(p.id) + '" ' + (p.id === iaDefaultId ? 'checked' : '') + ' style="accent-color:var(--gold);margin-right:4px">Default</label></div>' +
      '</div>').join('');
    $pL.querySelectorAll('input[data-fld]').forEach(inp => inp.oninput = () => {
      const i = +inp.dataset.idx, f = inp.dataset.fld;
      if (f === 'models') iaProviders[i][f] = inp.value.split(',').map(s => s.trim()).filter(Boolean);
      else iaProviders[i][f] = inp.value;
    });
    $pL.querySelectorAll('[data-rm]').forEach(b => b.onclick = () => { iaProviders.splice(+b.dataset.rm, 1); renderProviderList(); });
    $pL.querySelectorAll('[data-def]').forEach(rb => rb.onchange = () => { iaDefaultId = rb.dataset.def; });
  }

  async function loadIaConfig() {
    const r = await api('/api/ai/providers');
    if (r && r.providers) {
      iaProviders = r.providers.map(p => ({ ...p, apiKey: '' }));
      iaDefaultId = r.defaultId || (iaProviders[0] && iaProviders[0].id) || '';
    }
    renderProviderList();
    $pB.innerHTML = Object.entries(PRESETS).map(([k, v]) =>
      '<button type="button" data-preset="' + k + '" style="background:var(--bg-3);border:1px solid var(--border);border-radius:9px;color:var(--text-2);padding:7px 12px;font-size:12px;cursor:pointer;white-space:nowrap">+ ' + v.name + '</button>'
    ).join('');
    $pB.querySelectorAll('[data-preset]').forEach(b => b.onclick = () => {
      const k = b.dataset.preset, pr = PRESETS[k];
      if (iaProviders.some(p => p.id === k)) { toast(pr.name + ' ya está agregado', 'err'); return; }
      iaProviders.push({ id: k, name: pr.name, baseUrl: pr.baseUrl, apiKey: '', models: pr.models || [], keyMask: '', hasKey: false });
      renderProviderList();
      toast(pr.name + ' agregado. Pega tu API Key y guarda.', 'ok');
    });
  }

  document.getElementById('fIA').addEventListener('submit', async ev => {
    ev.preventDefault();
    const btn = ev.target.querySelector('button[type="submit"]');
    btn.disabled = true;
    const payload = iaProviders.map(p => ({ id: p.id, name: p.name, baseUrl: p.baseUrl, apiKey: p.apiKey, models: p.models }));
    await api('/api/ai/providers', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ providers: payload, defaultId: iaDefaultId }) });
    const enabled = document.getElementById('ai_enabled').checked;
    if (enabled) await api('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ai_enabled: 'true' }) });
    else await api('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ ai_enabled: 'false' }) });
    btn.disabled = false;
    toast('Configuración de IA guardada', 'ok');
    await loadIaConfig();
  });

  document.getElementById('btnTestIA').addEventListener('click', async () => {
    const btn = document.getElementById('btnTestIA');
    const res = document.getElementById('iaTestResult');
    const def = iaProviders.find(p => p.id === iaDefaultId) || iaProviders[0];
    res.style.display = 'block';
    res.innerHTML = 'Probando conexión con ' + (def ? def.name : 'proveedor por defecto') + '...';
    res.style.color = 'var(--text-3)';
    btn.disabled = true;
    try {
      const r = await api('/api/nlp/test', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ texto: 'Hola, me interesan los lotes en Tocaima. ¿Cuánto cuestan?' }) });
      if (r && r.ok) {
        res.innerHTML = '✅ Conexión exitosa! Modelo: <strong>' + esc(r.model || '?') + '</strong> · ' + esc(r.sentiment?.label || '?') + ' · ' + esc(r.intent?.intent || '?');
        res.style.color = '#4E7B46';
      } else {
        res.innerHTML = '❌ ' + esc(r?.error || 'Respuesta inválida. ¿API Key correcta?');
        res.style.color = '#e74c3c';
      }
    } catch (e) {
      res.innerHTML = '❌ Error de conexión: ' + esc(e.message);
      res.style.color = '#e74c3c';
    }
    btn.disabled = false;
  });

  await loadIaConfig();
})();
</script>
