<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>SP OS · CRM</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
</head>
<body>
<script src="/os/sp-shell.js"></script>
<script>
(async function () {
  const { ICONS, api, fmt, avatarColor, initials, toast, fmtPhone } = SPOS;

  const ETQ = {
    sin_clasificar: { t:'Nuevo', b:'mute' },
    interesado:     { t:'Interesado', b:'blue' },
    negociacion:    { t:'Negociación', b:'gold' },
    cita:           { t:'Cita', b:'amber' },
    vendido:        { t:'Vendido', b:'green' },
    no_interesado:  { t:'No interesado', b:'red' },
  };
  const FILTERS = [['todos','Todos'],['sin_clasificar','Nuevos'],['interesado','Interesados'],['negociacion','Negociación'],['cita','Citas'],['vendido','Vendidos']];

  const ctx = await SPOS.mount({
    active: 'crm', title: 'CRM · Leads', crumb: 'Tarjetas inteligentes', padded: false, panel: true,
    action: `<button class="btn btn--gold btn--sm" id="newLead">${ICONS.plus}Nuevo lead</button>`
  });

  let leads = await api('/api/leads');
  const DEMO = [
    { id:1, customer_name:'Juan Pérez', customer_phone:'+573214625618', etiqueta:'negociacion', status:'contactado', assigned_to_nombre:'Carlos García', updated_at:'2026-07-02 14:10:00', unread_count:2 },
    { id:2, customer_name:'María González', customer_phone:'+573001234567', etiqueta:'interesado', status:'contactado', assigned_to_nombre:'Andrea López', updated_at:'2026-07-02 12:30:00', unread_count:0 },
    { id:3, customer_name:'Roberto Martínez', customer_phone:'+573019876543', etiqueta:'cita', status:'contactado', assigned_to_nombre:'Miguel Torres', updated_at:'2026-07-02 09:05:00', unread_count:1 },
    { id:4, customer_name:'Lucía Fernández', customer_phone:'+573145550101', etiqueta:'vendido', status:'cerrado', assigned_to_nombre:'Carlos García', updated_at:'2026-07-01 17:40:00', unread_count:0 },
    { id:5, customer_name:'Andrés Gómez', customer_phone:'+573205559090', etiqueta:'sin_clasificar', status:'nuevo', assigned_to_nombre:null, updated_at:'2026-07-02 15:20:00', unread_count:3 },
    { id:6, customer_name:'Paola Ramírez', customer_phone:'+573112223344', etiqueta:'interesado', status:'contactado', assigned_to_nombre:'Andrea López', updated_at:'2026-07-01 11:15:00', unread_count:0 },
  ];
  if (!Array.isArray(leads)) leads = DEMO;

  let filter = 'todos', query = '';

  ctx.content.innerHTML = `
    <div style="padding:var(--s3) var(--s3) 0">
      <div class="u-between u-gap2" style="margin-bottom:var(--s3)">
        <label class="os-search" style="min-width:280px">${ICONS.search}<input id="q" placeholder="Buscar por nombre o teléfono…"></label>
        <div class="u-row u-gap1 u-wrap" id="filters">${FILTERS.map(([k,l],i)=>`<button class="chip${i===0?' active':''}" data-f="${k}">${l}</button>`).join('')}</div>
      </div>
    </div>
    <div class="os-content" style="padding:0 var(--s3) var(--s3)"><div class="grid grid--3" id="grid"></div></div>`;

  ctx.panel.innerHTML = `<div class="os-panel__body"><div class="empty">${ICONS.leads}<div><div class="t-h3">Selecciona un lead</div><div class="t-dim3" style="font-size:12px;margin-top:4px">Verás su ficha 360°, timeline y acciones</div></div></div></div>`;

  const grid = ctx.content.querySelector('#grid');

  function timeago(ts) {
    if (!ts) return '';
    const d = new Date(String(ts).replace(' ', 'T') + 'Z'); if (isNaN(d)) return '';
    const min = Math.floor((Date.now() - d.getTime()) / 60000);
    if (min < 1) return 'ahora'; if (min < 60) return min + ' min';
    const h = Math.floor(min/60); if (h < 24) return h + ' h';
    return Math.floor(h/24) + ' d';
  }

  function render() {
    const items = leads.filter(l => {
      const okF = filter === 'todos' || (l.etiqueta || 'sin_clasificar') === filter;
      const okQ = !query || (l.customer_name || '').toLowerCase().includes(query) || (l.customer_phone || '').toLowerCase().includes(query.replace(/\s/g, ''));
      return okF && okQ;
    });
    if (!items.length) { grid.innerHTML = `<div class="empty" style="grid-column:1/-1">${ICONS.leads}<div>Sin leads en esta vista</div></div>`; return; }
    grid.innerHTML = items.map((l, i) => {
      const e = ETQ[l.etiqueta || 'sin_clasificar'] || ETQ.sin_clasificar;
      return `<div class="card card--pad card--float rise rise-${Math.min(4,(i%4)+1)}" data-id="${l.id}" style="cursor:pointer">
        <div class="u-between" style="margin-bottom:14px">
          <div class="u-row u-gap2">
            <div class="avatar avatar--md" style="background:${avatarColor(l.customer_name)}">${initials(l.customer_name)}</div>
            <div><div style="font-weight:600">${l.customer_name || 'Sin nombre'}</div><div class="t-dim3 t-num" style="font-size:12px">${fmtPhone(l.customer_phone)}</div></div>
          </div>
          ${l.unread_count > 0 ? `<span class="os-nav__badge">${l.unread_count}</span>` : ''}
        </div>
        <div class="u-between">
          <span class="badge badge--${e.b}">${e.t}</span>
          <span class="t-dim3" style="font-size:11.5px">${timeago(l.updated_at)}</span>
        </div>
        <div style="height:1px;background:var(--border-soft);margin:13px 0"></div>
        <div class="u-row u-gap1 t-dim3" style="font-size:12px">
          ${ICONS.team.replace('<svg ','<svg style="width:14px;height:14px" ')}
          <span>${l.assigned_to_nombre || 'Sin asignar'}</span>
        </div>
      </div>`;
    }).join('');
    grid.querySelectorAll('[data-id]').forEach(el => el.addEventListener('click', () => openLead(Number(el.dataset.id))));
  }

  function openLead(id) {
    const l = leads.find(x => x.id === id); if (!l) return;
    const e = ETQ[l.etiqueta || 'sin_clasificar'] || ETQ.sin_clasificar;
    ctx.panel.innerHTML = `
      <div class="os-panel__head">
        <div class="t-label">Ficha del lead</div>
        <a class="btn btn--gold btn--sm" href="/os/inbox.html">${ICONS.msg}Abrir chat</a>
      </div>
      <div class="os-panel__body">
        <div class="u-col" style="align-items:center;text-align:center;gap:10px;margin-bottom:var(--s3)">
          <div class="avatar avatar--lg" style="background:${avatarColor(l.customer_name)}">${initials(l.customer_name)}</div>
          <div><div class="t-h2">${l.customer_name || 'Sin nombre'}</div><div class="t-dim3 t-num" style="font-size:13px">${fmtPhone(l.customer_phone)}</div></div>
          <span class="badge badge--${e.b}">${e.t}</span>
        </div>
        <div class="surface" style="padding:14px;margin-bottom:var(--s3)">
          ${info('Asesor', l.assigned_to_nombre || 'Sin asignar')}
          ${info('Estado', l.status || 'nuevo')}
          ${info('Última actividad', timeago(l.updated_at) + ' atrás')}
          ${info('Sin leer', (l.unread_count||0) + ' mensajes', true)}
        </div>
        <div class="t-label" style="margin-bottom:var(--s2)">Timeline</div>
        <div class="tl">
          ${tl('msg', 'Mensaje recibido', timeago(l.updated_at) + ' atrás')}
          ${tl('leads', 'Asignado a ' + (l.assigned_to_nombre||'—'), 'automático')}
          ${tl('spark', 'Lead creado', 'origen: campaña Meta')}
        </div>
        <div class="u-col u-gap1" style="margin-top:var(--s3)">
          <button class="btn btn--ghost btn--block btn--sm" onclick="SPOS.toast('Recordatorio creado','ok')">${ICONS.clock}Agendar seguimiento</button>
          <button class="btn btn--ghost btn--block btn--sm" onclick="SPOS.toast('El Copiloto SP se activará en la Fase IA','ok')">${ICONS.ai}Sugerir respuesta con IA</button>
        </div>
      </div>`;
  }
  const info = (k,v,gold) => `<div class="u-between" style="padding:7px 0"><span class="t-dim3" style="font-size:12.5px">${k}</span><span style="font-size:13px;font-weight:500${gold?';color:var(--gold)':''}">${v}</span></div>`;
  const tl = (ic,t,s) => `<div class="tl-item"><div class="tl-item__dot">${ICONS[ic].replace('<svg ','<svg style="width:13px;height:13px" ')}</div><div class="tl-item__body"><div class="tl-item__title">${t}</div><div class="tl-item__time">${s}</div></div></div>`;

  ctx.content.querySelector('#q').addEventListener('input', (ev) => { query = ev.target.value.toLowerCase().trim(); render(); });
  ctx.content.querySelectorAll('#filters .chip').forEach(c => c.addEventListener('click', () => {
    ctx.content.querySelectorAll('#filters .chip').forEach(x => x.classList.remove('active'));
    c.classList.add('active'); filter = c.dataset.f; render();
  }));
  document.getElementById('newLead').addEventListener('click', () => toast('El alta de leads llega en la próxima fase', 'ok'));

  render();
})();
</script>
</body>
</html>
