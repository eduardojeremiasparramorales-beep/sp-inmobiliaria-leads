<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>Leons Group · Integraciones</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
<style>
  .int-card { display:flex; flex-direction:column; gap:14px; }
  .int-logo { width:46px; height:46px; border-radius:13px; display:grid; place-items:center; font-size:22px; }
  .int-status { display:inline-flex; align-items:center; gap:6px; font-size:12px; font-weight:600; }
</style>
</head>
<body>
<script src="/os/sp-shell.js"></script>
<script>
(async function () {
  const { ICONS, api, toast } = SPOS;
  const ctx = await SPOS.mount({ active:'integrations', title:'Integraciones', crumb:'Canales y servicios conectados', padded:true });

  const st = await api('/api/channels/status') || {};
  const conn = (k) => st[k] === true;

  const INTS = [
    { k:'whatsapp', n:'WhatsApp', e:'🟢', bg:'rgba(87,193,104,.14)', on:conn('whatsapp'), cfg:'/os/whatsapp.html', d:'Número oficial de la empresa' },
    { k:'instagram', n:'Instagram', e:'🟣', bg:'rgba(200,164,90,.14)', on:conn('instagram'), d:'Mensajes directos de IG' },
    { k:'messenger', n:'Messenger', e:'🔵', bg:'rgba(91,141,239,.14)', on:conn('messenger'), d:'Facebook Messenger' },
    { k:'facebook', n:'Facebook', e:'📘', bg:'rgba(91,141,239,.14)', on:false, d:'Comentarios y páginas' },
    { k:'email', n:'Email', e:'✉️', bg:'rgba(248,248,248,.08)', on:false, d:'Correo entrante y saliente' },
    { k:'telegram', n:'Telegram', e:'🛩️', bg:'rgba(91,141,239,.14)', on:false, d:'Bot de Telegram' },
    { k:'calendar', n:'Google Calendar', e:'📅', bg:'rgba(229,72,77,.12)', on:false, d:'Agenda y citas' },
    { k:'stripe', n:'Stripe', e:'💳', bg:'rgba(120,120,220,.14)', on:false, d:'Cobros y suscripciones' },
  ];

  const connected = INTS.filter(i=>i.on).length;

  ctx.content.innerHTML = `<div class="os-content__max">
    <div class="grid grid--3 rise rise-1" style="margin-bottom:var(--s3)">
      ${metric('marketplace','Integraciones', INTS.length)}
      ${metric('activity','Conectadas', connected)}
      ${metric('inbox','Canales de mensajería', INTS.filter(i=>['whatsapp','instagram','messenger','facebook','telegram','email'].includes(i.k)&&i.on).length)}
    </div>
    <div class="grid grid--4 rise rise-2">
      ${INTS.map(i=>`
        <div class="card card--pad card--float int-card">
          <div class="u-between">
            <div class="int-logo" style="background:${i.bg}">${i.e}</div>
            ${i.on ? `<span class="int-status" style="color:#83B778"><span class="dot dot--green"></span>Conectado</span>`
                   : `<span class="int-status t-dim3"><span class="dot dot--mute"></span>Sin conectar</span>`}
          </div>
          <div><div class="t-h3">${i.n}</div><div class="t-dim3" style="font-size:12px;margin-top:2px">${i.d}</div></div>
          ${i.on
            ? `<a class="btn btn--ghost btn--sm btn--block" href="${i.cfg||'#'}">${i.cfg?'Configurar':'Gestionar'}</a>`
            : `<button class="btn btn--gold btn--sm btn--block" data-k="${i.k}">Conectar</button>`}
        </div>`).join('')}
    </div>
  </div>`;

  const TOKEN_CHANNELS = {
    messenger: { label:'Messenger', idField:'pageId', idPlaceholder:'ID de la página de Facebook' },
    instagram: { label:'Instagram', idField:'igUserId', idPlaceholder:'ID de la cuenta de Instagram Business' },
  };

  ctx.content.querySelectorAll('[data-k]').forEach(b=>b.addEventListener('click',()=>{
    const k = b.dataset.k;
    if(k==='whatsapp') location.href='/os/whatsapp.html';
    else if(TOKEN_CHANNELS[k]) abrirConectarModal(k);
    else toast('La conexión de '+b.textContent+' se habilita en Configuración','ok');
  }));

  function abrirConectarModal(k){
    const c = TOKEN_CHANNELS[k];
    abrirModal('Conectar '+c.label, `
      <form id="connForm" style="display:flex;flex-direction:column;gap:14px">
        <div class="t-dim3" style="font-size:12px">Pega el token de acceso de página (Meta for Developers → tu app → Messenger/Instagram → Generar token).</div>
        <input name="token" placeholder="Token de acceso" required style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border-soft);background:var(--bg);color:var(--txt);font-size:14px;font-family:inherit;outline:none">
        <input name="id" placeholder="${c.idPlaceholder}" required style="width:100%;padding:12px;border-radius:10px;border:1px solid var(--border-soft);background:var(--bg);color:var(--txt);font-size:14px;font-family:inherit;outline:none">
        <div style="display:flex;gap:10px;margin-top:6px">
          <button type="button" class="btn btn--ghost" id="modalCancel">Cancelar</button>
          <button type="submit" class="btn btn--gold">Guardar</button>
        </div>
      </form>`);
    document.getElementById('modalCancel').addEventListener('click', cerrarModal);
    document.getElementById('connForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const token = fd.get('token').trim();
      const id = fd.get('id').trim();
      if(!token || !id){ toast('Campos requeridos','err'); return; }
      try{
        const body = { token }; body[c.idField] = id;
        const r = await api('/api/channels/'+k+'/token', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify(body) });
        if(r && r.ok){ toast(c.label+' conectado'); cerrarModal(); setTimeout(()=>location.reload(), 600); }
        else toast(r?.error || 'Error al conectar','err');
      }catch(err){ toast('Error de conexión','err'); }
    });
  }

  // Modal helper (mismo patrón que equipo.html)
  const modalBg = document.createElement('div');
  modalBg.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.42);z-index:999;display:grid;place-items:center;animation:fadeIn .2s ease';
  let modalActive = null;
  function esc(s){ return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c])); }
  function abrirModal(titulo, html){
    if(modalActive) cerrarModal();
    modalActive = document.createElement('div');
    modalActive.style.cssText = 'background:var(--bg-1);border:1px solid var(--border-soft);border-radius:16px;padding:28px;width:90%;max-width:400px;animation:slideUp .25s var(--ease);max-height:90vh;overflow-y:auto';
    modalActive.innerHTML = `<div style="font-size:16px;font-weight:600;margin-bottom:20px">${esc(titulo)}</div>${html}`;
    modalBg.innerHTML = '';
    modalBg.appendChild(modalActive);
    document.body.appendChild(modalBg);
  }
  function cerrarModal(){ modalBg.remove(); modalActive = null; }

  function metric(icon,label,value){ return `<div class="metric"><div class="metric__top"><div class="metric__icon">${ICONS[icon]}</div></div><div><div class="metric__value t-num">${value}</div><div class="metric__label">${label}</div></div></div>`; }
})();
</script>
</body>
</html>
