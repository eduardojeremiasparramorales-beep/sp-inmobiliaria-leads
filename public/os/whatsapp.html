<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>Leons Group · WhatsApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
</head>
<body>
<script src="/os/sp-shell.js"></script>
<script>
(async function () {
  const { ICONS, api, toast } = SPOS;
  const ctx = await SPOS.mount({ active:'integrations', title:'Configuración de WhatsApp', crumb:'Integraciones · WhatsApp', padded:true, adminOnly:true });
  if (!ctx) return;

  const [st, cfg] = await Promise.all([
    api('/api/channels/status'),
    api('/api/config'),
  ]);
  const on = st && st.whatsapp === true;
  const welcome = (cfg && cfg.welcome_message) || '';

  ctx.content.innerHTML = `<div class="os-content__max" style="max-width:760px">
    <div class="card card--pad rise rise-1" style="margin-bottom:var(--s3)">
      <div class="u-between" style="margin-bottom:var(--s3)">
        <div class="u-row u-gap2">
          <div class="metric__icon" style="background:rgba(87,193,104,.14);color:#83B778">${ICONS.msg}</div>
          <div><div class="t-h3">WhatsApp Business Cloud API</div><div class="t-dim3" style="font-size:13px">Número oficial de la empresa</div></div>
        </div>
        ${on ? `<span class="badge badge--green"><span class="dot dot--green"></span>Conectado</span>`
             : `<span class="badge badge--amber"><span class="dot dot--gold"></span>Sin token</span>`}
      </div>
      <div class="surface" style="padding:14px">
        <div class="t-label" style="margin-bottom:8px">Estado</div>
        <div class="u-row u-gap1"><span class="dot dot--${on?'green':'mute'}"></span><span style="font-size:14px;font-weight:500">${on?'Operativo — token y número configurados':'Pendiente: configura WHATSAPP_TOKEN y PHONE_NUMBER_ID en el servidor (.env)'}</span></div>
      </div>
    </div>

    <div class="card card--pad rise rise-2">
      <div class="t-h3" style="margin-bottom:4px">Mensaje de bienvenida</div>
      <div class="t-dim3" style="font-size:12px;margin-bottom:14px">Respuesta automática al primer mensaje de cada cliente nuevo. Se guarda en el servidor.</div>
      <textarea class="input" id="tpl" rows="4" maxlength="1000" placeholder="Hola 👋 Gracias por contactar a SP Inmobiliaria. Un asesor te atenderá en los próximos minutos.">${welcome.replace(/</g,'&lt;')}</textarea>
      <div class="u-row u-gap2" style="margin-top:14px;justify-content:flex-end">
        <a class="btn btn--ghost btn--sm" href="/os/integraciones.html">Volver</a>
        <button class="btn btn--gold btn--sm" id="save">${ICONS.check}Guardar cambios</button>
      </div>
    </div>
  </div>`;

  document.getElementById('save').addEventListener('click', async () => {
    const r = await api('/api/config', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ welcome_message: document.getElementById('tpl').value.trim() }) });
    if (r) toast('Mensaje de bienvenida guardado', 'ok');
    else toast('Error al guardar', 'err');
  });
})();
</script>
</body>
</html>
