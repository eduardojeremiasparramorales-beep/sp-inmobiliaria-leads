<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>SP OS · WhatsApp</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
</head>
<body>
<script src="/os/sp-shell.js"></script>
<script>
(async function () {
  const { ICONS, api, toast } = SPOS;
  const ctx = await SPOS.mount({ active:'integrations', title:'Configuración de WhatsApp', crumb:'Integraciones · WhatsApp', padded:true });

  const st = await api('/api/channels/status') || {};
  const on = st.whatsapp === true;
  const numero = '+57 300 123 4567';
  const usadas = 980, limite = 1000, pct = Math.round((usadas/limite)*100);

  ctx.content.innerHTML = `<div class="os-content__max" style="max-width:760px">
    <div class="card card--pad rise rise-1" style="margin-bottom:var(--s3)">
      <div class="u-between" style="margin-bottom:var(--s3)">
        <div class="u-row u-gap2">
          <div class="metric__icon" style="background:rgba(87,193,104,.14);color:#83B778">${ICONS.msg}</div>
          <div><div class="t-h3">Número conectado</div><div class="t-dim3 t-num" style="font-size:13px">${numero}</div></div>
        </div>
        ${on ? `<span class="badge badge--green"><span class="dot dot--green"></span>Conectado</span>`
             : `<span class="badge badge--amber"><span class="dot dot--gold"></span>Sin token</span>`}
      </div>
      <div class="grid grid--2" style="gap:12px">
        <div class="surface" style="padding:14px">
          <div class="t-label" style="margin-bottom:8px">Estado</div>
          <div class="u-row u-gap1"><span class="dot dot--${on?'green':'mute'}"></span><span style="font-size:14px;font-weight:500">${on?'Operativo':'Pendiente de configurar'}</span></div>
        </div>
        <div class="surface" style="padding:14px">
          <div class="t-label" style="margin-bottom:8px">Calidad</div>
          <div class="u-row u-gap1"><span class="dot dot--gold"></span><span style="font-size:14px;font-weight:500">Alta</span></div>
        </div>
      </div>
    </div>

    <div class="card card--pad rise rise-2" style="margin-bottom:var(--s3)">
      <div class="u-between" style="margin-bottom:12px">
        <div class="t-h3">Límite de conversaciones</div>
        <span class="t-num t-dim">${usadas.toLocaleString('es-CO')} / ${limite.toLocaleString('es-CO')}</span>
      </div>
      <div style="height:12px;background:var(--bg-4);border-radius:999px;overflow:hidden">
        <div style="height:100%;width:${pct}%;background:linear-gradient(90deg,var(--gold),${pct>90?'var(--red)':'var(--green)'});border-radius:999px;transition:width .8s var(--ease-out)"></div>
      </div>
      <div class="t-dim3" style="font-size:12px;margin-top:8px">${pct}% del cupo mensual usado · se renueva el 1 de cada mes</div>
    </div>

    <div class="card card--pad rise rise-3">
      <div class="t-h3" style="margin-bottom:4px">Plantilla de bienvenida</div>
      <div class="t-dim3" style="font-size:12px;margin-bottom:14px">Primer mensaje automático cuando entra un lead nuevo</div>
      <textarea class="input" id="tpl" rows="3">¡Hola! Gracias por contactarnos. ¿En qué podemos ayudarte hoy?</textarea>
      <div class="u-row u-gap2" style="margin-top:14px;justify-content:flex-end">
        <a class="btn btn--ghost btn--sm" href="/os/integraciones.html">Volver</a>
        <button class="btn btn--gold btn--sm" id="save">${ICONS.check}Guardar cambios</button>
      </div>
    </div>
  </div>`;

  document.getElementById('save').addEventListener('click', ()=> toast('Plantilla de bienvenida guardada','ok'));
})();
</script>
</body>
</html>
