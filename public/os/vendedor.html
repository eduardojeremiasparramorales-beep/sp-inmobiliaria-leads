<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<title>SP OS · Mi Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
<style>
  /* ── Vendor 2-pane layout ── */
  .vnd { display: flex; height: 100%; min-height: 0; }

  /* ── Lead list ── */
  .vnd-list { width: 320px; flex-shrink: 0; border-right: 1px solid var(--border-soft); display: flex; flex-direction: column; min-height: 0; background: var(--bg-0); }
  .vnd-list__top { padding: var(--s2) var(--s2) 10px; border-bottom: 1px solid var(--border-soft); }
  .vnd-list__top h3 { font-family: var(--f-title); font-size: 13px; color: var(--text-2); letter-spacing: .12em; text-transform: uppercase; font-weight: 500; margin-bottom: 10px; }
  .vnd-search { position: relative; }
  .vnd-search input { width: 100%; height: 36px; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 0 12px 0 34px; font-family: var(--f-ui); font-size: 13.5px; outline: none; }
  .vnd-search input:focus { border-color: var(--gold-line); }
  .vnd-search input::placeholder { color: var(--text-3); }
  .vnd-search svg { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; color: var(--text-3); pointer-events: none; }
  .vnd-chips { display: flex; gap: 5px; padding: 8px var(--s2) 6px; overflow-x: auto; scrollbar-width: none; }
  .vnd-chips::-webkit-scrollbar { display: none; }
  .vnd-chip { height: 26px; padding: 0 12px; border: none; border-radius: var(--r-full); font-size: 11.5px; font-weight: 500; cursor: pointer; white-space: nowrap; transition: all .15s; background: var(--bg-3); color: var(--text-3); font-family: var(--f-ui); }
  .vnd-chip.active { background: var(--gold-soft); color: var(--gold); border: 1px solid var(--gold-line); }
  .vnd-scroll { flex: 1; overflow-y: auto; min-height: 0; }
  .vnd-item { display: flex; gap: 11px; padding: 11px var(--s2); cursor: pointer; border-bottom: 1px solid var(--border-soft); transition: background .12s; position: relative; }
  .vnd-item:hover { background: var(--bg-1); }
  .vnd-item.active { background: var(--bg-2); }
  .vnd-item.active::before { content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px; background: var(--gold); border-radius: 0 2px 2px 0; }
  .vnd-item__info { flex: 1; min-width: 0; }
  .vnd-item__top { display: flex; justify-content: space-between; align-items: baseline; gap: 6px; }
  .vnd-item__name { font-size: 13.5px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }
  .vnd-item.unread .vnd-item__name { font-weight: 700; }
  .vnd-item__time { font-size: 11px; color: var(--text-3); flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .vnd-item__bot { display: flex; justify-content: space-between; align-items: center; gap: 6px; margin-top: 2px; }
  .vnd-item__prev { font-size: 12px; color: var(--text-3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; flex: 1; }
  .vnd-item.unread .vnd-item__prev { color: var(--text-2); font-weight: 500; }
  .vnd-badge { background: var(--gold); color: #000; font-size: 10px; font-weight: 700; min-width: 18px; height: 18px; border-radius: var(--r-full); display: flex; align-items: center; justify-content: center; padding: 0 5px; flex-shrink: 0; font-variant-numeric: tabular-nums; }
  .vnd-tag { font-size: 10px; padding: 2px 7px; border-radius: var(--r-full); font-weight: 600; text-transform: uppercase; letter-spacing: .06em; flex-shrink: 0; }
  .t-interesado { background: var(--blue-soft); color: var(--blue); }
  .t-negociacion { background: var(--gold-soft); color: var(--gold); }
  .t-cita { background: var(--amber-soft); color: var(--amber); }
  .t-vendido { background: var(--green-soft); color: var(--green); }
  .t-no_interesado { background: var(--red-soft); color: var(--red); }
  .t-sin_clasificar { background: var(--bg-3); color: var(--text-3); }

  /* ── Chat pane ── */
  .vnd-thread { flex: 1; display: flex; flex-direction: column; min-width: 0; min-height: 0; background: var(--bg-0); position: relative; }
  .vnd-empty { flex: 1; display: flex; flex-direction: column; align-items: center; justify-content: center; gap: var(--s2); color: var(--text-3); }
  .vnd-empty svg { width: 48px; height: 48px; opacity: .25; }
  .vnd-empty p { font-size: 14px; }

  /* Chat header */
  .vnd-head { height: 62px; flex-shrink: 0; display: flex; align-items: center; gap: 11px; padding: 0 var(--s3); border-bottom: 1px solid var(--border-soft); background: rgba(10,10,10,.8); backdrop-filter: blur(14px); -webkit-backdrop-filter: blur(14px); }
  .vnd-head__info { flex: 1; min-width: 0; cursor: pointer; }
  .vnd-head__name { font-size: 14px; font-weight: 600; color: var(--text); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .vnd-head__sub { font-size: 11.5px; color: var(--text-3); margin-top: 1px; }

  /* Lead tools bar */
  .vnd-tools { padding: 8px var(--s3); display: flex; gap: 8px; align-items: center; flex-wrap: wrap; border-bottom: 1px solid var(--border-soft); background: var(--bg-1); }
  .vnd-tools label { font-size: 11px; color: var(--text-3); letter-spacing: .04em; }
  .vnd-tools select { background: var(--bg-3); color: var(--text); border: 1px solid var(--border); border-radius: var(--r-sm); padding: 4px 10px; font-family: var(--f-ui); font-size: 12px; outline: none; cursor: pointer; }
  .vnd-tools select:focus { border-color: var(--gold-line); }
  .vnd-tools-btn { background: var(--bg-3); border: 1px solid var(--border); color: var(--text-2); height: 28px; padding: 0 12px; border-radius: var(--r-sm); font-size: 12px; font-family: var(--f-ui); cursor: pointer; display: flex; align-items: center; gap: 5px; transition: color .12s, border-color .12s; }
  .vnd-tools-btn:hover { color: var(--text); border-color: var(--border-strong); }

  /* Notas panel */
  .vnd-notas { display: none; padding: 10px var(--s3); background: var(--bg-1); border-bottom: 1px solid var(--border-soft); }
  .vnd-notas.show { display: block; }
  .nota-item { background: var(--bg-2); border-left: 2px solid var(--gold); padding: 8px 12px; border-radius: var(--r-sm); margin-bottom: 6px; font-size: 12.5px; color: var(--text-2); }
  .nota-item .nota-meta { display: flex; justify-content: space-between; font-size: 10.5px; color: var(--text-3); margin-top: 5px; }
  .nota-del { cursor: pointer; color: var(--red); opacity: .5; transition: opacity .12s; }
  .nota-del:hover { opacity: 1; }
  .nota-form { display: flex; gap: 8px; margin-top: 8px; }
  .nota-form input { flex: 1; height: 34px; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 0 12px; font-family: var(--f-ui); font-size: 13px; outline: none; }
  .nota-form input:focus { border-color: var(--gold-line); }
  .nota-form button { height: 34px; padding: 0 16px; background: var(--gold); color: #000; border: none; border-radius: var(--r-sm); font-weight: 600; font-size: 12px; cursor: pointer; font-family: var(--f-ui); }

  /* Skeleton */
  .sk { background: linear-gradient(90deg, var(--bg-2) 25%, var(--bg-3) 50%, var(--bg-2) 75%); background-size: 200% 100%; animation: shimmer 1.2s infinite; }
  @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  .skel-item { display: flex; gap: 11px; padding: 11px 16px; border-bottom: 1px solid var(--border-soft); }

  /* Messages */
  .vnd-msgs { flex: 1; overflow-y: auto; padding: var(--s2) var(--s3); display: flex; flex-direction: column; gap: 4px; background: var(--bg-0); }
  .bubble { max-width: 72%; padding: 8px 12px; border-radius: 14px; font-size: 13.5px; line-height: 1.45; word-wrap: break-word; position: relative; }
  .bubble--in { align-self: flex-start; background: var(--bg-3); border-bottom-left-radius: 5px; color: var(--text); }
  .bubble--out { align-self: flex-end; background: linear-gradient(160deg, #1D4535, #153427); color: #EDF5F1; border-bottom-right-radius: 5px; }
  .bubble__time { font-size: 10.5px; opacity: .45; margin-top: 3px; text-align: right; display: block; font-variant-numeric: tabular-nums; }
  .date-sep { align-self: center; font-size: 11px; color: var(--text-3); background: var(--bg-2); padding: 3px 12px; border-radius: var(--r-full); margin: 6px 0; border: 1px solid var(--border-soft); }
  .media-img { max-width: 220px; max-height: 280px; border-radius: 10px; display: block; cursor: pointer; }
  .media-video { max-width: 220px; border-radius: 10px; display: block; }
  .media-audio { width: 210px; display: block; border-radius: 8px; }
  .media-file { color: var(--text-2); text-decoration: none; border-bottom: 1px solid var(--border-soft); word-break: break-all; }
  .media-cap { margin-top: 4px; font-size: 12.5px; }

  /* Templates chips */
  .vnd-tpls { display: flex; gap: 5px; padding: 8px var(--s3) 0; flex-wrap: wrap; }
  .tpl-chip { background: var(--bg-3); border: 1px solid var(--border); color: var(--text-2); height: 28px; padding: 0 12px; border-radius: var(--r-full); font-size: 11.5px; cursor: pointer; white-space: nowrap; font-family: var(--f-ui); font-weight: 400; transition: background .12s, color .12s; }
  .tpl-chip:hover { background: var(--bg-4); color: var(--text); }

  /* Composer */
  .vnd-compose { flex-shrink: 0; padding: 10px var(--s3); padding-bottom: calc(10px + env(safe-area-inset-bottom)); border-top: 1px solid var(--border-soft); background: var(--bg-1); display: flex; flex-direction: column; gap: 6px; }
  .vnd-compose.disabled { opacity: .35; pointer-events: none; }
  .compose-row { display: flex; gap: 8px; align-items: flex-end; }
  .compose-pill { flex: 1; display: flex; align-items: flex-end; background: var(--bg-3); border: 1px solid var(--border); border-radius: 22px; padding: 2px 4px; min-height: 44px; transition: border-color .15s; }
  .compose-pill:focus-within { border-color: var(--gold-line); }
  .compose-pill textarea { flex: 1; resize: none; background: transparent; border: none; color: var(--text); padding: 10px 8px; font-family: var(--f-ui); font-size: 14px; line-height: 1.35; max-height: 100px; outline: none; }
  .compose-pill textarea::placeholder { color: var(--text-3); }
  .icon-btn { background: none; border: none; color: var(--text-3); padding: 9px 8px; cursor: pointer; display: flex; align-items: center; transition: color .12s; flex-shrink: 0; }
  .icon-btn:hover { color: var(--text-2); }
  .icon-btn svg { width: 20px; height: 20px; }
  .fab-send { width: 42px; height: 42px; border-radius: 50%; background: var(--gold); color: #000; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: opacity .12s, transform .1s; }
  .fab-send:hover { opacity: .85; }
  .fab-send:active { transform: scale(.92); }
  .fab-send:disabled { opacity: .3; cursor: not-allowed; transform: none; }
  .fab-send svg { width: 20px; height: 20px; }
  .fab-send.grabando { background: var(--red); color: #fff; animation: micPulse 1s infinite; }
  @keyframes micPulse { 0%,100% { box-shadow: 0 0 0 0 rgba(229,72,77,.3); } 50% { box-shadow: 0 0 0 10px rgba(229,72,77,0); } }

  /* Rec strip */
  .rec-strip { display: none; flex: 1; align-items: center; gap: 10px; background: var(--bg-3); border: 1px solid rgba(229,72,77,.3); border-radius: 22px; padding: 0 18px; min-height: 44px; font-size: 13px; cursor: pointer; }
  .rec-strip.show { display: flex; }
  .rec-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); animation: recPulse .8s infinite; }
  @keyframes recPulse { 0%,100% { opacity:1;transform:scale(1); } 50% { opacity:.4;transform:scale(.8); } }
  .rec-timer { color: var(--red); font-weight: 600; font-variant-numeric: tabular-nums; }
  .rec-hint { color: var(--text-3); font-size: 11.5px; margin-left: auto; }

  /* Audio preview */
  .audio-preview { display: none; align-items: center; gap: 10px; }
  .audio-preview.show { display: flex; }
  .audio-preview audio { flex: 1; height: 34px; }
  .btn-ap { height: 34px; padding: 0 14px; border: none; border-radius: var(--r-sm); font-weight: 600; font-size: 12.5px; cursor: pointer; font-family: var(--f-ui); }
  .btn-ap-send { background: var(--gold); color: #000; }
  .btn-ap-cancel { background: var(--bg-3); color: var(--text-2); border: 1px solid var(--border); }

  /* Slash menu */
  .slash-menu { display: none; background: var(--bg-2); border: 1px solid var(--border-strong); border-radius: var(--r-sm); max-height: 200px; overflow-y: auto; box-shadow: var(--sh-3); }
  .slash-menu.show { display: block; }
  .slash-item { padding: 9px 14px; cursor: pointer; display: flex; flex-direction: column; gap: 2px; border-bottom: 1px solid var(--border-soft); transition: background .1s; }
  .slash-item:hover, .slash-item.sel { background: var(--gold-soft); }
  .slash-item .si-title { color: var(--gold); font-weight: 600; font-size: 12.5px; }
  .slash-item .si-body { color: var(--text-3); font-size: 11.5px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

  /* Emoji panel */
  .emoji-panel { display: none; grid-template-columns: repeat(8, 1fr); gap: 2px; padding: 8px 12px; max-height: 180px; overflow-y: auto; background: var(--bg-2); border: 1px solid var(--border-soft); border-radius: var(--r-sm); }
  .emoji-panel.show { display: grid; }
  .emoji-panel button { background: none; border: none; font-size: 20px; padding: 5px 0; cursor: pointer; border-radius: 6px; line-height: 1; transition: background .1s; }
  .emoji-panel button:hover { background: var(--bg-3); }

  /* Drawer de contacto */
  .drawer-overlay { position: fixed; inset: 0; background: rgba(0,0,0,.45); z-index: 200; display: none; backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
  .drawer-overlay.show { display: block; }
  .drawer { position: fixed; right: 0; top: 0; bottom: 0; width: 340px; background: var(--bg-1); z-index: 201; border-left: 1px solid var(--border-soft); transform: translateX(100%); transition: transform .35s var(--ease); overflow-y: auto; }
  .drawer.show { transform: translateX(0); }
  .drawer__head { padding: var(--s4) var(--s3) var(--s3); border-bottom: 1px solid var(--border-soft); }
  .drawer__name { font-family: var(--f-title); font-size: 18px; font-weight: 600; background: linear-gradient(135deg, var(--gold), #9E7E3C); -webkit-background-clip: text; background-clip: text; -webkit-text-fill-color: transparent; letter-spacing: .04em; margin-top: var(--s2); }
  .drawer__phone { font-size: 13px; color: var(--text-3); margin-top: 6px; display: flex; align-items: center; gap: 8px; }
  .drawer__copy { background: var(--bg-3); border: 1px solid var(--border); color: var(--text-2); border-radius: var(--r-sm); padding: 3px 10px; font-size: 11px; cursor: pointer; font-family: var(--f-ui); }
  .drawer__sec { padding: var(--s2) var(--s3); border-bottom: 1px solid var(--border-soft); }
  .drawer__sec h4 { font-size: 10px; color: var(--text-3); text-transform: uppercase; letter-spacing: .14em; font-weight: 600; margin-bottom: 10px; }
  .drawer__sec input { width: 100%; height: 36px; background: var(--bg-3); border: 1px solid var(--border); border-radius: var(--r-sm); color: var(--text); padding: 0 12px; font-family: var(--f-ui); font-size: 13px; outline: none; }
  .drawer__sec input:focus { border-color: var(--gold-line); }
  .drawer__row { display: flex; justify-content: space-between; padding: 6px 0; font-size: 13px; color: var(--text-2); border-bottom: 1px solid var(--border-soft); }
  .drawer__row strong { color: var(--text); font-weight: 500; }
  .drawer-close { position: absolute; top: 14px; right: 14px; background: var(--bg-3); border: 1px solid var(--border); color: var(--text-2); width: 30px; height: 30px; border-radius: 50%; cursor: pointer; display: flex; align-items: center; justify-content: center; }
  .drawer-close svg { width: 14px; height: 14px; }

  /* Conn dot */
  .conn-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--red); display: inline-block; transition: background .3s; flex-shrink: 0; }
  .conn-dot.on { background: var(--green); }

  /* Back btn mobile */
  .btn-back { display: none; }
  @media (max-width: 720px) {
    .vnd-list { width: 100%; }
    .vnd-list.hide { display: none; }
    .vnd-thread.hide { display: none; }
    .btn-back { display: flex; }
    .drawer { width: 100%; }
  }
</style>
</head>
<body>
<script src="/os/sp-shell.js"></script>
<script>
(async function () {
  'use strict';
  const { ICONS, api, toast, avatarColor, initials, fmtPhone } = SPOS;

  /* ── Etiquetas ── */
  const ETQ = {
    sin_clasificar: { t: 'Nuevo', cls: 'sin_clasificar' },
    interesado:     { t: 'Interesado', cls: 'interesado' },
    negociacion:    { t: 'Negociación', cls: 'negociacion' },
    cita:           { t: 'Cita', cls: 'cita' },
    vendido:        { t: 'Vendido', cls: 'vendido' },
    no_interesado:  { t: 'No int.', cls: 'no_interesado' },
  };
  const ETIQUETAS = Object.entries(ETQ).map(([v, e]) => ({ v, t: e.t }));
  const etqLabel = v => (ETQ[v] || { t: v }).t;
  const etqTag = v => {
    const e = ETQ[v] || { t: v, cls: 'sin_clasificar' };
    return `<span class="vnd-tag t-${e.cls}">${e.t}</span>`;
  };

  const EMOJIS = ['😀','😂','😊','😍','🥰','😎','🤝','👍','👌','🙏','💪','👏','🎉','🔥','⭐','❤️','💛','💚','✅','❌','⏰','📍','📞','💬','🏡','🏠','🏘️','🌳','🌄','📐','📄','💰','💵','🤑','📈','🔑','🚪','🛣️','🚗','☀️','🌙','🎯','✨','💡','🙌','😅','🤔','😉','🥳','😇','🫡'];

  function I(d, size) {
    size = size || 20;
    return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round" width="${size}" height="${size}" aria-hidden="true">${d}</svg>`;
  }
  const SVG = {
    search: 'M11 17.25a6.25 6.25 0 1 0 0-12.5 6.25 6.25 0 0 0 0 12.5zM16 16l3.5 3.5',
    send: 'm22 2-7 20-4-9-9-4ZM22 2 11 13',
    mic: 'M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3ZM19 10v2a7 7 0 0 1-14 0v-2M12 19v3',
    stop: '<rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" stroke="none"/>',
    clip: 'm21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48',
    smile: '<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/>',
    note: 'M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3ZM15 3v6h6',
    back: 'm12 19-7-7 7-7M19 12H5',
    x: 'M18 6 6 18M6 6l12 12',
    pencil: 'M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z',
    megaphone: 'm3 11 18-5v12L3 14v-3zM11.6 16.8a3 3 0 1 1-5.8-1.6',
    chat: 'M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z',
    copy: '<rect width="14" height="14" x="8" y="8" rx="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',
  };

  function escapeHtml(s) {
    return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
  }

  /* ── Tiempo ── */
  function horaCorta(ts) {
    if (!ts) return '';
    const d = new Date(ts.replace(' ', 'T') + 'Z');
    if (isNaN(d)) return '';
    const hoy = new Date();
    const mismo = d.getFullYear() === hoy.getFullYear() && d.getMonth() === hoy.getMonth() && d.getDate() === hoy.getDate();
    return mismo ? d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' }) : d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit' });
  }
  function soloHora(ts) {
    if (!ts) return '';
    const d = new Date(ts.replace(' ', 'T') + 'Z');
    return isNaN(d) ? '' : d.toLocaleTimeString('es-CO', { hour: '2-digit', minute: '2-digit' });
  }
  function dateLabel(ts) {
    if (!ts) return '';
    const d = new Date(ts.replace(' ', 'T') + 'Z');
    if (isNaN(d)) return '';
    const hoy = new Date(), ayer = new Date();
    ayer.setDate(hoy.getDate() - 1);
    const sd = (a, b) => a.getFullYear() === b.getFullYear() && a.getMonth() === b.getMonth() && a.getDate() === b.getDate();
    if (sd(d, hoy)) return 'Hoy';
    if (sd(d, ayer)) return 'Ayer';
    return d.toLocaleDateString('es-CO', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }

  /* ── Estado ── */
  const ctx = await SPOS.mount({
    active: 'inbox', title: 'Mi Panel', crumb: 'Conversaciones asignadas',
    padded: false
  });
  if (!ctx) return;
  const { me } = ctx;

  ctx.content.style.cssText = 'flex:1;min-height:0;overflow:hidden;padding:0;display:flex';

  let leads = [], templates = [], waTemplates = [], vendedores = [];
  let currentLead = null, filtroActivo = 'todos', termBusqueda = '';
  let slashIdx = -1;

  /* ── Montar HTML ── */
  ctx.content.innerHTML = `
    <div class="vnd" id="vnd">
      <div class="vnd-list" id="vndList">
        <div class="vnd-list__top">
          <h3>Mis Chats · <span id="leadCount" style="color:var(--gold)">0</span></h3>
          <div class="vnd-search">
            ${I(SVG.search, 14)}
            <input type="text" id="buscar" placeholder="Buscar lead…" autocomplete="off" aria-label="Buscar">
          </div>
        </div>
        <div class="vnd-chips">
          <button class="vnd-chip active" data-f="todos">Todos</button>
          <button class="vnd-chip" data-f="sin_clasificar">Nuevos</button>
          <button class="vnd-chip" data-f="interesado">Interesados</button>
          <button class="vnd-chip" data-f="negociacion">Negociación</button>
          <button class="vnd-chip" data-f="cita">Citas</button>
          <button class="vnd-chip" data-f="vendido">Vendidos</button>
        </div>
        <div class="vnd-scroll" id="scroll"></div>
      </div>

      <div class="vnd-thread" id="vndThread">
        <div class="vnd-empty" id="vndEmpty">
          ${I(SVG.chat, 48)}
          <p>Selecciona un lead para chatear</p>
        </div>
        <div id="chatBody" style="display:none;flex:1;min-height:0;display:none;flex-direction:column;height:100%"></div>
      </div>
    </div>

    <div class="drawer-overlay" id="doverlay"></div>
    <div class="drawer" id="drawer" role="dialog" aria-label="Información del contacto">
      <button class="drawer-close" id="drawerClose">${I(SVG.x, 14)}</button>
    </div>`;

  const $list = document.getElementById('scroll');
  const $thread = document.getElementById('vndThread');
  const $empty = document.getElementById('vndEmpty');
  const $chat = document.getElementById('chatBody');
  const $overlay = document.getElementById('doverlay');
  const $drawer = document.getElementById('drawer');

  /* ── Carga inicial ── */
  mostrarSkeletons();
  await Promise.all([cargarLeads(), cargarTemplates(), cargarWATemplates()]);
  if (me.rol === 'admin') await cargarVendedores();
  conectarStream();
  wiring();

  const params = new URLSearchParams(location.search);
  const fromUrl = params.get('lead');
  if (fromUrl) abrirLead(Number(fromUrl));

  /* ── Loaders ── */
  function mostrarSkeletons() {
    $list.innerHTML = Array.from({ length: 6 }, () => `
      <div class="skel-item">
        <div class="sk" style="width:44px;height:44px;border-radius:50%;flex-shrink:0"></div>
        <div style="flex:1"><div class="sk" style="height:11px;width:55%;border-radius:5px;margin-bottom:7px"></div><div class="sk" style="height:9px;width:80%;border-radius:5px"></div></div>
      </div>`).join('');
  }

  async function cargarLeads() {
    const data = await api('/api/mis-leads');
    leads = data || [];
    renderLeads();
  }

  async function cargarTemplates() {
    const data = await api('/api/templates');
    templates = data || [];
  }

  async function cargarWATemplates() {
    const data = await api('/api/wa-templates');
    waTemplates = data || [];
  }

  async function cargarVendedores() {
    const data = await api('/api/vendedores');
    vendedores = data || [];
  }

  /* ── Filtrado ── */
  function leadsFiltrados() {
    let arr = leads;
    if (filtroActivo !== 'todos') {
      arr = arr.filter(l => (l.etiqueta || 'sin_clasificar') === filtroActivo);
    }
    if (termBusqueda) {
      const t = termBusqueda.toLowerCase();
      arr = arr.filter(l => (l.customer_name || '').toLowerCase().includes(t) || (l.customer_phone || '').includes(t));
    }
    return arr;
  }

  function renderLeads() {
    const lista = leadsFiltrados();
    document.getElementById('leadCount').textContent = lista.length;
    if (!lista.length) {
      $list.innerHTML = `<div style="padding:24px 16px;text-align:center;color:var(--text-3);font-size:13px">${leads.length ? 'Sin resultados para este filtro.' : 'Aún no tienes leads asignados.'}</div>`;
      return;
    }
    $list.innerHTML = lista.map(l => {
      const nombre = l.customer_name || 'Cliente';
      const unread = Number(l.unread_count || 0);
      const etq = l.etiqueta && l.etiqueta !== 'sin_clasificar' ? etqTag(l.etiqueta) : '';
      return `
        <div class="vnd-item ${currentLead && currentLead.id === l.id ? 'active' : ''} ${unread ? 'unread' : ''}" data-id="${l.id}">
          <div class="avatar avatar--sm" style="background:${avatarColor(nombre)};flex-shrink:0">${initials(nombre)}</div>
          <div class="vnd-item__info">
            <div class="vnd-item__top">
              <span class="vnd-item__name">${escapeHtml(nombre)}</span>
              <span class="vnd-item__time">${horaCorta(l.updated_at || l.created_at)}</span>
            </div>
            <div class="vnd-item__bot">
              <span class="vnd-item__prev">${escapeHtml(l.last_message || l.first_message || '')}</span>
              ${etq}
              ${unread ? `<span class="vnd-badge">${unread > 99 ? '99+' : unread}</span>` : ''}
            </div>
          </div>
        </div>`;
    }).join('');
    $list.querySelectorAll('.vnd-item').forEach(el =>
      el.addEventListener('click', () => abrirLead(Number(el.dataset.id))));
  }

  /* ── Abrir lead ── */
  async function abrirLead(id) {
    const data = await api(`/api/leads/${id}/mensajes`);
    if (!data) return;
    currentLead = data.lead;
    api(`/api/leads/${id}/leido`, { method: 'POST' }).catch(() => { });
    const e = leads.find(l => l.id === id);
    if (e) e.unread_count = 0;
    if (currentLead) currentLead.unread_count = 0;
    renderLeads();
    renderChat(data.lead, data.mensajes);
    if (window.innerWidth <= 720) {
      document.getElementById('vndList').classList.add('hide');
      $thread.classList.remove('hide');
    }
  }

  /* ── Render chat ── */
  function renderChat(lead, mensajes) {
    const cerrado = lead.status === 'cerrado';
    $empty.style.display = 'none';
    $chat.style.display = 'flex';
    $chat.style.flexDirection = 'column';
    $chat.style.flex = '1';
    $chat.style.minHeight = '0';
    $chat.style.height = '100%';

    const chips = templates.map(t =>
      `<button class="tpl-chip" data-c="${escapeHtml(t.cuerpo)}">${escapeHtml(t.titulo)}</button>`).join('');

    const connDot = `<span class="conn-dot" id="connDot"></span>`;

    $chat.innerHTML = `
      <div class="vnd-head">
        <button class="btn btn--icon btn--quiet btn-back" id="btnBack">${I(SVG.back)}</button>
        <div class="avatar avatar--sm" style="background:${avatarColor(lead.customer_name || 'Cliente')};flex-shrink:0">${initials(lead.customer_name || 'Cliente')}</div>
        <div class="vnd-head__info" id="headInfo">
          <div class="vnd-head__name">${escapeHtml(lead.customer_name || 'Cliente')}</div>
          <div class="vnd-head__sub">${escapeHtml(fmtPhone(lead.customer_phone))} · toca para ver info</div>
        </div>
        <div style="display:flex;align-items:center;gap:10px;margin-left:auto">
          ${connDot}
          ${waTemplates.length ? `<button class="btn btn--ghost btn--sm" id="btnReactivar">${I(SVG.megaphone, 15)} Reactivar</button>` : ''}
        </div>
      </div>
      <div class="vnd-tools">
        <label>Etiqueta:</label>
        <select id="etqSelect">
          ${ETIQUETAS.map(e => `<option value="${e.v}" ${(lead.etiqueta || 'sin_clasificar') === e.v ? 'selected' : ''}>${e.t}</option>`).join('')}
        </select>
        ${me.rol === 'admin' ? `
        <label style="margin-left:6px">Vendedor:</label>
        <select id="reasignarSelect">
          ${vendedores.map(v => `<option value="${v.id}" ${Number(lead.assigned_to_id) === Number(v.id) ? 'selected' : ''}>${escapeHtml(v.nombre)}${v.estado !== 'activo' ? ' (' + v.estado + ')' : ''}</option>`).join('')}
        </select>` : ''}
        <button type="button" class="vnd-tools-btn" id="notasBtn">${I(SVG.note, 14)} Notas</button>
      </div>
      <div class="vnd-notas" id="notasPanel">
        <div id="notasList"></div>
        <form class="nota-form" id="notaForm">
          <input type="text" id="notaInput" placeholder="Nota interna…" maxlength="500">
          <button type="submit">Guardar</button>
        </form>
      </div>
      ${waTemplates.length ? `
      <div id="reactivarPanel" style="display:none;padding:8px 20px;background:var(--bg-2);border-bottom:1px solid var(--border-soft);font-size:12.5px;display:flex;gap:6px;flex-wrap:wrap;align-items:center">
        <span style="color:var(--text-3)">Plantilla:</span>
        ${waTemplates.map(t => `<button onclick="enviarTemplate(${t.id},'${escapeHtml(t.nombre)}','${escapeHtml(t.idioma)}')" class="btn btn--ghost btn--sm" style="font-size:11.5px">${escapeHtml(t.nombre)}</button>`).join('')}
      </div>` : ''}
      <div class="vnd-msgs" id="msgs" role="log" aria-live="polite">
        ${renderMensajesHTML(mensajes)}
      </div>
      ${chips ? `<div class="vnd-tpls">${chips}</div>` : ''}
      <div class="vnd-compose ${cerrado ? 'disabled' : ''}" id="compose">
        <div class="emoji-panel" id="emojiPanel"></div>
        <div class="slash-menu" id="slashMenu"></div>
        <div class="audio-preview" id="audioPreview">
          <button class="btn-ap btn-ap-cancel" id="apCancel">${I(SVG.x, 14)}</button>
          <audio id="audioPlayback" controls></audio>
          <button class="btn-ap btn-ap-send" id="apSend">Enviar audio</button>
        </div>
        <div class="compose-row">
          <div class="rec-strip" id="recStrip">
            <span class="rec-dot"></span>
            <span class="rec-timer" id="recTimer">0:00</span>
            <span class="rec-hint">Grabando… toca para detener</span>
          </div>
          <div class="compose-pill" id="pill">
            <button type="button" class="icon-btn" id="emojiBtn" aria-label="Emojis">${I(SVG.smile)}</button>
            <textarea id="msgInput" rows="1" placeholder="${cerrado ? 'Lead cerrado' : 'Mensaje…'}" ${cerrado ? 'disabled' : ''} aria-label="Escribe un mensaje"></textarea>
            <button type="button" class="icon-btn" id="adjuntar" aria-label="Adjuntar" ${cerrado ? 'disabled' : ''}>${I(SVG.clip)}</button>
            <input type="file" id="fileInput" accept="image/*,audio/*,video/*,application/pdf,.doc,.docx,.xls,.xlsx,.txt" style="display:none">
          </div>
          <button type="button" class="fab-send" id="mainBtn" aria-label="Grabar audio" ${cerrado ? 'disabled' : ''}>${I(SVG.mic)}</button>
        </div>
      </div>`;

    const $msgs = document.getElementById('msgs');
    $msgs.scrollTop = $msgs.scrollHeight;

    /* ── Wiring del chat ── */
    document.getElementById('headInfo').addEventListener('click', abrirDrawer);
    document.getElementById('btnBack')?.addEventListener('click', () => {
      document.getElementById('vndList').classList.remove('hide');
      $thread.classList.add('hide');
    });

    const etqSel = document.getElementById('etqSelect');
    etqSel?.addEventListener('change', async () => {
      const r = await api(`/api/leads/${lead.id}/etiqueta`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ etiqueta: etqSel.value }) });
      if (r) { toast('Etiqueta actualizada', 'ok'); if (currentLead) currentLead.etiqueta = etqSel.value; await cargarLeads(); }
      else toast('Error al etiquetar', 'err');
    });

    const reasigSel = document.getElementById('reasignarSelect');
    reasigSel?.addEventListener('change', async () => {
      const nombre = reasigSel.options[reasigSel.selectedIndex].text;
      if (!confirm(`¿Reasignar a ${nombre}?`)) { reasigSel.value = lead.assigned_to_id; return; }
      const r = await api(`/api/leads/${lead.id}/reasignar`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ vendedorId: reasigSel.value }) });
      if (r !== null) { toast(`Reasignado a ${nombre}`, 'ok'); await cargarLeads(); }
      else toast('Error al reasignar', 'err');
    });

    /* Notas */
    const notasBtn = document.getElementById('notasBtn');
    const notasPanel = document.getElementById('notasPanel');
    notasBtn?.addEventListener('click', async () => {
      const abre = !notasPanel.classList.contains('show');
      notasPanel.classList.toggle('show', abre);
      if (abre) await cargarNotas(lead.id);
    });
    document.getElementById('notaForm')?.addEventListener('submit', async ev => {
      ev.preventDefault();
      const inp = document.getElementById('notaInput');
      const nota = inp.value.trim();
      if (!nota) return;
      await api(`/api/leads/${lead.id}/notas`, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ nota }) });
      inp.value = '';
      await cargarNotas(lead.id);
    });

    /* Reactivar */
    document.getElementById('btnReactivar')?.addEventListener('click', () => {
      const p = document.getElementById('reactivarPanel');
      if (p) p.style.display = p.style.display === 'none' ? 'flex' : 'none';
    });

    /* Templates chips */
    document.querySelectorAll('.tpl-chip').forEach(c =>
      c.addEventListener('click', () => {
        const inp = document.getElementById('msgInput');
        if (!inp) return;
        inp.value = c.dataset.c;
        inp.style.height = 'auto'; inp.style.height = inp.scrollHeight + 'px';
        inp.focus();
        updateMainBtn();
      }));

    if (cerrado) return;

    /* ── Compositor ── */
    const input = document.getElementById('msgInput');
    const mainBtn = document.getElementById('mainBtn');
    const pill = document.getElementById('pill');
    const recStrip = document.getElementById('recStrip');
    const emojiBtn = document.getElementById('emojiBtn');
    const emojiPanel = document.getElementById('emojiPanel');
    const adjuntar = document.getElementById('adjuntar');
    const fileInput = document.getElementById('fileInput');
    const audioPreview = document.getElementById('audioPreview');
    const audioPlayback = document.getElementById('audioPlayback');
    const apSend = document.getElementById('apSend');
    const apCancel = document.getElementById('apCancel');
    const slashMenu = document.getElementById('slashMenu');

    function updateMainBtn() {
      if (mediaRec && mediaRec.state === 'recording') return;
      const hay = input.value.trim().length > 0;
      mainBtn.innerHTML = hay ? I(SVG.send) : I(SVG.mic);
      mainBtn.setAttribute('aria-label', hay ? 'Enviar mensaje' : 'Grabar audio');
    }

    input.addEventListener('input', () => {
      input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px';
      updateMainBtn();
      actualizarMenuSlash();
    });
    input.addEventListener('keydown', e => {
      if (manejarTecladoSlash(e)) return;
      if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); enviarMensaje(); }
    });

    adjuntar.addEventListener('click', () => fileInput.click());
    fileInput.addEventListener('change', () => { if (fileInput.files?.[0]) enviarMedia(fileInput.files[0]); });

    /* Emoji panel */
    emojiPanel.innerHTML = EMOJIS.map(e => `<button type="button" aria-label="${e}">${e}</button>`).join('');
    emojiBtn.addEventListener('click', () => emojiPanel.classList.toggle('show'));
    emojiPanel.querySelectorAll('button').forEach(b => b.addEventListener('click', () => {
      const pos = input.selectionStart ?? input.value.length;
      input.value = input.value.slice(0, pos) + b.textContent + input.value.slice(pos);
      input.focus(); input.selectionStart = input.selectionEnd = pos + b.textContent.length;
      updateMainBtn();
    }));

    /* Grabación */
    let mediaRec = null, recChunks = [], recInterval = null, recBlob = null;
    const fmtSecs = s => Math.floor(s / 60) + ':' + (s % 60 < 10 ? '0' : '') + s % 60;

    function stopRecording() {
      if (mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
      clearInterval(recInterval);
      mainBtn.classList.remove('grabando');
      pill.style.display = 'flex';
      recStrip.classList.remove('show');
      updateMainBtn();
    }

    async function startRecording() {
      try {
        const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
        const mime = ['audio/ogg;codecs=opus', 'audio/webm;codecs=opus', 'audio/webm', 'audio/mp4'].find(t => MediaRecorder.isTypeSupported(t)) || '';
        mediaRec = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
        recChunks = [];
        mediaRec.ondataavailable = e => { if (e.data.size > 0) recChunks.push(e.data); };
        mediaRec.onstop = () => {
          stream.getTracks().forEach(t => t.stop());
          const finalMime = mediaRec.mimeType || mime || 'audio/webm';
          recBlob = new Blob(recChunks, { type: finalMime });
          audioPlayback.src = URL.createObjectURL(recBlob);
          audioPreview.classList.add('show');
        };
        mediaRec.start(200);
        mainBtn.classList.add('grabando');
        mainBtn.innerHTML = I(SVG.stop);
        mainBtn.setAttribute('aria-label', 'Detener grabación');
        pill.style.display = 'none';
        emojiPanel.classList.remove('show');
        recStrip.classList.add('show');
        let secs = 0;
        document.getElementById('recTimer').textContent = '0:00';
        recInterval = setInterval(() => {
          secs++;
          document.getElementById('recTimer').textContent = fmtSecs(secs);
          if (secs >= 120) { stopRecording(); toast('Máximo 2 minutos de audio'); }
        }, 1000);
      } catch (e) { toast('No se pudo acceder al micrófono', 'err'); }
    }

    mainBtn.addEventListener('click', () => {
      if (mediaRec && mediaRec.state === 'recording') { stopRecording(); return; }
      if (input.value.trim()) { enviarMensaje(); return; }
      startRecording();
    });
    recStrip.addEventListener('click', () => { if (mediaRec && mediaRec.state === 'recording') stopRecording(); });
    updateMainBtn();

    apCancel.addEventListener('click', () => {
      audioPreview.classList.remove('show');
      audioPlayback.src = '';
      recBlob = null;
      stopRecording();
    });
    apSend.addEventListener('click', async () => {
      if (!recBlob || !currentLead) return;
      apSend.disabled = true; apSend.textContent = 'Enviando…';
      try {
        const ext = recBlob.type.includes('ogg') ? 'ogg' : recBlob.type.includes('mp4') ? 'mp4' : 'webm';
        const dataBase64 = await new Promise((res, rej) => {
          const r = new FileReader();
          r.onload = () => res(String(r.result).split(',')[1]);
          r.onerror = rej;
          r.readAsDataURL(recBlob);
        });
        const result = await api(`/api/leads/${currentLead.id}/responder-media`, {
          method: 'POST', headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ mime: recBlob.type, filename: 'audio.' + ext, dataBase64 }),
        });
        if (!result) throw new Error('Error al enviar');
        audioPreview.classList.remove('show'); audioPlayback.src = ''; recBlob = null;
        await abrirLead(currentLead.id); await cargarLeads();
      } catch (e) { toast('Error: ' + e.message, 'err'); }
      finally { apSend.disabled = false; apSend.textContent = 'Enviar audio'; }
    });
  }

  /* ── Notas internas ── */
  async function cargarNotas(leadId) {
    const cont = document.getElementById('notasList');
    if (!cont) return;
    const notas = await api(`/api/leads/${leadId}/notas`) || [];
    if (!notas.length) { cont.innerHTML = '<div style="color:var(--text-3);font-size:12px;padding:4px 0">Sin notas todavía.</div>'; return; }
    cont.innerHTML = notas.map(n => `
      <div class="nota-item">
        <div>${escapeHtml(n.nota)}</div>
        <div class="nota-meta">
          <span>${escapeHtml(n.autor || 'Equipo')} · ${soloHora(n.created_at)}</span>
          <span class="nota-del" data-id="${n.id}">Eliminar</span>
        </div>
      </div>`).join('');
    cont.querySelectorAll('.nota-del').forEach(el =>
      el.addEventListener('click', async () => {
        if (!confirm('¿Eliminar esta nota?')) return;
        await api(`/api/leads/${leadId}/notas/${el.dataset.id}`, { method: 'DELETE' });
        await cargarNotas(leadId);
      }));
  }

  /* ── Enviar mensaje ── */
  async function enviarMensaje() {
    const input = document.getElementById('msgInput');
    const btn = document.getElementById('mainBtn');
    const msg = input?.value.trim();
    if (!msg || !currentLead) return;
    if (btn) btn.disabled = true;
    try {
      const r = await api(`/api/leads/${currentLead.id}/responder`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json', 'Accept': 'application/json', 'X-Requested-With': 'XMLHttpRequest' },
        body: JSON.stringify({ mensaje: msg }),
      });
      if (!r) throw new Error('Sin respuesta del servidor');
      input.value = ''; input.style.height = 'auto';
      await abrirLead(currentLead.id); await cargarLeads();
      toast('Enviado', 'ok');
    } catch (e) { toast('Error: ' + e.message, 'err'); }
    finally { if (btn) btn.disabled = false; }
  }

  /* ── Enviar media ── */
  async function enviarMedia(file) {
    if (!currentLead || !file) return;
    if (file.size > 18 * 1024 * 1024) { toast('Archivo muy grande (máx 18 MB)', 'err'); return; }
    toast('Enviando archivo…');
    try {
      const dataBase64 = await new Promise((res, rej) => {
        const r = new FileReader();
        r.onload = () => res(String(r.result).split(',')[1]);
        r.onerror = rej;
        r.readAsDataURL(file);
      });
      const result = await api(`/api/leads/${currentLead.id}/responder-media`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ mime: file.type || 'application/octet-stream', filename: file.name, dataBase64 }),
      });
      if (!result) throw new Error('Sin respuesta del servidor');
      await abrirLead(currentLead.id); await cargarLeads();
    } catch (e) { toast('Error: ' + e.message, 'err'); }
  }

  window.enviarTemplate = async function (id, nombre, idioma) {
    if (!currentLead) return;
    if (!confirm(`¿Enviar plantilla "${nombre}" a ${currentLead.customer_name || currentLead.customer_phone}?`)) return;
    const r = await api(`/api/leads/${currentLead.id}/enviar-template`, {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ nombre, idioma }),
    });
    if (r !== null) { toast('Plantilla enviada', 'ok'); await abrirLead(currentLead.id); }
    else toast('Error al enviar plantilla', 'err');
    const p = document.getElementById('reactivarPanel');
    if (p) p.style.display = 'none';
  };

  /* ── Render mensajes ── */
  function renderMensajesHTML(mensajes) {
    if (!mensajes?.length) return '<div style="margin:auto;color:var(--text-3);font-size:13.5px">Sin mensajes todavía.</div>';
    let html = '', lastFecha = '';
    for (const m of mensajes) {
      const fecha = dateLabel(m.timestamp);
      if (fecha && fecha !== lastFecha) {
        html += `<div class="date-sep">${fecha}</div>`;
        lastFecha = fecha;
      }
      const ticks = m.direction !== 'incoming' ? '<span style="opacity:.45;font-size:10px;margin-left:3px">✓✓</span>' : '';
      html += `<div class="bubble bubble--${m.direction === 'incoming' ? 'in' : 'out'}">
        ${msgInner(m)}
        <span class="bubble__time">${soloHora(m.timestamp)}${ticks}</span>
      </div>`;
    }
    return html;
  }

  function msgInner(m) {
    if (m.media_type && m.id) {
      const src = `/api/media/${m.id}`;
      const cap = (m.body && !/^\[(image|audio|video|document|sticker)\]$/.test(m.body)) ? `<div class="media-cap">${escapeHtml(m.body)}</div>` : '';
      if (m.media_type === 'image' || m.media_type === 'sticker')
        return `<a href="${src}" target="_blank"><img class="media-img" src="${src}" alt="imagen" loading="lazy"></a>${cap}`;
      if (m.media_type === 'audio')
        return `<audio class="media-audio" controls src="${src}"></audio>${cap}`;
      if (m.media_type === 'video')
        return `<video class="media-video" controls src="${src}"></video>${cap}`;
      return `<a class="media-file" href="${src}" target="_blank">📄 ${escapeHtml(m.media_filename || 'archivo')}</a>${cap}`;
    }
    return escapeHtml(m.body);
  }

  /* ── Menú de slash commands ── */
  function slashItems() {
    const v = document.getElementById('msgInput')?.value || '';
    if (!v.startsWith('/')) return [];
    const term = v.slice(1).toLowerCase();
    return templates.filter(t => !term || t.titulo.toLowerCase().includes(term));
  }
  function actualizarMenuSlash() {
    const menu = document.getElementById('slashMenu');
    if (!menu) return;
    const items = slashItems();
    if (!items.length) { menu.classList.remove('show'); slashIdx = -1; return; }
    if (slashIdx >= items.length) slashIdx = items.length - 1;
    if (slashIdx < 0) slashIdx = 0;
    menu.innerHTML = items.map((t, i) =>
      `<div class="slash-item ${i === slashIdx ? 'sel' : ''}" data-i="${i}">
        <span class="si-title">${escapeHtml(t.titulo)}</span>
        <span class="si-body">${escapeHtml(t.cuerpo.slice(0, 60))}${t.cuerpo.length > 60 ? '…' : ''}</span>
      </div>`).join('');
    menu.classList.add('show');
    menu.querySelectorAll('.slash-item').forEach(el =>
      el.addEventListener('click', () => elegirSlash(Number(el.dataset.i))));
  }
  function elegirSlash(i) {
    const items = slashItems();
    const input = document.getElementById('msgInput');
    const menu = document.getElementById('slashMenu');
    if (!items[i] || !input) return;
    input.value = items[i].cuerpo;
    input.style.height = 'auto'; input.style.height = input.scrollHeight + 'px';
    input.focus();
    menu?.classList.remove('show');
    slashIdx = -1;
    updateMainBtn();
  }
  function manejarTecladoSlash(e) {
    const menu = document.getElementById('slashMenu');
    if (!menu?.classList.contains('show')) return false;
    const items = slashItems();
    if (e.key === 'ArrowDown') { e.preventDefault(); slashIdx = Math.min(slashIdx + 1, items.length - 1); actualizarMenuSlash(); return true; }
    if (e.key === 'ArrowUp') { e.preventDefault(); slashIdx = Math.max(slashIdx - 1, 0); actualizarMenuSlash(); return true; }
    if (e.key === 'Enter') { e.preventDefault(); elegirSlash(slashIdx); return true; }
    if (e.key === 'Escape') { menu.classList.remove('show'); slashIdx = -1; return true; }
    return false;
  }
  function updateMainBtn() {
    const input = document.getElementById('msgInput');
    const mainBtn = document.getElementById('mainBtn');
    if (!input || !mainBtn) return;
    const hay = input.value.trim().length > 0;
    mainBtn.innerHTML = hay ? I(SVG.send) : I(SVG.mic);
    mainBtn.setAttribute('aria-label', hay ? 'Enviar mensaje' : 'Grabar audio');
  }

  /* ── Drawer de contacto ── */
  function abrirDrawer() {
    if (!currentLead) return;
    const nombre = currentLead.customer_name || 'Cliente';
    const vend = currentLead.assigned_to_nombre || '—';
    $drawer.innerHTML = `
      <button class="drawer-close" id="drawerClose">${I(SVG.x, 14)}</button>
      <div class="drawer__head">
        <div class="avatar" style="background:${avatarColor(nombre)};width:56px;height:56px;font-size:18px">${initials(nombre)}</div>
        <div class="drawer__name">${escapeHtml(nombre)}</div>
        <div class="drawer__phone">
          <span>${escapeHtml(fmtPhone(currentLead.customer_phone))}</span>
          <button class="drawer__copy" id="copiarTel">Copiar</button>
          <button class="drawer__copy" id="editarNombre">${I(SVG.pencil, 12)} Editar</button>
        </div>
      </div>
      <div class="drawer__sec">
        <h4>Buscar en la conversación</h4>
        <input type="text" id="buscarConv" placeholder="Escribe para resaltar…" aria-label="Buscar mensajes">
        <div id="buscarInfo" style="color:var(--text-3);font-size:11.5px;margin-top:5px"></div>
      </div>
      <div class="drawer__sec">
        <h4>Detalles</h4>
        <div class="drawer__row"><span>Etiqueta</span><strong style="color:var(--gold)">${etqLabel(currentLead.etiqueta || 'sin_clasificar')}</strong></div>
        <div class="drawer__row"><span>Estado</span><strong>${escapeHtml(currentLead.status || 'nuevo')}</strong></div>
        <div class="drawer__row"><span>Vendedor</span><strong>${escapeHtml(vend)}</strong></div>
        <div class="drawer__row"><span>Mensajes</span><strong>${currentLead.messages_count || 0}</strong></div>
        <div class="drawer__row"><span>Creado</span><strong>${soloHora(currentLead.created_at)}</strong></div>
      </div>`;
    $drawer.classList.add('show'); $overlay.classList.add('show');
    document.getElementById('drawerClose').addEventListener('click', cerrarDrawer);
    $overlay.onclick = cerrarDrawer;
    document.getElementById('copiarTel').addEventListener('click', async () => {
      try { await navigator.clipboard.writeText(currentLead.customer_phone); toast('Teléfono copiado', 'ok'); }
      catch (e) { toast('No se pudo copiar', 'err'); }
    });
    document.getElementById('editarNombre').addEventListener('click', async () => {
      const nuevo = prompt('Nombre del contacto:', currentLead.customer_name || '');
      if (!nuevo?.trim()) return;
      const r = await api(`/api/leads/${currentLead.id}/nombre`, {
        method: 'POST', headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ nombre: nuevo.trim() }),
      });
      if (r !== null) { currentLead.customer_name = nuevo.trim(); toast('Nombre actualizado', 'ok'); await cargarLeads(); await abrirLead(currentLead.id); abrirDrawer(); }
      else toast('Error al actualizar', 'err');
    });
    document.getElementById('buscarConv').addEventListener('input', ev => buscarEnConversacion(ev.target.value));
  }
  function cerrarDrawer() {
    $drawer.classList.remove('show'); $overlay.classList.remove('show');
    buscarEnConversacion('');
    $overlay.onclick = null;
  }
  function buscarEnConversacion(term) {
    const msgs = document.querySelectorAll('#msgs .bubble');
    const info = document.getElementById('buscarInfo');
    const t = String(term || '').trim().toLowerCase();
    let hits = 0, primero = null;
    msgs.forEach(m => {
      if (!t) { m.style.opacity = ''; m.style.outline = ''; return; }
      const match = m.textContent.toLowerCase().includes(t);
      m.style.opacity = match ? '1' : '.2';
      m.style.outline = match ? '1px solid var(--gold-line)' : '';
      if (match) { hits++; if (!primero) primero = m; }
    });
    if (info) info.textContent = t ? (hits ? `${hits} mensaje(s) encontrado(s)` : 'Sin coincidencias') : '';
    if (primero) primero.scrollIntoView({ behavior: 'smooth', block: 'center' });
  }

  /* ── Wiring de filtros ── */
  function wiring() {
    document.getElementById('buscar').addEventListener('input', e => { termBusqueda = e.target.value.trim(); renderLeads(); });
    document.querySelectorAll('.vnd-chip').forEach(c => c.addEventListener('click', () => {
      document.querySelectorAll('.vnd-chip').forEach(x => x.classList.remove('active'));
      c.classList.add('active');
      filtroActivo = c.dataset.f;
      renderLeads();
    }));
    document.addEventListener('keydown', e => {
      const enCampo = /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);
      if (e.key === '/' && !enCampo) { e.preventDefault(); const b = document.getElementById('buscar'); b?.focus(); b?.select(); }
      if (e.key === 'Escape') {
        if (window.innerWidth <= 720 && !$thread.classList.contains('hide')) {
          document.getElementById('vndList').classList.remove('hide'); $thread.classList.add('hide');
        }
      }
    });
  }

  /* ── SSE tiempo real ── */
  function conectarStream() {
    const es = new EventSource('/api/stream');
    const dot = () => document.getElementById('connDot');
    es.onopen = () => dot()?.classList.add('on');
    es.addEventListener('conectado', () => dot()?.classList.add('on'));
    es.addEventListener('nuevo_mensaje', async ev => {
      try {
        const data = JSON.parse(ev.data);
        await cargarLeads();
        if (currentLead && data.leadId === currentLead.id) {
          const r = await api(`/api/leads/${currentLead.id}/mensajes`);
          if (r) renderChat(r.lead, r.mensajes);
        }
        if (data.tipo === 'mensaje_cliente') {
          toast('Nuevo mensaje de un cliente');
          try { new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=').play(); } catch (e) { }
          try { if (navigator.vibrate) navigator.vibrate([120, 60, 120]); } catch (e) { }
        }
      } catch (err) { console.error('SSE error:', err); }
    });
    es.onerror = () => { dot()?.classList.remove('on'); es.close(); setTimeout(conectarStream, 5000); };
  }

  /* ── Auto-poll fallback (30s) ── */
  setInterval(async () => {
    if (!currentLead) return;
    const r = await api(`/api/leads/${currentLead.id}/mensajes`);
    if (r) { renderChat(r.lead, r.mensajes); await cargarLeads(); }
  }, 30000);

  /* ── PWA / Push ── */
  if ('serviceWorker' in navigator) {
    navigator.serviceWorker.register('/sw.js').then(() => activarPush()).catch(() => { });
    navigator.serviceWorker.addEventListener('message', ev => {
      if (ev.data?.type === 'open_lead' && ev.data.leadId) abrirLead(Number(ev.data.leadId));
    });
  }

  async function activarPush() {
    try {
      if (!('Notification' in window) || !('PushManager' in window)) return;
      const r = await fetch('/api/push/clave');
      if (!r.ok) return;
      const { publicKey, enabled } = await r.json();
      if (!enabled || !publicKey) return;
      if (Notification.permission === 'denied') return;
      if (Notification.permission === 'default') {
        const perm = await Notification.requestPermission();
        if (perm !== 'granted') return;
      }
      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if (!sub) {
        const padding = '='.repeat((4 - publicKey.length % 4) % 4);
        const base64 = (publicKey + padding).replace(/-/g, '+').replace(/_/g, '/');
        const raw = atob(base64);
        const arr = new Uint8Array(raw.length);
        for (let i = 0; i < raw.length; i++) arr[i] = raw.charCodeAt(i);
        sub = await reg.pushManager.subscribe({ userVisibleOnly: true, applicationServerKey: arr });
      }
      await fetch('/api/push/suscribir', { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify({ subscription: sub }) });
    } catch (e) { }
  }
})();
</script>
