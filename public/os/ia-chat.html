<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>SP OS · Chat IA</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
<style>
.ai-bar { display:flex; gap:10px; align-items:center; padding:10px 20px; border-bottom:1px solid var(--border-soft); background:var(--bg-0); flex-wrap:wrap; }
.ai-bar select, .ai-bar input { background:var(--bg-2); border:1px solid var(--border); border-radius:10px; color:var(--text); padding:8px 11px; font-family:var(--f-ui); font-size:12.5px; outline:none; }
.ai-bar select { min-width:150px; cursor:pointer; }
.ai-bar .ai-model { flex:1; min-width:180px; }
.ai-bar label { font-size:11px; color:var(--text-3); letter-spacing:.04em; }
.ai-gear { background:var(--bg-3); border:1px solid var(--border); border-radius:10px; color:var(--text-2); padding:8px 12px; font-size:12.5px; cursor:pointer; display:flex; align-items:center; gap:6px; white-space:nowrap; }
.ai-gear:hover { color:var(--gold); border-color:var(--gold); }
#chatBox { flex:1; overflow-y:auto; padding:20px 24px; display:flex; flex-direction:column; gap:14px; min-height:0; }
.msg { max-width:75%; padding:12px 16px; border-radius:14px; font-size:13.5px; line-height:1.5; word-wrap:break-word; white-space:pre-wrap; animation: msgIn .2s ease; }
.msg.user { align-self:flex-end; background:var(--gold); color:#000; border-bottom-right-radius:4px; }
.msg.bot { align-self:flex-start; background:var(--bg-2); color:var(--text); border:1px solid var(--border-soft); border-bottom-left-radius:4px; }
.msg .msg-meta { display:block; font-size:10px; opacity:.5; margin-top:6px; }
@keyframes msgIn { from { opacity:0; transform:translateY(8px) scale(.98); } to { opacity:1; transform:translateY(0) scale(1); } }
.typing { align-self:flex-start; display:flex; gap:4px; padding:14px 20px; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:14px; border-bottom-left-radius:4px; }
.typing span { width:7px; height:7px; border-radius:50%; background:var(--text-3); animation: blink 1.2s infinite; }
.typing span:nth-child(2) { animation-delay:.2s; }
.typing span:nth-child(3) { animation-delay:.4s; }
@keyframes blink { 0%,100% { opacity:.3; } 50% { opacity:1; } }
.empty-chat { flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; color:var(--text-3); text-align:center; gap:12px; }
.empty-chat svg { width:48px; height:48px; opacity:.15; }
.empty-chat h3 { font-family:var(--f-title); font-size:13px; letter-spacing:.12em; color:var(--text-2); }
/* Modal proveedores */
.pm-ov { position:fixed; inset:0; background:rgba(0,0,0,.6); backdrop-filter:blur(4px); z-index:200; display:none; align-items:center; justify-content:center; padding:20px; }
.pm-ov.show { display:flex; }
.pm { background:var(--bg-1); border:1px solid var(--border); border-radius:18px; width:100%; max-width:560px; max-height:88vh; overflow-y:auto; padding:22px; }
.pm h3 { font-family:var(--f-title); font-size:15px; margin-bottom:4px; }
.pm .pm-sub { font-size:12px; color:var(--text-3); margin-bottom:16px; }
.pm-presets { display:flex; gap:8px; flex-wrap:wrap; margin-bottom:16px; }
.pm-preset { background:var(--bg-3); border:1px solid var(--border); border-radius:9px; color:var(--text-2); padding:7px 12px; font-size:12px; cursor:pointer; }
.pm-preset:hover { border-color:var(--gold); color:var(--gold); }
.pm-card { border:1px solid var(--border-soft); border-radius:12px; padding:14px; margin-bottom:12px; background:var(--bg-2); }
.pm-card .pm-row { display:flex; gap:10px; align-items:center; margin-bottom:8px; }
.pm-card input { width:100%; background:var(--bg-0); border:1px solid var(--border); border-radius:9px; color:var(--text); padding:9px 11px; font-size:12.5px; outline:none; }
.pm-card label { font-size:10.5px; color:var(--text-3); display:block; margin-bottom:3px; letter-spacing:.04em; }
.pm-fld { flex:1; }
.pm-del { background:none; border:none; color:var(--red); cursor:pointer; font-size:12px; padding:4px 8px; }
.pm-def { display:flex; align-items:center; gap:6px; font-size:11.5px; color:var(--text-2); cursor:pointer; }
.pm-actions { display:flex; gap:10px; justify-content:flex-end; margin-top:8px; }
.pm-btn { border:none; border-radius:10px; padding:10px 18px; font-size:13px; cursor:pointer; font-family:var(--f-ui); }
.pm-btn.save { background:var(--gold); color:#000; font-weight:600; }
.pm-btn.ghost { background:var(--bg-3); color:var(--text-2); border:1px solid var(--border); }
</style>
</head>
<body>
<script src="/os/sp-shell.js"></script>
<script>
(async function () {
  const { ICONS, api, toast, esc } = SPOS;

  const ctx = await SPOS.mount({
    active: 'ia-chat', title: 'Chat IA', crumb: 'Copiloto SP — cualquier modelo, tu API key', padded: false
  });
  if (!ctx) return;

  ctx.content.innerHTML = `
    <div style="display:flex;flex-direction:column;height:100%;min-height:0">
      <div class="ai-bar">
        <label>Proveedor</label>
        <select id="provSel"></select>
        <label>Modelo</label>
        <input class="ai-model" id="modelInp" list="modelList" placeholder="ej: openai/gpt-4o" autocomplete="off">
        <datalist id="modelList"></datalist>
        <button class="ai-gear" id="btnProv">⚙ Proveedores</button>
      </div>
      <div id="chatBox"><div class="empty-chat">${ICONS.spark}
        <h3>Copiloto SP</h3>
        <p style="font-size:13px;max-width:320px">Elige un proveedor y un modelo arriba, y pregúntame lo que necesites: redactar mensajes, analizar leads, estrategias de venta o cualquier duda.</p>
      </div></div>
      <div style="padding:14px 20px;border-top:1px solid var(--border-soft);background:var(--bg-0);display:flex;gap:10px;align-items:flex-end">
        <div style="flex:1;position:relative">
          <textarea id="chatInput" rows="1" placeholder="Escribe un mensaje..." style="width:100%;background:var(--bg-2);border:1px solid var(--border);border-radius:12px;color:var(--text);padding:11px 14px;font-family:var(--f-ui);font-size:13.5px;outline:none;resize:none;max-height:120px;line-height:1.4"
            oninput="this.style.height='auto';this.style.height=Math.min(this.scrollHeight,120)+'px'"
            onkeydown="if(event.key==='Enter'&&!event.shiftKey){event.preventDefault();window.__aiEnviar()}"></textarea>
        </div>
        <button id="btnSend" class="btn" style="height:40px;width:40px;border-radius:12px;background:var(--gold);color:#000;border:none;display:grid;place-items:center;flex-shrink:0;cursor:pointer">${ICONS.up.replace('<svg ','<svg style="width:18px;height:18px" ')}</button>
        <button id="btnClear" class="btn" style="height:40px;width:40px;border-radius:12px;background:var(--bg-3);color:var(--text-3);border:1px solid var(--border);display:grid;place-items:center;flex-shrink:0;cursor:pointer" title="Limpiar conversación">${ICONS.zap.replace('<svg ','<svg style="width:16px;height:16px" ')}</button>
      </div>
    </div>
    <div class="pm-ov" id="pmOv"><div class="pm">
      <h3>Proveedores de IA</h3>
      <div class="pm-sub">Agrega cualquier proveedor compatible con OpenAI (OpenRouter, OpenAI, DeepSeek, Groq…) con su propia API key.</div>
      <div class="pm-presets" id="pmPresets"></div>
      <div id="pmList"></div>
      <div class="pm-actions">
        <button class="pm-btn ghost" id="pmCancel">Cancelar</button>
        <button class="pm-btn save" id="pmSave">Guardar</button>
      </div>
    </div></div>`;

  const chatBox = document.getElementById('chatBox');
  const chatInput = document.getElementById('chatInput');
  const btnSend = document.getElementById('btnSend');
  const btnClear = document.getElementById('btnClear');
  const provSel = document.getElementById('provSel');
  const modelInp = document.getElementById('modelInp');
  const modelList = document.getElementById('modelList');

  let history = [];
  let providers = [];   // { id, name, baseUrl, hasKey, keyMask, models }
  let presets = {};
  let defaultId = '';

  /* ── Proveedores / modelos ── */
  async function loadProviders() {
    const r = await api('/api/ai/providers');
    if (!r) return;
    providers = r.providers || [];
    presets = r.presets || {};
    defaultId = r.defaultId || (providers[0] && providers[0].id) || '';
    provSel.innerHTML = providers.map(p =>
      `<option value="${esc(p.id)}">${esc(p.name)}${p.hasKey ? '' : ' (sin key)'}</option>`).join('');
    const savedProv = localStorage.getItem('sp_ai_provider');
    provSel.value = (savedProv && providers.some(p => p.id === savedProv)) ? savedProv : defaultId;
    await onProviderChange(false);
  }

  async function onProviderChange(resetModel) {
    const p = providers.find(x => x.id === provSel.value);
    localStorage.setItem('sp_ai_provider', provSel.value);
    // Poblar datalist con modelos conocidos del proveedor
    let models = (p && p.models) || [];
    modelList.innerHTML = models.map(m => `<option value="${esc(m)}">`).join('');
    const savedModel = localStorage.getItem('sp_ai_model_' + provSel.value);
    if (resetModel || !modelInp.value) modelInp.value = savedModel || models[0] || '';
    // Intentar traer la lista completa del proveedor en segundo plano
    if (p && p.hasKey) {
      const mr = await api('/api/ai/models?providerId=' + encodeURIComponent(provSel.value));
      if (mr && mr.models && mr.models.length) {
        modelList.innerHTML = mr.models.map(m => `<option value="${esc(m)}">`).join('');
        if (!modelInp.value) modelInp.value = savedModel || mr.models[0] || '';
      }
    }
  }

  provSel.addEventListener('change', () => onProviderChange(true));
  modelInp.addEventListener('change', () => localStorage.setItem('sp_ai_model_' + provSel.value, modelInp.value.trim()));

  /* ── Chat ── */
  function addMsg(role, text, meta) {
    const empty = chatBox.querySelector('.empty-chat');
    if (empty) empty.remove();
    const div = document.createElement('div');
    div.className = 'msg ' + role;
    div.textContent = text;
    if (meta) { const s = document.createElement('span'); s.className = 'msg-meta'; s.textContent = meta; div.appendChild(s); }
    chatBox.appendChild(div);
    chatBox.scrollTop = chatBox.scrollHeight;
    history.push({ role: role === 'user' ? 'Usuario' : 'Asistente', content: text });
  }
  function showTyping() {
    const div = document.createElement('div');
    div.className = 'typing'; div.id = 'typingIndicator';
    div.innerHTML = '<span></span><span></span><span></span>';
    chatBox.appendChild(div); chatBox.scrollTop = chatBox.scrollHeight;
  }
  function hideTyping() { const el = document.getElementById('typingIndicator'); if (el) el.remove(); }

  async function enviar() {
    const msg = chatInput.value.trim();
    if (!msg) return;
    const model = modelInp.value.trim();
    if (!model) { toast('Elige o escribe un modelo', 'err'); return; }
    localStorage.setItem('sp_ai_model_' + provSel.value, model);
    chatInput.value = ''; chatInput.style.height = 'auto';
    addMsg('user', msg);
    btnSend.disabled = true; showTyping();
    try {
      const r = await api('/api/nlp/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ message: msg, history: history.slice(0, -1), providerId: provSel.value, model })
      });
      hideTyping();
      if (r && r.ok && r.reply) addMsg('bot', r.reply, r.model || model);
      else addMsg('bot', 'Error: ' + (r?.error || 'No se pudo conectar con la IA. ¿API key configurada para este proveedor?'));
    } catch (e) { hideTyping(); addMsg('bot', 'Error de conexión: ' + e.message); }
    btnSend.disabled = false; chatInput.focus();
  }
  window.__aiEnviar = enviar;

  btnSend.addEventListener('click', enviar);
  btnClear.addEventListener('click', () => {
    if (!confirm('¿Limpiar la conversación?')) return;
    history = [];
    chatBox.innerHTML = `<div class="empty-chat">${ICONS.spark}
      <h3>Copiloto SP</h3>
      <p style="font-size:13px;max-width:320px">Elige un proveedor y un modelo arriba, y pregúntame lo que necesites.</p>
    </div>`;
  });

  /* ── Modal de proveedores ── */
  const pmOv = document.getElementById('pmOv');
  const pmList = document.getElementById('pmList');
  const pmPresets = document.getElementById('pmPresets');
  let editing = []; // copia editable

  function renderPresets() {
    pmPresets.innerHTML = Object.keys(presets).map(k =>
      `<button class="pm-preset" data-preset="${esc(k)}">+ ${esc(presets[k].name)}</button>`).join('')
      + `<button class="pm-preset" data-preset="__custom">+ Personalizado</button>`;
    pmPresets.querySelectorAll('[data-preset]').forEach(b => b.onclick = () => {
      const k = b.dataset.preset;
      if (k === '__custom') {
        editing.push({ id: 'custom-' + editing.length + '-' + (modelInp.value ? modelInp.value.length : 0) + Math.floor(performance.now()), name: 'Nuevo proveedor', baseUrl: '', apiKey: '', keyMask: '', models: [], hasKey: false });
        renderList(); return;
      }
      const pr = presets[k];
      if (editing.some(e => e.id === k)) { toast('Ya está agregado', 'err'); return; }
      editing.push({ id: k, name: pr.name, baseUrl: pr.baseUrl, apiKey: '', keyMask: '', models: [], hasKey: false });
      renderList();
    });
  }
  function renderList() {
    pmList.innerHTML = editing.map((p, i) => `
      <div class="pm-card">
        <div class="pm-row">
          <div class="pm-fld"><label>Nombre</label><input data-f="name" data-i="${i}" value="${esc(p.name || '')}"></div>
          <button class="pm-del" data-del="${i}">Quitar</button>
        </div>
        <div class="pm-row"><div class="pm-fld"><label>Base URL</label><input data-f="baseUrl" data-i="${i}" value="${esc(p.baseUrl || '')}" placeholder="https://api.openai.com/v1"></div></div>
        <div class="pm-row"><div class="pm-fld"><label>API Key</label><input data-f="apiKey" data-i="${i}" type="password" autocomplete="off" value="" placeholder="${p.hasKey ? esc(p.keyMask) + ' (deja vacío para conservar)' : 'sk-...'}"></div></div>
        <div class="pm-row"><div class="pm-fld"><label>Modelos sugeridos (separados por coma, opcional)</label><input data-f="models" data-i="${i}" value="${esc((p.models || []).join(', '))}" placeholder="openai/gpt-4o, anthropic/claude-3.5-sonnet"></div></div>
        <label class="pm-def"><input type="radio" name="pmdef" data-def="${esc(p.id)}" ${p.id === defaultId ? 'checked' : ''}> Usar como predeterminado</label>
      </div>`).join('') || '<div style="color:var(--text-3);font-size:12.5px;padding:8px 0">Sin proveedores. Agrega uno con los botones de arriba.</div>';
    pmList.querySelectorAll('input[data-f]').forEach(inp => inp.oninput = () => {
      const i = +inp.dataset.i, f = inp.dataset.f;
      if (f === 'models') editing[i][f] = inp.value.split(',').map(s => s.trim()).filter(Boolean);
      else editing[i][f] = inp.value;
    });
    pmList.querySelectorAll('[data-del]').forEach(b => b.onclick = () => { editing.splice(+b.dataset.del, 1); renderList(); });
    pmList.querySelectorAll('[data-def]').forEach(r => r.onchange = () => { defaultId = r.dataset.def; });
  }
  function openModal() {
    editing = providers.map(p => ({ ...p, apiKey: '' })); // apiKey vacío = conservar
    renderPresets(); renderList();
    pmOv.classList.add('show');
  }
  document.getElementById('btnProv').onclick = openModal;
  document.getElementById('pmCancel').onclick = () => pmOv.classList.remove('show');
  pmOv.onclick = e => { if (e.target === pmOv) pmOv.classList.remove('show'); };
  document.getElementById('pmSave').onclick = async () => {
    // Actualizar id de nuevos proveedores según el nombre (para que sean estables)
    const payload = editing.map(p => ({ id: p.id, name: p.name, baseUrl: p.baseUrl, apiKey: p.apiKey, models: p.models }));
    const r = await api('/api/ai/providers', {
      method: 'POST', headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ providers: payload, defaultId })
    });
    if (r && r.ok) { toast('Proveedores guardados', 'ok'); pmOv.classList.remove('show'); await loadProviders(); }
    else toast('Error al guardar', 'err');
  };

  await loadProviders();
  chatInput.focus();
})();
</script>
</body>
</html>
