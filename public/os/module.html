<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>SP OS</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
</head>
<body>
<script src="/os/sp-shell.js"></script>
<script>
(async function () {
  const { ICONS } = SPOS;
  const params = new URLSearchParams(location.search);
  const key = params.get('m') || 'module';

  // Metadatos por módulo (mismo lenguaje visual, distinto contenido)
  const MODULES = {
    pipeline:      { icon:'pipeline', title:'Pipeline', desc:'Tablero Kanban con arrastrar y soltar para mover leads por cada etapa comercial. Vista integrada con el CRM.', feats:['Columnas por etapa','Drag & drop fluido','Valor estimado por columna','Filtros por asesor y campaña'] },
    clients:       { icon:'clients', title:'Clientes', desc:'Base unificada de clientes con historial completo, propiedades vinculadas y valor de vida.', feats:['Ficha 360° del cliente','Historial de compras','Documentos y contratos','Segmentación inteligente'] },
    properties:    { icon:'properties', title:'Propiedades', desc:'Catálogo visual de lotes y proyectos con fichas premium, ubicación en mapa y disponibilidad en vivo.', feats:['Tarjetas de propiedad','Mapa interactivo','Estado de disponibilidad','Vincular a leads'] },
    projects:      { icon:'projects', title:'Proyectos', desc:'Gestión de proyectos inmobiliarios por fases, con avances y asignación de recursos.', feats:['Fases y milestones','Avance por proyecto','Asignación de equipo','Documentación central'] },
    campaigns:     { icon:'campaigns', title:'Campañas Meta', desc:'Crea y monitorea campañas de Facebook e Instagram Ads sin salir del sistema. Atribución de lead a cierre.', feats:['Lanzar campañas','Atribución completa','Costo por lead','A/B testing de creativos'] },
    automations:   { icon:'automations', title:'Automatizaciones', desc:'Constructor visual de flujos tipo n8n integrado. Nodos minimalistas para automatizar seguimiento y escalamiento.', feats:['Editor de nodos','Disparadores por evento','Secuencias de follow-up','Integración con IA'] },
    calendar:      { icon:'calendar', title:'Calendario', desc:'Agenda unificada de citas y visitas. Sincronización con Google Calendar y recordatorios automáticos.', feats:['Vista día / semana / mes','Sincronización Google','Recordatorios por WhatsApp','Disponibilidad por asesor'] },
    analytics:     { icon:'analytics', title:'Analytics', desc:'Inteligencia de negocio con embudos, cohortes y rendimiento. Conectado a los reportes reales del backend.', feats:['Embudos de conversión','Tiempos de respuesta','Distribución por canal','Exportación de datos'] },
    billing:       { icon:'billing', title:'Facturación & Suscripciones', desc:'Núcleo SaaS: planes, consumo, facturas y métodos de pago para vender SP OS por suscripción.', feats:['Planes y precios','Uso de API y tokens IA','Facturas y renovaciones','Multiempresa aislada'] },
    marketplace:   { icon:'marketplace', title:'Marketplace', desc:'Módulos verticales sobre el mismo núcleo: SP Inmobiliaria, SP Barber, SP Commerce, SP Health y más.', feats:['SP Inmobiliaria 🏡','SP Barber 💈','SP Commerce 🛍','SP Health 🏥'] },
    settings:      { icon:'settings', title:'Configuración', desc:'Identidad de la empresa, dominio, logo, colores, equipo y canales conectados.', feats:['Marca y dominio','Canales (WhatsApp, Meta)','Roles y permisos','Preferencias del workspace'] },
    team:          { icon:'team', title:'Equipo', desc:'Gestión de asesores, roles y permisos granulares. Rendimiento individual y asignación de leads.', feats:['Asesores y roles','Permisos granulares','Round-robin de leads','Rendimiento por persona'] },
  };
  const mod = MODULES[key] || { icon:'settings', title:'Módulo', desc:'Este módulo forma parte del ecosistema SP OS.', feats:[] };

  const ctx = await SPOS.mount({ active: key, title: mod.title, crumb: 'SP OS · ' + mod.title, padded: true });

  ctx.content.innerHTML = `
   <div class="os-content__max">
    <div class="card rise rise-1" style="padding:var(--s5);border-color:var(--gold-line);background:linear-gradient(160deg,var(--bg-2),rgba(200,164,90,.04));text-align:center;max-width:640px;margin:var(--s4) auto 0">
      <div class="metric__icon" style="width:56px;height:56px;margin:0 auto var(--s3);border-radius:16px">${ICONS[mod.icon]}</div>
      <div class="t-h1" style="margin-bottom:10px">${mod.title}</div>
      <p class="t-dim" style="font-size:15px;line-height:1.6;max-width:480px;margin:0 auto var(--s4)">${mod.desc}</p>
      <div class="grid grid--2" style="text-align:left;max-width:520px;margin:0 auto var(--s4)">
        ${mod.feats.map(f => `<div class="u-row u-gap2" style="padding:11px 14px;background:var(--bg-1);border:1px solid var(--border-soft);border-radius:var(--r-sm)">
          <span style="color:var(--gold)">${ICONS.check.replace('<svg ','<svg style="width:16px;height:16px" ')}</span>
          <span style="font-size:13px;font-weight:500">${f}</span></div>`).join('')}
      </div>
      <div class="u-row u-gap2" style="justify-content:center">
        <span class="badge badge--gold">En construcción</span>
        <a class="btn btn--ghost btn--sm" href="/os/dashboard.html">Volver al Dashboard</a>
      </div>
    </div>
   </div>`;
})();
</script>
</body>
</html>
