<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<title>SP OS · Equipo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
</head>
<body>
<script src="/os/sp-shell.js"></script>
<script>
(async function () {
  const { ICONS, api, fmt, avatarColor, initials, toast } = SPOS;

  const ctx = await SPOS.mount({
    active: 'team', title: 'Equipo', crumb: 'Asesores y rendimiento', padded: true, adminOnly: true,
    action: `<button class="btn btn--gold btn--sm" id="add">${ICONS.plus}Agregar asesor</button>`
  });

  let m = await api('/api/metricas');
  let stats = await api('/api/stats');
  if (!m) m = { porVendedor: [] };
  if (!stats) stats = { totalVendedores: 0, vendedoresActivos: 0 };
  const team = m.porVendedor || [];
  const totalLeads = team.reduce((s,v)=>s+v.total,0);
  const totalVend = team.reduce((s,v)=>s+v.vendidos,0);
  const avgConv = team.length ? Math.round(team.reduce((s,v)=>s+v.conversion,0)/team.length) : 0;
  const topId = team.slice().sort((a,b)=>b.vendidos-a.vendidos)[0]?.id;

  ctx.content.innerHTML = `
   <div class="os-content__max">
    <div class="grid grid--4 rise rise-1" style="margin-bottom:var(--s3)">
      ${metric('team','Asesores', fmt.n(stats.totalVendedores))}
      ${metric('activity','Activos ahora', fmt.n(stats.vendedoresActivos))}
      ${metric('money','Cierres del equipo', fmt.n(totalVend))}
      ${metric('target','Conversión media', avgConv+'%')}
    </div>

    <div class="grid grid--3 rise rise-2" style="margin-bottom:var(--s3)">
      ${team.map((v,i)=>{
        const share = totalLeads ? Math.round((v.total/totalLeads)*100) : 0;
        return `<div class="card card--pad card--float">
          <div class="u-between" style="margin-bottom:var(--s2)">
            <div class="u-row u-gap2">
              <div class="avatar avatar--md" style="background:${avatarColor(v.nombre)}">${initials(v.nombre)}</div>
              <div><div style="font-weight:600">${v.nombre}</div>
              <div class="u-row u-gap1" style="font-size:11.5px"><span class="dot dot--${v.estado==='activo'?'green':'mute'}"></span><span class="t-dim3">${v.estado}</span></div></div>
            </div>
            ${v.id===topId?`<span class="badge badge--gold">${ICONS.flame.replace('<svg ','<svg style="width:12px;height:12px" ')}Top</span>`:''}
          </div>
          <div class="grid grid--3" style="gap:8px;margin-bottom:var(--s2)">
            ${miniStat('Leads', fmt.n(v.total))}
            ${miniStat('Activos', fmt.n(v.activos))}
            ${miniStat('Cierres', fmt.n(v.vendidos))}
          </div>
          <div class="u-between" style="margin-bottom:6px"><span class="t-dim3" style="font-size:11.5px">Conversión</span><span style="font-size:12px;font-weight:600" class="${v.conversion>=15?'t-green':'t-gold'}">${v.conversion}%</span></div>
          <div style="height:8px;background:var(--bg-4);border-radius:999px;overflow:hidden"><div style="height:100%;width:${Math.min(100,v.conversion*4)}%;background:${v.conversion>=15?'var(--green)':'var(--gold)'};border-radius:999px"></div></div>
          <div class="t-dim3" style="font-size:11px;margin-top:10px">${share}% de la carga total del equipo</div>
        </div>`;
      }).join('') || `<div class="empty" style="grid-column:1/-1">${ICONS.team}<div>Aún no hay asesores</div></div>`}
    </div>

    <div class="card rise rise-3" style="overflow:hidden">
      <div class="card--pad" style="padding-bottom:var(--s2)"><div class="t-h3">Ranking de rendimiento</div></div>
      <table class="table">
        <thead><tr><th>#</th><th>Asesor</th><th>Estado</th><th>Leads</th><th>Activos</th><th>Cierres</th><th>Conversión</th></tr></thead>
        <tbody>${team.slice().sort((a,b)=>b.vendidos-a.vendidos).map((v,i)=>`<tr>
          <td class="t-num t-dim3">${i+1}</td>
          <td><div class="u-row u-gap2"><div class="avatar avatar--sm" style="background:${avatarColor(v.nombre)}">${initials(v.nombre)}</div><span style="font-weight:500">${v.nombre}</span></div></td>
          <td><span class="badge badge--${v.estado==='activo'?'green':'mute'}">${v.estado}</span></td>
          <td class="t-num">${fmt.n(v.total)}</td>
          <td class="t-num t-dim">${fmt.n(v.activos)}</td>
          <td class="t-num">${fmt.n(v.vendidos)}</td>
          <td><span class="badge badge--${v.conversion>=15?'green':v.conversion>=8?'gold':'mute'}">${v.conversion}%</span></td>
        </tr>`).join('')}</tbody>
      </table>
    </div>
   </div>`;

  document.getElementById('add').addEventListener('click', ()=>{
    const overlay = document.createElement('div');
    overlay.style.cssText = 'position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:999;display:grid;place-items:center;animation:fadeIn .2s ease';
    overlay.innerHTML = `
      <div style="background:var(--bg-1);border:1px solid var(--border-soft);border-radius:16px;padding:28px;width:90%;max-width:380px;animation:slideUp .25s var(--ease)">
        <div style="font-size:16px;font-weight:600;margin-bottom:20px">Agregar asesor</div>
        <form id="addForm" style="display:flex;flex-direction:column;gap:14px">
          <input name="nombre" placeholder="Nombre completo" required style="background:var(--bg);border:1px solid var(--border-soft);border-radius:10px;padding:12px;color:var(--txt);font-size:14px;font-family:inherit;outline:none">
          <input name="telefono" placeholder="+573XXXXXXXXX" required pattern="\\+573\\d{9}" style="background:var(--bg);border:1px solid var(--border-soft);border-radius:10px;padding:12px;color:var(--txt);font-size:14px;font-family:inherit;outline:none">
          <input name="pin" placeholder="PIN de 4 dígitos" required pattern="\\d{4}" maxlength="4" inputmode="numeric" style="background:var(--bg);border:1px solid var(--border-soft);border-radius:10px;padding:12px;color:var(--txt);font-size:14px;font-family:inherit;outline:none">
          <div style="display:flex;gap:10px;margin-top:6px">
            <button type="button" id="cancelAdd" style="flex:1;padding:12px;border-radius:10px;border:1px solid var(--border-soft);background:transparent;color:var(--txt2);font-size:14px;font-family:inherit;cursor:pointer">Cancelar</button>
            <button type="submit" style="flex:1;padding:12px;border-radius:10px;border:none;background:var(--gold);color:#0A0A0A;font-size:14px;font-weight:600;font-family:inherit;cursor:pointer">Crear</button>
          </div>
        </form>
      </div>`;
    document.body.appendChild(overlay);
    overlay.addEventListener('click', e=>{ if(e.target===overlay) overlay.remove(); });
    overlay.querySelector('#cancelAdd').addEventListener('click', ()=> overlay.remove());
    overlay.querySelector('#addForm').addEventListener('submit', async e=>{
      e.preventDefault();
      const fd = new FormData(e.target);
      const nombre = fd.get('nombre').trim();
      const telefono = fd.get('telefono').trim();
      const pin = fd.get('pin').trim();
      if(!nombre || !telefono || !pin){ toast('Campos requeridos','error'); return; }
      try {
        const r = await api('/api/vendedores', { method:'POST', headers:{'Content-Type':'application/json'}, body: JSON.stringify({ nombre, telefono, pin }) });
        if(r && r.vendedorId){
          toast('Asesor creado');
          overlay.remove();
          setTimeout(()=> location.reload(), 600);
        } else {
          toast(r?.error || 'Error al crear','error');
        }
      } catch(err){ toast('Error de conexión','error'); }
    });
  });

  function metric(icon,label,value){ return `<div class="metric"><div class="metric__top"><div class="metric__icon">${ICONS[icon]}</div></div><div><div class="metric__value t-num">${value}</div><div class="metric__label">${label}</div></div></div>`; }
  function miniStat(k,v){ return `<div style="background:var(--bg-1);border:1px solid var(--border-soft);border-radius:10px;padding:9px;text-align:center"><div class="t-num" style="font-size:16px;font-weight:600">${v}</div><div class="t-dim3" style="font-size:10.5px">${k}</div></div>`; }
})();
</script>
</body>
</html>
