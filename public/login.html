<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SP Panel">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>SP Inmobiliaria — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Apple Design System · SP Inmobiliaria ── */
  :root{
    --bg:#040406; --bg2:#0A0A0E; --bg3:#121218;
    --txt:#F5F0E8; --txt2:rgba(245,240,232,.45); --txt3:rgba(245,240,232,.22);
    --oro:#D4AF37; --oro2:#A8872B; --rojo:#FF453A;
    --e2:0 8px 30px rgba(0,0,0,.5); --e3:0 20px 60px rgba(0,0,0,.6);
    --ease:cubic-bezier(.22,1,.36,1);
    --negro:#040406; --marfil:#F5F0E8; --gris:rgba(245,240,232,.45); --verde:#4E7B46;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',sans-serif;color:var(--txt);
    background:radial-gradient(ellipse 130% 90% at 50% -20%,#0A0A0E 0%,var(--bg) 60%);
    min-height:100vh;display:flex;align-items:center;justify-content:center;padding:20px;
    -webkit-user-select:none;-moz-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
  }
  input{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default}
  .card{
    width:100%;max-width:380px;background:var(--bg2);border-radius:12px;
    padding:40px 32px;box-shadow:var(--e3);
    animation:cardIn .35s var(--ease);
  }
  @keyframes cardIn{from{opacity:0;transform:translateY(16px) scale(.98)}to{opacity:1;transform:none}}
  @media (prefers-reduced-motion: reduce){.card{animation:none}}
  :focus-visible{outline:2px solid rgba(212,175,55,.4);outline-offset:2px}
  .brand{text-align:center;margin-bottom:28px}
  .brand .sp{
    font-family:'Cinzel',serif;font-weight:600;letter-spacing:.12em;
    background:linear-gradient(135deg,#E8C84A,var(--oro),var(--oro2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .brand .sub{
    font-size:.68rem;color:var(--txt2);
    letter-spacing:.24em;text-transform:uppercase;margin-top:6px;
  }
  .linea{height:2px;width:48px;background:linear-gradient(90deg,var(--oro),var(--oro2));margin:18px auto 0;border-radius:1px;opacity:.6}
  label{display:block;font-size:.72rem;color:var(--txt2);margin:20px 0 8px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
  input{
    width:100%;height:44px;padding:0 16px;background:var(--bg3);
    border:none;border-radius:10px;color:var(--txt);font-size:16px;font-family:inherit;
    box-shadow:inset 0 2px 4px rgba(0,0,0,.3);transition:box-shadow .15s ease;
  }
  input::placeholder{color:rgba(255,255,255,.2)}
  input:focus{outline:none;box-shadow:inset 0 2px 4px rgba(0,0,0,.3),0 0 0 1.5px rgba(212,175,55,.3)}
  /* PIN: 4 cuadros grandes */
  .pin-wrap{display:flex;gap:10px;justify-content:center;margin-top:4px}
  .pin-wrap input{
    width:58px;height:62px;text-align:center;font-size:1.6rem;
    font-weight:600;letter-spacing:0;padding:0;font-feature-settings:'tnum';
  }
  button{
    width:100%;margin-top:28px;height:44px;
    background:linear-gradient(135deg,var(--oro),var(--oro2));
    color:#0A0A0E;border:none;border-radius:10px;font-weight:600;
    font-size:.92rem;cursor:pointer;letter-spacing:.03em;font-family:inherit;
    box-shadow:0 2px 8px rgba(0,0,0,.4);
    transition:filter .15s ease,transform .1s ease;
  }
  button:hover{filter:brightness(1.1)}
  button:active{transform:scale(.97)}
  button:disabled{opacity:.5;cursor:not-allowed;transform:none}
  .error{
    margin-top:16px;padding:12px 14px;background:rgba(255,69,58,.08);
    border-radius:10px;color:var(--rojo);font-size:.84rem;display:none;text-align:center;
  }
  .toggle{text-align:center;margin-top:24px;font-size:.76rem;color:var(--txt2)}
  .toggle a{color:rgba(212,175,55,.7);cursor:pointer;text-decoration:none;transition:color .15s ease}
  .toggle a:hover{color:var(--oro)}
  .foot{text-align:center;margin-top:16px;font-size:.7rem;color:var(--txt3)}
</style>
</head>
<body>
  <div class="card">
    <div class="brand">
      <img src="/icons/icon-192.png" alt="SP" style="width:76px;height:76px;border-radius:18px;object-fit:cover;margin-bottom:10px" onerror="this.style.display='none'">
      <div class="sp" style="font-size:1.15rem">SP LEONS GROUP</div>
      <div class="sub">Inmobiliaria</div>
      <div class="linea"></div>
    </div>

    <!-- Formulario vendedor: teléfono + PIN -->
    <form id="formVendedor">
      <label for="telefono">Tu número WhatsApp</label>
      <input id="telefono" type="tel" inputmode="tel" autocomplete="tel"
             placeholder="+573001112233" required>
      <label>PIN de 4 dígitos</label>
      <div class="pin-wrap">
        <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" pattern="\d" required>
        <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" pattern="\d" required>
        <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" pattern="\d" required>
        <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" pattern="\d" required>
      </div>
      <button id="btnV" type="submit">Ingresar</button>
      <div class="error" id="errorV"></div>
    </form>

    <!-- Formulario admin: oculto por defecto -->
    <form id="formAdmin" style="display:none">
      <label for="email">Correo admin</label>
      <input id="email" type="email" autocomplete="username" required placeholder="admin@spinmobiliaria.com">
      <label for="password">Contraseña</label>
      <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••">
      <button id="btnA" type="submit">Ingresar como admin</button>
      <div class="error" id="errorA"></div>
    </form>

    <div class="toggle" id="toggleWrap">
      <a id="toggleLink">Acceso administrador</a>
    </div>
    <div class="foot">Acceso exclusivo del equipo SP</div>
  </div>

<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  }

  // Si ya hay sesión, redirigir según rol
  fetch('/api/me').then(r=>r.ok?r.json():null).then(u=>{
    if(u) location.href = u.rol==='admin' ? '/index.html' : '/vendedor.html';
  });

  // Toggle entre modos
  let modoAdmin = false;
  document.getElementById('toggleLink').addEventListener('click', () => {
    modoAdmin = !modoAdmin;
    document.getElementById('formVendedor').style.display = modoAdmin ? 'none' : '';
    document.getElementById('formAdmin').style.display = modoAdmin ? '' : 'none';
    document.getElementById('toggleLink').textContent = modoAdmin ? 'Acceso vendedor' : 'Acceso administrador';
  });

  // --- PIN: auto-avanzar entre dígitos ---
  const digits = document.querySelectorAll('.pin-digit');
  digits.forEach((d, i) => {
    d.addEventListener('input', () => {
      d.value = d.value.replace(/\D/g, '').slice(-1);
      if (d.value && i < digits.length - 1) digits[i+1].focus();
    });
    d.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !d.value && i > 0) digits[i-1].focus();
    });
    d.addEventListener('paste', e => {
      e.preventDefault();
      const pasted = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,4);
      pasted.split('').forEach((ch, j) => { if(digits[j]) digits[j].value = ch; });
      const last = Math.min(pasted.length, digits.length-1);
      digits[last].focus();
    });
  });

  // --- Login vendedor ---
  document.getElementById('formVendedor').addEventListener('submit', async e => {
    e.preventDefault();
    const errBox = document.getElementById('errorV');
    const btn = document.getElementById('btnV');
    errBox.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Verificando...';

    const pin = Array.from(digits).map(d=>d.value).join('');
    if (pin.length !== 4) {
      errBox.textContent = 'Ingresa los 4 dígitos del PIN';
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar';
      return;
    }

    try {
      const res = await fetch('/api/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ telefono: document.getElementById('telefono').value.trim(), pin }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error==='credenciales_invalidas' ? 'Número o PIN incorrecto' : 'Error al ingresar');
      location.href = '/vendedor.html';
    } catch(err) {
      errBox.textContent = err.message;
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar';
      digits.forEach(d=>d.value=''); digits[0].focus();
    }
  });

  // --- Login admin ---
  document.getElementById('formAdmin').addEventListener('submit', async e => {
    e.preventDefault();
    const errBox = document.getElementById('errorA');
    const btn = document.getElementById('btnA');
    errBox.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Verificando...';
    try {
      const res = await fetch('/api/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error==='credenciales_invalidas' ? 'Correo o contraseña incorrectos' : 'Error al ingresar');
      location.href = data.usuario.rol==='admin' ? '/index.html' : '/vendedor.html';
    } catch(err) {
      errBox.textContent = err.message;
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar como admin';
    }
  });
</script>
</body>
</html>
