<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SP Panel">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>SP Inmobiliaria — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600&family=Cormorant+Garamond:wght@400;500&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── iOS 18 · Login Sheet · SP Inmobiliaria ── */
  :root{
    --black:#000000; --bg:#0B141A; --bg2:#111B21; --bg3:#1F2C33;
    --txt:#E9EDEF; --txt2:rgba(233,237,239,.5); --txt3:rgba(233,237,239,.25);
    --gold:#C8A45A; --gold2:#A8872B; --red:#FF453A;
    --ease:cubic-bezier(.32,.72,0,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  body{
    font-family:'Inter',sans-serif;color:var(--txt);
    background:var(--black);
    min-height:100vh;display:flex;flex-direction:column;justify-content:flex-end;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent;
    overflow:hidden;
  }
  input{-webkit-user-select:text;user-select:text;-webkit-touch-callout:default}

  /* iOS Status Bar */
  .ios-statusbar{height:44px;background:var(--black);display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:13px;font-weight:600;flex-shrink:0;position:fixed;top:0;left:0;right:0;z-index:10}
  .ios-statusbar .s-time{font-weight:700;letter-spacing:.5px;color:var(--txt)}
  .ios-statusbar .s-icons{display:flex;align-items:center;gap:5px}
  .ios-statusbar .s-icons svg{display:block}

  /* Background: subtle gradient */
  .bg-gradient{position:fixed;inset:0;background:radial-gradient(ellipse 120% 80% at 50% -10%,#1F2C33 0%,#000 60%);z-index:0}

  /* Logo centered above sheet */
  .logo-area{position:relative;z-index:1;text-align:center;padding:0 20px;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center}
  .logo-area img{width:80px;height:80px;border-radius:20px;object-fit:cover;box-shadow:0 8px 30px rgba(0,0,0,.6);margin-bottom:16px}
  .logo-area .sp{font-family:'Cinzel',serif;font-weight:600;letter-spacing:.12em;font-size:1.2rem;
    background:linear-gradient(135deg,#E8C84A,var(--gold),var(--gold2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .logo-area .sub{font-size:.65rem;color:var(--txt2);letter-spacing:.24em;text-transform:uppercase;margin-top:6px}
  .logo-area .linea{height:2px;width:40px;background:linear-gradient(90deg,var(--gold),var(--gold2));margin:14px auto 0;border-radius:1px;opacity:.5}

  /* Bottom Sheet Card */
  .card{
    position:relative;z-index:2;width:100%;background:var(--bg2);
    border-radius:22px 22px 0 0;padding:20px 28px 36px;
    padding-bottom:calc(36px + env(safe-area-inset-bottom));
    animation:sheetUp .5s var(--ease);
    box-shadow:0 -10px 40px rgba(0,0,0,.5);
  }
  @keyframes sheetUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
  @media (prefers-reduced-motion: reduce){.card{animation:none}}
  :focus-visible{outline:2px solid rgba(200,164,90,.4);outline-offset:2px}

  /* Drag Handle */
  .dw-handle{width:36px;height:5px;border-radius:3px;background:var(--txt3);margin:6px auto 16px}

  .input-group{margin-bottom:14px}
  .input-group label{display:block;font-size:.65rem;color:var(--txt2);margin-bottom:6px;letter-spacing:.06em;text-transform:uppercase;font-weight:500}
  .input-group input{
    width:100%;height:44px;padding:0 16px;background:var(--bg3);
    border:none;border-radius:10px;color:var(--txt);font-size:16px;font-family:inherit;
    transition:box-shadow .15s ease;
  }
  .input-group input::placeholder{color:var(--txt3);font-weight:400}
  .input-group input:focus{outline:none;box-shadow:0 0 0 1.5px rgba(200,164,90,.3)}
  .input-group input[type=password]{letter-spacing:2px;font-size:1.2rem}

  .pin-wrap{display:flex;gap:8px;justify-content:center;margin-top:4px}
  .pin-wrap input{
    width:56px;height:56px;text-align:center;font-size:1.5rem;
    font-weight:600;letter-spacing:0;padding:0;font-feature-settings:'tnum';
    background:var(--bg3);border:none;border-radius:10px;color:var(--txt);
    transition:box-shadow .15s ease;
  }
  .pin-wrap input:focus{outline:none;box-shadow:0 0 0 1.5px rgba(200,164,90,.3)}

  .btn{
    width:100%;margin-top:18px;height:48px;
    background:linear-gradient(135deg,var(--gold),var(--gold2));
    color:#000;border:none;border-radius:12px;font-weight:600;
    font-size:.95rem;cursor:pointer;letter-spacing:.03em;font-family:inherit;
    box-shadow:0 4px 12px rgba(0,0,0,.4);
    transition:opacity .15s ease,transform .1s ease;
  }
  .btn:hover{opacity:.9}
  .btn:active{transform:scale(.97)}
  .btn:disabled{opacity:.4;cursor:not-allowed;transform:none}

  .error{
    margin-top:14px;padding:10px 14px;background:rgba(255,69,58,.08);
    border-radius:10px;color:#FF9F94;font-size:.82rem;display:none;text-align:center;
  }
  .toggle{text-align:center;margin-top:18px;font-size:.76rem;color:var(--txt2)}
  .toggle a{color:var(--gold);cursor:pointer;text-decoration:none;transition:opacity .15s ease;opacity:.8}
  .toggle a:hover{opacity:1}
  .foot{text-align:center;margin-top:12px;font-size:.66rem;color:var(--txt3)}
</style>
</head>
<body>
  <div class="bg-gradient"></div>

  <!-- Logo Area -->
  <div class="logo-area">
    <img src="/icons/icon-192.png" alt="SP" onerror="this.style.display='none'">
    <div class="sp">SP INMOBILIARIA</div>
    <div class="sub">Inversiones &amp; Finca Raíz</div>
    <div class="linea"></div>
  </div>

  <!-- Bottom Sheet Card -->
  <div class="card">
    <div class="dw-handle"></div>

    <!-- Form vendedor: WhatsApp + PIN -->
    <form id="formVendedor">
      <div class="input-group">
        <label for="telefono">WhatsApp</label>
        <input id="telefono" type="tel" inputmode="tel" autocomplete="tel" placeholder="+573001112233" required>
      </div>
      <div class="input-group">
        <label>PIN</label>
        <div class="pin-wrap">
          <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" pattern="\d" required autofocus>
          <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" pattern="\d" required>
          <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" pattern="\d" required>
          <input class="pin-digit" type="password" inputmode="numeric" maxlength="1" pattern="\d" required>
        </div>
      </div>
      <button class="btn" id="btnV" type="submit">Ingresar</button>
      <div class="error" id="errorV"></div>
    </form>

    <!-- Form admin (hidden by default) -->
    <form id="formAdmin" style="display:none">
      <div class="input-group">
        <label for="email">Correo</label>
        <input id="email" type="email" autocomplete="username" required placeholder="admin@spinmobiliaria.com">
      </div>
      <div class="input-group">
        <label for="password">Contraseña</label>
        <input id="password" type="password" autocomplete="current-password" required placeholder="••••••••">
      </div>
      <button class="btn" id="btnA" type="submit">Ingresar</button>
      <div class="error" id="errorA"></div>
    </form>

    <div class="toggle" id="toggleWrap">
      <a id="toggleLink">Acceso administrador</a>
    </div>
    <div class="foot">Acceso exclusivo del equipo SP</div>
  </div>

<script>
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js').catch(()=>{});
  }

  // Si ya hay sesión, redirigir según rol
  fetch('/api/me').then(r=>r.ok?r.json():null).then(u=>{
    if(u) location.href = u.rol==='admin' ? '/os/dashboard.html' : '/os/vendedor.html';
  });

  // Toggle entre modos
  let modoAdmin = false;
  document.getElementById('toggleLink').addEventListener('click', () => {
    modoAdmin = !modoAdmin;
    document.getElementById('formVendedor').style.display = modoAdmin ? 'none' : '';
    document.getElementById('formAdmin').style.display = modoAdmin ? '' : 'none';
    document.getElementById('toggleLink').textContent = modoAdmin ? 'Acceso vendedor' : 'Acceso administrador';
  });

  // --- PIN: auto-avanzar entre dígitos ---
  const digits = document.querySelectorAll('.pin-digit');
  digits.forEach((d, i) => {
    d.addEventListener('input', () => {
      d.value = d.value.replace(/\D/g, '').slice(-1);
      if (d.value && i < digits.length - 1) digits[i+1].focus();
    });
    d.addEventListener('keydown', e => {
      if (e.key === 'Backspace' && !d.value && i > 0) digits[i-1].focus();
    });
    d.addEventListener('paste', e => {
      e.preventDefault();
      const pasted = (e.clipboardData||window.clipboardData).getData('text').replace(/\D/g,'').slice(0,4);
      pasted.split('').forEach((ch, j) => { if(digits[j]) digits[j].value = ch; });
      const last = Math.min(pasted.length, digits.length-1);
      digits[last].focus();
    });
  });

  // --- Login vendedor ---
  document.getElementById('formVendedor').addEventListener('submit', async e => {
    e.preventDefault();
    const errBox = document.getElementById('errorV');
    const btn = document.getElementById('btnV');
    errBox.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Verificando...';

    const pin = Array.from(digits).map(d=>d.value).join('');
    if (pin.length !== 4) {
      errBox.textContent = 'Ingresa los 4 dígitos del PIN';
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar';
      return;
    }

    try {
      const res = await fetch('/api/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ telefono: document.getElementById('telefono').value.trim(), pin }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error==='credenciales_invalidas' ? 'Número o PIN incorrecto' : 'Error al ingresar');
      location.href = '/os/vendedor.html';
    } catch(err) {
      errBox.textContent = err.message;
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar';
      digits.forEach(d=>d.value=''); digits[0].focus();
    }
  });

  // --- Login admin ---
  document.getElementById('formAdmin').addEventListener('submit', async e => {
    e.preventDefault();
    const errBox = document.getElementById('errorA');
    const btn = document.getElementById('btnA');
    errBox.style.display = 'none';
    btn.disabled = true; btn.textContent = 'Verificando...';
    try {
      const res = await fetch('/api/login', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ email: document.getElementById('email').value, password: document.getElementById('password').value }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error==='credenciales_invalidas' ? 'Correo o contraseña incorrectos' : 'Error al ingresar');
      location.href = data.usuario.rol==='admin' ? '/os/dashboard.html' : '/os/vendedor.html';
    } catch(err) {
      errBox.textContent = err.message;
      errBox.style.display = 'block';
      btn.disabled = false; btn.textContent = 'Ingresar como admin';
    }
  });
</script>
</body>
</html>
