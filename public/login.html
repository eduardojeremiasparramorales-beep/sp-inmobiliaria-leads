<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="SP Panel">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>SP Inmobiliaria — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root{
    --black:#0A0A0A; --gold:#C8A45A; --gold2:#A8872B; --gold3:#E8C84A;
    --txt:#F8F8F8; --txt2:rgba(248,248,248,.55); --txt3:rgba(248,248,248,.25);
    --border:#1E1E1E; --surface:#111111; --surface2:#171717; --surface3:#1C1C1C;
    --red:#E5484D; --ease:cubic-bezier(.32,.72,0,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Inter',sans-serif;color:var(--txt);background:var(--black);
    display:flex;flex-direction:column;
    -webkit-user-select:none;user-select:none;
    -webkit-tap-highlight-color:transparent;
  }

  /* ── Screen container ── */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;transition:opacity .35s var(--ease),transform .35s var(--ease);z-index:1}
  .screen.hidden{opacity:0;pointer-events:none;transform:translateX(40px)}
  .screen.hidden-left{opacity:0;pointer-events:none;transform:translateX(-40px)}

  /* ── SCREEN 1: Phone entry ── */
  #s1{align-items:center;justify-content:space-between;padding:clamp(40px,8vh,80px) 28px clamp(24px,5vh,48px)}

  .s1-top{text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px}

  .logo-mark{
    width:88px;height:88px;border-radius:22px;
    background:linear-gradient(140deg,#E8C84A 0%,#C8A45A 45%,#9E7E3C 100%);
    display:grid;place-items:center;
    box-shadow:0 12px 40px rgba(0,0,0,.6),0 0 0 1px rgba(200,164,90,.15);
  }
  .logo-mark span{font-family:'Cinzel',serif;font-weight:700;font-size:28px;color:#0A0A0A;letter-spacing:.05em}

  .brand-name{
    font-family:'Cinzel',serif;font-weight:600;font-size:1.3rem;letter-spacing:.14em;
    background:linear-gradient(135deg,var(--gold3),var(--gold),var(--gold2));
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
  }
  .brand-sub{font-size:.7rem;color:var(--txt2);letter-spacing:.28em;text-transform:uppercase;font-weight:300}

  .gold-line{height:2px;width:48px;background:linear-gradient(90deg,transparent,var(--gold),transparent);border-radius:1px;opacity:.4}

  .s1-bottom{width:100%;max-width:400px}

  .phone-display{
    text-align:center;padding:16px 0;margin-bottom:20px;
    font-size:1.4rem;font-weight:500;letter-spacing:.08em;
    color:var(--txt);min-height:52px;
    border-bottom:1px solid var(--border);
  }
  .phone-display.empty{color:var(--txt3);font-size:1rem;font-weight:400}
  .phone-display .cursor{display:inline-block;width:2px;height:1.2em;background:var(--gold);margin-left:2px;animation:blink 1s step-end infinite;vertical-align:text-bottom}
  @keyframes blink{50%{opacity:0}}

  .keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:320px;margin:0 auto}
  .key{
    height:56px;border-radius:14px;border:none;
    background:var(--surface2);color:var(--txt);font-size:1.35rem;font-weight:400;font-family:'Inter',sans-serif;
    cursor:pointer;transition:background .12s ease,transform .08s ease;
    display:flex;flex-direction:column;align-items:center;justify-content:center;gap:1px;
    -webkit-tap-highlight-color:transparent;
  }
  .key:active{background:var(--surface3);transform:scale(.95)}
  .key-sub{font-size:.55rem;color:var(--txt3);letter-spacing:.08em;font-weight:500;text-transform:uppercase}
  .key--action{background:transparent}
  .key--action:active{background:var(--surface3)}
  .key--enter{
    background:linear-gradient(135deg,var(--gold),var(--gold2));color:#0A0A0A;font-weight:600;font-size:1rem;
  }
  .key--enter:active{opacity:.85;transform:scale(.96)}
  .key--enter:disabled{opacity:.3;cursor:not-allowed;transform:none}
  .key--del{font-size:.85rem;color:var(--txt2)}

  .s1-footer{text-align:center;padding-top:16px;font-size:.65rem;color:var(--txt3);letter-spacing:.05em}

  /* ── SCREEN 2: PIN entry ── */
  #s2{align-items:center;justify-content:space-between;padding:clamp(40px,8vh,80px) 28px clamp(24px,5vh,48px)}

  .s2-top{text-align:center;flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}

  .back-btn{
    position:absolute;top:16px;left:16px;z-index:10;
    width:40px;height:40px;border-radius:12px;border:none;
    background:var(--surface2);color:var(--txt2);font-size:18px;
    cursor:pointer;display:grid;place-items:center;
    transition:background .12s ease;
  }
  .back-btn:active{background:var(--surface3)}

  .pin-label{font-size:.8rem;color:var(--txt2);letter-spacing:.08em;font-weight:400}
  .pin-phone{font-size:1.05rem;color:var(--txt);font-weight:500;letter-spacing:.04em;margin-top:2px}

  .pin-boxes{display:flex;gap:14px;justify-content:center;margin:24px 0}
  .pin-box{
    width:54px;height:60px;border-radius:14px;
    background:var(--surface2);border:2px solid var(--border);
    display:grid;place-items:center;
    font-size:1.6rem;font-weight:600;color:var(--txt);
    transition:border-color .2s ease,background .2s ease;
  }
  .pin-box.active{border-color:var(--gold);background:rgba(200,164,90,.06)}
  .pin-box.filled{border-color:var(--gold);background:rgba(200,164,90,.08)}
  .pin-box.error{border-color:var(--red);background:rgba(229,72,77,.06);animation:shake .4s ease}
  .pin-box .dot{width:14px;height:14px;border-radius:50%;background:var(--txt)}
  @keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-6px)}40%,80%{transform:translateX(6px)}}

  .pin-keypad{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;max-width:320px;margin:0 auto}
  .pin-key{
    height:60px;border-radius:14px;border:none;
    background:var(--surface2);color:var(--txt);font-size:1.4rem;font-weight:400;font-family:'Inter',sans-serif;
    cursor:pointer;transition:background .12s ease,transform .08s ease;
    display:flex;align-items:center;justify-content:center;
    -webkit-tap-highlight-color:transparent;
  }
  .pin-key:active{background:var(--surface3);transform:scale(.95)}
  .pin-key--empty{background:transparent;pointer-events:none}
  .pin-key--biometric{font-size:1.3rem;color:var(--gold)}
  .pin-key--biometric:active{background:rgba(200,164,90,.08)}
  .pin-key--del{font-size:.8rem;color:var(--txt2)}

  .pin-error{
    text-align:center;font-size:.8rem;color:var(--red);min-height:20px;
    margin-top:12px;opacity:0;transition:opacity .2s ease;
  }
  .pin-error.show{opacity:1}

  .s2-footer{text-align:center;padding-top:12px;font-size:.65rem;color:var(--txt3);letter-spacing:.05em}

  /* ── Shared ── */
  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media (min-width:768px){
    .key{height:64px;font-size:1.5rem;border-radius:16px}
    .pin-key{height:68px;font-size:1.5rem;border-radius:16px}
    .pin-box{width:62px;height:68px;font-size:1.8rem}
  }
</style>
</head>
<body>

<!-- ═══════════ SCREEN 1: Phone number ═══════════ -->
<div class="screen" id="s1">
  <div class="s1-top">
    <div class="logo-mark"><span>SP</span></div>
    <div class="brand-name">SP INMOBILIARIA</div>
    <div class="brand-sub">Inversiones &amp; Finca Raíz</div>
    <div class="gold-line"></div>
  </div>

  <div class="s1-bottom">
    <div class="phone-display empty" id="phoneDisplay">Ingresa tu número</div>
    <div class="keypad">
      <button class="key" data-v="1">1</button>
      <button class="key" data-v="2">2<span class="key-sub">ABC</span></button>
      <button class="key" data-v="3">3<span class="key-sub">DEF</span></button>
      <button class="key" data-v="4">4<span class="key-sub">GHI</span></button>
      <button class="key" data-v="5">5<span class="key-sub">JKL</span></button>
      <button class="key" data-v="6">6<span class="key-sub">MNO</span></button>
      <button class="key" data-v="7">7<span class="key-sub">PQRS</span></button>
      <button class="key" data-v="8">8<span class="key-sub">TUV</span></button>
      <button class="key" data-v="9">9<span class="key-sub">WXYZ</span></button>
      <button class="key key--action key--del" id="delKey">
        <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
      </button>
      <button class="key" data-v="0">0</button>
      <button class="key key--enter" id="enterKey" disabled>Entrar</button>
    </div>
    <div class="s1-footer">Acceso exclusivo del equipo SP</div>
  </div>
</div>

<!-- ═══════════ SCREEN 2: PIN ═══════════ -->
<div class="screen hidden" id="s2">
  <button class="back-btn" id="backBtn">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
  </button>

  <div class="s2-top">
    <div class="pin-label">Ingresa tu PIN</div>
    <div class="pin-phone" id="pinPhone"></div>

    <div class="pin-boxes">
      <div class="pin-box" id="pb0"></div>
      <div class="pin-box" id="pb1"></div>
      <div class="pin-box" id="pb2"></div>
      <div class="pin-box" id="pb3"></div>
    </div>

    <div class="pin-error" id="pinError"></div>
  </div>

  <div class="pin-keypad">
    <button class="pin-key" data-p="1">1</button>
    <button class="pin-key" data-p="2">2</button>
    <button class="pin-key" data-p="3">3</button>
    <button class="pin-key" data-p="4">4</button>
    <button class="pin-key" data-p="5">5</button>
    <button class="pin-key" data-p="6">6</button>
    <button class="pin-key" data-p="7">7</button>
    <button class="pin-key" data-p="8">8</button>
    <button class="pin-key" data-p="9">9</button>
    <button class="pin-key pin-key--empty"></button>
    <button class="pin-key" data-p="0">0</button>
    <button class="pin-key pin-key--del" id="pinDel">
      <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg>
    </button>
  </div>
  <div class="s2-footer">Acceso exclusivo del equipo SP</div>
</div>

<script>
(function(){
  'use strict';

  // Si ya hay sesión, redirigir
  fetch('/api/me').then(r=>r.ok?r.json():null).then(u=>{
    if(u) location.href = u.rol==='admin' ? '/os/dashboard.html' : '/os/vendedor.html';
  });

  // ── SCREEN 1: Phone number ──
  let phone = '';
  const phoneDisplay = document.getElementById('phoneDisplay');
  const enterKey = document.getElementById('enterKey');

  function updatePhoneDisplay(){
    if(!phone){ phoneDisplay.textContent='Ingresa tu número'; phoneDisplay.className='phone-display empty'; enterKey.disabled=true; return; }
    // Format: +57 XXX XXX XXXX
    let formatted = phone;
    if(phone.length > 0) formatted = '+57 ' + phone;
    if(phone.length > 3) formatted = '+57 ' + phone.slice(0,3) + ' ' + phone.slice(3);
    if(phone.length > 6) formatted = '+57 ' + phone.slice(0,3) + ' ' + phone.slice(3,6) + ' ' + phone.slice(6,10);
    phoneDisplay.textContent = formatted;
    phoneDisplay.className = 'phone-display';
    phoneDisplay.innerHTML = formatted + '<span class="cursor"></span>';
    enterKey.disabled = phone.length < 10;
  }

  document.querySelectorAll('.keypad .key[data-v]').forEach(k=>{
    k.addEventListener('click',()=>{
      if(phone.length >= 10) return;
      phone += k.dataset.v;
      updatePhoneDisplay();
    });
  });

  document.getElementById('delKey').addEventListener('click',()=>{
    phone = phone.slice(0,-1);
    updatePhoneDisplay();
  });

  // Keyboard support for screen 1
  document.addEventListener('keydown', e=>{
    if(!document.getElementById('s1').classList.contains('hidden')){
      if(e.key >= '0' && e.key <= '9' && phone.length < 10){ phone += e.key; updatePhoneDisplay(); }
      else if(e.key === 'Backspace'){ phone = phone.slice(0,-1); updatePhoneDisplay(); }
      else if(e.key === 'Enter' && phone.length >= 10){ showPinScreen(); }
    }
  });

  enterKey.addEventListener('click', ()=>{
    if(phone.length >= 10) showPinScreen();
  });

  // ── SCREEN 2: PIN ──
  let pin = '';
  const pinBoxes = [document.getElementById('pb0'),document.getElementById('pb1'),document.getElementById('pb2'),document.getElementById('pb3')];
  const pinError = document.getElementById('pinError');
  let attempting = false;

  function showPinScreen(){
    document.getElementById('pinPhone').textContent = '+57 ' + phone.slice(0,3) + ' ' + phone.slice(3,6) + ' ' + phone.slice(6,10);
    document.getElementById('s1').classList.add('hidden');
    document.getElementById('s2').classList.remove('hidden');
    pin = '';
    updatePinBoxes();
    // Check for biometric support
    checkBiometric();
  }

  function updatePinBoxes(){
    pinBoxes.forEach((box,i)=>{
      box.className = 'pin-box';
      if(i < pin.length){ box.innerHTML = '<div class="dot"></div>'; box.classList.add('filled'); }
      else if(i === pin.length){ box.classList.add('active'); box.innerHTML = ''; }
      else { box.innerHTML = ''; }
    });
    pinError.classList.remove('show');
  }

  document.querySelectorAll('.pin-keypad .pin-key[data-p]').forEach(k=>{
    k.addEventListener('click',()=>{
      if(attempting || pin.length >= 4) return;
      pin += k.dataset.p;
      updatePinBoxes();
      if(pin.length === 4) attemptLogin();
    });
  });

  document.getElementById('pinDel').addEventListener('click',()=>{
    if(attempting) return;
    pin = pin.slice(0,-1);
    updatePinBoxes();
  });

  // Keyboard support for screen 2
  document.addEventListener('keydown', e=>{
    if(!document.getElementById('s2').classList.contains('hidden')){
      if(e.key >= '0' && e.key <= '9' && pin.length < 4 && !attempting){
        pin += e.key; updatePinBoxes();
        if(pin.length === 4) attemptLogin();
      }
      else if(e.key === 'Backspace' && !attempting){
        pin = pin.slice(0,-1); updatePinBoxes();
      }
      else if(e.key === 'Escape'){
        goBack();
      }
    }
  });

  document.getElementById('backBtn').addEventListener('click', goBack);

  function goBack(){
    document.getElementById('s2').classList.add('hidden');
    document.getElementById('s1').classList.remove('hidden');
    pin = '';
    updatePinBoxes();
  }

  async function attemptLogin(){
    attempting = true;
    try {
      const res = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ telefono: '+57' + phone, pin }),
      });
      const data = await res.json();
      if(!res.ok){
        if(data.error === 'credenciales_invalidas'){
          pinBoxes.forEach(b => b.classList.add('error'));
          pinError.textContent = 'Número o PIN incorrecto';
          pinError.classList.add('show');
          setTimeout(()=>{ pin=''; updatePinBoxes(); attempting=false; }, 800);
        } else {
          throw new Error(data.error || 'Error');
        }
        return;
      }
      // Éxito
      location.href = data.usuario && data.usuario.rol === 'admin' ? '/os/dashboard.html' : '/os/vendedor.html';
    } catch(err) {
      pinError.textContent = 'Error de conexión';
      pinError.classList.add('show');
      setTimeout(()=>{ pin=''; updatePinBoxes(); attempting=false; }, 800);
    }
  }

  // ── Biometric (WebAuthn) ──
  async function checkBiometric(){
    try {
      if(!window.PublicKeyCredential) return;
      const available = await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
      if(!available) return;
      // Show biometric button in place of empty center key
      const centerKey = document.querySelector('.pin-keypad .pin-key--empty');
      if(centerKey){
        centerKey.classList.remove('pin-key--empty');
        centerKey.classList.add('pin-key--biometric');
        centerKey.innerHTML = '<svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><path d="M12 10v4"/><path d="M7.5 12.5a5 5 0 019 0"/><path d="M5 12a7 7 0 0014 0"/><path d="M8.5 16a3 3 0 017 0"/><circle cx="12" cy="19" r="1"/></svg>';
        centerKey.title = 'Usar huella digital';
        centerKey.addEventListener('click', attemptBiometric);
      }
    } catch(e){ /* biometric not supported */ }
  }

  async function attemptBiometric(){
    // Placeholder: biometric login would need server-side WebAuthn challenge
    // For now, show a toast
    pinError.textContent = 'Biometría próximamente';
    pinError.classList.add('show');
    setTimeout(()=> pinError.classList.remove('show'), 2000);
  }

})();
</script>
</body>
</html>
