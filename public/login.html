<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Leons Group">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>Leons Group — Acceso</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
<style>
  :root{
    --bg:#0A0A0A; --gold:#D4AF37; --gold-2:#8E7028; --gold-3:#EDCC60;
    --green:#4E7B46; --txt:#F8F8F8; --txt-2:rgba(248,248,248,.5);
    --txt-3:rgba(248,248,248,.22); --border:#1A1A1A; --surface:#111;
    --red:#E5484D; --ease:cubic-bezier(.22,1,.36,1);
    /* Glass (sync sp-os.css) */
    --glass:rgba(20,20,20,.15); --glass-2:rgba(25,25,25,.22);
    --glass-border:rgba(248,248,248,.08); --blur-sm:saturate(1.4) blur(24px);
    --grad-gold:linear-gradient(140deg,#EDCC60,var(--gold) 60%,#A08028);
    --grad-gold-text:linear-gradient(135deg,#EDCC60,var(--gold) 55%,#8E7028);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%;overflow:hidden}
  body{
    font-family:'Inter',system-ui,sans-serif;color:var(--txt);
    font-optical-sizing:auto;letter-spacing:-0.011em;
    background:
      radial-gradient(circle 260px at 15% 18%, rgba(248,248,248,.09), rgba(248,248,248,.028) 52%, transparent 62%),
      radial-gradient(circle 200px at 85% 60%, rgba(248,248,248,.06), rgba(248,248,248,.02) 54%, transparent 64%),
      radial-gradient(700px 500px at 80% -15%, rgba(212,175,55,.14), transparent 60%),
      radial-gradient(600px 550px at -10% 105%, rgba(78,123,70,.08), transparent 60%),
      radial-gradient(500px 400px at 50% 50%, rgba(212,175,55,.05), transparent 70%),
      var(--bg);
    display:flex;flex-direction:column;
    -webkit-user-select:none;user-select:none;-webkit-tap-highlight-color:transparent;
  }

  /* ── Layout ── */
  .screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:28px;transition:opacity .3s var(--ease),transform .3s var(--ease);z-index:1}
  .screen.hidden{opacity:0;pointer-events:none;transform:translateY(12px)}

  /* ── Logo ── */
  .logo{
    width:72px;height:72px;border-radius:18px;
    background:var(--glass-2);
    backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
    display:grid;place-items:center;margin-bottom:18px;
    box-shadow:0 8px 32px rgba(0,0,0,.3),0 0 0 1px rgba(200,164,90,.2),0 0 30px rgba(200,164,90,.08);
  }
  .logo img{width:100%;height:100%;object-fit:cover;border-radius:18px}
  .brand{font-family:'Cinzel',serif;font-weight:600;font-size:1.1rem;letter-spacing:.16em;text-align:center;margin-bottom:4px;
    background:var(--grad-gold-text);
    -webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;
    text-shadow:0 0 40px rgba(200,164,90,.2);
  }
  .sub{font-family:'Cormorant Garamond',serif;font-size:.85rem;color:var(--txt-2);letter-spacing:.1em;text-align:center;margin-bottom:24px;font-weight:400}
  .sp-line{width:40px;height:1.5px;background:var(--gold);opacity:.35;margin-bottom:28px;border-radius:1px}

  /* ── Input field ── */
  .field{width:100%;max-width:320px;margin-bottom:14px}
  .field label{display:block;font-size:.7rem;color:var(--txt-3);letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px;font-weight:500}
  .field-wrap{position:relative;width:100%}
  .field-wrap .prefix{position:absolute;left:16px;top:50%;transform:translateY(-50%);font-size:1rem;color:var(--txt-2);font-weight:500;pointer-events:none;z-index:1}
  .field input{
    width:100%;height:52px;border-radius:12px;border:1.5px solid var(--glass-border);
    background:var(--glass);backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
    color:var(--txt);font-size:1.05rem;font-family:'Inter',sans-serif;
    padding:0 16px;padding-left:46px;outline:none;transition:border-color .2s,box-shadow .2s;
    -webkit-appearance:none;appearance:none;
  }
  .field input:focus{border-color:var(--gold);box-shadow:0 0 0 3px rgba(200,164,90,.08)}
  .field input::placeholder{color:var(--txt-3);font-weight:400}

  /* ── PIN dots ── */
  .pin-row{display:flex;gap:10px;justify-content:center;margin-bottom:24px}
  .pin-dot{
    width:52px;height:56px;border-radius:12px;border:1.5px solid var(--glass-border);
    background:var(--glass);backdrop-filter:var(--blur-sm);-webkit-backdrop-filter:var(--blur-sm);
    display:grid;place-items:center;
    transition:border-color .2s,background .2s;
  }
  .pin-dot.active{border-color:var(--gold);background:rgba(200,164,90,.04)}
  .pin-dot.filled{border-color:var(--gold);background:rgba(200,164,90,.06)}
  .pin-dot.error{border-color:var(--red);animation:shake .35s ease}
  .pin-dot .circ{width:12px;height:12px;border-radius:50%;background:var(--txt)}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}

  /* ── Keypad (solo PIN) ── */
  .keypad{width:100%;max-width:280px;display:grid;grid-template-columns:repeat(3,1fr);gap:6px}
  .k{
    height:54px;border-radius:12px;border:none;background:transparent;
    color:var(--txt);font-size:1.35rem;font-weight:400;font-family:'Inter',sans-serif;
    cursor:pointer;display:flex;align-items:center;justify-content:center;
    transition:background .1s;position:relative;
  }
  .k:active{background:rgba(255,255,255,.06)}
  .k-del{color:var(--txt-2)}
  .k-del svg{width:22px;height:22px}
  .k-ok{
    background:var(--grad-gold);color:#0A0A0A;
    font-weight:600;font-size:.9rem;letter-spacing:.04em;
  }
  .k-ok:active{opacity:.8;transform:scale(.96)}
  .k-ok:disabled{opacity:.25;cursor:not-allowed;transform:none}

  /* ── Bottom button (phone) ── */
  .bottom-btn{
    position:absolute;bottom:0;left:0;right:0;
    padding:0 28px calc(24px + env(safe-area-inset-bottom));
  }
  .btn-entrar{
    width:100%;height:52px;border-radius:12px;border:none;
    background:var(--grad-gold);color:#0A0A0A;
    font-size:.95rem;font-weight:600;font-family:'Inter',sans-serif;letter-spacing:.04em;
    cursor:pointer;transition:opacity .15s,transform .1s;
  }
  .btn-entrar:active{opacity:.85;transform:scale(.98)}
  .btn-entrar:disabled{opacity:.25;cursor:not-allowed;transform:none}

  /* ── Mensajes ── */
  .msg{text-align:center;font-size:.78rem;min-height:18px;margin-top:10px;transition:opacity .2s}
  .msg.err{color:var(--red)}
  .msg.ok{color:var(--green)}

  /* ── Crear cuenta ── */
  .link-row{text-align:center;margin-top:18px;font-size:.78rem;color:var(--txt-2)}
  .link-row a{color:var(--gold);text-decoration:none;font-weight:600;cursor:pointer}
  .reg-photo{width:76px;height:76px;border-radius:20px;margin:0 auto 16px;background:var(--glass);border:1.5px dashed var(--glass-border);display:grid;place-items:center;cursor:pointer;overflow:hidden;font-size:1.4rem;color:var(--txt-3)}
  .reg-photo img{width:100%;height:100%;object-fit:cover}
  .reg-photo-label{text-align:center;font-size:.68rem;color:var(--txt-3);margin:-10px 0 16px}
  .reg-body{width:100%;max-width:320px;overflow-y:auto;max-height:100%;padding-bottom:12px}

  /* ── Footer ── */
  .foot{position:absolute;bottom:0;left:0;right:0;text-align:center;padding-bottom:calc(12px + env(safe-area-inset-bottom));font-size:.6rem;color:var(--txt-3);letter-spacing:.08em}

  @media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important}}
  @media (min-width:768px){
    .k{height:60px;font-size:1.4rem}
    .pin-dot{width:58px;height:62px}
  }
  @supports(corner-shape:squircle){*,*::before,*::after{corner-shape:squircle}.pin-dot .circ,.spin{corner-shape:round}
    [style*="border-radius:50%"],[style*="border-radius: 50%"]{corner-shape:round}}
</style>
</head>
<body>

<!-- ═══ SCREEN 1: Teléfono ═══ -->
<div class="screen" id="s1">
  <div class="logo"><img src="/icons/logo.png" alt="SP Leons Group"></div>
  <div class="brand">LEONS GROUP</div>
  <div class="sub">Inversiones &amp; Finca Raíz</div>
  <div class="sp-line"></div>

  <div class="field">
    <label>Teléfono</label>
    <div class="field-wrap">
      <span class="prefix">+57</span>
      <input type="tel" id="phone" placeholder="300 123 4567" inputmode="numeric" maxlength="12" autocomplete="tel">
    </div>
  </div>

  <div class="msg" id="msg"></div>

  <div class="link-row">¿Eres asesor nuevo? <a id="linkCrearCuenta">Crear cuenta</a></div>

  <div class="bottom-btn">
    <button class="btn-entrar" id="btnEntrar" disabled>Entrar</button>
  </div>
</div>

<!-- ═══ SCREEN 3: Crear cuenta (auto-registro de asesor) ═══ -->
<div class="screen hidden" id="s3">
  <div class="reg-body">
    <div class="logo" style="margin:0 auto 18px"><img src="/icons/logo.png" alt="SP Leons Group"></div>
    <div class="brand" style="text-align:center">LEONS GROUP</div>
    <div class="sub" style="text-align:center">Crear cuenta de asesor</div>
    <div class="sp-line" style="margin:0 auto 24px"></div>

    <div class="reg-photo" id="regPhotoBox">📷</div>
    <div class="reg-photo-label">Foto de perfil (opcional)</div>
    <input type="file" id="regFotoInput" accept="image/*" style="display:none">

    <div class="field">
      <label>Nombre completo</label>
      <div class="field-wrap"><input type="text" id="regNombre" placeholder="Tu nombre" autocomplete="name"></div>
    </div>
    <div class="field">
      <label>Teléfono</label>
      <div class="field-wrap"><span class="prefix">+57</span><input type="tel" id="regPhone" placeholder="300 123 4567" inputmode="numeric" maxlength="12"></div>
    </div>
    <div class="field">
      <label>PIN de 4 dígitos</label>
      <div class="field-wrap"><input type="password" id="regPin" placeholder="••••" inputmode="numeric" maxlength="4"></div>
    </div>

    <div class="msg" id="msgReg"></div>
    <button class="btn-entrar" id="btnRegistrar" style="margin-top:6px">Solicitar cuenta</button>
    <div class="link-row"><a id="linkVolverLogin">Volver al inicio de sesión</a></div>
  </div>
</div>

<!-- ═══ SCREEN 2: PIN ═══ -->
<div class="screen hidden" id="s2">
  <div class="logo"><img src="/icons/logo.png" alt="SP Leons Group"></div>
  <div class="brand">LEONS GROUP</div>
  <div class="sub" id="pinSub"></div>
  <div class="sp-line"></div>

  <div class="pin-row">
    <div class="pin-dot" id="pd0"></div>
    <div class="pin-dot" id="pd1"></div>
    <div class="pin-dot" id="pd2"></div>
    <div class="pin-dot" id="pd3"></div>
  </div>

  <div class="keypad" id="keypad"></div>
  <div class="msg" id="msg2"></div>
</div>

<div class="foot">Línea Patrimonial SP™</div>

<script>
(function(){
  'use strict';

  fetch('/api/me').then(r=>r.ok?r.json():null).then(u=>{
    if(u) location.replace(u.rol==='admin' ? '/os/dashboard.html' : '/m/');
  });

  const $ = id => document.getElementById(id);
  let phone = '';
  let pin = '';
  let attempting = false;

  // ── Phone input ──
  const phoneEl = $('phone');
  const btnEntrar = $('btnEntrar');

  function formatPhone(raw){
    let f = raw;
    if(raw.length > 3) f = raw.slice(0,3) + ' ' + raw.slice(3);
    if(raw.length > 6) f = raw.slice(0,3) + ' ' + raw.slice(3,6) + ' ' + raw.slice(6);
    return f;
  }

  phoneEl.addEventListener('input', e=>{
    let raw = e.target.value.replace(/\D/g,'');
    // Si el usuario escribió el código de país, tomar solo los últimos 10 dígitos
    if(raw.length > 10) raw = raw.slice(-10);
    phone = raw;
    e.target.value = formatPhone(raw);
    btnEntrar.disabled = raw.length < 10;
    $('msg').textContent = '';
  });

  phoneEl.addEventListener('keydown', e=>{
    if(e.key === 'Enter' && phone.length >= 10) goToPin();
  });

  btnEntrar.addEventListener('click', goToPin);

  // ── Transitions ──
  function goToPin(){
    if(phone.length < 10) return;
    $('pinSub').textContent = '+57 ' + formatPhone(phone);
    $('s1').classList.add('hidden');
    $('s2').classList.remove('hidden');
    cambioPin = null;
    pin = '';
    updatePinDots();
    renderKeypad();
    $('msg2').textContent = '';
    // Bloquear teclado nativo: focus en un input oculto readonly
    const trap = document.createElement('input');
    trap.setAttribute('readonly','');
    trap.style.cssText = 'position:absolute;opacity:0;pointer-events:none;width:1px;height:1px;top:0;left:0';
    $('s2').appendChild(trap);
    trap.focus();
  }

  function goToPhone(){
    $('s2').classList.add('hidden');
    $('s1').classList.remove('hidden');
    phoneEl.value = formatPhone(phone);
    btnEntrar.disabled = phone.length < 10;
    phoneEl.focus();
  }

  // ── PIN dots ──
  function updatePinDots(){
    for(let i=0;i<4;i++){
      const d = $('pd'+i);
      d.className = 'pin-dot';
      if(i < pin.length){ d.innerHTML = '<div class="circ"></div>'; d.classList.add('filled'); }
      else if(i === pin.length){ d.classList.add('active'); d.innerHTML = ''; }
      else { d.innerHTML = ''; }
    }
    $('msg2').className = 'msg';
  }

  // ── Keypad (PIN only) ──
  function renderKeypad(){
    const kp = $('keypad');
    kp.innerHTML = `
      <button class="k" data-p="1">1</button>
      <button class="k" data-p="2">2</button>
      <button class="k" data-p="3">3</button>
      <button class="k" data-p="4">4</button>
      <button class="k" data-p="5">5</button>
      <button class="k" data-p="6">6</button>
      <button class="k" data-p="7">7</button>
      <button class="k" data-p="8">8</button>
      <button class="k" data-p="9">9</button>
      <button class="k k-del" id="kBack"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg></button>
      <button class="k" data-p="0">0</button>
      <button class="k k-del" id="kDel"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M21 4H8l-7 8 7 8h13a2 2 0 002-2V6a2 2 0 00-2-2z"/><line x1="18" y1="9" x2="12" y2="15"/><line x1="12" y1="9" x2="18" y2="15"/></svg></button>`;
    kp.querySelectorAll('[data-p]').forEach(b=>b.onclick=()=>{
      if(pin.length<4 && !attempting){ pin+=b.dataset.p; updatePinDots(); if(pin.length===4) procesarPinCompleto(); }
    });
    $('kBack').onclick = goToPhone;
    $('kDel').onclick = ()=>{ if(!attempting){ pin=pin.slice(0,-1); updatePinDots(); }};
  }

  // ── Login ──
  async function doLogin(){
    attempting = true;
    $('msg2').textContent = 'Verificando…'; $('msg2').className = 'msg';
    try {
      const res = await fetch('/api/login', {
        method:'POST',
        headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ telefono: '+57' + phone, pin }),
      });
      const data = await res.json();
      if(!res.ok){
        if(data.error === 'credenciales_invalidas'){
          for(let i=0;i<4;i++) $('pd'+i).classList.add('error');
          $('msg2').textContent = 'Número o PIN incorrecto'; $('msg2').className = 'msg err';
          setTimeout(()=>{ pin=''; updatePinDots(); attempting=false; }, 700);
        } else if(data.error === 'cuenta_pendiente_aprobacion'){
          $('msg2').textContent = 'Tu cuenta está en revisión. El admin te avisará cuando esté activa.'; $('msg2').className = 'msg err';
          setTimeout(()=>{ pin=''; updatePinDots(); attempting=false; }, 900);
        } else {
          throw new Error(data.error || 'Error');
        }
        return;
      }
      const destino = data.usuario && data.usuario.rol === 'admin' ? '/os/dashboard.html' : '/m/';
      if(data.must_change){
        // PIN de fábrica: obligar a crear uno nuevo antes de entrar
        iniciarCambioPin(destino);
        return;
      }
      $('msg2').textContent = 'Bienvenido'; $('msg2').className = 'msg ok';
      setTimeout(()=>{ location.replace(destino); }, 300);
    } catch(err) {
      $('msg2').textContent = 'Error de conexión'; $('msg2').className = 'msg err';
      setTimeout(()=>{ pin=''; updatePinDots(); attempting=false; }, 700);
    }
  }

  // ── Cambio de PIN obligatorio (PIN de fábrica) ──
  let cambioPin = null; // null = login normal · {paso:'nuevo'|'confirmar', nuevo, destino}
  function iniciarCambioPin(destino){
    cambioPin = { paso:'nuevo', nuevo:'', destino };
    pin = ''; attempting = false; updatePinDots();
    $('pinSub').textContent = 'Crea tu PIN nuevo';
    $('msg2').textContent = 'Tu PIN es el de fábrica. Elige uno propio.';
    $('msg2').className = 'msg';
  }
  async function procesarPinCompleto(){
    if(!cambioPin) return doLogin();
    if(cambioPin.paso === 'nuevo'){
      if(pin === '0000'){
        $('msg2').textContent = 'Ese PIN no está permitido'; $('msg2').className = 'msg err';
        setTimeout(()=>{ pin=''; updatePinDots(); }, 600);
        return;
      }
      cambioPin.nuevo = pin; cambioPin.paso = 'confirmar';
      pin = ''; updatePinDots();
      $('pinSub').textContent = 'Confirma tu PIN nuevo';
      $('msg2').textContent = '';
      return;
    }
    // confirmar
    if(pin !== cambioPin.nuevo){
      for(let i=0;i<4;i++) $('pd'+i).classList.add('error');
      $('msg2').textContent = 'No coincide, intenta de nuevo'; $('msg2').className = 'msg err';
      cambioPin.paso = 'nuevo'; cambioPin.nuevo = '';
      setTimeout(()=>{ pin=''; updatePinDots(); $('pinSub').textContent='Crea tu PIN nuevo'; }, 700);
      return;
    }
    attempting = true;
    $('msg2').textContent = 'Guardando…'; $('msg2').className = 'msg';
    try {
      const res = await fetch('/api/mi-pin', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ pin }),
      });
      if(!res.ok) throw new Error('error');
      $('msg2').textContent = 'PIN actualizado. Bienvenido'; $('msg2').className = 'msg ok';
      const destino = cambioPin.destino;
      setTimeout(()=>{ location.replace(destino); }, 400);
    } catch(err){
      $('msg2').textContent = 'No se pudo guardar, intenta de nuevo'; $('msg2').className = 'msg err';
      setTimeout(()=>{ pin=''; updatePinDots(); attempting=false; }, 700);
    }
  }

  // ── Keyboard (desktop only) ──
  document.addEventListener('keydown', e=>{
    if($('s2').classList.contains('hidden')) return;
    if(e.key >= '0' && e.key <= '9' && pin.length < 4 && !attempting){
      pin += e.key; updatePinDots();
      if(pin.length === 4) procesarPinCompleto();
    } else if(e.key === 'Backspace' && !attempting){
      pin = pin.slice(0,-1); updatePinDots();
    } else if(e.key === 'Escape'){
      goToPhone();
    }
  });

  // ── Crear cuenta (auto-registro de asesor) ──
  let regFotoBase64 = '';
  $('linkCrearCuenta').addEventListener('click', ()=>{
    $('s1').classList.add('hidden');
    $('s3').classList.remove('hidden');
    $('regNombre').focus();
  });
  $('linkVolverLogin').addEventListener('click', ()=>{
    $('s3').classList.add('hidden');
    $('s1').classList.remove('hidden');
  });
  $('regPhotoBox').addEventListener('click', ()=> $('regFotoInput').click());
  $('regFotoInput').addEventListener('change', function(){
    const file = this.files[0]; if(!file) return;
    const r = new FileReader();
    r.onload = e=>{
      regFotoBase64 = e.target.result;
      $('regPhotoBox').innerHTML = '<img src="'+regFotoBase64+'" alt="">';
    };
    r.readAsDataURL(file);
  });
  $('regPhone').addEventListener('input', e=>{
    let raw = e.target.value.replace(/\D/g,'');
    if(raw.length > 10) raw = raw.slice(-10);
    e.target.value = formatPhone(raw);
  });
  $('regPin').addEventListener('input', e=>{
    e.target.value = e.target.value.replace(/\D/g,'').slice(0,4);
  });
  let registrando = false;
  $('btnRegistrar').addEventListener('click', async ()=>{
    if(registrando) return;
    const nombre = $('regNombre').value.trim();
    const telRaw = $('regPhone').value.replace(/\D/g,'');
    const pinReg = $('regPin').value.trim();
    const msgEl = $('msgReg');
    if(!nombre){ msgEl.textContent = 'Escribe tu nombre completo'; msgEl.className = 'msg err'; return; }
    if(telRaw.length < 10){ msgEl.textContent = 'Teléfono inválido'; msgEl.className = 'msg err'; return; }
    if(pinReg.length !== 4 || pinReg === '0000'){ msgEl.textContent = 'Elige un PIN de 4 dígitos distinto de 0000'; msgEl.className = 'msg err'; return; }
    registrando = true;
    $('btnRegistrar').disabled = true;
    msgEl.textContent = 'Enviando…'; msgEl.className = 'msg';
    try{
      const res = await fetch('/api/vendedores/registro', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ nombre, telefono:'+57'+telRaw, pin:pinReg, foto: regFotoBase64 || undefined }),
      });
      const data = await res.json();
      if(!res.ok){
        const errores = { telefono_ya_registrado:'Ese teléfono ya está registrado', pin_invalido:'PIN inválido', formato_telefono_invalido_debe_ser_57:'Teléfono inválido', demasiados_intentos_intenta_mas_tarde:'Demasiados intentos, intenta más tarde' };
        msgEl.textContent = errores[data.error] || 'No se pudo registrar'; msgEl.className = 'msg err';
        registrando = false; $('btnRegistrar').disabled = false;
        return;
      }
      msgEl.textContent = '¡Listo! Tu cuenta está en revisión — el admin te avisará cuando esté activa.'; msgEl.className = 'msg ok';
      setTimeout(()=>{
        $('s3').classList.add('hidden');
        $('s1').classList.remove('hidden');
        registrando = false; $('btnRegistrar').disabled = false;
      }, 2200);
    }catch(err){
      msgEl.textContent = 'Error de conexión'; msgEl.className = 'msg err';
      registrando = false; $('btnRegistrar').disabled = false;
    }
  });

  phoneEl.focus();
})();
</script>
</body>
</html>
