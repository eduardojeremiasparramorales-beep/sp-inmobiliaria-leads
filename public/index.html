<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0A0A">
<title>Leons Group</title>
<style>
  html,body{height:100%;margin:0;color:#F8F8F8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif;
    background:
      radial-gradient(circle 240px at 16% 20%, rgba(248,248,248,.08), rgba(248,248,248,.025) 52%, transparent 62%),
      radial-gradient(700px 500px at 85% -10%, rgba(212,175,55,.10), transparent 60%),
      radial-gradient(600px 550px at -10% 105%, rgba(78,123,70,.06), transparent 60%),
      #0A0A0A}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .mark{width:56px;height:56px;border-radius:16px;background:linear-gradient(140deg,#EDCC60,#D4AF37 55%,#A08028);display:grid;place-items:center;color:#000;font-weight:700;font-size:22px;font-family:Georgia,serif;box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .name{font-size:15px;letter-spacing:.14em;color:#D4AF37;font-weight:600}
  .spin{width:26px;height:26px;border:2px solid #252525;border-top-color:#D4AF37;border-radius:50%;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
@supports(corner-shape:squircle){.mark{corner-shape:squircle}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">SP</div>
    <div class="name">LEONS&nbsp;GROUP</div>
    <div class="spin"></div>
  </div>
<script>
  // Enrutador de entrada: manda a cada quien a donde corresponde.
  fetch('/api/me', { credentials: 'include' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (u) {
      if (!u) { location.replace('/login.html'); return; }
      if (u.rol === 'admin') { location.replace('/os/dashboard.html'); return; }
      location.replace('/m/');
    })
    .catch(function () { location.replace('/login.html'); });
</script>
</body>
</html>
