<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="theme-color" content="#0A0A0A">
<title>Leons Group</title>
<style>
  html,body{height:100%;margin:0;background:#0A0A0A;color:#F8F8F8;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Inter,sans-serif}
  .wrap{height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:18px}
  .mark{width:56px;height:56px;border-radius:16px;background:linear-gradient(140deg,#E8C86A,#C8A45A 55%,#9E7E3C);display:grid;place-items:center;color:#000;font-weight:700;font-size:22px;font-family:Georgia,serif;box-shadow:0 8px 30px rgba(0,0,0,.5)}
  .name{font-size:15px;letter-spacing:.14em;color:#C8A45A;font-weight:600}
  .spin{width:26px;height:26px;border:2px solid #252525;border-top-color:#C8A45A;border-radius:50%;animation:s .8s linear infinite}
  @keyframes s{to{transform:rotate(360deg)}}
</style>
</head>
<body>
  <div class="wrap">
    <div class="mark">SP</div>
    <div class="name">LEONS&nbsp;GROUP</div>
    <div class="spin"></div>
  </div>
<script>
  // Enrutador de entrada: manda a cada quien a donde corresponde.
  fetch('/api/me', { credentials: 'include' })
    .then(function (r) { return r.ok ? r.json() : null; })
    .then(function (u) {
      if (!u) { location.replace('/login.html'); return; }
      if (u.rol === 'admin') { location.replace('/os/dashboard.html'); return; }
      location.replace('/m/');
    })
    .catch(function () { location.replace('/login.html'); });
</script>
</body>
</html>
