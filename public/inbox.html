<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SP Inbox">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>SP Inmobiliaria — Inbox</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital@0;1&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── Apple Design System · SP Inmobiliaria ── */
  :root{
    --bg:#040406; --bg2:#0A0A0E; --bg3:#121218; --bg4:#16161E;
    --sep:rgba(255,255,255,.04);
    --txt:#F5F0E8; --txt2:rgba(245,240,232,.45); --txt3:rgba(245,240,232,.22);
    --oro:#D4AF37; --oro-bright:#D4AF37; --oro-dark:#A8872B;
    --verde:#4E7B46; --verde-bright:#3D6B37; --rojo:#FF453A;
    --marfil:#F5F0E8; --gris:rgba(245,240,232,.45); --gris-oscuro:rgba(245,240,232,.22);
    --grad-gold:linear-gradient(135deg,#D4AF37,#A8872B);
    --shadow-raised:0 8px 30px rgba(0,0,0,.5);
    --shadow-raised-sm:0 2px 8px rgba(0,0,0,.4);
    --shadow-raised-lg:0 20px 60px rgba(0,0,0,.6);
    --shadow-inset:inset 0 2px 4px rgba(0,0,0,.3);
    --shadow-inset-sm:inset 0 2px 4px rgba(0,0,0,.3);
    --radius:12px; --radius-sm:10px; --radius-lg:20px; --radius-xl:26px;
    --transition:.15s ease;
    --ease:cubic-bezier(.22,1,.36,1);
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  button{cursor:pointer;font-family:inherit}
  .ic{display:inline-block;vertical-align:middle;flex-shrink:0}
  body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--txt);height:100vh;height:100dvh;overflow:hidden;
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  .msg,.msg *,.nota-item,.nota-item *,input,textarea{
    -webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text;-webkit-touch-callout:default}
  button,.conv-item,.tpl-chip,a,select{touch-action:manipulation}
  button:active,.tpl-chip:active{transform:scale(.97)}
  ::selection{background:rgba(212,175,55,.3);color:#fff}

  .app{display:grid;grid-template-columns:340px 1fr;height:100vh;height:100dvh;min-height:0}

  /* ── Topbar ── */
  .topbar{
    grid-column:1/3;display:flex;align-items:center;justify-content:space-between;
    height:56px;padding:0 24px;background:var(--bg2);position:relative;z-index:10;
    box-shadow:0 1px 0 rgba(255,255,255,.04),0 2px 8px rgba(0,0,0,.4);
    border-bottom:1px solid rgba(212,175,55,.08);
    -webkit-backdrop-filter:blur(40px);backdrop-filter:blur(40px);
  }
  .topbar .brand{font-family:'Cinzel',serif;font-weight:600;
    background:linear-gradient(135deg,#E8C84A,var(--oro),var(--oro-dark));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    letter-spacing:.1em;font-size:15px;display:flex;align-items:center;gap:12px}
  .topbar .brand .logo{width:32px;height:32px;border-radius:10px;object-fit:cover;box-shadow:var(--shadow-raised-sm)}
  .topbar .right{display:flex;align-items:center;gap:16px;font-size:.85rem}
  .estado-select{background:var(--bg3);color:var(--txt);border:none;border-radius:var(--radius-sm);padding:8px 14px;font-family:inherit;font-size:.76rem;
    box-shadow:var(--shadow-inset);transition:box-shadow .15s ease;appearance:none}
  .estado-select:focus{outline:none;box-shadow:var(--shadow-inset),0 0 0 1.5px rgba(212,175,55,.3)}
  .logout{color:var(--txt2);cursor:pointer;text-decoration:none;font-size:.76rem;transition:color .15s ease;
    padding:8px 14px;border-radius:var(--radius-sm);background:var(--bg3);box-shadow:var(--shadow-raised-sm)}
  .logout:hover{color:var(--oro)}

  .app{grid-template-rows:auto minmax(0,1fr)}

  /* ── Sidebar ── */
  .sidebar{grid-row:2;grid-column:1;background:var(--bg2);overflow-y:auto;min-height:0;
    box-shadow:1px 0 0 rgba(255,255,255,.04)}
  .chat{grid-row:2;grid-column:2;display:flex;flex-direction:column;min-height:0;height:100%;overflow:hidden;background:var(--bg);position:relative}

  .sidebar-hdr{display:flex;align-items:center;justify-content:space-between;padding:18px 20px 10px}
  .sidebar-hdr h3{font-family:'Cinzel',serif;font-size:.6rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.2em;font-weight:500}
  .sidebar-hdr span{font-family:'Inter',sans-serif;color:var(--txt2);font-size:.7rem;background:var(--bg3);padding:4px 12px;border-radius:20px;font-feature-settings:'tnum'}

  .search-wrap{padding:12px 16px 6px;position:sticky;top:0;background:var(--bg2);z-index:5}
  .search-wrap input{width:100%;height:40px;background:var(--bg3);border:none;border-radius:var(--radius-sm);color:var(--txt);padding:0 16px;font-family:inherit;font-size:.84rem;
    box-shadow:var(--shadow-inset);transition:box-shadow .15s ease}
  .search-wrap input::placeholder{color:rgba(255,255,255,.2)}
  .search-wrap input:focus{outline:none;box-shadow:var(--shadow-inset),0 0 0 1.5px rgba(212,175,55,.3)}

  .filtros{display:flex;gap:6px;padding:8px 16px 12px;overflow-x:auto;scrollbar-width:none}
  .filtros::-webkit-scrollbar{display:none}
  .filtro-chip{background:var(--bg3);border:none;color:var(--txt2);height:32px;display:inline-flex;align-items:center;padding:0 16px;border-radius:20px;font-size:.72rem;cursor:pointer;white-space:nowrap;transition:color .15s ease,background .15s ease;flex-shrink:0;font-weight:500}
  .filtro-chip:hover{color:var(--txt)}
  .filtro-chip.active{background:rgba(212,175,55,.1);color:var(--oro);font-weight:600}

  .date-sep{align-self:center;background:var(--bg3);color:var(--txt3);font-size:.6rem;padding:5px 16px;border-radius:20px;margin:12px 0;text-transform:uppercase;letter-spacing:.12em}
  .msg .ticks{color:rgba(212,175,55,.5);font-size:.66rem;margin-left:5px}

  .conv-item{min-height:60px;padding:10px 16px;cursor:pointer;transition:background .15s ease;display:flex;gap:12px;align-items:center;margin:0 8px 2px;border-radius:var(--radius);border-left:3px solid transparent}
  .conv-item:hover{background:rgba(255,255,255,.03)}
  .conv-item.active{background:rgba(212,175,55,.06);border-left:3px solid var(--oro)}
  .avatar{width:44px;height:44px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:.95rem;color:#fff;letter-spacing:.02em;position:relative;
    box-shadow:var(--shadow-raised-sm)}
  .conv-item.active .avatar{box-shadow:var(--shadow-raised-sm),0 0 0 2px rgba(212,175,55,.25)}
  .ch-badge{position:absolute;bottom:-2px;right:-2px;width:18px;height:18px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:.5rem;font-weight:700;
    border:2.5px solid var(--bg2);color:#fff}
  .ch-whatsapp{background:#25D366}
  .ch-messenger{background:#0084FF}
  .ch-instagram{background:#E4405F}
  .conv-main{flex:1;min-width:0}
  .conv-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .conv-item .name{font-weight:500;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;display:flex;align-items:center;gap:6px;color:var(--txt)}
  .conv-item .name .ch-label{font-size:.56rem;color:var(--txt3);font-weight:400}
  .conv-time{font-size:.64rem;color:var(--txt3);flex-shrink:0;font-feature-settings:'tnum'}
  .conv-bottom{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:3px}
  .conv-item .preview{font-size:.78rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1;line-height:1.3}
  .conv-item.unread .preview{color:var(--txt);font-weight:500}
  .conv-item.unread .name{font-weight:700}
  .unread-badge{background:linear-gradient(135deg,var(--verde),var(--verde-bright));color:#fff;font-size:.62rem;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 7px;flex-shrink:0;font-feature-settings:'tnum'}
  .vend-tag{font-size:.58rem;color:var(--oro);background:rgba(212,175,55,.1);padding:3px 10px;border-radius:20px;flex-shrink:0;font-weight:500}

  .conn-dot{width:9px;height:9px;border-radius:50%;background:var(--rojo);display:inline-block;transition:background .15s ease}
  .conn-dot.on{background:#30D158}

  /* ── Drawer ── */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:90;display:none}
  .drawer-overlay.show{display:block}
  .drawer{position:fixed;top:0;right:-380px;width:350px;max-width:92vw;height:100%;background:var(--bg2);z-index:95;
    transition:right .4s var(--ease);display:flex;flex-direction:column;overflow-y:auto;
    box-shadow:var(--shadow-raised-lg);
    -webkit-backdrop-filter:blur(40px);backdrop-filter:blur(40px)}
  .drawer.show{right:0}
  .drawer .dw-head{padding:36px 28px 24px;text-align:center}
  .drawer .dw-head .avatar{width:80px;height:80px;font-size:1.7rem;margin:0 auto 16px;box-shadow:var(--shadow-raised)}
  .drawer .dw-name{font-family:'Cinzel',serif;font-weight:600;font-size:1.1rem;
    background:var(--grad-gold);
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    letter-spacing:.04em}
  .drawer .dw-channel{color:var(--txt2);font-size:.8rem;margin-top:8px;display:flex;align-items:center;justify-content:center;gap:6px}
  .drawer .dw-sec{padding:24px 28px}
  .drawer .dw-sec h4{font-size:.6rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.2em;margin-bottom:16px;font-family:'Cinzel',serif;font-weight:500}
  .drawer .dw-close{position:absolute;top:16px;left:16px;background:var(--bg3);border:none;color:var(--txt2);width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s ease;box-shadow:var(--shadow-raised-sm)}
  .drawer .dw-close:hover{color:var(--oro)}
  .dw-detail{display:flex;justify-content:space-between;padding:12px 0;font-size:.8rem}
  .dw-detail .label{color:var(--txt2)}.dw-detail .value{color:var(--txt);font-weight:500}

  .badge{font-size:.56rem;padding:4px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
  .b-nuevo{background:var(--grad-gold);color:#0A0A0E}
  .b-asignado{background:rgba(100,160,220,.12);color:#9CC4E8}
  .b-contactado{background:linear-gradient(135deg,var(--verde),var(--verde-bright));color:#fff}
  .b-cerrado{background:var(--bg4);color:var(--txt2)}
  .etq{font-size:.54rem;padding:4px 10px;border-radius:20px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-left:6px}
  .e-interesado{background:rgba(100,160,220,.12);color:#9CC4E8}
  .e-negociacion{background:rgba(212,175,55,.1);color:var(--oro)}
  .e-cita{background:rgba(78,123,70,.15);color:#8FBF85}
  .e-vendido{background:var(--grad-gold);color:#0A0A0E}
  .e-no_interesado{background:rgba(255,69,58,.1);color:var(--rojo)}
  .e-sin_clasificar{background:var(--bg4);color:var(--txt3)}

  /* ── Chat ── */
  .chat-header{padding:12px 22px;background:var(--bg2);box-shadow:var(--shadow-raised-sm);display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
  .chat-header .cname{font-weight:600;font-size:1rem;display:flex;align-items:center;gap:8px;color:var(--txt)}
  .chat-header .cchannel{font-size:.64rem;font-weight:500;letter-spacing:.04em}
  .chat-header .cphone{font-size:.72rem;color:var(--txt3)}
  .chat-header button{background:var(--bg3);border:none;color:var(--txt2);padding:8px 16px;border-radius:var(--radius-sm);cursor:pointer;font-size:.72rem;font-family:inherit;transition:color .15s ease;box-shadow:var(--shadow-raised-sm)}
  .chat-header button:hover{color:var(--oro)}
  .lead-tools{display:flex;gap:10px;align-items:center;flex-wrap:wrap;padding:10px 20px;background:var(--bg2);font-size:.74rem;position:relative;z-index:1;box-shadow:0 1px 0 rgba(255,255,255,.04)}
  .lead-tools select{background:var(--bg3);color:var(--txt);border:none;border-radius:var(--radius-sm);padding:7px 12px;font-family:inherit;font-size:.74rem;transition:box-shadow .15s ease;box-shadow:var(--shadow-inset);appearance:none}
  .lead-tools select:focus{outline:none;box-shadow:var(--shadow-inset),0 0 0 1.5px rgba(212,175,55,.3)}
  .lead-tools label{color:var(--txt2);font-size:.66rem;letter-spacing:.02em}
  .notas-btn{background:rgba(212,175,55,.1);border:none;color:var(--oro);padding:7px 14px;border-radius:var(--radius-sm);cursor:pointer;font-size:.72rem;font-family:inherit;transition:filter .15s ease;display:flex;align-items:center;gap:6px}
  .notas-btn:hover{filter:brightness(1.15)}

  .notas-panel{display:none;padding:16px 22px;background:var(--bg2);box-shadow:var(--shadow-inset-sm)}
  .notas-panel.show{display:block}
  .nota-item{background:var(--bg3);border-left:3px solid var(--oro);padding:10px 14px;border-radius:var(--radius-sm);margin-bottom:8px;font-size:.8rem;box-shadow:var(--shadow-raised-sm)}
  .nota-item .meta{color:var(--txt2);font-size:.62rem;margin-top:5px;display:flex;justify-content:space-between}
  .nota-item .del{color:var(--rojo);opacity:.6;cursor:pointer;font-size:.62rem;transition:opacity .15s ease}
  .nota-item .del:hover{opacity:1}
  .notas-form{display:flex;gap:8px;margin-top:12px}
  .notas-form input{flex:1;height:40px;background:var(--bg3);border:none;border-radius:var(--radius-sm);color:var(--txt);padding:0 14px;font-family:inherit;font-size:.8rem;transition:box-shadow .15s ease;box-shadow:var(--shadow-inset)}
  .notas-form input:focus{outline:none;box-shadow:var(--shadow-inset),0 0 0 1.5px rgba(212,175,55,.3)}
  .notas-form button{background:var(--grad-gold);color:#0A0A0E;border:none;border-radius:var(--radius-sm);height:40px;padding:0 20px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.78rem;transition:filter .15s ease;box-shadow:var(--shadow-raised-sm)}
  .notas-form button:hover{filter:brightness(1.1)}

  .messages{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px 20px;display:flex;flex-direction:column;gap:4px}
  .msg{position:relative;max-width:72%;padding:10px 16px 8px;border-radius:14px;font-size:.86rem;line-height:1.5;word-wrap:break-word;animation:msgIn .35s var(--ease);box-shadow:var(--shadow-raised-sm)}
  @keyframes msgIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
  .msg .time{display:inline-block;font-size:.58rem;color:var(--txt3);margin-top:5px;float:right;margin-left:14px;position:relative;top:5px;font-feature-settings:'tnum'}
  .msg.in{align-self:flex-start;background:#16161E;border-top-left-radius:6px}
  .msg.out{align-self:flex-end;background:#1E3322;border-top-right-radius:6px}
  .msg.internal{max-width:90%;align-self:center;background:var(--bg3);font-style:italic;font-size:.76rem;color:var(--txt2);border-radius:var(--radius-sm)}
  .empty{margin:auto;color:var(--txt3);text-align:center;font-size:.85rem;max-width:250px;line-height:1.7}

  .skel{display:flex;gap:12px;align-items:center;min-height:60px;padding:10px 16px;margin:0 8px 2px;border-radius:var(--radius)}
  .skel .sk-av{width:44px;height:44px;border-radius:50%;flex-shrink:0;background:var(--bg3)}
  .skel .sk-l1{height:12px;width:60%;border-radius:6px;margin-bottom:8px;background:var(--bg3)}
  .skel .sk-l2{height:10px;width:85%;border-radius:5px;background:var(--bg3)}
  .skel .sk-av,.skel .sk-l1,.skel .sk-l2{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.2s linear infinite}
  @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
  ::-webkit-scrollbar{width:3px;height:3px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(212,175,55,.15);border-radius:2px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(212,175,55,.3)}
  :focus-visible{outline:2px solid rgba(212,175,55,.4);outline-offset:2px;border-radius:2px}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
  }

  .templates{display:flex;gap:6px;padding:8px 22px 0;flex-wrap:wrap}
  .tpl-chip{background:var(--bg3);border:none;color:var(--oro);height:32px;display:inline-flex;align-items:center;padding:0 14px;border-radius:20px;font-size:.7rem;cursor:pointer;white-space:nowrap;transition:background .15s ease;font-weight:500}
  .tpl-chip:hover{background:rgba(212,175,55,.1)}

  .composer{padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:var(--bg);display:flex;gap:10px;align-items:flex-end;flex-shrink:0;position:relative;z-index:2}
  .composer.disabled{opacity:.35;pointer-events:none}
  .pill{flex:1;display:flex;align-items:flex-end;background:var(--bg3);border:none;border-radius:var(--radius-xl);padding:2px 4px;min-height:52px;transition:box-shadow .15s ease;min-width:0;
    box-shadow:var(--shadow-inset)}
  .pill:focus-within{box-shadow:var(--shadow-inset),0 0 0 1.5px rgba(212,175,55,.3)}
  .pill .icon-btn{background:none;border:none;color:var(--txt2);font-size:1.3rem;padding:13px 10px;cursor:pointer;border-radius:50%;line-height:1;flex-shrink:0;transition:color .15s ease,transform .1s ease}
  .pill .icon-btn:hover{color:var(--oro)}
  .pill .icon-btn:active{transform:scale(.9)}
  .pill textarea{flex:1;resize:none;background:transparent;border:none;color:var(--txt);padding:15px 6px;font-family:inherit;font-size:16px;line-height:1.35;max-height:120px;outline:none;min-width:0}
  .pill textarea::placeholder{color:rgba(255,255,255,.2)}
  .fab{width:52px;height:52px;border-radius:50%;
    background:var(--grad-gold);color:#0A0A0E;border:none;font-size:1.35rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    transition:filter .15s ease,transform .1s ease;box-shadow:var(--shadow-raised-sm)}
  .fab:hover{filter:brightness(1.1)}
  .fab:active{transform:scale(.94)}
  .fab:disabled{opacity:.35;cursor:not-allowed;transform:none}
  .fab.grabando{background:linear-gradient(135deg,#FF453A,#C93028);color:#fff;animation:micPulse 1.2s infinite}
  @keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,69,58,.3)}50%{box-shadow:0 0 0 14px rgba(255,69,58,0)}}
  .rec-strip{flex:1;display:flex;align-items:center;gap:14px;background:var(--bg3);border:none;border-radius:var(--radius-xl);padding:0 24px;min-height:52px;font-size:.84rem;cursor:pointer;
    box-shadow:var(--shadow-inset)}
  .rec-dot{width:10px;height:10px;border-radius:50%;background:var(--rojo);animation:recPulse .8s infinite}
  @keyframes recPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  .rec-strip .rec-hint{color:var(--txt2);font-size:.72rem;margin-left:auto}
  #recTimer{color:#FF9F94;font-weight:600;font-variant-numeric:tabular-nums}
  .emoji-panel{display:none;grid-template-columns:repeat(8,1fr);gap:2px;padding:14px 18px;padding-bottom:calc(14px + env(safe-area-inset-bottom));background:var(--bg2);max-height:220px;overflow-y:auto;
    box-shadow:0 -1px 0 rgba(255,255,255,.04)}
  .emoji-panel.show{display:grid}
  .emoji-panel button{background:none;border:none;font-size:1.5rem;padding:7px 0;cursor:pointer;border-radius:8px;line-height:1;transition:background .15s ease}
  .emoji-panel button:hover{background:var(--bg3)}

  .slash-menu{display:none;background:var(--bg2);border:none;border-radius:var(--radius);margin:0 16px 6px;max-height:240px;overflow-y:auto;
    box-shadow:var(--shadow-raised-lg)}
  .slash-menu.show{display:block}
  .slash-item{padding:12px 18px;cursor:pointer;display:flex;flex-direction:column;gap:3px;transition:background .15s ease}
  .slash-item:hover,.slash-item.sel{background:rgba(212,175,55,.06)}
  .slash-item .st{color:var(--oro);font-weight:600;font-size:.82rem}
  .slash-item .sc{color:var(--txt2);font-size:.7rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .audio-preview{display:none;align-items:center;gap:14px;padding:12px 20px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:var(--bg);flex-shrink:0;position:relative;z-index:2}
  .audio-preview.show{display:flex}
  .audio-preview audio{flex:1;height:38px}
  .audio-preview .ap-send{background:var(--grad-gold);color:#0A0A0E;border:none;border-radius:var(--radius-sm);height:40px;padding:0 20px;font-weight:600;cursor:pointer;font-size:.8rem;white-space:nowrap;transition:filter .15s ease;box-shadow:var(--shadow-raised-sm)}
  .audio-preview .ap-send:hover{filter:brightness(1.1)}
  .audio-preview .ap-cancel{background:var(--bg3);border:none;color:var(--txt2);border-radius:var(--radius-sm);height:40px;padding:0 16px;cursor:pointer;font-size:.8rem;transition:color .15s ease;box-shadow:var(--shadow-raised-sm)}
  .audio-preview .ap-cancel:hover{color:var(--oro)}

  .msg .media-img{max-width:240px;max-height:300px;border-radius:var(--radius-sm);display:block;cursor:pointer;box-shadow:var(--shadow-raised-sm)}
  .msg .media-video{max-width:240px;border-radius:var(--radius-sm);display:block}
  .msg .media-audio{width:230px;display:block;border-radius:var(--radius-sm)}
  .msg .media-file{display:inline-block;color:var(--oro);text-decoration:none;border-bottom:1px solid rgba(212,175,55,.25);word-break:break-all;transition:opacity .15s ease}
  .msg .media-file:hover{opacity:.75}
  .msg .cap{margin-top:5px;font-size:.84rem}

  .splash{position:fixed;inset:0;background:var(--bg);
    display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .35s var(--ease);gap:24px}
  .splash.hide{opacity:0;pointer-events:none}
  .splash img{width:100px;height:100px;border-radius:24px;object-fit:cover;box-shadow:var(--shadow-raised-lg)}
  .splash .brand{font-family:'Cinzel',serif;font-weight:600;
    background:linear-gradient(135deg,#E8C84A,var(--oro),var(--oro-dark));
    -webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;
    letter-spacing:.22em;font-size:1.25rem;text-align:center}
  .splash .sub{color:var(--txt3);font-size:.66rem;letter-spacing:.18em;text-transform:uppercase}
  .splash .spin{width:22px;height:22px;border:2px solid rgba(212,175,55,.15);border-top-color:var(--oro);border-radius:50%;animation:spin .8s linear infinite}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;bottom:32px;left:50%;transform:translateX(-50%) translateY(16px);
    background:var(--bg3);color:var(--txt);
    padding:14px 28px;border-radius:var(--radius);font-size:.8rem;opacity:0;
    transition:all .4s var(--ease);z-index:50;pointer-events:none;
    box-shadow:var(--shadow-raised-lg)}
  .toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

  @media(max-width:760px){
    .app{grid-template-columns:1fr}
    .sidebar{grid-row:2;grid-column:1}
    .chat{grid-row:2;grid-column:1;animation:chatSlide .35s cubic-bezier(.22,1,.36,1)}
    @keyframes chatSlide{from{transform:translateX(45px);opacity:0}to{transform:none;opacity:1}}
    .chat.hidden,.sidebar.hidden{display:none}
    .topbar{height:auto;min-height:52px;padding:8px 16px;padding-top:calc(8px + env(safe-area-inset-top))}
    .topbar .brand{font-size:.85rem}
    .topbar .brand .logo{width:28px;height:28px}
    .topbar .right{gap:6px;font-size:.74rem}
    .topbar #miNombre{display:none}
    .estado-select{padding:6px 10px;font-size:.7rem}
    .messages{padding:16px 12px}
    .chat-header{padding:12px 16px}
    .chat-header button{padding:6px 12px}
    .conv-item{padding:10px 12px;margin:0 4px 3px}
    .tpl-chip{padding:5px 12px;font-size:.73rem}
    .sidebar,.app{min-height:0;height:100%}
    .conv-item.active::before{display:none}
  }
</style>
</head>
<body>
<div class="splash" id="splash">
  <img src="/icons/icon-512.png" alt="SP" onerror="this.style.display='none'">
  <div class="brand">SP INMOBILIARIA</div>
  <div class="sp-line-sm"></div>
  <div class="sub">Inbox Multicanal</div>
  <div class="spin"></div>
</div>
<div class="app">
  <div class="topbar">
    <div class="brand">
      <img src="/icons/logo.png" alt="" class="logo" onerror="this.style.display='none'">
      <span>SP INBOX</span>
    </div>
    <div class="right">
      <span class="conn-dot" id="connDot" title="Conexión en tiempo real" aria-label="Estado de conexión"></span>
      <span id="miNombre"></span>
      <select class="estado-select" id="estadoSelect" title="Mi disponibilidad">
        <option value="activo">Activo</option>
        <option value="ocupado">Ocupado</option>
        <option value="inactivo">Inactivo</option>
      </select>
      <a class="logout" id="logout">Salir</a>
    </div>
  </div>

  <div class="sidebar" id="sidebar">
    <div class="search-wrap">
      <input type="text" id="buscar" placeholder="Buscar por nombre o teléfono…" autocomplete="off" aria-label="Buscar conversaciones">
    </div>
    <div class="filtros" id="filtros">
      <span class="filtro-chip active" data-f="todos">Todos</span>
      <span class="filtro-chip" data-f="whatsapp">WhatsApp</span>
      <span class="filtro-chip" data-f="messenger">Messenger</span>
      <span class="filtro-chip" data-f="instagram">Instagram</span>
      <span class="filtro-chip" data-f="nuevo">Nuevos</span>
    </div>
    <div class="sidebar-hdr">
      <h3>Conversaciones</h3>
      <span id="convCount">0</span>
    </div>
    <div id="convsList"></div>
  </div>

  <div class="chat hidden" id="chat">
    <div id="chatBody" style="flex:1;min-height:0;display:flex;flex-direction:column;height:100%">
      <div class="empty" id="emptyState">Selecciona una conversación</div>
    </div>
  </div>
</div>
<div class="toast" id="toast"></div>
<div class="drawer-overlay" id="drawerOverlay"></div>
<div class="drawer" id="drawer" role="dialog" aria-label="Información del contacto"></div>

<script src="/socket.io/socket.io.js"></script>
<script>
let me = null;
let conversaciones = [];
let currentConv = null;
let templates = [];
let vendedores = [];
let socket = null;
let connectedViaSocket = false;

const CHANNELS = {
  whatsapp:{label:'WA',color:'#25D366',name:'WhatsApp'},
  messenger:{label:'M',color:'#0084FF',name:'Messenger'},
  instagram:{label:'IG',color:'#E4405F',name:'Instagram'},
};
function chInfo(c){return CHANNELS[c]||{label:'?',color:'#888',name:c};}

const ETIQUETAS = [
  {v:'sin_clasificar', t:'Sin clasificar'},
  {v:'interesado', t:'Interesado'},
  {v:'negociacion', t:'Negociación'},
  {v:'cita', t:'Cita agendada'},
  {v:'vendido', t:'Vendido'},
  {v:'no_interesado', t:'No interesado'},
];
function etqLabel(v){const e=ETIQUETAS.find(x=>x.v===v);return e?e.t:'';}

const EMOJIS = ['😀','😂','😊','😍','🥰','😎','🤝','👍','👌','🙏','💪','👏','🎉','🔥','⭐','❤️','💛','💚','✅','❌','⏰','📍','📞','💬','🏡','🏠','🏘️','🌳','🌄','📐','📄','💰','💵','🤑','📈','🔑','🚪','🛣️','🚗','☀️','🌙','🎯','✨','💡','🙌','😅','🤔','😉','🥳','😇','🫡','👀','📸','🗺️','🏦','📝','🖊️','⚡','🌟','💎','🤗','🙋','👷','🧱'];

const ICONS = {
  mic:'<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>',
  send:'<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
  stop:'<rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" stroke="none"/>',
  clip:'<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>',
  smile:'<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/>',
  x:'<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
  pencil:'<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>',
  back:'<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
  note:'<path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/><path d="M15 3v6h6"/>',
};
function I(name,size){
  size=size||22;
  return `<svg class="ic" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[name]||''}</svg>`;
}

let slashIdx=-1;
function slashItems(){
  const input=document.getElementById('input');
  if(!input)return[];
  const v=input.value;
  if(!v.startsWith('/'))return[];
  const term=v.slice(1).toLowerCase();
  return templates.filter(t=>!term||t.titulo.toLowerCase().includes(term));
}
function actualizarMenuSlash(){
  const menu=document.getElementById('slashMenu');
  if(!menu)return;
  const items=slashItems();
  if(!items.length){menu.classList.remove('show');slashIdx=-1;return;}
  if(slashIdx>=items.length)slashIdx=items.length-1;
  if(slashIdx<0)slashIdx=0;
  menu.innerHTML=items.map((t,i)=>`
    <div class="slash-item ${i===slashIdx?'sel':''}" data-i="${i}">
      <span class="st">${escapeHtml(t.titulo)}</span>
      <span class="sc">${escapeHtml(t.cuerpo.slice(0,60))}${t.cuerpo.length>60?'…':''}</span>
    </div>`).join('');
  menu.classList.add('show');
  menu.querySelectorAll('.slash-item').forEach(el=>el.addEventListener('click',()=>elegirSlash(Number(el.dataset.i))));
}
function elegirSlash(i){
  const items=slashItems();const input=document.getElementById('input');const menu=document.getElementById('slashMenu');
  if(!items[i]||!input)return;
  input.value=items[i].cuerpo;input.style.height='auto';input.style.height=input.scrollHeight+'px';input.focus();
  if(menu)menu.classList.remove('show');slashIdx=-1;input.dispatchEvent(new Event('input'));
}
function manejarTecladoSlash(e){
  const menu=document.getElementById('slashMenu');
  if(!menu||!menu.classList.contains('show'))return false;
  const items=slashItems();
  if(e.key==='ArrowDown'){e.preventDefault();slashIdx=Math.min(slashIdx+1,items.length-1);actualizarMenuSlash();return true;}
  if(e.key==='ArrowUp'){e.preventDefault();slashIdx=Math.max(slashIdx-1,0);actualizarMenuSlash();return true;}
  if(e.key==='Enter'){e.preventDefault();elegirSlash(slashIdx);return true;}
  if(e.key==='Escape'){menu.classList.remove('show');slashIdx=-1;return true;}
  return false;
}
function toast(msg){
  const t=document.getElementById('toast');t.textContent=msg;t.classList.add('show');
  setTimeout(()=>t.classList.remove('show'),2600);
}
function badgeClass(s){return 'badge b-'+(s||'nuevo');}
function iniciales(nombre){
  const p=String(nombre||'C').trim().split(/\s+/);
  return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase()||'C';
}
function avatarColor(nombre){
  const cols=['#4E7B46','#7a5c1e','#2b4d6b','#6b3f5b','#8a6d3b','#3b6b6b','#7a3b3b','#5b5b8a'];
  let h=0;const s=String(nombre||'');
  for(let i=0;i<s.length;i++)h=(h*31+s.charCodeAt(i))&0xffffff;
  return cols[Math.abs(h)%cols.length];
}
function horaCorta(ts){
  if(!ts)return'';
  const d=new Date(ts.replace(' ','T')+'Z');
  if(isNaN(d))return'';
  const hoy=new Date();
  const mismoDia=d.getFullYear()===hoy.getFullYear()&&d.getMonth()===hoy.getMonth()&&d.getDate()===hoy.getDate();
  return mismoDia?d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}):d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit'});
}
function fmtTime(ts){
  if(!ts)return'';
  const d=new Date(ts.replace(' ','T')+'Z');
  if(isNaN(d))return'';
  return d.toLocaleString('es-CO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
}
function api(url,opts){
  return fetch(url,opts).then(r=>{if(r.status===401){location.href='/login.html';throw new Error('no_auth');}return r;});
}
function mostrarSkeletons(){
  const cont=document.getElementById('convsList');
  if(cont)cont.innerHTML=Array.from({length:6},()=>`<div class="skel"><div class="sk sk-av"></div><div style="flex:1"><div class="sk sk-l1"></div><div class="sk sk-l2"></div></div></div>`).join('');
}

async function init(){
  mostrarSkeletons();
  const r=await api('/api/me');me=await r.json();
  document.getElementById('miNombre').textContent=me.nombre;
  const tl=document.getElementById('tituloLista');
  if(tl)tl.textContent=me.rol==='admin'?'Todas las conversaciones':'Mis conversaciones';
  await cargarTemplates();
  if(me.rol==='admin')await cargarVendedores();
  await cargarConversaciones();
  conectarSocket();
  wireFiltros();
  const params=new URLSearchParams(location.search);
  const convFromUrl=params.get('conv');
  if(convFromUrl)abrirConversacion(Number(convFromUrl));
}
async function cargarTemplates(){
  try{const r=await api('/api/templates');templates=await r.json();}catch(e){templates=[];}
}
async function cargarVendedores(){
  try{const r=await api('/api/vendedores');vendedores=await r.json();}catch(e){vendedores=[];}
}
async function cargarConversaciones(){
  const r=await api('/api/inbox/conversations');conversaciones=await r.json();renderConvs();
}

function conectarSocket(){
  socket=io({auth:{token:getCookie('sp_session')}});
  const dot=document.getElementById('connDot');
  socket.on('connect',()=>{if(dot)dot.classList.add('on');connectedViaSocket=true;});
  socket.on('disconnect',()=>{if(dot)dot.classList.remove('on');connectedViaSocket=false;});
  socket.on('message:new',(data)=>{cargarConversaciones();if(currentConv&&data.conversationId==currentConv.id)cargarTimeline(currentConv.id)});
  socket.on('conversation:assigned',(data)=>{if(data.vendedorId==me.vendedorId||me.rol==='admin')cargarConversaciones();});
}
function getCookie(name){const m=document.cookie.match('(^|;)\\s*'+name+'\\s*=\\s*([^;]+)');return m?decodeURIComponent(m.pop()):'';}

function wireFiltros(){
  const buscar=document.getElementById('buscar');
  if(buscar)buscar.addEventListener('input',()=>{terminoBusqueda=buscar.value.trim();renderConvs();});
  document.querySelectorAll('#filtros .filtro-chip').forEach(chip=>
    chip.addEventListener('click',()=>{
      document.querySelectorAll('#filtros .filtro-chip').forEach(c=>c.classList.remove('active'));
      chip.classList.add('active');filtroActivo=chip.dataset.f;renderConvs();
    }));
}
let filtroActivo='todos';let terminoBusqueda='';

function convsFiltradas(){
  let arr=conversaciones;
  if(filtroActivo!=='todos'){
    if(filtroActivo==='nuevo')arr=arr.filter(c=>(c.status||'nuevo')==='nuevo'||(c.status||'')==='asignado');
    else arr=arr.filter(c=>c.channel===filtroActivo);
  }
  if(terminoBusqueda){const t=terminoBusqueda.toLowerCase();arr=arr.filter(c=>(c.customer_name||'').toLowerCase().includes(t)||(c.customer_phone||'').toLowerCase().includes(t));}
  return arr;
}

function renderConvs(){
  const cont=document.getElementById('convsList');const lista=convsFiltradas();
  document.getElementById('convCount').textContent=lista.length;
  if(lista.length===0){cont.innerHTML=conversaciones.length===0?'<div class="empty" style="padding:30px 18px">Aún no hay conversaciones</div>':'<div class="empty" style="padding:30px 18px">Ninguna coincide</div>';return;}
  cont.innerHTML=lista.map(c=>{
    const nombre=c.customer_name||'Cliente';const noLeidos=Number(c.unread_count||0);const ch=chInfo(c.channel);
    const etq=c.etiqueta&&c.etiqueta!=='sin_clasificar'?`<span class="etq e-${c.etiqueta}">${etqLabel(c.etiqueta)}</span>`:'';
    const vend=me&&me.rol==='admin'&&c.assigned_to_nombre?`<span class="vend-tag">${escapeHtml(c.assigned_to_nombre)}</span>`:'';
    return `<div class="conv-item ${currentConv&&currentConv.id===c.id?'active':''} ${noLeidos>0?'unread':''}" data-id="${c.id}">
      <div class="avatar" style="background:${avatarColor(nombre)}">${iniciales(nombre)}<span class="ch-badge ch-${c.channel}" style="background:${ch.color}">${ch.label}</span></div>
      <div class="conv-main">
        <div class="conv-top"><span class="name">${escapeHtml(nombre)} <span class="ch-label">${ch.name}</span></span><span class="conv-time">${horaCorta(c.updated_at||c.created_at)}</span></div>
        <div class="conv-bottom"><span class="preview">${escapeHtml(c.last_message||'')}</span>${vend}${etq}${noLeidos>0?`<span class="unread-badge">${noLeidos>99?'99+':noLeidos}</span>`:''}</div>
      </div>
    </div>`;
  }).join('');
  cont.querySelectorAll('.conv-item').forEach(el=>el.addEventListener('click',()=>abrirConversacion(Number(el.dataset.id))));
}

async function abrirConversacion(id){
  const r=await api('/api/inbox/conversations/'+id+'/timeline');const data=await r.json();currentConv=data.conversation;
  api('/api/inbox/conversations/'+id+'/leido',{method:'GET'}).catch(()=>{});
  const enLista=conversaciones.find(c=>c.id===id);if(enLista)enLista.unread_count=0;renderConvs();
  renderChat(data.conversation,data.messages);
  if(socket&&socket.connected)socket.emit('join:conversation',id);
  if(window.innerWidth<=760){document.getElementById('sidebar').classList.add('hidden');document.getElementById('chat').classList.remove('hidden');}
}

function renderChat(conv,mensajes){
  const cerrado=conv.status==='cerrado';const ch=chInfo(conv.channel);
  const chips=templates.map(t=>`<span class="tpl-chip" data-cuerpo="${escapeHtml(t.cuerpo)}">${escapeHtml(t.titulo)}</span>`).join('');
  const body=document.getElementById('chatBody');
  body.innerHTML=`
    <div class="chat-header">
      <div id="chatInfo" style="display:flex;align-items:center;gap:12px;min-width:0;cursor:pointer" title="Información del contacto" role="button" tabindex="0">
        <div class="avatar" style="width:42px;height:42px;font-size:.9rem;background:${avatarColor(conv.customer_name||'Cliente')}">${iniciales(conv.customer_name||'Cliente')}<span class="ch-badge ch-${conv.channel}" style="background:${ch.color};width:15px;height:15px;font-size:.45rem;bottom:-1px;right:-1px">${ch.label}</span></div>
        <div style="min-width:0">
          <div class="cname">${escapeHtml(conv.customer_name||'Cliente')}</div>
          <div class="cchannel" style="color:${ch.color}">${ch.name}</div>
          <div class="cphone">${escapeHtml(conv.customer_phone||'')}</div>
        </div>
      </div>
      <div style="display:flex;gap:8px;align-items:center">${window.innerWidth<=760?'<button id="volver" aria-label="Volver">'+I('back',16)+' Volver</button>':''}</div>
    </div>
    <div class="lead-tools">
      <label>Etiqueta:</label>
      <select id="etiquetaSelect">${ETIQUETAS.map(e=>'<option value="'+e.v+'" '+((conv.etiqueta||'sin_clasificar')===e.v?'selected':'')+'>'+e.t+'</option>').join('')}</select>
      ${me.rol==='admin'?'<label style="margin-left:6px">Vendedor:</label><select id="reasignarSelect">'+vendedores.map(v=>'<option value="'+v.id+'" '+(Number(conv.assigned_to_id)===Number(v.id)?'selected':'')+'>'+escapeHtml(v.nombre)+(v.estado!=='activo'?' ('+v.estado+')':'')+'</option>').join('')+'</select>':''}
      <button type="button" class="notas-btn" id="notasBtn">${I('note',14)} Notas</button>
    </div>
    <div class="notas-panel" id="notasPanel"><div id="notasList" style="max-height:160px;overflow-y:auto"></div><form class="notas-form" id="notasForm"><input type="text" id="notaInput" placeholder="Nota interna…" maxlength="500"><button type="submit">Guardar</button></form></div>
    <div class="messages" id="messages">${renderMsgsHTML(mensajes)}</div>
    <div class="templates">${chips}</div>
    <div class="audio-preview" id="audioPreview"><button class="ap-cancel" id="apCancel" aria-label="Cancelar audio">${I('x',16)}</button><audio id="audioPlayback" controls></audio><button class="ap-send" id="apSend">Enviar</button></div>
    <div class="slash-menu" id="slashMenu"></div>
    <form class="composer ${cerrado?'disabled':''}" onsubmit="enviarMensaje();return false;">
      <div class="pill" id="pill">
        <button type="button" id="emojiBtn" class="icon-btn" aria-label="Emojis" ${cerrado?'disabled':''}>${I('smile')}</button>
        <textarea id="input" rows="1" placeholder="${cerrado?'Cerrada':'Mensaje'}" ${cerrado?'disabled':''} aria-label="Escribe un mensaje"></textarea>
        <button type="button" id="adjuntar" class="icon-btn" aria-label="Adjuntar" ${cerrado?'disabled':''}>${I('clip')}</button>
        <input type="file" id="fileInput" accept="image/*,audio/*,video/*,application/pdf,.doc,.docx,.xls,.xlsx,.txt" style="display:none">
      </div>
      <div class="rec-strip" id="recStrip" style="display:none"><span class="rec-dot"></span><span id="recTimer">0:00</span><span class="rec-hint">Grabando… toca para detener</span></div>
      <button type="button" id="mainBtn" class="fab" aria-label="Grabar" ${cerrado?'disabled':''}>${I('mic')}</button>
    </form>
    <div class="emoji-panel" id="emojiPanel"></div>`;

  const msgs=document.getElementById('messages');msgs.scrollTop=msgs.scrollHeight;

  if(!cerrado){
    const input=document.getElementById('input');const mainBtn=document.getElementById('mainBtn');const pill=document.getElementById('pill');const recStrip=document.getElementById('recStrip');
    function updateMainBtn(){if(mediaRec&&mediaRec.state==='recording')return;const h=input.value.trim().length>0;mainBtn.innerHTML=h?I('send'):I('mic');mainBtn.setAttribute('aria-label',h?'Enviar':'Grabar');}
    input.addEventListener('input',()=>{input.style.height='auto';input.style.height=input.scrollHeight+'px';updateMainBtn();actualizarMenuSlash();});
    input.addEventListener('keydown',e=>{if(manejarTecladoSlash(e))return;if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();enviarMensaje();}});
    const adjuntar=document.getElementById('adjuntar');const fileInput=document.getElementById('fileInput');
    if(adjuntar&&fileInput){adjuntar.addEventListener('click',()=>fileInput.click());fileInput.addEventListener('change',()=>{if(fileInput.files&&fileInput.files[0])enviarMedia(fileInput.files[0]);});}
    const emojiBtn=document.getElementById('emojiBtn');const emojiPanel=document.getElementById('emojiPanel');
    if(emojiBtn&&emojiPanel){
      emojiPanel.innerHTML=EMOJIS.map(e=>'<button type="button" aria-label="emoji '+e+'">'+e+'</button>').join('');
      emojiBtn.addEventListener('click',()=>emojiPanel.classList.toggle('show'));
      emojiPanel.querySelectorAll('button').forEach(b=>b.addEventListener('click',()=>{const pos=input.selectionStart??input.value.length;input.value=input.value.slice(0,pos)+b.textContent+input.value.slice(pos);input.focus();input.selectionStart=input.selectionEnd=pos+b.textContent.length;updateMainBtn();}));
    }
    const recTimer=document.getElementById('recTimer');const audioPreview=document.getElementById('audioPreview');const audioPlayback=document.getElementById('audioPlayback');const apSend=document.getElementById('apSend');const apCancel=document.getElementById('apCancel');
    let mediaRec=null,recChunks=[],recInterval=null,recBlob=null;
    function fmtSecs(s){return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60;}
    function stopRecording(){if(mediaRec&&mediaRec.state!=='inactive')mediaRec.stop();clearInterval(recInterval);mainBtn.classList.remove('grabando');pill.style.display='flex';recStrip.style.display='none';updateMainBtn();}
    async function startRecording(){
      try{const stream=await navigator.mediaDevices.getUserMedia({audio:true});
        const mime=['audio/ogg;codecs=opus','audio/webm;codecs=opus','audio/webm','audio/mp4'].find(t=>MediaRecorder.isTypeSupported(t))||'';
        mediaRec=new MediaRecorder(stream,mime?{mimeType:mime}:{});recChunks=[];
        mediaRec.ondataavailable=e=>{if(e.data.size>0)recChunks.push(e.data);};
        mediaRec.onstop=()=>{stream.getTracks().forEach(t=>t.stop());recBlob=new Blob(recChunks,{type:mediaRec.mimeType||mime||'audio/webm'});audioPlayback.src=URL.createObjectURL(recBlob);audioPreview.classList.add('show');};
        mediaRec.start(200);mainBtn.classList.add('grabando');mainBtn.innerHTML=I('stop');mainBtn.setAttribute('aria-label','Detener');pill.style.display='none';if(emojiPanel)emojiPanel.classList.remove('show');recStrip.style.display='flex';let secs=0;recTimer.textContent='0:00';recInterval=setInterval(()=>{secs++;recTimer.textContent=fmtSecs(secs);if(secs>=120){stopRecording();toast('Máx 2 min');}},1000);
      }catch(e){toast('Micrófono no disponible');}
    }
    mainBtn.addEventListener('click',()=>{if(mediaRec&&mediaRec.state==='recording'){stopRecording();return;}if(input.value.trim()){enviarMensaje();return;}startRecording();});
    recStrip.addEventListener('click',()=>{if(mediaRec&&mediaRec.state==='recording')stopRecording();});
    updateMainBtn();
    apCancel.addEventListener('click',()=>{audioPreview.classList.remove('show');audioPlayback.src='';recBlob=null;stopRecording();});
    apSend.addEventListener('click',async()=>{
      if(!recBlob||!currentConv)return;apSend.disabled=true;apSend.textContent='Enviando…';
      try{const ext=recBlob.type.includes('ogg')?'ogg':recBlob.type.includes('mp4')?'mp4':'webm';
        const dataBase64=await new Promise((res,rej)=>{const reader=new FileReader();reader.onload=()=>res(String(reader.result).split(',')[1]);reader.onerror=rej;reader.readAsDataURL(recBlob);});
        await api('/api/leads/'+currentConv.id+'/responder-media',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mime:recBlob.type,filename:'audio.'+ext,dataBase64})});
        audioPreview.classList.remove('show');audioPlayback.src='';recBlob=null;await abrirConversacion(currentConv.id);await cargarConversaciones();
      }catch(e){toast('Error: '+e.message);}finally{apSend.disabled=false;apSend.textContent='Enviar';}
    });
    body.querySelectorAll('.tpl-chip').forEach(c=>c.addEventListener('click',()=>{input.value=c.dataset.cuerpo;input.focus();input.style.height='auto';input.style.height=input.scrollHeight+'px';}));
  }

  const etiquetaSelect=document.getElementById('etiquetaSelect');
  if(etiquetaSelect)etiquetaSelect.addEventListener('change',async()=>{
    try{await api('/api/inbox/conversations/'+conv.id+'/etiqueta',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({etiqueta:etiquetaSelect.value})});
    if(currentConv)currentConv.etiqueta=etiquetaSelect.value;toast('Etiqueta actualizada');await cargarConversaciones();}catch(e){toast('Error');}
  });
  const reasignarSelect=document.getElementById('reasignarSelect');
  if(reasignarSelect)reasignarSelect.addEventListener('change',async()=>{
    const nombre=reasignarSelect.options[reasignarSelect.selectedIndex].text;
    if(!confirm('Reasignar a '+nombre+'?')){reasignarSelect.value=conv.assigned_to_id;return;}
    try{await api('/api/leads/'+conv.id+'/reasignar',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({vendedorId:reasignarSelect.value})});
    toast('Reasignado');await cargarConversaciones();}catch(e){toast('Error');}
  });
  const notasBtn=document.getElementById('notasBtn');const notasPanel=document.getElementById('notasPanel');const notasForm=document.getElementById('notasForm');const notaInput=document.getElementById('notaInput');
  if(notasBtn&&notasPanel)notasBtn.addEventListener('click',async()=>{const abrir=!notasPanel.classList.contains('show');notasPanel.classList.toggle('show',abrir);if(abrir)await cargarNotas(conv.id);});
  if(notasForm)notasForm.addEventListener('submit',async(ev)=>{ev.preventDefault();const nota=notaInput.value.trim();if(!nota)return;
    try{await api('/api/inbox/conversations/'+conv.id+'/notas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nota})});
    notaInput.value='';await cargarNotas(conv.id);}catch(e){toast('Error');}
  });
  const volver=document.getElementById('volver');
  if(volver)volver.addEventListener('click',()=>{if(socket&&socket.connected&&currentConv)socket.emit('leave:conversation',currentConv.id);document.getElementById('chat').classList.add('hidden');document.getElementById('sidebar').classList.remove('hidden');});
  const chatInfo=document.getElementById('chatInfo');
  if(chatInfo){chatInfo.addEventListener('click',abrirDrawer);chatInfo.addEventListener('keydown',e=>{if(e.key==='Enter')abrirDrawer();});}
}

async function cargarNotas(convId){
  const cont=document.getElementById('notasList');if(!cont)return;
  try{const r=await api('/api/inbox/conversations/'+convId+'/notas');const notas=await r.json();
    if(!notas.length){cont.innerHTML='<div style="color:var(--gris);font-size:.8rem;padding:6px 0">Sin notas.</div>';return;}
    cont.innerHTML=notas.map(n=>`<div class="nota-item"><div>${escapeHtml(n.nota)}</div><div class="meta"><span>Equipo · ${fmtTime(n.created_at)}</span></div></div>`).join('');
  }catch(e){cont.innerHTML='<div style="color:#a55;font-size:.8rem">Error.</div>';}
}

function abrirDrawer(){
  if(!currentConv)return;const d=document.getElementById('drawer');const ov=document.getElementById('drawerOverlay');
  const nombre=currentConv.customer_name||'Cliente';const ch=chInfo(currentConv.channel);const vend=currentConv.assigned_to_nombre||'—';
  d.innerHTML=`<button class="dw-close" id="dwClose" aria-label="Cerrar">${I('x',20)}</button>
    <div class="dw-head"><div class="avatar" style="background:${avatarColor(nombre)}">${iniciales(nombre)}</div><div class="dw-name">${escapeHtml(nombre)}</div><div class="dw-channel"><span style="color:${ch.color};font-weight:600">${ch.name}</span> ${escapeHtml(currentConv.customer_phone||'')}</div></div>
    <div class="dw-sec"><h4>Detalles</h4>
      <div class="dw-detail"><span class="label">Canal</span><span class="value" style="color:${ch.color}">${ch.name}</span></div>
      <div class="dw-detail"><span class="label">Estado</span><span class="value">${escapeHtml(currentConv.status||'nuevo')}</span></div>
      <div class="dw-detail"><span class="label">Vendedor</span><span class="value">${escapeHtml(vend)}</span></div>
      <div class="dw-detail"><span class="label">Creado</span><span class="value">${fmtTime(currentConv.created_at)}</span></div>
      <div class="dw-detail"><span class="label">Último mensaje</span><span class="value">${fmtTime(currentConv.updated_at)}</span></div>
    </div>`;
  d.classList.add('show');ov.classList.add('show');
  document.getElementById('dwClose').addEventListener('click',cerrarDrawer);ov.onclick=cerrarDrawer;
}
function cerrarDrawer(){document.getElementById('drawer').classList.remove('show');document.getElementById('drawerOverlay').classList.remove('show');}

function enviarMensaje(){
  const input=document.getElementById('input');const btn=document.getElementById('mainBtn');const mensaje=input?input.value.trim():'';
  if(!mensaje||!currentConv)return;if(btn)btn.disabled=true;
  api('/api/inbox/conversations/'+currentConv.id+'/send',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mensaje})})
    .then(r=>{if(!r.ok)throw new Error();input.value='';input.style.height='auto';return abrirConversacion(currentConv.id);})
    .then(()=>cargarConversaciones()).catch(()=>toast('Error al enviar'))
    .finally(()=>{const b=document.getElementById('mainBtn');if(b)b.disabled=false;});
}

function dateLabel(ts){
  if(!ts)return'';const d=new Date(ts.replace(' ','T')+'Z');if(isNaN(d))return'';
  const h=new Date();const a=new Date();a.setDate(h.getDate()-1);
  const s=(a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
  if(s(d,h))return'Hoy';if(s(d,a))return'Ayer';
  return d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
}
function soloHora(ts){
  if(!ts)return'';const d=new Date(ts.replace(' ','T')+'Z');if(isNaN(d))return'';
  return d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
}
function renderMsgsHTML(m){
  if(!m||!m.length)return'<div class="empty">Sin mensajes todavía</div>';
  let h='',uf='';
  for(const x of m){
    if(x.event_type==='note')continue;
    const f=dateLabel(x.created_at);if(f&&f!==uf){h+=`<div class="date-sep">${f}</div>`;uf=f;}
    const d=x.direction==='incoming'?'in':(x.direction==='internal'?'internal':'out');
    h+=`<div class="msg ${d}">${msgInner(x)}<span class="time">${soloHora(x.created_at)}${d==='out'?'<span class="ticks">✓✓</span>':''}</span></div>`;
  }
  return h;
}
function msgInner(m){
  if(m.media_type&&m.id){
    const src='/api/media/'+m.id;const cap=(m.body&&!/^\[(image|audio|video|document|sticker)\]$/.test(m.body))?'<div class="cap">'+escapeHtml(m.body)+'</div>':'';
    if(m.media_type==='image'||m.media_type==='sticker')return'<a href="'+src+'" target="_blank"><img class="media-img" src="'+src+'" alt="imagen" loading="lazy"></a>'+cap;
    if(m.media_type==='audio')return'<audio class="media-audio" controls src="'+src+'"></audio>'+cap;
    if(m.media_type==='video')return'<video class="media-video" controls src="'+src+'"></video>'+cap;
    return'<a class="media-file" href="'+src+'" target="_blank">📄 '+escapeHtml(m.media_filename||'archivo')+'</a>'+cap;
  }
  return escapeHtml(m.body);
}
async function enviarMedia(file){
  if(!currentConv||!file)return;if(file.size>18*1024*1024){toast('Archivo muy grande (máx 18 MB)');return;}
  toast('Enviando…');
  try{const dataBase64=await new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(String(r.result).split(',')[1]);r.onerror=rej;r.readAsDataURL(file);});
    const r=await api('/api/leads/'+currentConv.id+'/responder-media',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({mime:file.type||'application/octet-stream',filename:file.name,dataBase64})});
    if(!r.ok)throw new Error();await abrirConversacion(currentConv.id);await cargarConversaciones();
  }catch(e){toast('Error');}
}
document.getElementById('estadoSelect').addEventListener('change',async(e)=>{
  if(!me.vendedorId)return;await api('/api/vendedores/'+me.vendedorId+'/estado',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado:e.target.value})});toast('Disponibilidad actualizada');
});
document.getElementById('logout').addEventListener('click',async()=>{if(socket)socket.disconnect();await fetch('/api/logout',{method:'POST'});location.href='/login.html';});
document.addEventListener('keydown',e=>{
  const enCampo=/^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);
  if(e.key==='/'&&!enCampo){e.preventDefault();const b=document.getElementById('buscar');if(b){b.focus();b.select();}return;}
  if(e.key==='Escape'){if(window.innerWidth<=760&&!document.getElementById('chat').classList.contains('hidden')){if(socket&&socket.connected&&currentConv)socket.emit('leave:conversation',currentConv.id);document.getElementById('chat').classList.add('hidden');document.getElementById('sidebar').classList.remove('hidden');}else if(document.activeElement===document.getElementById('buscar')){const b=document.getElementById('buscar');b.value='';terminoBusqueda='';renderConvs();b.blur();}}
});
function escapeHtml(s){return String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}
function ocultarSplash(){const s=document.getElementById('splash');if(s)setTimeout(()=>s.classList.add('hide'),400);}
init().then(ocultarSplash).catch(e=>{ocultarSplash();if(e.message!=='no_auth')console.error(e);});
setTimeout(ocultarSplash,4000);
</script>
