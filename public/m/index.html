<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Leons Group">
<title>Leons Group · Móvil</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Cormorant+Garamond:ital,wght@0,400;0,500;0,600;1,500&family=Inter:opsz,wght@14..32,300..700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
<style>
  /* ══════════ SP OS · Mobile Experience ══════════ */
  :root{
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --nav-h: 62px;
    /* --glass / --glass-2 / --blur / --blur-sm se heredan de sp-os.css (tokens centralizados) */
    --spring: cubic-bezier(.22,1,.36,1);
    --ease: cubic-bezier(.4,0,.2,1);
  }
  *{ -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html,body{ height:100%; margin:0; background:var(--bg-0); color:var(--text); font-family:var(--f-ui); overscroll-behavior:none; }
  body{ -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  input,textarea,button{ font-family:inherit; }
  ::-webkit-scrollbar{ display:none; }
  * { scrollbar-width:none; }

  #app{ position:fixed; inset:0; overflow:hidden; }
  .screen{ position:absolute; inset:0; display:flex; flex-direction:column;
    background:
      radial-gradient(circle 260px at 16% 14%, rgba(248,248,248,.09), rgba(248,248,248,.028) 52%, transparent 62%),
      radial-gradient(circle 200px at 86% 44%, rgba(248,248,248,.06), rgba(248,248,248,.02) 54%, transparent 64%),
      radial-gradient(circle 320px at 50% 106%, rgba(248,248,248,.05), rgba(248,248,248,.017) 54%, transparent 64%),
      radial-gradient(600px 400px at 90% -8%, rgba(212,175,55,.08), transparent 60%),
      radial-gradient(550px 480px at -10% 104%, rgba(78,123,70,.04), transparent 60%),
      var(--bg-0); }

  /* ── Transiciones de pantalla ── */
  .screen--chat{ transform:translateX(100%); transition:transform .34s var(--spring); z-index:20; will-change:transform; }
  .screen--chat.show{ transform:translateX(0); }

  /* ── Header (glass) ── */
  .m-head{ position:relative; z-index:5; padding:calc(var(--safe-t) + 10px) 18px 8px; background:var(--glass); backdrop-filter:var(--blur-sm); -webkit-backdrop-filter:var(--blur-sm); border-bottom:1px solid var(--glass-border); }
  .m-head__top{ display:flex; align-items:center; gap:11px; margin-bottom:12px; }
  .m-mark{ width:34px; height:34px; border-radius:11px; overflow:hidden; flex-shrink:0; }
  .m-mark img{ width:100%; height:100%; object-fit:cover; }
  .m-title{ font-family:var(--f-title); font-size:19px; font-weight:600; letter-spacing:.02em; }
  .m-title small{ display:block; font-family:var(--f-ui); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-3); font-weight:500; margin-top:1px; }
  .m-headbtn{ margin-left:auto; width:38px; height:38px; border-radius:50%; background:var(--bg-2); border:1px solid var(--border-soft); color:var(--text-2); display:grid; place-items:center; font-size:16px; }
  .m-headbtn svg{ width:19px; height:19px; }
  .m-headbtn.active{ background:var(--gold-soft,rgba(200,164,90,.18)); border-color:var(--gold); }

  /* ── Buscador ── */
  .m-search{ position:relative; display:flex; align-items:center; height:42px; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:14px; padding:0 12px; transition:border-color .2s, background .2s; }
  .m-search:focus-within{ border-color:var(--gold-line); background:var(--bg-3); }
  .m-search svg{ width:17px; height:17px; color:var(--text-3); flex-shrink:0; }
  .m-search input{ flex:1; border:none; background:none; outline:none; color:var(--text); font-size:15px; padding:0 10px; }
  .m-search input::placeholder{ color:var(--text-3); }

  /* ── Filtros ── */
  .m-filters{ display:flex; gap:7px; padding:12px 18px 4px; overflow-x:auto; }
  .m-chip{ flex-shrink:0; height:32px; padding:0 15px; border:1px solid var(--border); border-radius:999px; background:var(--bg-2); color:var(--text-3); font-size:12.5px; font-weight:500; display:flex; align-items:center; gap:6px; transition:all .2s var(--spring); }
  .m-chip.active{ background:var(--gold-soft); color:var(--gold); border-color:var(--gold-line); transform:scale(1.02); }
  .m-chip b{ font-weight:700; opacity:.7; }

  /* ── Lista ── */
  .m-scroll{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px); }
  .m-ptr{ height:0; overflow:hidden; display:flex; align-items:center; justify-content:center; color:var(--text-3); transition:height .2s var(--ease); }
  .m-ptr .spin{ width:20px; height:20px; border:2px solid var(--border-strong); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  /* Skeleton loaders — reemplazan los "Cargando…" planos */
  .sk{ background:linear-gradient(100deg,var(--bg-3) 30%,var(--bg-4,rgba(255,255,255,.06)) 50%,var(--bg-3) 70%); background-size:200% 100%; animation:skShine 1.3s ease-in-out infinite; border-radius:10px; }
  @keyframes skShine{ 0%{ background-position:200% 0 } 100%{ background-position:-200% 0 } }
  .sk-card{ display:flex; gap:12px; align-items:center; padding:14px; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:16px; margin-bottom:12px; }
  .sk-line{ height:11px; }
  .m-row{ position:relative; overflow:hidden; }
  .m-row__actions{ position:absolute; top:0; bottom:0; display:flex; align-items:center; }
  .m-row__actions.left{ left:0; }
  .m-row__actions.right{ right:0; }
  .swipe-act{ width:64px; align-self:stretch; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:#fff; font-size:10px; font-weight:600; border:none; }
  .swipe-act svg{ width:19px; height:19px; }
  .sa-call{ background:#2E7D46; } .sa-wa{ background:#1D9E5A; } .sa-note{ background:#5B7B8C; }
  .sa-tag{ background:var(--gold); color:#0A0A0A; } .sa-stage{ background:#7C6BB0; } .sa-arch{ background:#8C4A4A; }

  .m-card{ position:relative; z-index:1; display:flex; gap:13px; padding:13px 18px; background:var(--bg-0); border-bottom:1px solid var(--border-soft); transition:transform .28s var(--spring), background .15s; will-change:transform; }
  .m-card:active{ background:var(--bg-1); }
  .m-card.unread{ background:linear-gradient(135deg,rgba(200,164,90,.07),rgba(200,164,90,.02)); border-left:3px solid var(--gold); box-shadow:inset 0 0 22px -14px rgba(200,164,90,.5); }
  /* Borde dorado estático en la tarjeta sin leer (la animación infinita gastaba
     batería: repintado continuo con muchas tarjetas). El resalte queda sin loop. */
  .m-card.unread::after{
    content:''; position:absolute; inset:3px; border-radius:14px; pointer-events:none; z-index:2; padding:1.5px;
    background:linear-gradient(135deg, rgba(232,201,122,.55), #F2DA9C 40%, rgba(232,201,122,.25));
    -webkit-mask:linear-gradient(#000 0 0) content-box, linear-gradient(#000 0 0);
    -webkit-mask-composite:xor; mask-composite:exclude;
  }
  .m-card__prio{ position:absolute; left:0; top:9px; bottom:9px; width:3px; border-radius:0 3px 3px 0; }
  .m-avatar{ position:relative; width:52px; height:52px; border-radius:16px; display:grid; place-items:center; color:#fff; font-weight:600; font-size:18px; flex-shrink:0; overflow:hidden; }
  .m-avatar img{ width:100%; height:100%; object-fit:cover; }
  .m-avatar__st{ position:absolute; right:-1px; bottom:-1px; width:14px; height:14px; border-radius:50%; border:2.5px solid var(--bg-0); }
  .m-card__body{ flex:1; min-width:0; }
  .m-card__l1{ display:flex; align-items:center; gap:8px; }
  .m-card__name{ font-size:15px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .m-card__time{ font-size:11.5px; color:var(--text-3); flex-shrink:0; }
  .m-card.unread .m-card__time{ color:var(--gold); font-weight:600; }
  .m-card__l2{ display:flex; align-items:center; gap:8px; margin-top:3px; }
  .m-card__msg{ flex:1; min-width:0; font-size:13.5px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .m-card.unread .m-card__msg{ color:var(--text-2); font-weight:500; }
  .m-badge{ min-width:20px; height:20px; padding:0 6px; border-radius:999px; background:var(--gold); color:#0A0A0A; font-size:11px; font-weight:700; display:grid; place-items:center; flex-shrink:0; }
  .m-card__l3{ display:flex; align-items:center; gap:6px; margin-top:6px; }
  .m-tag{ font-size:10px; font-weight:600; padding:2px 8px; border-radius:999px; letter-spacing:.03em; flex-shrink:0; }
  .m-vendor{ font-size:10px; font-weight:500; padding:2px 7px; border-radius:999px; background:rgba(200,164,90,.12); color:var(--gold); border:1px solid rgba(200,164,90,.25); display:inline-flex; align-items:center; gap:3px; letter-spacing:.02em; }
  .m-meta{ font-size:10.5px; color:var(--text-3); display:inline-flex; align-items:center; gap:3px; }
  .m-meta svg{ width:11px; height:11px; opacity:.7; }

  /* SP Progress bar — definitiva */
  .m-card__progress{ margin-top:6px; padding-top:6px; border-top:1px solid var(--border); display:flex; align-items:center; gap:8px; }
  .m-card__progress .sp-pbar{ flex:1; height:4px; border-radius:999px; background:var(--bg-4); overflow:hidden; }
  .m-card__progress .sp-pbar i{ display:block; height:100%; border-radius:999px; background:var(--grad-gold-bar); transition:width .6s var(--ease); }
  .m-card__progress .sp-pct{ font-family:var(--f-title); font-size:11px; font-weight:700; color:var(--gold); letter-spacing:.04em; flex-shrink:0; }

  .t-interesado{ background:var(--blue-soft); color:var(--blue); } .t-negociacion{ background:var(--gold-soft); color:var(--gold); }
  .t-cita{ background:var(--amber-soft); color:var(--amber); } .t-vendido{ background:var(--green-soft); color:#83B778; }
  .t-no_interesado{ background:var(--red-soft); color:#FF8A8E; } .t-sin_clasificar{ background:var(--bg-3); color:var(--text-3); }
  .st-disponible{ background:#57C168; } .st-esperando{ background:var(--amber); } .st-inactivo{ background:var(--text-4); } .st-caliente{ background:var(--red); }

  /* ── FAB ── */
   .m-fab{ position:absolute; right:18px; bottom:calc(var(--nav-h) + var(--safe-b) + 14px); width:56px; height:56px; border-radius:19px; background:var(--grad-gold); color:#0A0A0A; border:none; display:grid; place-items:center; box-shadow:0 10px 30px rgba(200,164,90,.4), 0 0 0 1px rgba(200,164,90,.2), inset 0 1px 0 rgba(255,255,255,.3); z-index:15; transition:transform .18s var(--spring), box-shadow .18s; }
  .m-fab:active{ transform:scale(.88); box-shadow:0 4px 10px rgba(200,164,90,.2); }
  .m-fab svg{ width:26px; height:26px; }

  /* ── Bottom Navigation (glass) ── */
  .m-nav{ position:absolute; left:0; right:0; bottom:0; height:calc(var(--nav-h) + var(--safe-b)); padding-bottom:var(--safe-b); display:flex; background:var(--glass); backdrop-filter:var(--blur-sm); -webkit-backdrop-filter:var(--blur-sm); border-top:1px solid var(--glass-border); z-index:14; }
  .m-nav__i{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--text-3); background:none; border:none; font-size:10px; font-weight:500; transition:color .2s; position:relative; }
  .m-nav__i svg{ width:23px; height:23px; transition:transform .25s var(--spring); }
  .m-nav__i.active{ color:var(--gold); }
  .m-nav__i.active svg{ transform:translateY(-2px); }
  .m-nav__i.active::after{ content:''; position:absolute; top:-1px; left:50%; transform:translateX(-50%); width:22px; height:3px; border-radius:0 0 3px 3px; background:var(--gold); box-shadow:0 0 8px rgba(200,164,90,.5); }
  .m-nav__dot{ position:absolute; top:8px; right:calc(50% - 16px); min-width:8px; height:8px; border-radius:999px; background:var(--red); }

  /* ── Chat ── */
  .c-head{ display:flex; align-items:center; gap:11px; padding:calc(var(--safe-t) + 8px) 12px 8px; background:var(--glass); backdrop-filter:var(--blur-sm); -webkit-backdrop-filter:var(--blur-sm); border-bottom:1px solid var(--glass-border); }
  .c-back{ width:38px; height:38px; border-radius:50%; background:none; border:none; color:var(--text); display:grid; place-items:center; flex-shrink:0; }
  .c-back svg{ width:22px; height:22px; }
  .c-id{ display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
  .c-id .m-avatar{ width:38px; height:38px; border-radius:12px; font-size:14px; }
  .c-name{ font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .c-sub{ font-size:11.5px; color:var(--text-3); display:flex; align-items:center; gap:5px; }
  .c-acts{ display:flex; gap:2px; }
  .c-act{ width:38px; height:38px; border-radius:50%; background:none; border:none; color:var(--text-2); display:grid; place-items:center; }
  .c-act:active{ background:var(--bg-2); }
  .c-act svg{ width:20px; height:20px; }

  .c-msgs{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 14px 6px; display:flex; flex-direction:column; gap:3px; background:linear-gradient(180deg,var(--bg-0),#0C0C0C); }
  .c-msgs.c-msgs--patron{
    background:
      linear-gradient(180deg, rgba(10,10,10,.7), rgba(12,12,12,.8)),
      url('/images/chat-bg.jpg');
    background-size: auto, 420px 420px;
    background-repeat: repeat;
    background-attachment: fixed;
  }
  .c-date{ align-self:center; flex-shrink:0; font-size:11px; color:var(--text-3); background:var(--bg-2); border:1px solid var(--border-soft); padding:3px 12px; border-radius:999px; margin:8px 0; }
  .bub{ width:fit-content; max-width:80%; padding:9px 13px; border-radius:18px; font-size:14.5px; line-height:1.42; word-wrap:break-word; position:relative; animation:bubIn .28s var(--spring); }
  .bub--in{ margin-right:auto; background:var(--bg-3); border-bottom-left-radius:6px; border-left:2px solid var(--gold-line); }
  .bub--out{ margin-left:auto; background:linear-gradient(160deg,#1D4535,#153427); color:#EDF5F1; border-bottom-right-radius:6px; }
  @keyframes bubIn{ from{ opacity:0; transform:translateY(6px) scale(.98); } }
  .bub__t{ font-size:10.5px; opacity:.5; margin-top:3px; text-align:right; }
  .bub img,.bub video{ max-width:210px; border-radius:12px; display:block; }
  .bub audio{ width:210px; }
  .bub a.file{ color:inherit; text-decoration:underline; word-break:break-all; }
  .bub-quote{ border-left:3px solid var(--gold); padding:4px 8px; margin-bottom:6px; border-radius:4px; background:rgba(200,164,90,.08); font-size:12.5px; line-height:1.3; }
  .bub-quote span{ display:block; font-size:10px; color:var(--gold); font-weight:600; margin-bottom:2px; }
  .bub--out .bub-quote{ border-left-color:#83B778; }

  /* ── Input inteligente ── */
  .c-input{ padding:8px 12px calc(8px + var(--safe-b)); border-top:1px solid var(--border-soft); background:var(--bg-1); }
  .c-quick{ display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; }
  .c-quick button{ flex-shrink:0; height:30px; padding:0 13px; border-radius:999px; background:var(--bg-3); border:1px solid var(--border); color:var(--text-2); font-size:12px; }
  .c-input__row{ display:flex; align-items:flex-end; gap:8px; position:relative; }
  /* Durante grabación: ocultar + y campo de texto SIN ocultar #cSend (esconder el botón bajo el dedo cancela el touch) */
  .c-input__row.recording .c-plus, .c-input__row.recording .c-pill{ display:none; }
  .c-input__row.recording{ justify-content:flex-end; }
  .c-plus{ width:44px; height:44px; border-radius:50%; background:var(--bg-3); border:1px solid var(--border); color:var(--gold); display:grid; place-items:center; flex-shrink:0; transition:transform .25s var(--spring); }
  .c-plus.open{ transform:rotate(45deg); }
  .c-plus svg{ width:22px; height:22px; }
  .c-input__row.recording .c-emoji{ display:none; }
  .c-emoji{ width:44px; height:44px; border-radius:50%; background:var(--bg-3); border:1px solid var(--border); color:var(--gold); display:grid; place-items:center; flex-shrink:0; font-size:20px; }
  .c-emoji-pop{ position:absolute; bottom:100%; left:0; right:0; margin-bottom:8px; max-height:260px; overflow-y:auto; background:var(--bg-2); border:1px solid var(--border); border-radius:16px; padding:10px; box-shadow:0 -8px 24px rgba(0,0,0,.3); display:none; z-index:20; }
  .c-emoji-pop.show{ display:block; }
  .c-emoji-pop__cat{ font-size:11px; text-transform:uppercase; letter-spacing:.06em; color:var(--text-3); margin:8px 4px 4px; }
  .c-emoji-pop__cat:first-child{ margin-top:0; }
  .c-emoji-pop__grid{ display:grid; grid-template-columns:repeat(8,1fr); gap:2px; }
  .c-emoji-pop__grid button{ background:none; border:none; font-size:22px; padding:5px 0; border-radius:8px; cursor:pointer; line-height:1; }
  .c-emoji-pop__grid button:active{ background:var(--bg-3); }
  .c-pill{ flex:1; display:flex; align-items:flex-end; background:var(--bg-3); border:1px solid var(--border); border-radius:22px; padding:2px 6px; min-height:44px; transition:border-color .2s; }
  .c-pill:focus-within{ border-color:var(--gold-line); }
  .c-pill textarea{ flex:1; border:none; background:none; outline:none; color:var(--text); font-size:15px; line-height:1.35; padding:11px 6px; max-height:110px; resize:none; }
  .c-pill textarea::placeholder{ color:var(--text-3); }
  @media(max-width:359px){ .c-input{ padding:6px 8px calc(6px + var(--safe-b)); } .c-pill textarea{ font-size:14px; padding:8px 4px; } .c-plus,.c-send{ transform:scale(.85); } .c-quick button{ font-size:11px; padding:0 10px; height:26px; } }
  .c-send{ width:44px; height:44px; border-radius:50%; background:var(--grad-gold); color:#0A0A0A; border:none; display:grid; place-items:center; flex-shrink:0; transition:transform .15s var(--spring); }
  .c-send:active{ transform:scale(.88); }
  .c-send svg{ width:21px; height:21px; }

  /* ── Bottom Sheet (iOS) ── */
  .sheet-bg{ position:absolute; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); opacity:0; transition:opacity .3s var(--ease); z-index:40; pointer-events:none; }
  .sheet-bg.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; max-height:88%; background:rgba(18,18,18,.72); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); border-radius:26px 26px 0 0; border-top:1px solid var(--glass-border); box-shadow:var(--glass-edge), 0 -20px 50px rgba(0,0,0,.5); transform:translateY(100%); transition:transform .38s var(--spring); z-index:41; display:flex; flex-direction:column; padding-bottom:var(--safe-b); }
  .sheet.show{ transform:translateY(0); }
  .sheet__grab{ width:38px; height:5px; border-radius:3px; background:var(--border-strong); margin:10px auto 4px; flex-shrink:0; }
  .sheet__head{ display:flex; align-items:center; gap:10px; padding:6px 20px 12px; border-bottom:1px solid var(--border-soft); }
  .sheet__title{ font-family:var(--f-title); font-size:17px; font-weight:600; }
  .sheet__x{ margin-left:auto; width:30px; height:30px; border-radius:50%; background:var(--bg-3); border:1px solid var(--border); color:var(--text-2); display:grid; place-items:center; }
  .sheet__x svg{ width:14px; height:14px; }
  .sheet__body{ overflow-y:auto; padding:16px 20px 22px; }

  /* Grid de adjuntos */
  .att-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px 8px; }
  .att-i{ display:flex; flex-direction:column; align-items:center; gap:7px; background:none; border:none; color:var(--text-2); font-size:11px; }
  .att-i .ic{ width:56px; height:56px; border-radius:18px; background:var(--bg-3); border:1px solid var(--border-soft); display:grid; place-items:center; color:var(--gold); transition:transform .18s var(--spring); }
  .att-i:active .ic{ transform:scale(.9); }
  .att-i .ic svg{ width:24px; height:24px; }
  .loc-card{ display:flex; flex-direction:column; background:var(--bg-3); border-radius:12px; overflow:hidden; cursor:pointer; max-width:280px; border:1px solid var(--border-soft); }
  .loc-card:active{ opacity:.85; }
  .loc-card .loc-map{ width:100%; height:120px; background:var(--bg-4); display:grid; place-items:center; font-size:32px; overflow:hidden; position:relative; }

  .loc-form{ display:flex; flex-direction:column; gap:10px; }

  .loc-preset{ display:flex; flex-direction:column; gap:6px; margin-bottom:12px; }

  .loc-search-wrap{ position:relative; margin:8px 0; }

  .loc-results{ position:absolute; top:100%; left:0; right:0; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:10px; margin-top:4px; max-height:180px; overflow-y:auto; display:none; z-index:10; }

  .loc-picker-map{ width:100%; height:200px; border-radius:14px; overflow:hidden; background:var(--bg-4); margin-bottom:8px; position:relative; }

  .loc-picker-info{ display:flex; align-items:center; gap:8px; background:var(--bg-3); border:1px solid var(--border-soft); border-radius:12px; padding:10px 12px; margin-bottom:10px; font-size:12.5px; color:var(--text-2); }
  .loc-picker-info .loc-ic{ font-size:16px; flex-shrink:0; }
  .loc-picker-info .loc-picker-addr{ flex:1; min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .loc-picker-locate{ position:absolute; right:10px; bottom:10px; z-index:15; width:38px; height:38px; border-radius:50%; background:var(--bg-2); border:1px solid var(--border); color:var(--gold); display:grid; place-items:center; box-shadow:0 2px 8px rgba(0,0,0,.3); transition:transform .15s, box-shadow .2s; }
  .loc-picker-locate.loading{ animation:locSpin .8s linear infinite; }
  /* Editor de imagen */
  .img-editor{ position:fixed; inset:0; z-index:6000; background:#000; display:flex; flex-direction:column; animation:ieIn .2s ease; }
  @keyframes ieIn{ from{ opacity:0 } to{ opacity:1 } }
  .img-editor .ie-top{ display:flex; align-items:center; gap:8px; padding:calc(env(safe-area-inset-top,0) + 10px) 12px 10px; }
  .img-editor .ie-tools{ flex:1; display:flex; justify-content:center; gap:6px; }
  .img-editor .ie-btn{ width:42px; height:42px; border-radius:14px; border:none; background:rgba(255,255,255,.1); color:#fff; display:grid; place-items:center; font-size:19px; cursor:pointer; transition:transform .12s, background .15s; }
  .img-editor .ie-btn:active{ transform:scale(.9); }
  .img-editor .ie-btn.on{ background:var(--gold); color:#0A0A0A; }
  .img-editor .ie-done{ background:var(--gold); color:#0A0A0A; }
  .img-editor .ie-stage{ flex:1; display:grid; place-items:center; overflow:hidden; padding:6px; }
  .img-editor .ie-stage canvas{ max-width:100%; max-height:100%; border-radius:10px; touch-action:none; box-shadow:0 8px 40px rgba(0,0,0,.5); }
  .img-editor .ie-colors{ display:flex; justify-content:center; gap:10px; padding:8px 0; }
  .img-editor .ie-color{ width:28px; height:28px; border-radius:50%; border:2px solid rgba(255,255,255,.3); cursor:pointer; }
  .img-editor .ie-color.on{ border-color:#fff; transform:scale(1.15); }
  .img-editor .ie-caption{ padding:10px 12px calc(env(safe-area-inset-bottom,0) + 12px); }
  .img-editor .ie-caption input{ width:100%; height:46px; border-radius:14px; border:1px solid rgba(255,255,255,.15); background:rgba(255,255,255,.08); color:#fff; padding:0 16px; font-size:15px; font-family:inherit; outline:none; }
  .img-editor .ie-caption input::placeholder{ color:rgba(255,255,255,.5); }
  .loc-picker-locate.needs-gps{ border-color:var(--gold); box-shadow:0 0 0 0 rgba(200,164,90,.5); animation:locPulse 1.6s ease-out infinite; }
  @keyframes locSpin{ to{ transform:rotate(360deg); } }
  @keyframes locPulse{ 0%{ box-shadow:0 0 0 0 rgba(200,164,90,.5); } 70%{ box-shadow:0 0 0 10px rgba(200,164,90,0); } 100%{ box-shadow:0 0 0 0 rgba(200,164,90,0); } }
  .loc-picker-send{ width:100%; padding:13px; border-radius:12px; border:none; background:var(--gold); color:#000; font-weight:600; font-size:14px; font-family:inherit; cursor:pointer; margin-bottom:14px; }
  .loc-picker-send:disabled{ opacity:.5; }

  /* Perfil del lead */
  .lp-head{ display:flex; flex-direction:column; align-items:center; text-align:center; gap:9px; padding-bottom:16px; }
  .lp-head .m-avatar{ width:72px; height:72px; border-radius:22px; font-size:26px; }
  .lp-name{ font-family:var(--f-title); font-size:20px; font-weight:600; background:var(--grad-gold-text); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .lp-actions{ display:flex; gap:10px; margin-top:4px; }
  .lp-actions button{ width:46px; height:46px; border-radius:15px; background:var(--bg-3); border:1px solid var(--border-soft); color:var(--gold); display:grid; place-items:center; }
  .lp-actions button svg{ width:21px; height:21px; }
  .lp-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
  .lp-cell{ background:var(--bg-2); border:1px solid var(--border-soft); border-radius:14px; padding:11px 13px; }
  .lp-cell span{ display:block; font-size:10.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:3px; }
  .lp-cell strong{ font-size:14px; font-weight:600; }
  .lp-cell.mock strong{ color:var(--text-3); font-weight:400; }
  .lp-cell.wide{ grid-column:1/3; }
  /* SP Progress — versión grande (perfil + copiloto) */
  .sp-progress-lg{ background:var(--bg-2); border:1px solid var(--border-soft); border-radius:16px; padding:16px; margin-top:12px; }
  .sp-progress-lg__top{ display:flex; justify-content:space-between; align-items:baseline; }
  .sp-progress-lg__top span:first-child{ font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:.1em; }
  .sp-progress-lg__num{ font-family:var(--f-title); font-size:26px; font-weight:700; color:var(--gold); letter-spacing:.04em; }
  .sp-progress-lg__track{ display:block; height:6px; border-radius:999px; background:var(--bg-4); overflow:hidden; margin-top:10px; }
  .sp-progress-lg__track i{ display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,#B89840,var(--gold)); transition:width .8s var(--ease); }
  .sp-progress-lg__stages{ display:flex; justify-content:space-between; margin-top:10px; padding:0 1px; }
  .sp-progress-lg__stages span{ width:12px; height:12px; border-radius:50%; background:var(--bg-3); border:1.5px solid var(--border-strong); transition:all .4s var(--ease); position:relative; }
  .sp-progress-lg__stages span.done{ background:var(--gold); border-color:var(--gold); box-shadow:0 0 8px rgba(200,164,90,.35); }

  /* Timeline */
  .tl{ position:relative; padding-left:6px; }
  .tl-i{ display:flex; gap:13px; padding-bottom:16px; position:relative; }
  .tl-i:not(:last-child)::before{ content:''; position:absolute; left:14px; top:30px; bottom:0; width:1.5px; background:var(--border); }
  .tl-dot{ width:29px; height:29px; border-radius:10px; background:var(--bg-3); border:1px solid var(--border-strong); display:grid; place-items:center; color:var(--gold); flex-shrink:0; z-index:1; }
  .tl-dot svg{ width:15px; height:15px; }
  .tl-txt strong{ font-size:13.5px; font-weight:600; }
  .tl-txt span{ display:block; font-size:11.5px; color:var(--text-3); margin-top:2px; }

  /* Copiloto */
  .cop-badge{ display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gold); background:var(--gold-soft); border:1px solid var(--gold-line); padding:3px 9px; border-radius:999px; }
  .cop-card{ background:var(--bg-2); border:1px solid var(--border-soft); border-radius:16px; padding:13px; margin-bottom:11px; }
  .cop-card h5{ font-size:10.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:.1em; margin:0 0 7px; display:flex; align-items:center; gap:6px; }
  .cop-card h5 svg{ width:14px; height:14px; color:var(--gold); }
  .cop-card p{ margin:0; font-size:13.5px; line-height:1.5; color:var(--text-2); }
  .cop-sent{ display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#83B778; }
  .cop-obj{ display:flex; gap:8px; font-size:13px; color:var(--text-2); margin-bottom:6px; }
  .cop-obj::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--amber); margin-top:6px; flex-shrink:0; }
   .cop-use{ margin-top:9px; width:100%; height:40px; border-radius:13px; background:var(--grad-gold); color:#0A0A0A; border:none; font-weight:700; font-size:13px; }

  /* Calendario */
  .cal-nav{ background:var(--bg-3);border:1px solid var(--border);color:var(--text-2);width:32px;height:32px;border-radius:10px;font-size:16px;cursor:pointer;display:grid;place-items:center }
  .cal-nav:active{ color:var(--gold) }
  .cal-day{ min-height:46px;padding:4px;border-radius:8px;background:var(--bg-1);border:1px solid var(--border-soft);cursor:pointer;transition:border-color .15s }
  .cal-day:active{ border-color:var(--gold-line) }

  /* Empty / placeholder tabs */
  .m-empty{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:14px; text-align:center; padding:40px; color:var(--text-3); }
  .m-empty .ic{ width:64px; height:64px; border-radius:22px; background:var(--bg-2); border:1px solid var(--border-soft); display:grid; place-items:center; color:var(--gold); }
  .m-empty .ic svg{ width:28px; height:28px; }
  .m-empty h3{ font-family:var(--f-title); font-size:18px; color:var(--text); margin:0; }
  .m-empty p{ margin:0; font-size:13.5px; max-width:260px; line-height:1.5; }
  .m-empty .cop-badge{ margin-top:4px; }

  /* Skeleton */
  .sk{ background:linear-gradient(90deg,var(--bg-2) 25%,var(--bg-3) 50%,var(--bg-2) 75%); background-size:200% 100%; animation:shimmer 1.2s infinite; }
  @keyframes shimmer{ from{ background-position:200% 0; } to{ background-position:-200% 0; } }
  .sk-row{ display:flex; gap:13px; padding:13px 18px; align-items:center; }

  /* Toast */
  .m-toast{ position:absolute; left:50%; bottom:calc(var(--nav-h) + var(--safe-b) + 20px); transform:translateX(-50%) translateY(20px); background:var(--glass-2); backdrop-filter:var(--blur-sm); -webkit-backdrop-filter:var(--blur-sm); border:1px solid var(--glass-border); color:var(--text); padding:11px 18px; border-radius:999px; font-size:13.5px; font-weight:500; box-shadow:var(--sh-3); opacity:0; transition:all .3s var(--spring); z-index:60; pointer-events:none; white-space:nowrap; }

  /* ── Green dot unread ── */
  .m-unread-dot{ position:absolute; top:-1px; right:-1px; width:13px; height:13px; border-radius:50%; background:#34C759; border:2.5px solid var(--bg-0); z-index:3; animation:pulse-dot 2s ease-in-out infinite; }
  @keyframes pulse-dot{ 0%,100%{opacity:1} 50%{opacity:.5} }

  /* ── Archivados toggle ── */
  .m-arch-btn{ display:flex; align-items:center; gap:8px; padding:8px 18px; font-size:13px; color:var(--text-3); cursor:pointer; border-bottom:1px solid var(--border-soft); background:var(--bg-1); transition:background .15s; }
  .m-arch-btn:active{ background:var(--bg-2); }
  .m-arch-btn svg{ width:17px; height:17px; }
  .m-arch-btn .badge{ margin-left:auto; background:var(--bg-3); color:var(--text-2); padding:1px 8px; border-radius:999px; font-size:11px; font-weight:600; }
  .m-arch-btn.active{ color:var(--gold); }
  .m-card.archived{ opacity:1; }
  .m-card.archived .m-card__name,
  .m-card.archived .m-card__msg{ opacity:.55; }
  .m-card.archived .m-card__time{ opacity:.35; color:var(--text-3); }

  /* ── Reply bar ── */
  .c-reply{ display:none; align-items:center; gap:8px; padding:8px 12px; background:var(--bg-3); border-top:1px solid var(--border-soft); border-bottom:1px solid var(--border-soft); }
  .c-reply.show{ display:flex; }
  .c-reply__line{ width:3px; border-radius:3px; background:var(--gold); flex-shrink:0; height:32px; }
  .c-reply__info{ flex:1; min-width:0; }
  .c-reply__label{ font-size:11px; color:var(--gold); font-weight:600; }
  .c-reply__preview{ font-size:13px; color:var(--text-2); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .c-reply__x{ width:28px; height:28px; border-radius:50%; background:none; border:none; color:var(--text-3); display:grid; place-items:center; flex-shrink:0; cursor:pointer; }
  .c-reply__x svg{ width:16px; height:16px; }

  /* ── Swipe en mensajes ── */
  .msg-wrap{ position:relative; overflow:hidden; flex-shrink:0; }

  .chk{ vertical-align:middle; margin-left:3px; }

  .chk-delivered{ color:var(--text-2); }

  .chk-visto{ font-size:9.5px; color:var(--text-3); vertical-align:middle; }
  .link-preview{ margin:6px 0 2px; border-radius:12px; overflow:hidden; background:var(--bg-3); border:1px solid var(--border); cursor:pointer; transition:opacity .15s; }

  .link-preview .lp-img img{ width:100%; height:100%; object-fit:cover; }

  .link-preview .lp-title{ font-size:13px; font-weight:600; color:var(--text); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .link-preview .lp-desc{ font-size:11px; color:var(--text-2); margin-top:3px; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }
  .bub-body--trunc{ cursor:pointer; }
  .bub__more{ display:block; background:none; border:none; color:var(--gold); font-size:12px; font-weight:500; padding:2px 0 0; cursor:pointer; font-family:inherit; }
  .up-bar{ position:fixed; bottom:80px; left:50%; transform:translateX(-50%); z-index:999; background:var(--bg-1); border:1px solid var(--border); border-radius:12px; padding:12px 16px; display:flex; align-items:center; gap:10px; box-shadow:0 4px 20px rgba(0,0,0,.3); max-width:260px; }
  .up-bar__track{ flex:1; height:4px; background:var(--bg-3); border-radius:2px; overflow:hidden; }
  .up-bar__fill{ height:100%; background:var(--gold); border-radius:2px; width:0; transition:width .15s; }
  .up-bar__label{ font-size:11px; color:var(--text-3); white-space:nowrap; }
  .audio-player{ display:flex; align-items:center; gap:8px; padding:4px 10px 4px 4px; border-radius:12px; min-width:190px; max-width:240px; }
  .bub--in .audio-player{ background:var(--bg-3); }
  .bub--out .audio-player{ background:rgba(200,164,90,.12); }
  .audio-player__btn{ width:34px; height:34px; border-radius:50%; border:none; display:flex; align-items:center; justify-content:center; cursor:pointer; flex-shrink:0; padding:0; transition:transform .15s; background:var(--gold); }
  .audio-player__btn:active{ transform:scale(.92); }
  .audio-player__btn svg{ width:14px; height:14px; fill:#000; margin-left:2px; }
  .audio-player__btn.playing svg{ margin-left:0; }
  .audio-player__wave{ flex:1; display:flex; align-items:center; gap:2px; height:24px; }
  .audio-player__bar{ width:3px; border-radius:2px; background:var(--text-3); transition:background .12s; }
  .bub--out .audio-player__bar{ background:rgba(200,164,90,.3); }
  .audio-player__bar.active{ background:var(--gold) !important; }
  .audio-player__time{ font-size:11px; color:var(--text-2); font-variant-numeric:tabular-nums; white-space:nowrap; min-width:32px; text-align:right; }
  .c-search{ display:none; padding:10px 14px; background:var(--bg-1); border-bottom:1px solid var(--border-soft); gap:6px; }
  .c-search.show{ display:flex; }
  .c-search input{ flex:1; height:36px; border-radius:10px; border:1px solid var(--border); background:var(--bg-3); color:var(--text); padding:0 12px; font-size:14px; outline:none; }
  .c-search input:focus{ border-color:var(--gold-line); }
  .c-search__x{ width:36px; height:36px; border-radius:50%; background:none; border:none; color:var(--text-3); display:grid; place-items:center; }
  .c-window-badge{ display:none; align-items:center; gap:8px; padding:8px 14px; background:rgba(200,164,90,.12); border-bottom:1px solid var(--border-soft); font-size:12px; color:var(--gold); }
  .c-window-badge span{ display:flex; align-items:center; gap:6px; flex:1; }
  .c-window-badge svg{ flex-shrink:0; }
  .c-window-badge button{ padding:6px 12px; border-radius:999px; border:1px solid var(--gold-line); background:var(--gold); color:#000; font-size:11.5px; font-weight:600; font-family:inherit; cursor:pointer; white-space:nowrap; }

  .msg-info{ display:flex; flex-direction:column; gap:8px; }

  .mi-row:last-child{ border-bottom:none; }
  .mi-l{ font-size:13px; color:var(--text-3); }
  .mi-v{ font-size:13px; color:var(--text); text-align:right; max-width:60%; }
  .rec-bar{ display:none; align-items:center; gap:10px; padding:8px 12px; background:var(--bg-3); border-top:1px solid var(--border-soft); }
  .rec-bar.show{ display:flex; }
  .rec-bar .rec-dot{ width:10px; height:10px; border-radius:50%; background:var(--red); animation:pulse-dot 1s ease-in-out infinite; }
  .rec-bar .rec-time{ font-size:14px; color:var(--text-2); font-weight:500; min-width:40px; }
  .rec-bar .rec-send{ width:36px; height:36px; border-radius:50%; background:var(--gold); border:none; color:#0A0A0A; display:grid; place-items:center; margin-left:auto; }
  .rec-bar .rec-cancel{ width:36px; height:36px; border-radius:50%; background:var(--bg-4); border:none; color:var(--text-3); display:grid; place-items:center; }
  .rec-bar .rec-lock{ color:var(--gold); font-size:11px; display:flex; align-items:center; gap:3px; }

  /* ── Selection mode ── */
  .msg-wrap.sel-mode{ padding-left:40px; }
  .msg-wrap .sel-check{ position:absolute; left:6px; top:50%; transform:translateY(-50%); width:24px; height:24px; border-radius:50%; border:2px solid var(--text-3); display:none; align-items:center; justify-content:center; z-index:5; background:transparent; transition:all .2s; }

  .msg-wrap.selected .bub{ background:rgba(200,164,90,.12); }

  .sel-bar{ position:sticky; bottom:0; left:0; right:0; display:none; align-items:center; gap:6px; padding:8px 12px calc(8px + var(--safe-b)); background:var(--glass-2); backdrop-filter:var(--blur-sm); -webkit-backdrop-filter:var(--blur-sm); border-top:1px solid var(--glass-border); z-index:20; }
  .sel-bar.show{ display:flex; }
  .sel-bar .sel-count{ font-size:13px; color:var(--text-2); font-weight:500; flex:1; min-width:0; }

  .sel-bar .sel-act:active{ transform:scale(.9); background:var(--bg-4); }
  .sel-bar .sel-act svg{ width:19px; height:19px; }
  .sel-bar .sel-act.danger{ color:var(--red); }
  .sel-bar .sel-act.x{ color:var(--text-3); background:none; }
  /* ── Reactions ── */
  .bub-reactions{ display:flex; gap:4px; flex-wrap:wrap; margin-top:4px; padding-top:4px; border-top:1px solid rgba(255,255,255,.06); }

  .bub--out .bub-reaction{ background:rgba(255,255,255,.12); border-color:rgba(255,255,255,.18); }

  .bub-reaction .r-count{ font-size:10px; color:var(--text-3); font-weight:600; min-width:8px; text-align:center; }
  .bub-reaction.mine{ background:var(--gold-soft)!important; border-color:var(--gold)!important; }

  /* ── Edit badge ── */
  .bub__edited{ font-size:10px; color:var(--text-3); font-style:italic; margin-right:4px; }

  /* ── Deleted message placeholder ── */
  .bub-deleted{ font-style:italic; color:var(--text-3); font-size:13px; }

  .bub-antidelete{ margin-top:4px; padding:6px 8px; border-left:2px solid var(--gold); background:rgba(200,164,90,.08); border-radius:6px; font-size:12px; color:var(--text-2); }
  .bub-antidelete::before{ content:'Texto original conservado'; display:block; font-size:9px; text-transform:uppercase; letter-spacing:.5px; color:var(--gold); margin-bottom:2px; }
  /* ── Pin badge on card ── */
  .m-card__pin{ position:absolute; top:-1px; right:12px; color:var(--gold); font-size:9px; display:flex; align-items:center; gap:2px; opacity:.7; }

  /* ── Mute badge ── */
  .m-card__mute{ position:absolute; top:-1px; left:12px; color:var(--text-3); font-size:9px; display:flex; align-items:center; gap:2px; opacity:.6; }
  .m-card__mute svg{ width:11px; height:11px; }

  .ctx-item{ display:flex; align-items:center; gap:12px; padding:14px 16px; font-size:14px; color:var(--text); border-bottom:1px solid var(--border-soft); cursor:pointer; transition:background .1s; -webkit-tap-highlight-color:transparent; }
  .ctx-item:active{ background:var(--bg-2); }

  .ctx-item .ctx-ic svg{ width:18px; height:18px; }
  .ctx-item.danger{ color:var(--red); }
  .ctx-item.primary{ color:var(--gold); }

  .emoji-grid{ display:grid; grid-template-columns:repeat(6,1fr); gap:6px; padding:10px 0; }

  .emoji-grid button:active{ transform:scale(1.2); background:var(--bg-4); }
  .emoji-grid button.active{ background:var(--gold-soft); box-shadow:0 0 0 2px var(--gold); }
  .emoji-grid button .e-count{ font-size:10px; color:var(--text-3); margin-left:2px; }
  .sch-item{ display:flex; align-items:center; gap:8px; padding:10px 12px; border-bottom:1px solid var(--border-soft); }
  .sch-item:last-child{ border-bottom:none; }
  .sch-item .sch-time{ font-size:12px; color:var(--text-3); flex-shrink:0; width:60px; }
  .sch-item .sch-body{ flex:1; font-size:13px; color:var(--text-2); min-width:0; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }
  .sch-item .sch-del{ width:28px; height:28px; border-radius:50%; background:none; border:none; color:var(--text-3); display:grid; place-items:center; }
  .rec-list{ max-height:200px; overflow-y:auto; margin-bottom:8px; }
  .m-toast.show{ opacity:1; transform:translateX(-50%) translateY(0); }
  .sec{ margin-bottom:20px; }
  .sec-label{ font-size:11px; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:8px; padding:0 4px; }
  .sec-body{ background:var(--bg-2); border-radius:14px; overflow:hidden; }
  .sec-row{ display:flex; align-items:center; justify-content:space-between; padding:13px 16px; border-bottom:1px solid var(--border-soft); cursor:pointer; }
  .sec-row:last-child{ border-bottom:none; }
  .sec-row label{ font-size:14px; color:var(--text); }
  .sec-row input{ border:none; background:var(--bg-3); color:var(--text); font-size:14px; font-family:inherit; padding:8px 12px; border-radius:10px; outline:none; width:100%; }
  .sec-btn{ width:100%; height:44px; border:none; background:none; color:var(--text-2); font-size:14px; font-family:inherit; cursor:pointer; display:flex; align-items:center; justify-content:center; gap:6px; padding:0 16px; }
  .sec-btn:active{ background:var(--bg-3); }
  .sec-btn.danger{ color:var(--red); }
  .bg-opt{ display:flex; flex-direction:column; align-items:center; gap:5px; cursor:pointer; padding:6px 4px; border-radius:12px; flex:1; transition:background .2s; }
  .bg-opt.active{ background:rgba(200,164,90,.1); }
  .bg-preview{ width:100%; height:52px; border-radius:10px; border:1.5px solid var(--border-strong); overflow:hidden; transition:border-color .2s; }
  .bg-opt.active .bg-preview{ border-color:var(--gold-line); }
  .bg-preview--none{ background:linear-gradient(135deg,#0A0A0A,#0C0C0C); }
  .bg-preview--leones{
    background:

  .toggle-sw{ position:relative; width:44px; height:26px; border-radius:13px; background:var(--bg-4); border:2px solid var(--border-soft); cursor:pointer; transition:all .25s var(--spring); flex-shrink:0; padding:0; }

  /* ── Banner + hoja de permisos ── */
  .perm-banner{ display:flex; align-items:center; gap:10px; margin:8px 14px 0; padding:10px 12px; background:var(--glass-2); border:1px solid rgba(200,164,90,.25); border-radius:14px; backdrop-filter:saturate(1.2) blur(10px); -webkit-backdrop-filter:saturate(1.2) blur(10px); }

  /* ── Pantalla de actualización (estilo Free Fire) ── */
  .screen--update{ z-index:90; display:none; align-items:center; justify-content:center; padding:28px; }
  .screen--update.show{ display:flex; }
  .upd-card{ width:100%; max-width:340px; background:var(--glass-2); border:1px solid var(--glass-border); border-radius:22px; box-shadow:var(--glass-edge), var(--sh-3); backdrop-filter:var(--blur); -webkit-backdrop-filter:var(--blur); padding:28px 22px; display:flex; flex-direction:column; align-items:center; text-align:center; }

  .upd-bar{ width:100%; height:10px; border-radius:999px; background:var(--bg-4); overflow:hidden; margin-bottom:8px; border:1px solid var(--border-soft); }

  .upd-pct{ font-size:12px; color:var(--text-3); min-height:16px; margin-bottom:14px; }
  .upd-btn{ width:100%; height:48px; border:none; border-radius:12px; background:var(--grad-gold); color:#0A0A0A; font-family:inherit; font-size:15px; font-weight:700; letter-spacing:.03em; cursor:pointer; }

function urlBase64ToUint8Array(b){
  const s=b.replace(/-/g,'+').replace(/_/g,'/');
  const r=atob(s); const u=new Uint8Array(r.length);
  for(let i=0;i<r.length;i++) u[i]=r.charCodeAt(i);
  return u;
}
async function suscribirPush(){
  // App nativa (Capacitor): FCM es más confiable en Android que Web Push (que el
  // sistema puede matar en segundo plano). Se registra AUTOMÁTICAMENTE al abrir,
  // salvo que el vendedor lo haya apagado desde Perfil (opt-out). La disponibilidad
  // del plugin se verifica con isPluginAvailable + try/catch para no tumbar la app
  // si Firebase no está configurado en este build.
  if(esNativo()){
    if(localStorage.getItem('sp_push_fcm_enabled')==='false') return; // opt-out explícito
    try{
      const cap=window.Capacitor;
      if(cap && typeof cap.isPluginAvailable==='function' && !cap.isPluginAvailable('PushNotifications')) return;
      return suscribirPushNativo();
    }catch(e){ return; }
  }
  if(!('Notification'in window)||!('serviceWorker'in navigator)) return;
  if(Notification.permission==='denied') return;
  if(Notification.permission==='default'){
    const p=await Notification.requestPermission();
    if(p!=='granted') return;
  }
  try{
    const reg=await navigator.serviceWorker.ready;
    const kr=await api('/api/push/clave');
    if(!kr||!kr.publicKey) return console.warn('suscribirPush: sin clave pública');
    if(!kr.enabled) return console.warn('suscribirPush: push deshabilitado en backend');
    const key=urlBase64ToUint8Array(kr.publicKey);
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:key});
    await api('/api/push/suscribir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub})});
  }catch(e){ console.error('suscribirPush:', e.message); }
}
async function suscribirPushNativo(){
  try{
    const { PushNotifications } = window.Capacitor.Plugins;
    const perm = await PushNotifications.requestPermissions();
    if(perm.receive!=='granted') return;
    await PushNotifications.addListener('registration', async token=>{
      try{ await api('/api/push/suscribir-fcm',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({token:token.value})}); }catch(e){}
    });
    await PushNotifications.addListener('registrationError', err=>console.error('FCM registration error:', err));
    // Tocar la notificación con la app en background debe abrir el lead correspondiente
    await PushNotifications.addListener('pushNotificationActionPerformed', action=>{
      const leadId = action.notification && action.notification.data && action.notification.data.leadId;
      if(leadId) abrirChat(Number(leadId));
    });
    await PushNotifications.register();
  }catch(e){ console.error('suscribirPushNativo:', e.message); }
}

async function api(url, opts){
  try{
    const r = await fetch(url, Object.assign({credentials:'include', headers:{'Accept':'application/json'}}, opts||{}));
    if(r.status===401){ if(!location.pathname.startsWith('/login')) location.replace('/login.html'); return null; }
    if(!r.ok) return null;
    const ct=r.headers.get('content-type')||''; return ct.includes('json')? r.json() : r.text();
  }
  catch(e){ return null; }
}

function apiUpload(url, body, pb){
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.withCredentials=true;
    xhr.upload.onprogress=e=>{ if(e.lengthComputable&&pb){ const f=pb.querySelector('#upFill'); if(f) f.style.width=Math.round(e.loaded/e.total*100)+'%'; } };
    xhr.onload=()=>{ try{ const r=JSON.parse(xhr.responseText); resolve(r); }catch(e){ resolve(null); } };
    xhr.onerror=()=>reject(new Error('upload failed'));
    xhr.send(JSON.stringify(body));
  });
}

/* ════════ Auto-actualización de la app (estilo Free Fire) ════════
   La web es OTA por sí sola (la app carga el sitio remoto); esto actualiza el
   APK NATIVO: detecta versión nueva vía /api/app/version, descarga con progreso
   (Filesystem) y lanza el instalador encima (ApkInstaller, misma firma). */
let _updInfo=null, _updApkPath=null, _updDescargando=false;

async function checkAppUpdate(){
  if(!esNativo()) return false;
  try{
    const info = await window.Capacitor.Plugins.App.getInfo();      // build = versionCode instalado
    const v = await api('/api/app/version');
    if(!v || !v.versionCode) return false;
    const instalado = Number(info.build)||0;
    if(v.versionCode <= instalado) return false;
    _updInfo = v;
    if(!v.obligatoria){
      try{
        const { Preferences } = window.Capacitor.Plugins;
        const skip = await Preferences.get({key:'sp_upd_skip'});
        if(Number(skip.value) === v.versionCode){ mostrarUpdBanner(v); return false; }
      }catch(e){}
    }
    mostrarPantallaUpdate(v);
    return !!v.obligatoria; // obligatoria = bloquear el resto del init
  }catch(e){ console.error('checkAppUpdate', e); return false; }
}

function mostrarPantallaUpdate(v){
  $('#updVer').textContent = 'Leons Group '+v.versionName;
  $('#updNotas').textContent = v.notas || '';
  $('#updBar').hidden = true; $('#updFill').style.width='0%'; $('#updPct').textContent='';
  const btn=$('#updBtn'); btn.disabled=false; btn.textContent = _updApkPath ? 'Instalar' : 'Actualizar ahora';
  btn.onclick = ()=>{ haptic(10); ejecutarUpdate(v); };
  const later=$('#updLater');
  later.hidden = !!v.obligatoria;
  later.onclick = async ()=>{
    try{ await window.Capacitor.Plugins.Preferences.set({key:'sp_upd_skip', value:String(v.versionCode)}); }catch(e){}
    $('#scUpdate').classList.remove('show'); mostrarUpdBanner(v);
  };
  $('#scUpdate').classList.add('show');
}

async function ejecutarUpdate(v){
  if(_updDescargando) return;
  const cap = window.Capacitor;
  // APK viejo sin los plugins nuevos: transición única vía descarga del navegador
  if(!cap.isPluginAvailable('ApkInstaller') || !cap.isPluginAvailable('Filesystem')){
    toast('Descargando… instala el APK desde tus descargas');
    window.open(location.origin + v.apkUrl, '_blank');
    return;
  }
  const { Filesystem, ApkInstaller } = cap.Plugins;
  try{
    const can = await ApkInstaller.canInstall();
    if(!can.value){
      toast('Autoriza "Instalar apps desconocidas" y vuelve a intentar');
      await ApkInstaller.openInstallSettings();
      return;
    }
    // Ya descargado (canceló el instalador antes): reinstalar directo
    if(_updApkPath){ await ApkInstaller.install({ path:_updApkPath }); return; }

    _updDescargando = true;
    const btn=$('#updBtn'); btn.disabled=true; btn.textContent='Descargando…';
    $('#updBar').hidden=false;
    const sub = await Filesystem.addListener('progress', p=>{
      const pct = p.contentLength ? Math.min(100, Math.round(p.bytes/p.contentLength*100)) : 0;
      $('#updFill').style.width = pct+'%';
      $('#updPct').textContent = pct+'%' + (p.contentLength ? '  ('+(p.bytes/1048576).toFixed(1)+' MB)' : '');
    });
    try{
      const r = await Filesystem.downloadFile({
        url: location.origin + v.apkUrl,
        path: 'leons-group-'+v.versionCode+'.apk',
        directory: 'CACHE',
        progress: true,
      });
      _updApkPath = r.path;
      $('#updFill').style.width='100%'; $('#updPct').textContent='Abriendo instalador…';
      await ApkInstaller.install({ path: r.path });
      btn.textContent='Instalar'; btn.disabled=false; // por si el usuario cancela el instalador
    } finally {
      try{ sub.remove(); }catch(e){}
      _updDescargando = false;
    }
  }catch(e){
    console.error('ejecutarUpdate', e);
    _updDescargando = false;
    const btn=$('#updBtn'); btn.disabled=false; btn.textContent='Reintentar';
    $('#updPct').textContent='Error al descargar. Revisa tu conexión.';
  }
}

function mostrarUpdBanner(v){
  const b=$('#updBanner'); if(!b) return;
  $('#updBannerTxt').textContent = _updApkPath
    ? 'Actualización descargada — toca para instalar'
    : 'Nueva versión '+v.versionName+' disponible';
  $('#updBannerBtn').onclick = ()=>{ haptic(10); mostrarPantallaUpdate(v); };
  b.hidden=false;
}

function initUpdateResume(){
  if(!esNativo()) return;
  try{
    window.Capacitor.Plugins.App.addListener('resume', async ()=>{
      if(!_updInfo) return;
      try{
        const info = await window.Capacitor.Plugins.App.getInfo();
        if(Number(info.build) >= _updInfo.versionCode){
          // Ya se actualizó — limpiar restos
          _updInfo=null; _updApkPath=null;
          $('#scUpdate').classList.remove('show'); $('#updBanner').hidden=true;
          location.reload();
        } else if(_updInfo.obligatoria){
          mostrarPantallaUpdate(_updInfo);
        } else if(_updApkPath){
          mostrarUpdBanner(_updInfo);
        }
      }catch(e){}
    });
  }catch(e){}
}

/* ════════ Bloqueo con huella (Biometric native + WebAuthn web) ════════ */
const BIO_KEY='sp_bio_lock';
async function bioDisponible(){
  try{
    if(esNativo()&&window.Capacitor.isPluginAvailable('BiometricLock')){
      const r=await window.Capacitor.Plugins.BiometricLock.isAvailable();
      if(r.value) return true;
    }
    if(window.PublicKeyCredential&&typeof PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable==='function')
      return await PublicKeyCredential.isUserVerifyingPlatformAuthenticatorAvailable();
  }catch(e){}
  return false;
}
async function bioActivado(){
  try{
    if(esNativo()&&window.Capacitor.isPluginAvailable('Preferences')){
      const r=await window.Capacitor.Plugins.Preferences.get({key:BIO_KEY});
      if(r.value==='1') return true;
    }
    return localStorage.getItem(BIO_KEY)==='1';
  }catch(e){ return localStorage.getItem(BIO_KEY)==='1'; }
}
async function bioSetActivado(v){
  try{
    if(esNativo()&&window.Capacitor.isPluginAvailable('Preferences'))
      await window.Capacitor.Plugins.Preferences.set({key:BIO_KEY,value:v?'1':'0'});
    localStorage.setItem(BIO_KEY,v?'1':'0');
  }catch(e){ localStorage.setItem(BIO_KEY,v?'1':'0'); }
}
function getBioCredId(){
  try{ const r=localStorage.getItem('sp_bio_cred'); return r?Uint8Array.from(JSON.parse(r)):null; }catch(e){ return null; }
}
function setBioCredId(id){
  localStorage.setItem('sp_bio_cred',JSON.stringify(Array.from(id)));
}
async function pedirDesbloqueo(){
  const ov=$('#bioLock'); if(!ov) return;
  ov.hidden=false;
  const intentar=async()=>{
    try{
      if(esNativo()&&window.Capacitor.isPluginAvailable('BiometricLock')){
        await window.Capacitor.Plugins.BiometricLock.authenticate();
      }else if(window.PublicKeyCredential){
        let credId=getBioCredId();
        if(!credId){
          const cred=await navigator.credentials.create({publicKey:{
            challenge:crypto.getRandomValues(new Uint8Array(32)),
            rp:{name:'SP CRM',id:window.location.hostname},
            user:{id:crypto.getRandomValues(new Uint8Array(16)),name:'sp_user',displayName:'SP CRM'},
            pubKeyCredParams:[{alg:-7,type:'public-key'}],
            authenticatorSelection:{authenticatorAttachment:'platform',userVerification:'required'},
          }});
          if(cred){ setBioCredId(cred.rawId); credId=cred.rawId; }
          else throw new Error('no_register');
        }
        await navigator.credentials.get({publicKey:{
          challenge:crypto.getRandomValues(new Uint8Array(32)),
          allowCredentials:[{type:'public-key',id:credId}],
          userVerification:'required',
        }});
      }
      ov.hidden=true; haptic([10,20]);
    }catch(e){ /* canceló o falló */ }
  };
  $('#bioUnlock').onclick=intentar;
  intentar();
}
async function initBioLock(){
  if(await bioActivado()&&await bioDisponible()) pedirDesbloqueo();
  try{
    if(esNativo()&&window.Capacitor.isPluginAvailable('App'))
      window.Capacitor.Plugins.App.addListener('resume',async()=>{
        if(await bioActivado()&&await bioDisponible()&&$('#bioLock').hidden) pedirDesbloqueo();
      });
    // Fallback web: detectar vuelta de background
    document.addEventListener('visibilitychange',()=>{
      if(!document.hidden&&$('#bioLock').hidden) (async()=>{ if(await bioActivado()&&await bioDisponible()) pedirDesbloqueo(); })();
    });
  }catch(e){}
}

/* ════════ Permisos del dispositivo ════════ */
const PERMISOS=[
  {k:'mic',   ic:'🎙️', nombre:'Micrófono',      desc:'Grabar y enviar notas de voz a tus clientes', query:'microphone'},
  {k:'cam',   ic:'📷', nombre:'Cámara',          desc:'Tomar fotos de lotes y documentos desde el chat', query:'camera'},
  {k:'geo',   ic:'📍', nombre:'Ubicación',       desc:'Compartir la ubicación de proyectos y citas', query:'geolocation'},
  {k:'notif', ic:'🔔', nombre:'Notificaciones',  desc:'Enterarte al instante cuando llega un lead o mensaje', query:'notifications'},
];
async function estadoPermiso(query){
  const P=(window.Capacitor&&window.Capacitor.Plugins)||{};
  if(esNativo()){
    // 1) Plugin propio Permisos (APK v4+): estado REAL de Android via checkSelfPermission
    try{
      if(window.Capacitor.isPluginAvailable&&window.Capacitor.isPluginAvailable('Permisos')){
        const r=await P.Permisos.estado();
        const st=r[{microphone:'mic',camera:'cam',geolocation:'geo',notifications:'notif'}[query]];
        if(st) return st;
      }
    }catch(e){}
    // 2) checkPermissions de los plugins oficiales (disponibles desde v3)
    try{
      if(query==='camera'&&P.Camera){ const st=await P.Camera.checkPermissions(); return st.camera==='granted'?'granted':st.camera==='denied'?'denied':'prompt'; }
      if(query==='geolocation'&&P.Geolocation){ const st=await P.Geolocation.checkPermissions(); return st.location==='granted'?'granted':st.location==='denied'?'denied':'prompt'; }
      if(query==='notifications'&&P.PushNotifications){ const st=await P.PushNotifications.checkPermissions(); return st.receive==='granted'?'granted':st.receive==='denied'?'denied':'prompt'; }
    }catch(e){}
  }
  if(query==='notifications'){
    if('Notification' in window) return Notification.permission==='default'?'prompt':Notification.permission;
    return 'desconocido';
  }
  // 3) Permissions API del navegador. OJO WebView Android: para mic/cam devuelve
  // 'prompt' PARA SIEMPRE aunque ya esté concedido (la concesión la resuelve
  // Capacitor a nivel nativo por cada request) — por eso el flag local de respaldo
  // que se marca cuando un pedido real tuvo éxito.
  try{
    const st=await navigator.permissions.query({name:query});
    if(st.state==='granted'){ localStorage.setItem('sp_perm_ok_'+query,'1'); return 'granted'; }
    if(st.state==='prompt'&&localStorage.getItem('sp_perm_ok_'+query)==='1') return 'granted';
    return st.state;
  }catch(e){
    return localStorage.getItem('sp_perm_ok_'+query)==='1'?'granted':'desconocido';
  }
}
async function estadoPermisos(){
  const out={};
  for(const p of PERMISOS) out[p.k]=await estadoPermiso(p.query);
  return out;
}
async function pedirPermiso(k){
  try{
    if(k==='mic'){ const s=await navigator.mediaDevices.getUserMedia({audio:true}); s.getTracks().forEach(t=>t.stop()); localStorage.setItem('sp_perm_ok_microphone','1'); }
    else if(k==='cam'){ const s=await navigator.mediaDevices.getUserMedia({video:true}); s.getTracks().forEach(t=>t.stop()); localStorage.setItem('sp_perm_ok_camera','1'); }
    else if(k==='geo'){
      if(esNativo() && window.Capacitor.Plugins.Geolocation){ await window.Capacitor.Plugins.Geolocation.requestPermissions(); }
      else{ await new Promise((res,rej)=>navigator.geolocation.getCurrentPosition(res,rej,{timeout:8000})); localStorage.setItem('sp_perm_ok_geolocation','1'); }
    }
    else if(k==='notif'){
      if(esNativo()) await suscribirPushNativo();
      else{ await Notification.requestPermission(); suscribirPush(); }
    }
  }catch(e){
    const st=await estadoPermiso((PERMISOS.find(p=>p.k===k)||{}).query);
    if(k==='mic' && esNativo() && st==='prompt'){
      // APK viejo sin RECORD_AUDIO en el manifest: Android deniega sin diálogo y el estado sigue en 'prompt'
      mostrarAyudaPermiso('Tu versión de la app no incluye el permiso de micrófono. Descarga e instala la última versión de Leons Group para poder grabar notas de voz.');
    } else if(st==='denied'){
      mostrarAyudaPermiso('El permiso está bloqueado por el sistema. Actívalo manualmente en: Ajustes › Aplicaciones › Leons Group › Permisos.');
    }
  }
  await refrescarPermSheet();
  actualizarPermBanner();
}
function mostrarAyudaPermiso(msg){
  const box=$('#permHelp'); if(box){ box.textContent=msg; box.hidden=false; } else toast(msg);
}
function permRowHTML(p,st){
  const accion = st==='granted' ? `<span class="perm-ok">✓ Activo</span>`
    : st==='denied' ? `<button class="perm-act" data-perm="${p.k}">Reintentar</button>`
    : `<button class="perm-act" data-perm="${p.k}">Activar</button>`;
  return `<div class="perm-row"><span class="perm-ic">${p.ic}</span><div class="perm-info"><b>${p.nombre}</b><small>${p.desc}</small></div>${accion}</div>`;
}
async function refrescarPermSheet(){
  const body=$('#permRows'); if(!body) return;
  const st=await estadoPermisos();
  body.innerHTML=PERMISOS.map(p=>permRowHTML(p,st[p.k])).join('');
  body.querySelectorAll('.perm-act').forEach(b=>b.onclick=()=>{ haptic(10); pedirPermiso(b.dataset.perm); });
}
async function abrirPermisos(){
  openSheet('Permisos de la app', `
    <div style="font-size:12.5px;color:var(--text-3);line-height:1.4;margin-bottom:6px">Para que todo funcione, la app necesita estos permisos del teléfono. Actívalos uno por uno:</div>
    <div id="permRows"></div>
    <div class="perm-help" id="permHelp" hidden></div>`);
  await refrescarPermSheet();
}
async function actualizarPermBanner(){
  const b=$('#permBanner'); if(!b) return;
  const dismiss=Number(localStorage.getItem('sp_perm_banner_dismiss')||0);
  if(Date.now()-dismiss < 3*24*60*60*1000){ b.hidden=true; return; }
  const st=await estadoPermisos();
  const falta=PERMISOS.filter(p=>st[p.k]==='prompt'||st[p.k]==='denied');
  if(!falta.length){ b.hidden=true; return; }
  const mic=falta.find(p=>p.k==='mic');
  const p=mic||falta[0];
  $('#permBannerTxt').textContent = mic
    ? 'Activa el micrófono para enviar notas de voz'
    : `Activa ${falta.length>1?'los permisos de la app':p.nombre.toLowerCase()} para usar todas las funciones`;
  b.querySelector('.ic').textContent=p.ic;
  b.hidden=false;
}
function initPermisos(){
  const btn=$('#permBannerBtn'), x=$('#permBannerX');
  if(btn) btn.onclick=()=>{ haptic(10); abrirPermisos(); };
  if(x) x.onclick=()=>{ localStorage.setItem('sp_perm_banner_dismiss',String(Date.now())); $('#permBanner').hidden=true; haptic(6); };
  actualizarPermBanner();
  if(localStorage.getItem('spPermOnboarded')!=='1'){
    localStorage.setItem('spPermOnboarded','1');
    setTimeout(abrirPermisos, 1200);
  }
}

async function cargar(){ const d = await api('/api/mis-leads'); if(d) leads = d; else if(!leads.length) toast('Sin conexión. Reintentando...'); renderList(); }
async function cargarArchivados(){ const d = await api('/api/mis-leads/archivados'); archivedLeads = d || []; archivadosCount = archivedLeads.length; }
function leadsActivos(){ return leadsFiltrados(); }
function leadsArchivados(){ let a = archivedLeads; if(term){ const t=term.toLowerCase(); a=a.filter(l=>(l.customer_name||'').toLowerCase().includes(t)||(l.customer_phone||'').includes(t)); } return a.sort((x,y)=>new Date(y.updated_at||y.created_at)-new Date(x.updated_at||x.created_at)); }

/* ════════ Filtros ════════ */
const FILTROS = [['todos','Todos'],['sin_clasificar','Nuevos'],['interesado','Interesados'],['negociacion','Negociación'],['cita','Citas'],['vendido','Vendidos']];
function renderFilters(){ $('#filters').innerHTML = FILTROS.map(([k,l])=>{ const n = k==='todos'?leads.length:leads.filter(x=>(x.etiqueta||'sin_clasificar')===k).length; return `<button class="m-chip ${k===filtro?'active':''}" data-f="${k}">${l}${n?` <b>${n}</b>`:''}</button>`; }).join(''); }

function estaPospuesto(l){ return l.snoozed_until && new Date(l.snoozed_until)>new Date(); }
function leadsFiltrados(){ let a=leads; if(filtro!=='todos') a=a.filter(l=>(l.etiqueta||'sin_clasificar')===filtro); if(term){ const t=term.toLowerCase(); a=a.filter(l=>(l.customer_name||'').toLowerCase().includes(t)||(l.customer_phone||'').includes(t)||(l.last_message||'').toLowerCase().includes(t)); }
  const base=ordenPrioridad?(x,y)=>(y.score||0)-(x.score||0):(x,y)=>new Date(y.updated_at||y.created_at)-new Date(x.updated_at||x.created_at);
  // Los pospuestos (C2) bajan al fondo, sin ocultarse — nunca se pierde un lead.
  return a.sort((x,y)=>{ const sx=estaPospuesto(x)?1:0, sy=estaPospuesto(y)?1:0; if(sx!==sy) return sx-sy; return base(x,y); }); }

function wireCard(row){
  const card=row.querySelector('.m-card'); if(!card) return;
  let lpTimer=null, lpFired=false, sx=0, sy=0;
  const abrirMenu=()=>{ lpTimer=null; lpFired=true; setTimeout(()=>{ lpFired=false; },600); haptic(18); cardMenu(Number(row.dataset.id)); };
  card.addEventListener('touchstart',e=>{ sx=e.touches[0].clientX; sy=e.touches[0].clientY; lpFired=false; lpTimer=setTimeout(abrirMenu,450); },{passive:true});
  card.addEventListener('touchmove',e=>{ if(!lpTimer) return; const dx=Math.abs(e.touches[0].clientX-sx), dy=Math.abs(e.touches[0].clientY-sy); if(dx>10||dy>10){ clearTimeout(lpTimer); lpTimer=null; } },{passive:true});
  const cancelar=()=>{ if(lpTimer){ clearTimeout(lpTimer); lpTimer=null; } };
  card.addEventListener('touchend',cancelar);
  card.addEventListener('touchcancel',cancelar);
  card.addEventListener('contextmenu',e=>{ e.preventDefault(); abrirMenu(); }); // desktop: click derecho
  card.addEventListener('click',()=>{ if(lpFired){ lpFired=false; return; } abrirChat(Number(card.dataset.open)); });
}

function swipeAction(a,row){ const id=Number(row.dataset.id); const phone=(row.dataset.phone||'').replace(/[^\d+]/g,''); const l=findLead(id); haptic(12);

function abrirSnooze(l){

    return;
  }
  const opts=[['60','En 1 hora'],['180','En 3 horas'],['mañana','Mañana 8:00 a.m.']];

/* ════════ Voice Recording — WhatsApp style (hold-to-record) ════════ */
let _rec=null, _recChunks=[], _recTimer=null, _recSec=0, _recCancelling=false, _recTouch=false, _recLocked=false;
function startGrabacion(){
  if(_rec) return; window._sending=false;
  _recSec=0; _recChunks=[]; _recCancelling=false; _recLocked=false;
  try{
    navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
      localStorage.setItem('sp_perm_ok_microphone','1'); // la hoja de permisos lee este flag (WebView no reporta mic via permissions.query)
      const mt=['audio/ogg;codecs=opus','audio/webm;codecs=opus','audio/webm','audio/mp4'].find(t=>window.MediaRecorder&&MediaRecorder.isTypeSupported&&MediaRecorder.isTypeSupported(t))||'';
      _rec=new MediaRecorder(s, mt?{mimeType:mt}:{});
      _rec.ondataavailable=e=>{ if(e.data.size>0) _recChunks.push(e.data); };
      _rec.onstop=()=>{ s.getTracks().forEach(t=>t.stop()); };
      _rec.start(200); haptic(20); // timeslice: los chunks llegan durante la grabación (sin esto quedan vacíos al soltar)
      $('#recBar').classList.add('show'); $('#cInput__row').classList.add('recording');
      _recTimer=setInterval(()=>{ _recSec++; const m=Math.floor(_recSec/60); const seg=String(_recSec%60).padStart(2,'0'); const t=$('#recTime'); if(t) t.textContent=m+':'+seg; },1000);
    }).catch(()=>{ toast('Permiso de micrófono requerido'); console.error('getUserMedia fail'); });
  }catch(e){ console.error('startGrabacion',e); toast('Grabación no disponible'); }
}
function detenerGrabacion(){ if(!_rec) return; _rec.stop(); clearInterval(_recTimer); _rec=null; }
function cancelarGrabacion(){ _recCancelling=true; detenerGrabacion(); _recChunks=[]; _recSec=0; limpiarRecUI(); }
let _pendingAudio=null; // { blob, recMime, ext, url, dur } — nota grabada a la espera de confirmación
// C1: al soltar/enviar, detiene la grabación y muestra un PREVIEW (reproducir/descartar/enviar)
// en vez de mandar de una — evita audios enviados por error o vacíos.
async function enviarGrabacion(){ if(!_rec) return; haptic([10,20]);
  const secs=_recSec;
  clearInterval(_recTimer); _recTimer=null;
  const recMime=_rec.mimeType||'audio/webm';
  try{
    await new Promise(r=>{
      if(_rec.state!=='recording'){ r(); return; }
      const orig=_rec.onstop; _rec.onstop=()=>{ if(orig) orig(); r(); }; _rec.stop();
    });
  }catch(e){ console.error('enviarGrabacion stop',e); limpiarRecUI(); toast('Error al detener la grabación'); return; }
  const blob=new Blob(_recChunks,{type:recMime});
  _rec=null;
  if(_recChunks.length===0||blob.size<100){ limpiarRecUI(); toast('Audio muy corto — mantén presionado para grabar'); return; }
  const ext=recMime.includes('ogg')?'ogg':recMime.includes('mp4')?'m4a':'webm';
  if(_pendingAudio&&_pendingAudio.url){ try{ URL.revokeObjectURL(_pendingAudio.url); }catch(e){} }
  _pendingAudio={ blob, recMime, ext, url:URL.createObjectURL(blob), dur:secs };
  mostrarPreviewAudio();
}
function mmss(s){ const m=Math.floor(s/60); return m+':'+String(s%60).padStart(2,'0'); }
function mostrarPreviewAudio(){
  const bar=$('#recBar'); if(!bar||!_pendingAudio) return;
  bar.classList.add('show'); $('#cInput__row').classList.add('recording');
  bar.innerHTML=`<button class="rec-play" id="recPlay" title="Reproducir" style="background:none;border:none;color:var(--gold);display:flex;align-items:center">${I(SVG.play||SVG.mic,20)}</button>
    <span class="rec-time" id="recPrevTime">${mmss(_pendingAudio.dur)}</span>
    <span style="flex:1;height:3px;background:var(--bg-4);border-radius:2px;overflow:hidden;margin:0 4px"><i id="recPrevProg" style="display:block;height:100%;width:0;background:var(--gold);transition:width .1s linear"></i></span>
    <button class="rec-discard" id="recDiscard" title="Descartar" style="background:none;border:none;color:var(--red);display:flex;align-items:center">${I(SVG.trash||SVG.x,18)}</button>
    <button class="rec-confirm" id="recConfirm" title="Enviar" style="background:var(--gold);border:none;color:#1a1400;width:34px;height:34px;border-radius:50%;display:flex;align-items:center;justify-content:center">${I(SVG.send,16)}</button>`;
  const audio=new Audio(_pendingAudio.url); _pendingAudio.audio=audio;
  const playBtn=$('#recPlay'), prog=$('#recPrevProg');
  audio.ontimeupdate=()=>{ if(prog&&audio.duration) prog.style.width=(audio.currentTime/audio.duration*100)+'%'; };
  const pauseIco='<svg width="20" height="20" viewBox="0 0 24 24" fill="currentColor"><rect x="6" y="5" width="4" height="14" rx="1"/><rect x="14" y="5" width="4" height="14" rx="1"/></svg>';
  audio.onended=()=>{ if(playBtn) playBtn.innerHTML=I(SVG.play,20); if(prog) prog.style.width='0'; };
  if(playBtn) playBtn.onclick=()=>{ if(audio.paused){ audio.play(); playBtn.innerHTML=pauseIco; } else { audio.pause(); playBtn.innerHTML=I(SVG.play,20); } haptic(6); };
}
function descartarPreviewAudio(){ if(_pendingAudio){ try{ _pendingAudio.audio&&_pendingAudio.audio.pause(); URL.revokeObjectURL(_pendingAudio.url); }catch(e){} } _pendingAudio=null; limpiarRecUI(); haptic(8); }
async function subirAudioPendiente(){
  if(!_pendingAudio||!current){ limpiarRecUI(); return; }
  const p=_pendingAudio; try{ p.audio&&p.audio.pause(); }catch(e){}
  const btn=$('#recConfirm'); if(btn){ btn.disabled=true; btn.innerHTML='…'; }
  const toBase64=f=>new Promise((res,rej)=>{ const r2=new FileReader(); r2.onload=()=>res(r2.result.split(',')[1]); r2.onerror=rej; r2.readAsDataURL(f); });
  const dataBase64=await toBase64(p.blob); const mediaBody={mime:p.recMime,filename:'nota-voz.'+p.ext,dataBase64,caption:''};
  if(replyTo) mediaBody.replyTo=replyTo.id;
  const r=await api(`/api/leads/${current.id}/responder-media`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(mediaBody)});
  try{ URL.revokeObjectURL(p.url); }catch(e){} _pendingAudio=null;
  cancelarReply(); _recChunks=[]; _recSec=0; limpiarRecUI();
  if(r!==null){ const d=await api(`/api/leads/${current.id}/mensajes`); if(d){ currentMsgs=d.mensajes; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight; } cargar(); toast('Audio enviado'); }
  else{ toast('Error al enviar — reintenta','err'); }
}
function limpiarRecUI(){ _rec=null; _recChunks=[]; _recSec=0; _recCancelling=false; _recLocked=false; $('#recBar').classList.remove('show'); $('#cInput__row').classList.remove('recording'); if(_recTimer){ clearInterval(_recTimer); _recTimer=null; } }
// Hold-to-record en el botón de micrófono (solo cuando no hay texto)
function wireHoldRecord(btn){
  let holdTimer=null, started=false, startY=0, moved=false;
  const isMic=()=>!($('#cInput').value||'').trim().length>0;
  function onTouchStart(e){
    if(!isMic()||_rec||window._sending) return;
    _recTouch=true; // el hold-to-record toma el control: ignorar el click fantasma posterior
    moved=false; startY=e.touches[0].clientY;
    holdTimer=setTimeout(()=>{
      holdTimer=null; started=true;
      startGrabacion();
      const bar=$('#recBar');
      if(bar){ bar.innerHTML=`<span class="rec-dot" id="recDot"></span><span class="rec-time" id="recTime">0:00</span><span class="rec-swipe" id="recSwipe">${I(SVG.arrowUp,14)} Desliza para cancelar</span><button class="rec-cancel" title="Cancelar">${I(SVG.x,17)}</button><button class="rec-send" title="Enviar audio">${I(SVG.send,16)}</button>`; }
    },200);
  }
  function onTouchMove(e){
    if(holdTimer&&!started){ clearTimeout(holdTimer); holdTimer=null; return; }
    if(!started||!_rec) return;
    const dy=startY-e.touches[0].clientY;
    if(dy>40&&!_recCancelling){
      _recCancelling=true; haptic(12);
      const sw=$('#recSwipe'); if(sw) sw.innerHTML=`${I(SVG.x,16)} Cancelar`;
      const lk=$('#recLock'); if(lk) lk.style.opacity='.3';
    } else if(dy<20&&_recCancelling){
      _recCancelling=false;
      const sw=$('#recSwipe'); if(sw) sw.innerHTML=`${I(SVG.arrowUp,14)} Desliza para cancelar`;
      const lk=$('#recLock'); if(lk) lk.style.opacity='1';
    }
  }
  function onTouchEnd(){
    setTimeout(()=>{ _recTouch=false; },500); // libera después del click fantasma del navegador
    if(holdTimer){ clearTimeout(holdTimer); holdTimer=null; started=false; toast('Mantén presionado para grabar'); return; }
    if(!started||!_rec) return;
    started=false;
    if(_recCancelling){ _recCancelling=false; cancelarGrabacion(); toast('Grabación cancelada'); }
    else enviarGrabacion();
  }
  function onTouchCancel(){
    setTimeout(()=>{ _recTouch=false; },500);
    if(holdTimer){ clearTimeout(holdTimer); holdTimer=null; started=false; return; }
    if(!started||!_rec) return;
    started=false;
    // El sistema interrumpió el touch (llamada, gesto, etc.) — enviar para no perder el audio
    enviarGrabacion();
  }
  btn.addEventListener('touchstart',onTouchStart,{passive:true});
  btn.addEventListener('touchmove',onTouchMove,{passive:true});
  btn.addEventListener('touchend',onTouchEnd);
  btn.addEventListener('touchcancel',onTouchCancel);
}

async function selDelete(msgId, mode){

function toggleComposeEmojiPicker(){
  const pop=$('#cEmojiPop'); if(!pop) return;
  if(pop.classList.contains('show')){ pop.classList.remove('show'); return; }
  if(!pop.innerHTML){
    pop.innerHTML=COMPOSE_EMOJIS.map(([cat,list])=>`<div class="c-emoji-pop__cat">${cat}</div><div class="c-emoji-pop__grid">${list.map(e=>`<button type="button" data-e="${e}">${e}</button>`).join('')}</div>`).join('');
    pop.querySelectorAll('button[data-e]').forEach(b=>b.onclick=()=>insertEmojiEnInput(b.dataset.e));
  }
  pop.classList.add('show');
  document.addEventListener('click', _closeComposeEmojiOnOutside, true);
}
function _closeComposeEmojiOnOutside(e){
  const pop=$('#cEmojiPop'); const btn=$('#cEmoji');
  if(!pop) return;
  if(pop.contains(e.target)||e.target===btn) return;
  pop.classList.remove('show');
  document.removeEventListener('click', _closeComposeEmojiOnOutside, true);
}
function insertEmojiEnInput(emoji){
  const inp=$('#cInput'); if(!inp) return;
  const start=inp.selectionStart??inp.value.length, end=inp.selectionEnd??inp.value.length;
  inp.value=inp.value.slice(0,start)+emoji+inp.value.slice(end);
  const pos=start+emoji.length;
  inp.focus(); inp.setSelectionRange(pos,pos);
  inp.dispatchEvent(new Event('input',{bubbles:true}));
  haptic(6);
}

/* ════════ Wire Long Press (reemplaza enterSelMode directo) ════════ */
function wireMsgLongPress(wrap){
  if(wrap._lp) return; wrap._lp=true;
  const bub=wrap.querySelector('.bub'); if(!bub) return;
  let timer=null, sx=0,sy=0;
  function onStart(e){
    if(selMode){ toggleSel(wrap.dataset.msgid); return; }
    if(_editingMsg) return; // no abrir menú mientras se edita
    const touch=e.touches[0]; sx=touch.clientX; sy=touch.clientY;
    timer=setTimeout(()=>{
      timer=null; haptic(12); showCtxMenu(wrap.dataset.msgid);
    },400);
  }
  function onMove(e){
    if(timer){ const dx=Math.abs(e.touches[0].clientX-sx),dy=Math.abs(e.touches[0].clientY-sy); if(dx>10||dy>10){ clearTimeout(timer); timer=null; } }
  }
  function onEnd(){
    if(timer){ clearTimeout(timer); timer=null; }
  }
  bub.addEventListener('touchstart',onStart,{passive:true});
  bub.addEventListener('touchmove',onMove,{passive:true});
  bub.addEventListener('touchend',onEnd);
}
/* ════════ Scheduled Messages — en SERVIDOR (salen aunque la app esté cerrada) ════════ */
function abrirProgramar(){
  if(!current){ toast('Abre un chat primero'); return; }
  openSheet('Mensaje programado', `
    <div style="display:flex;flex-direction:column;gap:10px">
      <div style="font-size:12px;color:var(--text-3)">Se enviará automáticamente aunque cierres la app 🚀</div>
      <textarea id="schBody" placeholder="Mensaje a enviar..." style="width:100%;min-height:70px;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--bg-3);color:var(--text);font-size:14px;font-family:inherit;outline:none;resize:none"></textarea>
      <input type="datetime-local" id="schDate" style="width:100%;padding:12px;border-radius:12px;border:1px solid var(--border);background:var(--bg-3);color:var(--text);font-size:14px;font-family:inherit;outline:none">
      <button class="cop-use" id="schSave">Programar</button>
      <div style="margin-top:8px"><div style="font-size:11px;color:var(--text-3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:4px">Programados</div>
      <div class="rec-list" id="schList"></div></div>
    </div>`);
  renderSchList();

    const body=($('#schBody').value||'').trim(); const dt=$('#schDate').value;
    if(!body||!dt){ toast('Completa mensaje y fecha'); return; }
    const r=await api('/api/programados',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({leadId:current.id,body,sendAt:new Date(dt).toISOString()})});
    if(r){ $('#schBody').value=''; $('#schDate').value=''; renderSchList(); toast('Programado en el servidor ✓'); haptic([10,20]); }
    else toast('Error al programar');
  };
