<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SP OS">
<title>SP OS · Móvil</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
<style>
  /* ══════════ SP OS · Mobile Experience ══════════ */
  :root{
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --nav-h: 62px;
    --glass: rgba(12,12,12,.72);
    --glass-2: rgba(20,20,20,.66);
    --spring: cubic-bezier(.22,1,.36,1);
    --ease: cubic-bezier(.4,0,.2,1);
  }
  *{ -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html,body{ height:100%; margin:0; background:var(--bg-0); color:var(--text); font-family:var(--f-ui); overscroll-behavior:none; }
  body{ -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  input,textarea,button{ font-family:inherit; }
  ::-webkit-scrollbar{ display:none; }
  * { scrollbar-width:none; }

  #app{ position:fixed; inset:0; overflow:hidden; }
  .screen{ position:absolute; inset:0; display:flex; flex-direction:column; background:var(--bg-0); }

  /* ── Transiciones de pantalla ── */
  .screen--chat{ transform:translateX(100%); transition:transform .34s var(--spring); z-index:20; will-change:transform; }
  .screen--chat.show{ transform:translateX(0); }

  /* ── Header (glass) ── */
  .m-head{ position:relative; z-index:5; padding:calc(var(--safe-t) + 10px) 18px 8px; background:var(--glass); backdrop-filter:saturate(1.4) blur(20px); -webkit-backdrop-filter:saturate(1.4) blur(20px); border-bottom:1px solid var(--border-soft); }
  .m-head__top{ display:flex; align-items:center; gap:11px; margin-bottom:12px; }
  .m-mark{ width:34px; height:34px; border-radius:11px; background:linear-gradient(140deg,#E8C86A,var(--gold) 55%,#9E7E3C); display:grid; place-items:center; color:#0A0A0A; font-weight:700; font-size:14px; font-family:var(--f-title); box-shadow:0 4px 16px rgba(200,164,90,.28); flex-shrink:0; }
  .m-title{ font-family:var(--f-title); font-size:19px; font-weight:600; letter-spacing:.02em; }
  .m-title small{ display:block; font-family:var(--f-ui); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-3); font-weight:500; margin-top:1px; }
  .m-headbtn{ margin-left:auto; width:38px; height:38px; border-radius:50%; background:var(--bg-2); border:1px solid var(--border-soft); color:var(--text-2); display:grid; place-items:center; }
  .m-headbtn svg{ width:19px; height:19px; }

  /* ── Buscador ── */
  .m-search{ position:relative; display:flex; align-items:center; height:42px; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:14px; padding:0 12px; transition:border-color .2s, background .2s; }
  .m-search:focus-within{ border-color:var(--gold-line); background:var(--bg-3); }
  .m-search svg{ width:17px; height:17px; color:var(--text-3); flex-shrink:0; }
  .m-search input{ flex:1; border:none; background:none; outline:none; color:var(--text); font-size:15px; padding:0 10px; }
  .m-search input::placeholder{ color:var(--text-3); }

  /* ── Filtros ── */
  .m-filters{ display:flex; gap:7px; padding:12px 18px 4px; overflow-x:auto; }
  .m-chip{ flex-shrink:0; height:32px; padding:0 15px; border:1px solid var(--border); border-radius:999px; background:var(--bg-2); color:var(--text-3); font-size:12.5px; font-weight:500; display:flex; align-items:center; gap:6px; transition:all .2s var(--spring); }
  .m-chip.active{ background:var(--gold-soft); color:var(--gold); border-color:var(--gold-line); transform:scale(1.02); }
  .m-chip b{ font-weight:700; opacity:.7; }

  /* ── Lista ── */
  .m-scroll{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px); }
  .m-ptr{ height:0; overflow:hidden; display:flex; align-items:center; justify-content:center; color:var(--text-3); transition:height .2s var(--ease); }
  .m-ptr .spin{ width:20px; height:20px; border:2px solid var(--border-strong); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .m-row{ position:relative; overflow:hidden; }
  .m-row__actions{ position:absolute; top:0; bottom:0; display:flex; align-items:center; }
  .m-row__actions.left{ left:0; }
  .m-row__actions.right{ right:0; }
  .swipe-act{ width:64px; align-self:stretch; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:#fff; font-size:10px; font-weight:600; border:none; }
  .swipe-act svg{ width:19px; height:19px; }
  .sa-call{ background:#2E7D46; } .sa-wa{ background:#1D9E5A; } .sa-note{ background:#5B7B8C; }
  .sa-tag{ background:var(--gold); color:#0A0A0A; } .sa-stage{ background:#7C6BB0; } .sa-arch{ background:#8C4A4A; }

  .m-card{ position:relative; z-index:1; display:flex; gap:13px; padding:13px 18px; background:var(--bg-0); border-bottom:1px solid var(--border-soft); transition:transform .28s var(--spring), background .15s; will-change:transform; }
  .m-card:active{ background:var(--bg-1); }
  .m-card.unread{ background:linear-gradient(135deg,rgba(200,164,90,.07),rgba(200,164,90,.02)); border-left:3px solid var(--gold); }
  .m-card.flash-new{ animation:flash-gold .9s ease-out forwards; }
  .m-card__prio{ position:absolute; left:0; top:9px; bottom:9px; width:3px; border-radius:0 3px 3px 0; }
  .m-avatar{ position:relative; width:52px; height:52px; border-radius:16px; display:grid; place-items:center; color:#fff; font-weight:600; font-size:18px; flex-shrink:0; overflow:hidden; }
  .m-avatar img{ width:100%; height:100%; object-fit:cover; }
  .m-avatar__st{ position:absolute; right:-1px; bottom:-1px; width:14px; height:14px; border-radius:50%; border:2.5px solid var(--bg-0); }
  .m-card__body{ flex:1; min-width:0; }
  .m-card__l1{ display:flex; align-items:center; gap:8px; }
  .m-card__name{ font-size:15px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .m-card__time{ font-size:11.5px; color:var(--text-3); flex-shrink:0; }
  .m-card.unread .m-card__time{ color:var(--gold); font-weight:600; }
  .m-card__l2{ display:flex; align-items:center; gap:8px; margin-top:3px; }
  .m-card__msg{ flex:1; min-width:0; font-size:13.5px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .m-card.unread .m-card__msg{ color:var(--text-2); font-weight:500; }
  .m-badge{ min-width:20px; height:20px; padding:0 6px; border-radius:999px; background:var(--gold); color:#0A0A0A; font-size:11px; font-weight:700; display:grid; place-items:center; flex-shrink:0; }
  .m-card__l3{ display:flex; align-items:center; gap:6px; margin-top:7px; flex-wrap:wrap; }
  .m-tag{ font-size:10px; font-weight:600; padding:2px 8px; border-radius:999px; letter-spacing:.03em; }
  .m-vendor{ font-size:10px; font-weight:500; padding:2px 7px; border-radius:999px; background:rgba(200,164,90,.12); color:var(--gold); border:1px solid rgba(200,164,90,.25); display:inline-flex; align-items:center; gap:3px; letter-spacing:.02em; }
  .m-meta{ font-size:10.5px; color:var(--text-3); display:inline-flex; align-items:center; gap:3px; }
  .m-meta svg{ width:11px; height:11px; opacity:.7; }
  .m-score{ margin-left:auto; display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700; color:var(--gold); }
  .m-score .bar{ width:34px; height:4px; border-radius:2px; background:var(--bg-4); overflow:hidden; }
  .m-score .bar i{ display:block; height:100%; background:linear-gradient(90deg,var(--green),var(--gold)); }

  .t-interesado{ background:var(--blue-soft); color:var(--blue); } .t-negociacion{ background:var(--gold-soft); color:var(--gold); }
  .t-cita{ background:var(--amber-soft); color:var(--amber); } .t-vendido{ background:var(--green-soft); color:#83B778; }
  .t-no_interesado{ background:var(--red-soft); color:#FF8A8E; } .t-sin_clasificar{ background:var(--bg-3); color:var(--text-3); }
  .st-disponible{ background:#57C168; } .st-esperando{ background:var(--amber); } .st-inactivo{ background:var(--text-4); } .st-caliente{ background:var(--red); }

  /* ── FAB ── */
  .m-fab{ position:absolute; right:18px; bottom:calc(var(--nav-h) + var(--safe-b) + 14px); width:56px; height:56px; border-radius:19px; background:linear-gradient(140deg,#E8C86A,var(--gold) 60%,#B08D42); color:#0A0A0A; border:none; display:grid; place-items:center; box-shadow:0 10px 30px rgba(200,164,90,.35), inset 0 1px 0 rgba(255,255,255,.3); z-index:15; transition:transform .18s var(--spring); }
  .m-fab:active{ transform:scale(.9); }
  .m-fab svg{ width:26px; height:26px; }

  /* ── Bottom Navigation (glass) ── */
  .m-nav{ position:absolute; left:0; right:0; bottom:0; height:calc(var(--nav-h) + var(--safe-b)); padding-bottom:var(--safe-b); display:flex; background:var(--glass); backdrop-filter:saturate(1.4) blur(22px); -webkit-backdrop-filter:saturate(1.4) blur(22px); border-top:1px solid var(--border-soft); z-index:14; }
  .m-nav__i{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--text-3); background:none; border:none; font-size:10px; font-weight:500; transition:color .2s; position:relative; }
  .m-nav__i svg{ width:23px; height:23px; transition:transform .25s var(--spring); }
  .m-nav__i.active{ color:var(--gold); }
  .m-nav__i.active svg{ transform:translateY(-2px); }
  .m-nav__dot{ position:absolute; top:8px; right:calc(50% - 16px); min-width:8px; height:8px; border-radius:999px; background:var(--red); }

  /* ── Chat ── */
  .c-head{ display:flex; align-items:center; gap:11px; padding:calc(var(--safe-t) + 8px) 12px 8px; background:var(--glass); backdrop-filter:blur(20px) saturate(1.4); -webkit-backdrop-filter:blur(20px) saturate(1.4); border-bottom:1px solid var(--border-soft); }
  .c-back{ width:38px; height:38px; border-radius:50%; background:none; border:none; color:var(--text); display:grid; place-items:center; flex-shrink:0; }
  .c-back svg{ width:22px; height:22px; }
  .c-id{ display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
  .c-id .m-avatar{ width:38px; height:38px; border-radius:12px; font-size:14px; }
  .c-name{ font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .c-sub{ font-size:11.5px; color:var(--text-3); display:flex; align-items:center; gap:5px; }
  .c-acts{ display:flex; gap:2px; }
  .c-act{ width:38px; height:38px; border-radius:50%; background:none; border:none; color:var(--text-2); display:grid; place-items:center; }
  .c-act:active{ background:var(--bg-2); }
  .c-act svg{ width:20px; height:20px; }

  .c-msgs{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 14px 6px; display:flex; flex-direction:column; gap:3px; background:linear-gradient(180deg,var(--bg-0),#0C0C0C); }
  .c-date{ align-self:center; flex-shrink:0; font-size:11px; color:var(--text-3); background:var(--bg-2); border:1px solid var(--border-soft); padding:3px 12px; border-radius:999px; margin:8px 0; }
  .bub{ width:fit-content; max-width:80%; padding:9px 13px; border-radius:18px; font-size:14.5px; line-height:1.42; word-wrap:break-word; position:relative; animation:bubIn .28s var(--spring); }
  .bub--in{ margin-right:auto; background:var(--bg-3); border-bottom-left-radius:6px; }
  .bub--out{ margin-left:auto; background:linear-gradient(160deg,#1D4535,#153427); color:#EDF5F1; border-bottom-right-radius:6px; }
  @keyframes bubIn{ from{ opacity:0; transform:translateY(6px) scale(.98); } }
  .bub__t{ font-size:10.5px; opacity:.5; margin-top:3px; text-align:right; }
  .bub img,.bub video{ max-width:210px; border-radius:12px; display:block; }
  .bub audio{ width:210px; }
  .bub a.file{ color:inherit; text-decoration:underline; word-break:break-all; }
  .bub-quote{ border-left:3px solid var(--gold); padding:4px 8px; margin-bottom:6px; border-radius:4px; background:rgba(200,164,90,.08); font-size:12.5px; line-height:1.3; }
  .bub-quote span{ display:block; font-size:10px; color:var(--gold); font-weight:600; margin-bottom:2px; }
  .bub--out .bub-quote{ border-left-color:#83B778; }

  /* ── Input inteligente ── */
  .c-input{ padding:8px 12px calc(8px + var(--safe-b)); border-top:1px solid var(--border-soft); background:var(--bg-1); }
  .c-quick{ display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; }
  .c-quick button{ flex-shrink:0; height:30px; padding:0 13px; border-radius:999px; background:var(--bg-3); border:1px solid var(--border); color:var(--text-2); font-size:12px; }
  .c-input__row{ display:flex; align-items:flex-end; gap:8px; }
  .c-plus{ width:44px; height:44px; border-radius:50%; background:var(--bg-3); border:1px solid var(--border); color:var(--gold); display:grid; place-items:center; flex-shrink:0; transition:transform .25s var(--spring); }
  .c-plus.open{ transform:rotate(45deg); }
  .c-plus svg{ width:22px; height:22px; }
  .c-pill{ flex:1; display:flex; align-items:flex-end; background:var(--bg-3); border:1px solid var(--border); border-radius:22px; padding:2px 6px; min-height:44px; transition:border-color .2s; }
  .c-pill:focus-within{ border-color:var(--gold-line); }
  .c-pill textarea{ flex:1; border:none; background:none; outline:none; color:var(--text); font-size:15px; line-height:1.35; padding:11px 6px; max-height:110px; resize:none; }
  .c-pill textarea::placeholder{ color:var(--text-3); }
  .c-send{ width:44px; height:44px; border-radius:50%; background:linear-gradient(140deg,#E8C86A,var(--gold) 60%,#B08D42); color:#0A0A0A; border:none; display:grid; place-items:center; flex-shrink:0; transition:transform .15s var(--spring); }
  .c-send:active{ transform:scale(.88); }
  .c-send svg{ width:21px; height:21px; }

  /* ── Bottom Sheet (iOS) ── */
  .sheet-bg{ position:absolute; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); opacity:0; transition:opacity .3s var(--ease); z-index:40; pointer-events:none; }
  .sheet-bg.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; max-height:88%; background:var(--bg-1); border-radius:26px 26px 0 0; border-top:1px solid var(--border); box-shadow:0 -20px 50px rgba(0,0,0,.5); transform:translateY(100%); transition:transform .38s var(--spring); z-index:41; display:flex; flex-direction:column; padding-bottom:var(--safe-b); }
  .sheet.show{ transform:translateY(0); }
  .sheet__grab{ width:38px; height:5px; border-radius:3px; background:var(--border-strong); margin:10px auto 4px; flex-shrink:0; }
  .sheet__head{ display:flex; align-items:center; gap:10px; padding:6px 20px 12px; border-bottom:1px solid var(--border-soft); }
  .sheet__title{ font-family:var(--f-title); font-size:17px; font-weight:600; }
  .sheet__x{ margin-left:auto; width:30px; height:30px; border-radius:50%; background:var(--bg-3); border:1px solid var(--border); color:var(--text-2); display:grid; place-items:center; }
  .sheet__x svg{ width:14px; height:14px; }
  .sheet__body{ overflow-y:auto; padding:16px 20px 22px; }

  /* Grid de adjuntos */
  .att-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px 8px; }
  .att-i{ display:flex; flex-direction:column; align-items:center; gap:7px; background:none; border:none; color:var(--text-2); font-size:11px; }
  .att-i .ic{ width:56px; height:56px; border-radius:18px; background:var(--bg-3); border:1px solid var(--border-soft); display:grid; place-items:center; color:var(--gold); transition:transform .18s var(--spring); }
  .att-i:active .ic{ transform:scale(.9); }
  .att-i .ic svg{ width:24px; height:24px; }

  /* Perfil del lead */
  .lp-head{ display:flex; flex-direction:column; align-items:center; text-align:center; gap:9px; padding-bottom:16px; }
  .lp-head .m-avatar{ width:72px; height:72px; border-radius:22px; font-size:26px; }
  .lp-name{ font-family:var(--f-title); font-size:20px; font-weight:600; background:linear-gradient(135deg,var(--gold),#9E7E3C); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .lp-actions{ display:flex; gap:10px; margin-top:4px; }
  .lp-actions button{ width:46px; height:46px; border-radius:15px; background:var(--bg-3); border:1px solid var(--border-soft); color:var(--gold); display:grid; place-items:center; }
  .lp-actions button svg{ width:21px; height:21px; }
  .lp-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
  .lp-cell{ background:var(--bg-2); border:1px solid var(--border-soft); border-radius:14px; padding:11px 13px; }
  .lp-cell span{ display:block; font-size:10.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:3px; }
  .lp-cell strong{ font-size:14px; font-weight:600; }
  .lp-cell.mock strong{ color:var(--text-3); font-weight:400; }
  .lp-cell.wide{ grid-column:1/3; }
  .prob-wrap{ background:var(--bg-2); border:1px solid var(--border-soft); border-radius:16px; padding:14px; margin-top:12px; }
  .prob-top{ display:flex; align-items:baseline; justify-content:space-between; }
  .prob-num{ font-size:26px; font-weight:700; font-family:var(--f-num); }
  .prob-bar{ height:8px; border-radius:999px; background:var(--bg-4); overflow:hidden; margin-top:9px; }
  .prob-bar i{ display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--green),var(--gold)); }

  /* Timeline */
  .tl{ position:relative; padding-left:6px; }
  .tl-i{ display:flex; gap:13px; padding-bottom:16px; position:relative; }
  .tl-i:not(:last-child)::before{ content:''; position:absolute; left:14px; top:30px; bottom:0; width:1.5px; background:var(--border); }
  .tl-dot{ width:29px; height:29px; border-radius:10px; background:var(--bg-3); border:1px solid var(--border-strong); display:grid; place-items:center; color:var(--gold); flex-shrink:0; z-index:1; }
  .tl-dot svg{ width:15px; height:15px; }
  .tl-txt strong{ font-size:13.5px; font-weight:600; }
  .tl-txt span{ display:block; font-size:11.5px; color:var(--text-3); margin-top:2px; }

  /* Copiloto */
  .cop-badge{ display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gold); background:var(--gold-soft); border:1px solid var(--gold-line); padding:3px 9px; border-radius:999px; }
  .cop-card{ background:var(--bg-2); border:1px solid var(--border-soft); border-radius:16px; padding:13px; margin-bottom:11px; }
  .cop-card h5{ font-size:10.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:.1em; margin:0 0 7px; display:flex; align-items:center; gap:6px; }
  .cop-card h5 svg{ width:14px; height:14px; color:var(--gold); }
  .cop-card p{ margin:0; font-size:13.5px; line-height:1.5; color:var(--text-2); }
  .cop-sent{ display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#83B778; }
  .cop-obj{ display:flex; gap:8px; font-size:13px; color:var(--text-2); margin-bottom:6px; }
  .cop-obj::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--amber); margin-top:6px; flex-shrink:0; }
  .cop-use{ margin-top:9px; width:100%; height:40px; border-radius:13px; background:linear-gradient(140deg,#E8C86A,var(--gold) 60%,#B08D42); color:#0A0A0A; border:none; font-weight:700; font-size:13px; }

  /* Propiedades */
  .prop-scroll{ display:flex; gap:12px; overflow-x:auto; padding:2px 2px 8px; margin:0 -4px; }
  .prop-c{ flex-shrink:0; width:220px; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:18px; overflow:hidden; }
  .prop-c .ph{ height:120px; background:linear-gradient(135deg,#1a1a1a,#242424); display:grid; place-items:center; font-size:38px; }
  .prop-c .in{ padding:12px; }
  .prop-c .nm{ font-size:14px; font-weight:600; }

  .m-toast{ position:absolute; left:50%; bottom:calc(var(--nav-h) + var(--safe-b) + 20px); transform:translateX(-50%) translateY(20px); background:rgba(28,28,28,.95); backdrop-filter:blur(20px); border:1px solid var(--border-strong); color:var(--text); padding:11px 18px; border-radius:999px; font-size:13.5px; font-weight:500; box-shadow:var(--sh-3); opacity:0; transition:all .3s var(--spring); z-index:60; pointer-events:none; white-space:nowrap; }

  .m-unread-dot{ position:absolute; top:-1px; right:-1px; width:13px; height:13px; border-radius:50%; background:#34C759; border:2.5px solid var(--bg-0); z-index:3; animation:pulse-dot 2s ease-in-out infinite; }

  .c-reply{ display:none; align-items:center; gap:8px; padding:8px 12px; background:var(--bg-3); border-top:1px solid var(--border-soft); border-bottom:1px solid var(--border-soft); }

  .c-reply__x{ width:28px; height:28px; border-radius:50%; background:none; border:none; color:var(--text-3); display:grid; place-items:center; flex-shrink:0; cursor:pointer; }

  .chk{ vertical-align:middle; margin-left:3px; }

  .chk-delivered{ color:var(--text-2); }

  .chk-visto{ font-size:9.5px; color:var(--text-3); vertical-align:middle; }
  .link-preview{ margin:6px 0 2px; border-radius:12px; overflow:hidden; background:var(--bg-3); border:1px solid var(--border); cursor:pointer; transition:opacity .15s; }
  .link-preview:active{ opacity:.7; }
  .link-preview .lp-img{ width:100%; max-height:140px; overflow:hidden; background:var(--bg-1); }
  .link-preview .lp-img img{ width:100%; height:100%; object-fit:cover; }
  .link-preview .lp-body{ padding:8px 12px 10px; }
  .link-preview .lp-site{ font-size:10px; color:var(--text-3); text-transform:uppercase; letter-spacing:.06em; margin-bottom:2px; }
  .link-preview .lp-title{ font-size:13px; font-weight:600; color:var(--text); line-height:1.3; display:-webkit-box; -webkit-line-clamp:2; -webkit-box-orient:vertical; overflow:hidden; }

  .bub-body--trunc{ cursor:pointer; }

  .hidden{ display:none !important; }
  @media (min-width:900px){ #app{ max-width:440px; margin:0 auto; box-shadow:0 0 0 1px var(--border-soft); } }

function playNotifSound(){
  if(localStorage.getItem('sp_notif_sound')==='false') return;
  const custom=localStorage.getItem('sp_notif_sound_custom');
  if(custom){ try{ new Audio(custom).play(); }catch(e){} return; }
  try{
    const ac=new(window.AudioContext||window.webkitAudioContext)();
    const g=ac.createGain(); g.connect(ac.destination);
    g.gain.setValueAtTime(.25,ac.currentTime);
    g.gain.exponentialRampToValueAtTime(.01,ac.currentTime+.25);
    const o=ac.createOscillator(); o.type='sine';
    o.frequency.setValueAtTime(800,ac.currentTime);
    o.frequency.exponentialRampToValueAtTime(1100,ac.currentTime+.12);
    o.connect(g); o.start(); o.stop(ac.currentTime+.25);
  }catch(e){}
}
function urlBase64ToUint8Array(b){
  const s=b.replace(/-/g,'+').replace(/_/g,'/');
  const r=atob(s); const u=new Uint8Array(r.length);
  for(let i=0;i<r.length;i++) u[i]=r.charCodeAt(i);
  return u;
}
async function suscribirPush(){
  if(!('Notification'in window)||!('serviceWorker'in navigator)) return;
  if(Notification.permission==='denied') return;
  if(Notification.permission==='default'){
    const p=await Notification.requestPermission();
    if(p!=='granted') return;
  }
  try{
    const reg=await navigator.serviceWorker.ready;
    const kr=await api('/api/push/clave');
    if(!kr||!kr.publicKey) return;
    const key=urlBase64ToUint8Array(kr.publicKey);
    const sub=await reg.pushManager.subscribe({userVisibleOnly:true,applicationServerKey:key});
    await api('/api/push/suscribir',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({subscription:sub})});
  }catch(e){}
}
async function limpiarCache(){
  if('caches'in window){ const k=await caches.keys(); await Promise.all(k.map(x=>caches.delete(x))); }

}

function horaCorta(ts){ if(!ts) return ''; const d=new Date(String(ts).replace(' ','T')+'Z'); if(isNaN(d)) return ''; const h=new Date(); const sd=d.toDateString()===h.toDateString(); return sd? d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}) : d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit'}); }
function soloHora(ts){ if(!ts) return ''; const d=new Date(String(ts).replace(' ','T')+'Z'); return isNaN(d)?'':d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'}); }
function dateLabel(ts){ if(!ts) return ''; const d=new Date(String(ts).replace(' ','T')+'Z'); if(isNaN(d)) return ''; const h=new Date(), a=new Date(); a.setDate(h.getDate()-1); const sd=(x,y)=>x.toDateString()===y.toDateString(); if(sd(d,h)) return 'Hoy'; if(sd(d,a)) return 'Ayer'; return d.toLocaleDateString('es-CO',{day:'2-digit',month:'long'}); }

function leadScore(l){ let s=40; const e=l.etiqueta||''; if(e==='negociacion')s=88; else if(e==='cita')s=80; else if(e==='interesado')s=66; else if(e==='vendido')s=100; s+=Math.min(20,(l.messages_count||0)); return Math.min(99,s); }

async function api(url, opts){
  try{ const r = await fetch(url, Object.assign({credentials:'include', headers:{'Accept':'application/json'}}, opts||{})); if(!r.ok) return null; const ct=r.headers.get('content-type')||''; return ct.includes('json')? r.json() : r.text(); }
  catch(e){ return null; }
}

function apiUpload(url, body, pb){
  return new Promise((resolve,reject)=>{
    const xhr=new XMLHttpRequest();
    xhr.open('POST', url, true);
    xhr.setRequestHeader('Content-Type','application/json');
    xhr.withCredentials=true;
    xhr.upload.onprogress=e=>{ if(e.lengthComputable&&pb){ const f=pb.querySelector('#upFill'); if(f) f.style.width=Math.round(e.loaded/e.total*100)+'%'; } };
    xhr.onload=()=>{ try{ const r=JSON.parse(xhr.responseText); resolve(r); }catch(e){ resolve(null); } };
    xhr.onerror=()=>reject(new Error('upload failed'));
    xhr.send(JSON.stringify(body));
  });
}

/* ════════ Swipe horizontal ════════ */
function wireSwipe(row){
  const card=row.querySelector('.m-card'); let x0=0,y0=0,dx=0,drag=false,locked=null; const L=192,R=128;
  card.addEventListener('touchstart',e=>{ x0=e.touches[0].clientX; y0=e.touches[0].clientY; dx=0; drag=true; locked=null; card.style.transition='none'; },{passive:true});
  card.addEventListener('touchmove',e=>{ if(!drag) return; const cx=e.touches[0].clientX, cy=e.touches[0].clientY; if(locked===null){ locked = Math.abs(cx-x0)>Math.abs(cy-y0)+4 ? 'x':'y'; } if(locked!=='x') return; dx=cx-x0; dx=Math.max(-R,Math.min(L,dx)); card.style.transform=`translateX(${dx}px)`; },{passive:true});

  bub.addEventListener('touchmove',e=>{ if(!drag) return; dx=Math.min(0,e.touches[0].clientX-x0); if(dx<-50){ dx=-56; drag=false; bub.style.transition='transform .25s var(--spring)'; bub.style.transform='translateX(-56px)'; haptic(8); const t=setTimeout(()=>{ bub.style.transition='transform .3s var(--spring)'; bub.style.transform='translateX(0)'; clearTimeout(t); },600); setReply(wrap.dataset.msgid); return; } bub.style.transform='translateX('+dx+'px)'; },{passive:true});

/* ════════ Voice Recording — WhatsApp style (hold-to-record) ════════ */
let _rec=null, _recChunks=[], _recTimer=null, _recSec=0, _recCancelling=false;
function startGrabacion(){
  if(_rec) return; window._sending=false;
  _recSec=0; _recChunks=[]; _recCancelling=false; _recLocked=false;
  try{
    navigator.mediaDevices.getUserMedia({audio:true}).then(s=>{
      _rec=new MediaRecorder(s);
      _rec.ondataavailable=e=>{ if(e.data.size>0) _recChunks.push(e.data); };
      _rec.onstop=()=>{ s.getTracks().forEach(t=>t.stop()); };
      _rec.start(); haptic(20);
      $('#recBar').classList.add('show'); $('#cInput__row').classList.add('hidden');
      _recTimer=setInterval(()=>{ _recSec++; const m=Math.floor(_recSec/60); const seg=String(_recSec%60).padStart(2,'0'); const t=$('#recTime'); if(t) t.textContent=m+':'+seg; },1000);
    }).catch(()=>{ toast('Permiso de micrófono requerido'); console.error('getUserMedia fail'); });
  }catch(e){ console.error('startGrabacion',e); toast('Grabación no disponible'); }
}
function detenerGrabacion(){ if(!_rec) return; _rec.stop(); clearInterval(_recTimer); _rec=null; }
function cancelarGrabacion(){ _recCancelling=true; detenerGrabacion(); _recChunks=[]; _recSec=0; limpiarRecUI(); }
async function enviarGrabacion(){ if(!_rec||_recChunks.length===0) return; haptic([10,20]); const dot=$('#recDot'); if(dot) dot.style.background='var(--gold)';
  clearInterval(_recTimer); _recTimer=null; _rec.stop();
  await new Promise(r=>{ const orig=_rec.onstop; _rec.onstop=()=>{ if(orig) orig(); r(); }; });
  const blob=new Blob(_recChunks,{type:'audio/ogg; codecs=opus'}); const toBase64=f=>new Promise((res,rej)=>{ const r2=new FileReader(); r2.onload=()=>res(r2.result.split(',')[1]); r2.onerror=rej; r2.readAsDataURL(f); });
  const dataBase64=await toBase64(blob); const mediaBody={mime:'audio/ogg; codecs=opus',filename:'nota-voz.ogg',dataBase64,caption:''};
  if(replyTo) mediaBody.replyTo=replyTo.id;
  const r=await api(`/api/leads/${current.id}/responder-media`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(mediaBody)});
  cancelarReply(); _recChunks=[]; _recSec=0; limpiarRecUI();
  if(r!==null){ const d=await api(`/api/leads/${current.id}/mensajes`); if(d){ currentMsgs=d.mensajes; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight; } cargar(); toast('Audio enviado'); } else toast('Error al enviar audio');
}
function limpiarRecUI(){ _rec=null; _recChunks=[]; _recSec=0; _recCancelling=false; _recLocked=false; $('#recBar').classList.remove('show'); $('#cInput__row').classList.remove('hidden'); if(_recTimer){ clearInterval(_recTimer); _recTimer=null; } }
// Hold-to-record en el botón de micrófono (solo cuando no hay texto)
function wireHoldRecord(btn){
  let holdTimer=null, started=false, startY=0, moved=false;
  const isMic=()=>!($('#cInput').value||'').trim().length>0;
  function onTouchStart(e){
    if(!isMic()||_rec||window._sending) return;
    moved=false; startY=e.touches[0].clientY;
    holdTimer=setTimeout(()=>{
      holdTimer=null; started=true;
      startGrabacion();
      const bar=$('#recBar');
      if(bar){ bar.innerHTML=`<span class="rec-dot" id="recDot"></span><span class="rec-time" id="recTime">0:00</span><span class="rec-lock" id="recLock">${I(SVG.lock,13)}</span><span class="rec-swipe" id="recSwipe">${I(SVG.arrowUp,14)} Desliza para cancelar</span>`; }
    },200);
  }
  function onTouchMove(e){
    if(holdTimer&&!started){ clearTimeout(holdTimer); holdTimer=null; return; }
    if(!started||!_rec) return;
    const dy=startY-e.touches[0].clientY;
    if(dy>40&&!_recCancelling){
      _recCancelling=true; haptic(12);
      const sw=$('#recSwipe'); if(sw) sw.innerHTML=`${I(SVG.x,16)} Cancelar`;
      const lk=$('#recLock'); if(lk) lk.style.opacity='.3';
    } else if(dy<20&&_recCancelling){
      _recCancelling=false;
      const sw=$('#recSwipe'); if(sw) sw.innerHTML=`${I(SVG.arrowUp,14)} Desliza para cancelar`;
      const lk=$('#recLock'); if(lk) lk.style.opacity='1';
    }
  }
  function onTouchEnd(){
    if(holdTimer){ clearTimeout(holdTimer); holdTimer=null; started=false; return; }
    if(!started||!_rec) return;
    started=false;
    if(_recCancelling){ _recCancelling=false; cancelarGrabacion(); toast('Grabación cancelada'); }
    else enviarGrabacion();
  }
  btn.addEventListener('touchstart',onTouchStart,{passive:true});
  btn.addEventListener('touchmove',onTouchMove,{passive:true});
  btn.addEventListener('touchend',onTouchEnd);
}

async function selDelete(msgId, mode){

function wireMsgLongPress(wrap){
  if(wrap._lp) return; wrap._lp=true;
  const bub=wrap.querySelector('.bub'); if(!bub) return;
  let timer=null, sx=0,sy=0;
  function onStart(e){
    if(selMode){ toggleSel(wrap.dataset.msgid); return; }
    if(_editingMsg) return; // no abrir menú mientras se edita
    const touch=e.touches[0]; sx=touch.clientX; sy=touch.clientY;
    timer=setTimeout(()=>{
      timer=null; haptic(12); showCtxMenu(wrap.dataset.msgid);
    },400);
  }
  function onMove(e){
    if(timer){ const dx=Math.abs(e.touches[0].clientX-sx),dy=Math.abs(e.touches[0].clientY-sy); if(dx>10||dy>10){ clearTimeout(timer); timer=null; } }
  }
  function onEnd(){
    if(timer){ clearTimeout(timer); timer=null; }
  }
  bub.addEventListener('touchstart',onStart,{passive:true});
  bub.addEventListener('touchmove',onMove,{passive:true});
  bub.addEventListener('touchend',onEnd);
}

async function enviar(){ const inp=$('#cInput'); const msg=(inp.value||'').trim(); if(!msg||!current||window._sending) return; window._sending=true; haptic([10,20,10]);
  const sendBtn=$('#cSend'); if(sendBtn) sendBtn.disabled=true;
  if(_editingMsg){
    // Modo edición

    } else toast('Error al editar');
    cancelEdit(); inp.value=''; inp.style.height='auto'; updateSend(); cancelarReply(); window._sending=false; if(sendBtn) sendBtn.disabled=false; return;
  }
  if(DEMO){ currentMsgs.push({id:Date.now(),body:msg,direction:'outgoing',timestamp:new Date().toISOString().slice(0,19).replace('T',' ')}); inp.value=''; inp.style.height='auto'; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight; updateSend(); window._sending=false; if(sendBtn) sendBtn.disabled=false; return; }
  // Optimistic — mostrar mensaje inmediatamente
  const tempId = 'temp_'+Date.now();
  const tempMsg = {id:tempId,body:msg,direction:'outgoing',timestamp:new Date().toISOString().slice(0,19).replace('T',' ')};
  currentMsgs.push(tempMsg);
  inp.value=''; inp.style.height='auto'; updateSend();
  $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight;
  const body = replyTo ? {mensaje:msg, replyTo:replyTo.id} : {mensaje:msg};
  const r=await api(`/api/leads/${current.id}/responder`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  cancelarReply();
  if(r!==null){
    const d=await api(`/api/leads/${current.id}/mensajes`);
    if(d){ currentMsgs=d.mensajes; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); b.scrollTop=b.scrollHeight; }
    cargar();
  } else {
    // Falló — quitar mensaje optimista y restaurar texto

    $('#cMsgs').innerHTML=msgsHTML(currentMsgs); b.scrollTop=b.scrollHeight;
    toast('Error al enviar. Toca enviar para reintentar.');
  }
  window._sending=false; if(sendBtn) sendBtn.disabled=false;
}

function initFileInput(){
  const fi=document.createElement('input'); fi.type='file'; fi.id='fileInput'; fi.style.display='none'; fi.accept='image/*,video/*,.pdf,.doc,.docx';
  fi.onchange=async()=>{ const file=fi.files[0]; if(!file||!current) return; fi.value=''; haptic(10);
    const toBase64=f=>new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(f); });
    const dataBase64=await toBase64(file); const mime=file.type||'application/octet-stream';
    closeSheet();
    const pb=showProgressBar();
    const mediaBody = {mime,filename:file.name,dataBase64,caption:''}; if(replyTo) mediaBody.replyTo=replyTo.id;
    try{
      const r=await apiUpload(`/api/leads/${current.id}/responder-media`,mediaBody,pb);
      cancelarReply();
      if(r!==null){ const d=await api(`/api/leads/${current.id}/mensajes`); if(d){ currentMsgs=d.mensajes; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight; } cargar(); toast('Enviado'); } else toast('Error al enviar archivo');

    pb.remove();
  };
  document.body.appendChild(fi);
}

function exportarConversacion(){
  if(!current||!currentMsgs||!currentMsgs.length){ toast('Sin mensajes'); return; }
  const nombre=current.customer_name||'Cliente';
  const lines=currentMsgs.filter(m=>!m.deleted_for_sender).map(m=>{
    const who=m.direction==='incoming'?'Cliente':'Tú';
    const ts=m.timestamp?new Date(m.timestamp).toLocaleString('es-CO'):'';
    const body=m.media_type?`[${m.media_type}]`:m.body||'';
    return `[${ts}] ${who}: ${body}`;
  });
  const txt='Conversación con '+nombre+'\n'+'='.repeat(30)+'\n\n'+lines.join('\n');
  try{ navigator.clipboard.writeText(txt); toast('Copiado al portapapeles'); }catch(e){ toast('No se pudo exportar'); }

/* ════════ Interacciones globales ════════ */
function wire(){
  $('#q').addEventListener('input',e=>{ term=e.target.value.trim(); renderList(); });
  $('#filters').addEventListener('click',e=>{ const b=e.target.closest('[data-f]'); if(!b) return; filtro=b.dataset.f; haptic(8); renderList(); });
  $('#fab').onclick=()=>abrirNuevoLead();
  $('#btnNotif').onclick=()=>abrirNotificaciones();
  $('#sheetX').onclick=closeSheet; $('#sheetBg').onclick=closeSheet;
  // Logout desde tab Perfil (long-press)
  const perfNav=$('[data-tab="perfil"]');
  if(perfNav){ let pt; perfNav.addEventListener('touchstart',()=>{ pt=setTimeout(()=>{ pt=null; $('#btnLogout')?.click(); },600); },{passive:true}); perfNav.addEventListener('touchend',()=>{ if(pt){ clearTimeout(pt); pt=null; } },{passive:true}); perfNav.addEventListener('touchmove',()=>{ if(pt){ clearTimeout(pt); pt=null; } },{passive:true}); }
  // Logout
  document.addEventListener('click', e=>{
    const btn=e.target.closest('#btnLogout');
    if(btn){ haptic(12); openSheet('Cerrar sesión', `
      <div style="text-align:center;padding:10px 0">
        <div style="font-size:40px;margin-bottom:10px">${I('M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9',32)}</div>
        <div style="font-size:16px;font-weight:600;margin-bottom:6px">¿Cerrar sesión?</div>
        <div style="font-size:13px;color:var(--text-3);margin-bottom:20px">Volverás a la pantalla de inicio</div>
        <div style="display:flex;gap:10px">
          <button class="cop-use" style="flex:1;background:var(--bg-3);color:var(--text);border:1px solid var(--border)" id="logoutCancel">Cancelar</button>
          <button class="cop-use" style="flex:1;background:var(--red);color:#fff" id="logoutConfirm">Salir</button>
        </div>
      </div>`);
      $('#logoutCancel').onclick=closeSheet;
      $('#logoutConfirm').onclick=()=>{ closeSheet(); fetch('/api/logout',{method:'POST',credentials:'include'}).catch(()=>{}); location.href='/login.html'; };
    }
  });
  // Pull to refresh
  const sc=$('#list'); let sy=0,pull=0,at=false;
  sc.addEventListener('touchstart',e=>{ at=sc.scrollTop<=0; sy=e.touches[0].clientY; pull=0; },{passive:true});
  sc.addEventListener('touchmove',e=>{ if(!at) return; pull=Math.max(0,Math.min(70,e.touches[0].clientY-sy)); const p=$('#ptr'); if(p&&pull>0) p.style.height=pull+'px'; },{passive:true});
  sc.addEventListener('touchend',async()=>{ if(pull>50){ haptic(12); await (DEMO?Promise.resolve():cargar()); } const p=$('#ptr'); if(p) p.style.height='0'; pull=0; });
  // Flash animation cleanup
  document.addEventListener('animationend',e=>{ if(e.target.classList.contains('flash-new')) e.target.classList.remove('flash-new'); });
}

function abrirNotificaciones(){ haptic(8);
  const sinResp = leads.filter(l => Number(l.unread_count||0) > 0 && !l.muted_at).slice(0,10);
  const items = sinResp.length ? sinResp.map(l=>[l.unread_count>0?'chat':'bell',`${esc(l.customer_name||'Cliente')} — ${l.unread_count||0} mensaje(s) sin responder`,horaCorta(l.updated_at||l.created_at),'var(--red)']) : [['bell','Sin notificaciones nuevas','','var(--text-3)']];
  openSheet('Notificaciones', items.map(([ic,t,s,c])=>`<div class="tl-i" style="padding-bottom:14px"><div class="tl-dot" style="color:${c}">${I(SVG[ic]||SVG.bell,15)}</div><div class="tl-txt"><strong>${t}</strong><span>${s}</span></div></div>`).join(''));
}

async function cargarMisTpl(){
  const box=document.getElementById('secMisTpl'); if(!box) return;
  const data=await api('/api/mis-templates');
  if(!data||!data.length){
    box.innerHTML='<div class="sec-row"><button class="sec-btn" id="btnAddTpl" style="color:var(--gold)">+ Agregar respuesta</button></div>';
  } else {
    box.innerHTML=data.map(t=>`<div style="display:flex;align-items:center;gap:6px;padding:10px 16px;border-bottom:1px solid var(--border-soft)"><div style="flex:1;min-width:0"><div style="font-size:12px;font-weight:600;color:var(--gold)">${esc(t.titulo)}</div><div style="font-size:12px;color:var(--text-3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${esc(t.cuerpo)}</div></div><button class="tpl-del" data-id="${t.id}" style="width:28px;height:28px;border-radius:50%;background:none;border:none;color:var(--red);display:grid;place-items:center">${I(SVG.x,14)}</button></div>`).join('')+
      '<div style="padding:8px 16px"><button class="sec-btn" id="btnAddTpl" style="color:var(--gold)">+ Agregar respuesta</button></div>';
  }
  const addBtn=document.getElementById('btnAddTpl');
  if(addBtn) addBtn.onclick=()=>{
    openSheet('Nueva respuesta', `
      <div style="display:flex;flex-direction:column;gap:10px">
        <input id="ntTitulo" placeholder="Título (Ej: Precio lote)" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-3);color:var(--text);font-size:14px;outline:none">
        <textarea id="ntCuerpo" placeholder="Mensaje de respuesta..." style="width:100%;min-height:80px;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-3);color:var(--text);font-size:14px;outline:none;resize:none"></textarea>
        <button class="cop-use" id="ntSave">Guardar</button>
      </div>`);
    $('#ntSave').onclick=async()=>{
      const titulo=$('#ntTitulo').value.trim(); const cuerpo=$('#ntCuerpo').value.trim();
      if(!titulo||!cuerpo){ toast('Completa título y mensaje'); return; }
      const r=await api('/api/mis-templates',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo,cuerpo})});
      if(r){ toast('Respuesta guardada'); closeSheet(); cargarMisTpl(); } else toast('Error');
    };
  };
  box.querySelectorAll('.tpl-del').forEach(b=>b.onclick=async()=>{
    const id=b.dataset.id; const r=await api(`/api/mis-templates/${id}`,{method:'DELETE'});
    if(r){ toast('Eliminada'); cargarMisTpl(); } else toast('Error');
  });

/* ════════ Recordatorios ════════ */
function renderRecordatorios(){
  const box=document.getElementById('recList'); if(!box) return;
  const r=JSON.parse(localStorage.getItem('sp_records')||'[]');
  if(!r.length){ box.innerHTML='<div style="font-size:12px;color:var(--text-3);text-align:center;padding:10px">Sin recordatorios</div>'; return; }
  box.innerHTML=r.map(x=>`<div class="sch-item"><span class="sch-time">${new Date(x.dt).toLocaleString('es-CO',{month:'2-digit',day:'2-digit',hour:'2-digit',minute:'2-digit'})}</span><span class="sch-body">${esc(x.txt)}</span><button class="sch-del" data-rec="${x.id}">${I(SVG.x,14)}</button></div>`).join('');
  box.querySelectorAll('[data-rec]').forEach(b=>b.onclick=()=>{ const id=Number(b.dataset.rec); let r=JSON.parse(localStorage.getItem('sp_records')||'[]'); r=r.filter(x=>x.id!==id); localStorage.setItem('sp_records',JSON.stringify(r)); renderRecordatorios(); });
}
let _recCheckInterval=null;
function initRecordatorios(){
  if(_recCheckInterval) clearInterval(_recCheckInterval);
  _recCheckInterval=setInterval(()=>{
    const r=JSON.parse(localStorage.getItem('sp_records')||'[]'); if(!r.length) return; const now=new Date(); const pend=[];
    r.forEach(x=>{ if(new Date(x.dt)<=now) pend.push(x); });
    if(!pend.length) return;
    pend.forEach(x=>{ toast('🔔 '+x.txt); if(Notification.permission==='granted') new Notification('SP OS Recordatorio',{body:x.txt}); });
    localStorage.setItem('sp_records',JSON.stringify(r.filter(x=>!pend.includes(x))));
    renderRecordatorios();
  },15000);
}

  renderPropiedades();
  const q=document.getElementById('propQ');
  if(q) q.addEventListener('input', function(){ renderPropiedades(this.value); });
}
function renderPropiedades(q){
  const box=document.getElementById('propList'); if(!box) return;
  let items=_props; if(q){ const t=q.toLowerCase(); items=items.filter(p=>p.nombre.toLowerCase().includes(t)||(p.ciudad||'').toLowerCase().includes(t)); }
  if(!items.length){ box.innerHTML='<div class="m-empty"><div class="ic">'+I(SVG.building,28)+'</div><h3>Sin propiedades</h3><p>No hay propiedades disponibles aún.</p></div>'; return; }
  box.innerHTML='<div class="prop-scroll" style="flex-wrap:wrap;overflow-x:hidden;gap:12px;justify-content:center">'+items.map(p=>`<div class="prop-c" style="flex:none;width:100%;max-width:340px"><div class="ph" style="${p.imagen_url?`background-image:url(${esc(p.imagen_url)});background-size:cover;background-position:center`:'background:linear-gradient(135deg,#1a1a1a,#242424)'}">${p.imagen_url?'':p.tipo==='lote'?'🏡':p.tipo==='casa'?'🏠':'🏢'}</div><div class="in"><div class="nm">${esc(p.nombre)}</div><div class="lo">${I(SVG.mapPin,11)} ${esc(p.ciudad||'—')} · ${p.m2} m²</div><div class="pr">${money(p.precio)}</div><div class="ft"><span class="mt" style="${p.estado==='disponible'?'background:var(--green-soft);color:#83B778':p.estado==='reservado'?'background:var(--gold-soft);color:var(--gold)':'background:var(--red-soft);color:#FF8A8E'}">${p.estado}</span></div></div></div>`).join('')+'</div>';
}

/* ════════ Tareas tab ════════ */
async function cargarTareas(){
  const box=document.getElementById('taskList'); if(!box) return;
  const d=await api('/api/citas'); if(!d||!d.length){ box.innerHTML='<div style="text-align:center;color:var(--text-3);padding:20px">Sin tareas pendientes</div>'; } else {
    box.innerHTML=d.sort((a,b)=>new Date(b.fecha)-new Date(a.fecha)).map(t=>`<div style="display:flex;align-items:center;gap:10px;padding:10px 0;border-bottom:1px solid var(--border-soft)"><button class="task-toggle" data-id="${t.id}" style="width:24px;height:24px;border-radius:6px;border:2px solid ${t.estado==='hecha'?'var(--green)':'var(--border-strong)'};background:${t.estado==='hecha'?'var(--green)':'transparent'};display:grid;place-items:center;flex-shrink:0;color:#0A0A0A;${t.estado==='hecha'?'':'color:transparent'}">${I(SVG.check,14)}</button><div style="flex:1;min-width:0"><div style="font-size:13.5px;font-weight:500;${t.estado==='hecha'?'text-decoration:line-through;opacity:.5':''}">${esc(t.titulo)}</div><div style="font-size:11px;color:var(--text-3);margin-top:2px">${new Date(t.fecha).toLocaleString('es-CO',{day:'2-digit',month:'short',hour:'2-digit',minute:'2-digit'})}${t.lead_id?' · Lead #'+t.lead_id:''}</div></div><button class="task-del" data-id="${t.id}" style="width:28px;height:28px;border-radius:50%;background:none;border:none;color:var(--text-3);display:grid;place-items:center">${I(SVG.x,14)}</button></div>`).join('');
    box.querySelectorAll('.task-toggle').forEach(b=>b.onclick=async()=>{
      const id=b.dataset.id; const t=d.find(x=>String(x.id)===String(id)); if(!t) return; const nuevoEstado=t.estado==='hecha'?'pendiente':'hecha';
      await api('/api/citas/'+id,{method:'PUT',headers:{'Content-Type':'application/json'},body:JSON.stringify({estado:nuevoEstado})}); cargarTareas();
    });
    box.querySelectorAll('.task-del').forEach(b=>b.onclick=async()=>{ await api('/api/citas/'+b.dataset.id,{method:'DELETE'}); cargarTareas(); });
  }
  const addBtn=document.getElementById('taskAdd');
  if(addBtn) addBtn.onclick=async()=>{
    const txt=document.getElementById('taskTxt').value.trim(); if(!txt) return;
    await api('/api/citas',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({titulo:txt,fecha:new Date().toISOString().slice(0,19).replace('T',' '),notas:''})});
    document.getElementById('taskTxt').value=''; cargarTareas(); toast('Tarea creada');
  };
  document.getElementById('taskTxt')&&document.getElementById('taskTxt').addEventListener('keydown',e=>{ if(e.key==='Enter'){ e.preventDefault(); document.getElementById('taskAdd')&&document.getElementById('taskAdd').click(); } });
}

/* ════════ Tiempo real ════════ */
function conectarStream(){ try{ const es=new EventSource('/api/stream');
  es.addEventListener('nuevo_mensaje',async ev=>{ const old=leads; const d=await api('/api/mis-leads'); if(d) leads=d; const dot=$('#navDot'); if(dot) dot.style.display=''; const totalUnread=leads.reduce((s,l)=>s+Number(l.unread_count||0),0); try{ navigator.setAppBadge&&navigator.setAppBadge(totalUnread); }catch(e){} if(current&&$('#scChat').classList.contains('show')){ const dm=await api(`/api/leads/${current.id}/mensajes`); if(dm){ currentMsgs=dm.mensajes; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight; } } else { renderFilters(); updateCardBadges(); } try{ let x={}; try{x=JSON.parse(ev.data);}catch(e){} if(x.tipo==='mensaje_cliente'){ haptic([100,50,100]); playNotifSound(); } }catch(e){} });
  es.addEventListener('lead_actualizado',async ev=>{ const d=await api('/api/mis-leads'); if(d) leads=d; if(current&&$('#scChat').classList.contains('show')){ const dm=await api(`/api/leads/${current.id}/mensajes`); if(dm){ currentMsgs=dm.mensajes; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight; } } else { renderFilters(); updateCardBadges(); } });
  es.onerror=()=>{ es.close(); setTimeout(conectarStream,5000); };
  }catch(e){} }

/* ════════ Arranque (tras declarar todas las const) ════════ */
init();

})();
</script>
