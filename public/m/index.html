<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover, maximum-scale=1.0, user-scalable=no">
<meta name="theme-color" content="#0A0A0A">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SP OS">
<title>SP OS · Móvil</title>
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/os/sp-os.css">
<style>
  /* ══════════ SP OS · Mobile Experience ══════════ */
  :root{
    --safe-t: env(safe-area-inset-top, 0px);
    --safe-b: env(safe-area-inset-bottom, 0px);
    --nav-h: 62px;
    --glass: rgba(12,12,12,.72);
    --glass-2: rgba(20,20,20,.66);
    --spring: cubic-bezier(.22,1,.36,1);
    --ease: cubic-bezier(.4,0,.2,1);
  }
  *{ -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
  html,body{ height:100%; margin:0; background:var(--bg-0); color:var(--text); font-family:var(--f-ui); overscroll-behavior:none; }
  body{ -webkit-font-smoothing:antialiased; text-rendering:optimizeLegibility; }
  input,textarea,button{ font-family:inherit; }
  ::-webkit-scrollbar{ display:none; }
  * { scrollbar-width:none; }

  #app{ position:fixed; inset:0; overflow:hidden; }
  .screen{ position:absolute; inset:0; display:flex; flex-direction:column; background:var(--bg-0); }

  /* ── Transiciones de pantalla ── */
  .screen--chat{ transform:translateX(100%); transition:transform .34s var(--spring); z-index:20; will-change:transform; }
  .screen--chat.show{ transform:translateX(0); }

  /* ── Header (glass) ── */
  .m-head{ position:relative; z-index:5; padding:calc(var(--safe-t) + 10px) 18px 8px; background:var(--glass); backdrop-filter:saturate(1.4) blur(20px); -webkit-backdrop-filter:saturate(1.4) blur(20px); border-bottom:1px solid var(--border-soft); }
  .m-head__top{ display:flex; align-items:center; gap:11px; margin-bottom:12px; }
  .m-mark{ width:34px; height:34px; border-radius:11px; background:linear-gradient(140deg,#E8C86A,var(--gold) 55%,#9E7E3C); display:grid; place-items:center; color:#0A0A0A; font-weight:700; font-size:14px; font-family:var(--f-title); box-shadow:0 4px 16px rgba(200,164,90,.28); flex-shrink:0; }
  .m-title{ font-family:var(--f-title); font-size:19px; font-weight:600; letter-spacing:.02em; }
  .m-title small{ display:block; font-family:var(--f-ui); font-size:11px; letter-spacing:.14em; text-transform:uppercase; color:var(--text-3); font-weight:500; margin-top:1px; }
  .m-headbtn{ margin-left:auto; width:38px; height:38px; border-radius:50%; background:var(--bg-2); border:1px solid var(--border-soft); color:var(--text-2); display:grid; place-items:center; }
  .m-headbtn svg{ width:19px; height:19px; }

  /* ── Buscador ── */
  .m-search{ position:relative; display:flex; align-items:center; height:42px; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:14px; padding:0 12px; transition:border-color .2s, background .2s; }
  .m-search:focus-within{ border-color:var(--gold-line); background:var(--bg-3); }
  .m-search svg{ width:17px; height:17px; color:var(--text-3); flex-shrink:0; }
  .m-search input{ flex:1; border:none; background:none; outline:none; color:var(--text); font-size:15px; padding:0 10px; }
  .m-search input::placeholder{ color:var(--text-3); }

  /* ── Filtros ── */
  .m-filters{ display:flex; gap:7px; padding:12px 18px 4px; overflow-x:auto; }
  .m-chip{ flex-shrink:0; height:32px; padding:0 15px; border:1px solid var(--border); border-radius:999px; background:var(--bg-2); color:var(--text-3); font-size:12.5px; font-weight:500; display:flex; align-items:center; gap:6px; transition:all .2s var(--spring); }
  .m-chip.active{ background:var(--gold-soft); color:var(--gold); border-color:var(--gold-line); transform:scale(1.02); }
  .m-chip b{ font-weight:700; opacity:.7; }

  /* ── Lista ── */
  .m-scroll{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding-bottom:calc(var(--nav-h) + var(--safe-b) + 8px); }
  .m-ptr{ height:0; overflow:hidden; display:flex; align-items:center; justify-content:center; color:var(--text-3); transition:height .2s var(--ease); }
  .m-ptr .spin{ width:20px; height:20px; border:2px solid var(--border-strong); border-top-color:var(--gold); border-radius:50%; animation:spin .8s linear infinite; }
  @keyframes spin{ to{ transform:rotate(360deg); } }

  .m-row{ position:relative; overflow:hidden; }
  .m-row__actions{ position:absolute; top:0; bottom:0; display:flex; align-items:center; }
  .m-row__actions.left{ left:0; }
  .m-row__actions.right{ right:0; }
  .swipe-act{ width:64px; align-self:stretch; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:#fff; font-size:10px; font-weight:600; border:none; }
  .swipe-act svg{ width:19px; height:19px; }
  .sa-call{ background:#2E7D46; } .sa-wa{ background:#1D9E5A; } .sa-note{ background:#5B7B8C; }
  .sa-tag{ background:var(--gold); color:#0A0A0A; } .sa-stage{ background:#7C6BB0; } .sa-arch{ background:#8C4A4A; }

  .m-card{ position:relative; z-index:1; display:flex; gap:13px; padding:13px 18px; background:var(--bg-0); border-bottom:1px solid var(--border-soft); transition:transform .28s var(--spring), background .15s; will-change:transform; }
  .m-card:active{ background:var(--bg-1); }
  .m-card__prio{ position:absolute; left:0; top:9px; bottom:9px; width:3px; border-radius:0 3px 3px 0; }
  .m-avatar{ position:relative; width:52px; height:52px; border-radius:16px; display:grid; place-items:center; color:#fff; font-weight:600; font-size:18px; flex-shrink:0; overflow:hidden; }
  .m-avatar img{ width:100%; height:100%; object-fit:cover; }
  .m-avatar__st{ position:absolute; right:-1px; bottom:-1px; width:14px; height:14px; border-radius:50%; border:2.5px solid var(--bg-0); }
  .m-card__body{ flex:1; min-width:0; }
  .m-card__l1{ display:flex; align-items:center; gap:8px; }
  .m-card__name{ font-size:15px; font-weight:600; flex:1; min-width:0; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .m-card__time{ font-size:11.5px; color:var(--text-3); flex-shrink:0; }
  .m-card.unread .m-card__time{ color:var(--gold); font-weight:600; }
  .m-card__l2{ display:flex; align-items:center; gap:8px; margin-top:3px; }
  .m-card__msg{ flex:1; min-width:0; font-size:13.5px; color:var(--text-3); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .m-card.unread .m-card__msg{ color:var(--text-2); font-weight:500; }
  .m-badge{ min-width:20px; height:20px; padding:0 6px; border-radius:999px; background:var(--gold); color:#0A0A0A; font-size:11px; font-weight:700; display:grid; place-items:center; flex-shrink:0; }
  .m-card__l3{ display:flex; align-items:center; gap:6px; margin-top:7px; flex-wrap:wrap; }
  .m-tag{ font-size:10px; font-weight:600; padding:2px 8px; border-radius:999px; letter-spacing:.03em; }
  .m-meta{ font-size:10.5px; color:var(--text-3); display:inline-flex; align-items:center; gap:3px; }
  .m-meta svg{ width:11px; height:11px; opacity:.7; }
  .m-score{ margin-left:auto; display:inline-flex; align-items:center; gap:4px; font-size:10.5px; font-weight:700; color:var(--gold); }
  .m-score .bar{ width:34px; height:4px; border-radius:2px; background:var(--bg-4); overflow:hidden; }
  .m-score .bar i{ display:block; height:100%; background:linear-gradient(90deg,var(--green),var(--gold)); }

  .t-interesado{ background:var(--blue-soft); color:var(--blue); } .t-negociacion{ background:var(--gold-soft); color:var(--gold); }
  .t-cita{ background:var(--amber-soft); color:var(--amber); } .t-vendido{ background:var(--green-soft); color:#83B778; }
  .t-no_interesado{ background:var(--red-soft); color:#FF8A8E; } .t-sin_clasificar{ background:var(--bg-3); color:var(--text-3); }
  .st-disponible{ background:#57C168; } .st-esperando{ background:var(--amber); } .st-inactivo{ background:var(--text-4); } .st-caliente{ background:var(--red); }

  /* ── FAB ── */
  .m-fab{ position:absolute; right:18px; bottom:calc(var(--nav-h) + var(--safe-b) + 14px); width:56px; height:56px; border-radius:19px; background:linear-gradient(140deg,#E8C86A,var(--gold) 60%,#B08D42); color:#0A0A0A; border:none; display:grid; place-items:center; box-shadow:0 10px 30px rgba(200,164,90,.35), inset 0 1px 0 rgba(255,255,255,.3); z-index:15; transition:transform .18s var(--spring); }
  .m-fab:active{ transform:scale(.9); }
  .m-fab svg{ width:26px; height:26px; }

  /* ── Bottom Navigation (glass) ── */
  .m-nav{ position:absolute; left:0; right:0; bottom:0; height:calc(var(--nav-h) + var(--safe-b)); padding-bottom:var(--safe-b); display:flex; background:var(--glass); backdrop-filter:saturate(1.4) blur(22px); -webkit-backdrop-filter:saturate(1.4) blur(22px); border-top:1px solid var(--border-soft); z-index:14; }
  .m-nav__i{ flex:1; display:flex; flex-direction:column; align-items:center; justify-content:center; gap:3px; color:var(--text-3); background:none; border:none; font-size:10px; font-weight:500; transition:color .2s; position:relative; }
  .m-nav__i svg{ width:23px; height:23px; transition:transform .25s var(--spring); }
  .m-nav__i.active{ color:var(--gold); }
  .m-nav__i.active svg{ transform:translateY(-2px); }
  .m-nav__dot{ position:absolute; top:8px; right:calc(50% - 16px); min-width:8px; height:8px; border-radius:999px; background:var(--red); }

  /* ── Chat ── */
  .c-head{ display:flex; align-items:center; gap:11px; padding:calc(var(--safe-t) + 8px) 12px 8px; background:var(--glass); backdrop-filter:blur(20px) saturate(1.4); -webkit-backdrop-filter:blur(20px) saturate(1.4); border-bottom:1px solid var(--border-soft); }
  .c-back{ width:38px; height:38px; border-radius:50%; background:none; border:none; color:var(--text); display:grid; place-items:center; flex-shrink:0; }
  .c-back svg{ width:22px; height:22px; }
  .c-id{ display:flex; align-items:center; gap:10px; flex:1; min-width:0; }
  .c-id .m-avatar{ width:38px; height:38px; border-radius:12px; font-size:14px; }
  .c-name{ font-size:15px; font-weight:600; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
  .c-sub{ font-size:11.5px; color:var(--text-3); display:flex; align-items:center; gap:5px; }
  .c-acts{ display:flex; gap:2px; }
  .c-act{ width:38px; height:38px; border-radius:50%; background:none; border:none; color:var(--text-2); display:grid; place-items:center; }
  .c-act:active{ background:var(--bg-2); }
  .c-act svg{ width:20px; height:20px; }

  .c-msgs{ flex:1; overflow-y:auto; -webkit-overflow-scrolling:touch; padding:14px 14px 6px; display:flex; flex-direction:column; gap:3px; background:linear-gradient(180deg,var(--bg-0),#0C0C0C); }
  .c-date{ align-self:center; font-size:11px; color:var(--text-3); background:var(--bg-2); border:1px solid var(--border-soft); padding:3px 12px; border-radius:999px; margin:8px 0; }
  .bub{ max-width:80%; padding:9px 13px; border-radius:18px; font-size:14.5px; line-height:1.42; word-wrap:break-word; position:relative; animation:bubIn .28s var(--spring); }
  @keyframes bubIn{ from{ opacity:0; transform:translateY(6px) scale(.98); } }
  .bub--in{ align-self:flex-start; background:var(--bg-3); border-bottom-left-radius:6px; }
  .bub--out{ align-self:flex-end; background:linear-gradient(160deg,#1D4535,#153427); color:#EDF5F1; border-bottom-right-radius:6px; }
  .bub__t{ font-size:10.5px; opacity:.5; margin-top:3px; text-align:right; }
  .bub img,.bub video{ max-width:210px; border-radius:12px; display:block; }
  .bub audio{ width:210px; }
  .bub a.file{ color:inherit; text-decoration:underline; word-break:break-all; }
  .bub-quote{ border-left:3px solid var(--gold); padding:4px 8px; margin-bottom:6px; border-radius:4px; background:rgba(200,164,90,.08); font-size:12.5px; line-height:1.3; }
  .bub-quote span{ display:block; font-size:10px; color:var(--gold); font-weight:600; margin-bottom:2px; }
  .bub--out .bub-quote{ border-left-color:#83B778; }

  /* ── Input inteligente ── */
  .c-input{ padding:8px 12px calc(8px + var(--safe-b)); border-top:1px solid var(--border-soft); background:var(--bg-1); }
  .c-quick{ display:flex; gap:6px; overflow-x:auto; padding-bottom:8px; }
  .c-quick button{ flex-shrink:0; height:30px; padding:0 13px; border-radius:999px; background:var(--bg-3); border:1px solid var(--border); color:var(--text-2); font-size:12px; }
  .c-input__row{ display:flex; align-items:flex-end; gap:8px; }
  .c-plus{ width:44px; height:44px; border-radius:50%; background:var(--bg-3); border:1px solid var(--border); color:var(--gold); display:grid; place-items:center; flex-shrink:0; transition:transform .25s var(--spring); }
  .c-plus.open{ transform:rotate(45deg); }
  .c-plus svg{ width:22px; height:22px; }
  .c-pill{ flex:1; display:flex; align-items:flex-end; background:var(--bg-3); border:1px solid var(--border); border-radius:22px; padding:2px 6px; min-height:44px; transition:border-color .2s; }
  .c-pill:focus-within{ border-color:var(--gold-line); }
  .c-pill textarea{ flex:1; border:none; background:none; outline:none; color:var(--text); font-size:15px; line-height:1.35; padding:11px 6px; max-height:110px; resize:none; }
  .c-pill textarea::placeholder{ color:var(--text-3); }
  .c-send{ width:44px; height:44px; border-radius:50%; background:linear-gradient(140deg,#E8C86A,var(--gold) 60%,#B08D42); color:#0A0A0A; border:none; display:grid; place-items:center; flex-shrink:0; transition:transform .15s var(--spring); }
  .c-send:active{ transform:scale(.88); }
  .c-send svg{ width:21px; height:21px; }

  /* ── Bottom Sheet (iOS) ── */
  .sheet-bg{ position:absolute; inset:0; background:rgba(0,0,0,.5); backdrop-filter:blur(3px); -webkit-backdrop-filter:blur(3px); opacity:0; transition:opacity .3s var(--ease); z-index:40; pointer-events:none; }
  .sheet-bg.show{ opacity:1; pointer-events:auto; }
  .sheet{ position:absolute; left:0; right:0; bottom:0; max-height:88%; background:var(--bg-1); border-radius:26px 26px 0 0; border-top:1px solid var(--border); box-shadow:0 -20px 50px rgba(0,0,0,.5); transform:translateY(100%); transition:transform .38s var(--spring); z-index:41; display:flex; flex-direction:column; padding-bottom:var(--safe-b); }
  .sheet.show{ transform:translateY(0); }
  .sheet__grab{ width:38px; height:5px; border-radius:3px; background:var(--border-strong); margin:10px auto 4px; flex-shrink:0; }
  .sheet__head{ display:flex; align-items:center; gap:10px; padding:6px 20px 12px; border-bottom:1px solid var(--border-soft); }
  .sheet__title{ font-family:var(--f-title); font-size:17px; font-weight:600; }
  .sheet__x{ margin-left:auto; width:30px; height:30px; border-radius:50%; background:var(--bg-3); border:1px solid var(--border); color:var(--text-2); display:grid; place-items:center; }
  .sheet__x svg{ width:14px; height:14px; }
  .sheet__body{ overflow-y:auto; padding:16px 20px 22px; }

  /* Grid de adjuntos */
  .att-grid{ display:grid; grid-template-columns:repeat(4,1fr); gap:14px 8px; }
  .att-i{ display:flex; flex-direction:column; align-items:center; gap:7px; background:none; border:none; color:var(--text-2); font-size:11px; }
  .att-i .ic{ width:56px; height:56px; border-radius:18px; background:var(--bg-3); border:1px solid var(--border-soft); display:grid; place-items:center; color:var(--gold); transition:transform .18s var(--spring); }
  .att-i:active .ic{ transform:scale(.9); }
  .att-i .ic svg{ width:24px; height:24px; }

  /* Perfil del lead */
  .lp-head{ display:flex; flex-direction:column; align-items:center; text-align:center; gap:9px; padding-bottom:16px; }
  .lp-head .m-avatar{ width:72px; height:72px; border-radius:22px; font-size:26px; }
  .lp-name{ font-family:var(--f-title); font-size:20px; font-weight:600; background:linear-gradient(135deg,var(--gold),#9E7E3C); -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; }
  .lp-actions{ display:flex; gap:10px; margin-top:4px; }
  .lp-actions button{ width:46px; height:46px; border-radius:15px; background:var(--bg-3); border:1px solid var(--border-soft); color:var(--gold); display:grid; place-items:center; }
  .lp-actions button svg{ width:21px; height:21px; }
  .lp-grid{ display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:6px; }
  .lp-cell{ background:var(--bg-2); border:1px solid var(--border-soft); border-radius:14px; padding:11px 13px; }
  .lp-cell span{ display:block; font-size:10.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:.08em; margin-bottom:3px; }
  .lp-cell strong{ font-size:14px; font-weight:600; }
  .lp-cell.mock strong{ color:var(--text-3); font-weight:400; }
  .lp-cell.wide{ grid-column:1/3; }
  .prob-wrap{ background:var(--bg-2); border:1px solid var(--border-soft); border-radius:16px; padding:14px; margin-top:12px; }
  .prob-top{ display:flex; align-items:baseline; justify-content:space-between; }
  .prob-num{ font-size:26px; font-weight:700; font-family:var(--f-num); }
  .prob-bar{ height:8px; border-radius:999px; background:var(--bg-4); overflow:hidden; margin-top:9px; }
  .prob-bar i{ display:block; height:100%; border-radius:999px; background:linear-gradient(90deg,var(--green),var(--gold)); }

  /* Timeline */
  .tl{ position:relative; padding-left:6px; }
  .tl-i{ display:flex; gap:13px; padding-bottom:16px; position:relative; }
  .tl-i:not(:last-child)::before{ content:''; position:absolute; left:14px; top:30px; bottom:0; width:1.5px; background:var(--border); }
  .tl-dot{ width:29px; height:29px; border-radius:10px; background:var(--bg-3); border:1px solid var(--border-strong); display:grid; place-items:center; color:var(--gold); flex-shrink:0; z-index:1; }
  .tl-dot svg{ width:15px; height:15px; }
  .tl-txt strong{ font-size:13.5px; font-weight:600; }
  .tl-txt span{ display:block; font-size:11.5px; color:var(--text-3); margin-top:2px; }

  /* Copiloto */
  .cop-badge{ display:inline-flex; align-items:center; gap:5px; font-size:10px; font-weight:700; letter-spacing:.08em; text-transform:uppercase; color:var(--gold); background:var(--gold-soft); border:1px solid var(--gold-line); padding:3px 9px; border-radius:999px; }
  .cop-card{ background:var(--bg-2); border:1px solid var(--border-soft); border-radius:16px; padding:13px; margin-bottom:11px; }
  .cop-card h5{ font-size:10.5px; color:var(--text-3); text-transform:uppercase; letter-spacing:.1em; margin:0 0 7px; display:flex; align-items:center; gap:6px; }
  .cop-card h5 svg{ width:14px; height:14px; color:var(--gold); }
  .cop-card p{ margin:0; font-size:13.5px; line-height:1.5; color:var(--text-2); }
  .cop-sent{ display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#83B778; }
  .cop-obj{ display:flex; gap:8px; font-size:13px; color:var(--text-2); margin-bottom:6px; }
  .cop-obj::before{ content:''; width:6px; height:6px; border-radius:50%; background:var(--amber); margin-top:6px; flex-shrink:0; }
  .cop-use{ margin-top:9px; width:100%; height:40px; border-radius:13px; background:linear-gradient(140deg,#E8C86A,var(--gold) 60%,#B08D42); color:#0A0A0A; border:none; font-weight:700; font-size:13px; }

  /* Propiedades */
  .prop-scroll{ display:flex; gap:12px; overflow-x:auto; padding:2px 2px 8px; margin:0 -4px; }
  .prop-c{ flex-shrink:0; width:220px; background:var(--bg-2); border:1px solid var(--border-soft); border-radius:18px; overflow:hidden; }
  .prop-c .ph{ height:120px; background:linear-gradient(135deg,#1a1a1a,#242424); display:grid; place-items:center; font-size:38px; }
  .prop-c .in{ padding:12px; }
  .prop-c .nm{ font-size:14px; font-weight:600; }
  .prop-c .lo{ font-size:11.5px; color:var(--text-3); margin-top:2px; display:flex; align-items:center; gap:4px; }
  .prop-c .pr{ font-size:15px; font-weight:700; color:var(--gold); margin-top:6px; }
  .prop-c .ft{ display:flex; align-items:center; justify-content:space-between; margin-top:9px; }
  .prop-c .mt{ font-size:10.5px; font-weight:700; color:#83B778; background:var(--green-soft); padding:3px 8px; border-radius:999px; }

/* ════════ Swipe horizontal ════════ */
function wireSwipe(row){
  const card=row.querySelector('.m-card'); let x0=0,y0=0,dx=0,drag=false,locked=null; const L=192,R=128;
  card.addEventListener('touchstart',e=>{ x0=e.touches[0].clientX; y0=e.touches[0].clientY; dx=0; drag=true; locked=null; card.style.transition='none'; },{passive:true});
  card.addEventListener('touchmove',e=>{ if(!drag) return; const cx=e.touches[0].clientX, cy=e.touches[0].clientY; if(locked===null){ locked = Math.abs(cx-x0)>Math.abs(cy-y0)+4 ? 'x':'y'; } if(locked!=='x') return; dx=cx-x0; dx=Math.max(-R,Math.min(L,dx)); card.style.transform=`translateX(${dx}px)`; },{passive:true});
  card.addEventListener('touchend',()=>{ if(!drag) return; drag=false; card.style.transition='transform .3s var(--spring)'; let to=0; if(dx>60){ to=L; haptic(8); } else if(dx<-50){ to=-R; haptic(8); } card.style.transform=`translateX(${to}px)`; });
  row.querySelectorAll('.swipe-act').forEach(b=>b.addEventListener('click',e=>{ e.stopPropagation(); card.style.transform='translateX(0)'; swipeAction(b.dataset.a, row); }));
  card.addEventListener('click',()=>{ if(Math.abs(dx)>6){ card.style.transform='translateX(0)'; dx=0; return; } abrirChat(Number(card.dataset.open)); });
}
function swipeAction(a,row){ const id=Number(row.dataset.id); const phone=(row.dataset.phone||'').replace(/[^\d+]/g,''); const l=findLead(id); haptic(12);
  if(a==='call'){ if(phone) location.href='tel:'+phone; else toast('Sin número'); }
  else if(a==='note'){ current=l; abrirNota(); }
  else if(a==='tag'){ current=l; abrirEtapa(); }
  else if(a==='arch'){
    if(l){ toast('Archivando...'); api(`/api/leads/${id}/cerrar`,{method:'POST'}).then(async()=>{ toast('Archivado'); await cargarArchivados(); if(!showArchivados) cargar(); else renderList(); }); }
  }
  else if(a==='unread'){
    if(l){ api(`/api/leads/${id}/marcar-no-leido`,{method:'POST'}).then(()=>{ l.unread_count=1; renderList(); toast('Marcado como no leído'); }); }
  }
  else if(a==='unarch'){
    if(l){ toast('Restaurando...'); api(`/api/leads/${id}/desarchivar`,{method:'POST'}).then(async()=>{ await cargarArchivados(); if(showArchivados) renderList(); else { cargar(); } toast('Restaurado a bandeja principal'); }); }
  }
}

/* ════════ Swipe to reply ──── */
function wireMsgSwipe(wrap){ if(wrap._swipe) return; wrap._swipe=true;
  const bub=wrap.querySelector('.bub'); if(!bub) return;
  const actBtn=wrap.querySelector('.msg-reply-act'); if(!actBtn) return;
  let x0=0,dx=0,drag=false;
  bub.addEventListener('touchstart',e=>{ x0=e.touches[0].clientX; dx=0; drag=true; bub.style.transition='none'; wrap.style.overflow='visible'; },{passive:true});
  bub.addEventListener('touchmove',e=>{ if(!drag) return; dx=Math.min(0,e.touches[0].clientX-x0); if(dx<-50){ dx=-56; drag=false; bub.style.transition='transform .25s var(--spring)'; bub.style.transform='translateX(-56px)'; haptic(8); const t=setTimeout(()=>{ bub.style.transition='transform .3s var(--spring)'; bub.style.transform='translateX(0)'; clearTimeout(t); },600); setReply(wrap.dataset.msgid); return; } bub.style.transform='translateX('+dx+'px)'; },{passive:true});
  bub.addEventListener('touchend',()=>{ if(!drag) return; drag=false; bub.style.transition='transform .3s var(--spring)'; bub.style.transform='translateX(0)'; });
  actBtn.addEventListener('click',e=>{ e.stopPropagation(); setReply(wrap.dataset.msgid); });
}
function setReply(msgId){
  const m = currentMsgs.find(x=>String(x.id)===String(msgId)||String(x.id)===('temp_'+msgId));
  if(!m) return; replyTo=m; haptic(12);
  const bar=document.getElementById('cReply'); const lbl=document.getElementById('replyLabel'); const prev=document.getElementById('replyPreview');
  if(!bar||!lbl||!prev) return;
  const sender = m.direction!=='incoming' ? 'Tú' : (current?current.customer_name||'Cliente':'Cliente');
  let preview= m.reply_to_body ? '↳ '+(m.body||'') : (m.body||'');
  if(m.media_type){ const icons={'image':'🖼️','video':'🎬','audio':'🎙️','document':'📄'}; preview=icons[m.media_type]||'📎'; }
  lbl.textContent='Respondiendo a '+sender; prev.textContent=preview.slice(0,100); bar.classList.add('show');
  const inp=document.getElementById('cInput'); if(inp) inp.focus();
}
function cancelarReply(){ replyTo=null; const bar=document.getElementById('cReply'); if(bar) bar.classList.remove('show'); }

function msgsHTML(msgs){ if(!msgs||!msgs.length) return '<div class="m-empty" style="min-height:200px"><p>Sin mensajes todavía.</p></div>'; let h='',last='';
  for(const m of msgs){ const f=dateLabel(m.timestamp); if(f&&f!==last){ h+=`<div class="c-date">${f}</div>`; last=f; } const out=m.direction!=='incoming'; const wrapId='msg_'+m.id; h+=`<div class="msg-wrap" data-msgid="${m.id}" id="${wrapId}"><button class="msg-reply-act" data-r="${m.id}">${I(SVG.back,16)}Responder</button><div class="bub bub--${out?'out':'in'}">${msgInner(m)}<div class="bub__t">${soloHora(m.timestamp)}${out?' ✓✓':''}</div></div></div>`; }
  return h;
}
function msgInner(m){
  let quoteHTML='';
  if(m.reply_to_id && m.reply_to_body){ const icon=m.reply_to_media_type?{'image':'🖼️','video':'🎬','audio':'🎙️','document':'📄'}[m.reply_to_media_type]||'📎':''; const preview=icon+(m.reply_to_body||'').slice(0,80); const label=m.reply_to_direction!=='incoming'?'Tú':'Cliente'; quoteHTML=`<div class="bub-quote"><span>${esc(label)}</span>${esc(preview)}</div>`; }
  const content=m.media_type?renderMedia(m):esc(m.body||'');
  return quoteHTML+content;
}
function renderMedia(m){ const src=m.id?`/api/media/${m.id}`:''; if(m.media_type==='image'||m.media_type==='sticker') return src?`<img src="${src}" loading="lazy">`:'🖼️ Imagen'; if(m.media_type==='video') return src?`<video src="${src}" controls></video>`:'🎬 Video'; if(m.media_type==='audio') return src?`<audio src="${src}" controls></audio>`:'🎙️ Audio'; return `<a class="file" href="${src}" target="_blank">📄 ${esc(m.media_filename||'archivo')}</a>`; }

async function enviar(){ const inp=$('#cInput'); const msg=(inp.value||'').trim(); if(!msg||!current||window._sending) return; window._sending=true; haptic([10,20,10]);
  const sendBtn=$('#cSend'); if(sendBtn) sendBtn.disabled=true;
  if(DEMO){ currentMsgs.push({id:Date.now(),body:msg,direction:'outgoing',timestamp:new Date().toISOString().slice(0,19).replace('T',' ')}); inp.value=''; inp.style.height='auto'; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight; updateSend(); window._sending=false; if(sendBtn) sendBtn.disabled=false; return; }
  // Optimistic — mostrar mensaje inmediatamente
  const tempId = 'temp_'+Date.now();
  const tempMsg = {id:tempId,body:msg,direction:'outgoing',timestamp:new Date().toISOString().slice(0,19).replace('T',' ')};
  currentMsgs.push(tempMsg);
  inp.value=''; inp.style.height='auto'; updateSend();
  $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight;
  const body = replyTo ? {mensaje:msg, replyTo:replyTo.id} : {mensaje:msg};
  const r=await api(`/api/leads/${current.id}/responder`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  cancelarReply();
  if(r!==null){
    const d=await api(`/api/leads/${current.id}/mensajes`);
    if(d){ currentMsgs=d.mensajes; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); b.scrollTop=b.scrollHeight; }
    cargar();
  } else {
    // Falló — quitar mensaje optimista y restaurar texto
    currentMsgs = currentMsgs.filter(m => m.id !== tempId);
    inp.value = msg; inp.style.height='auto'; updateSend();
    $('#cMsgs').innerHTML=msgsHTML(currentMsgs); b.scrollTop=b.scrollHeight;
    toast('Error al enviar. Toca enviar para reintentar.');
  }
  window._sending=false; if(sendBtn) sendBtn.disabled=false;
}

    if(k==='call'&&p) location.href='tel:'+p; else if(k==='cal') toast('Agendar — próximamente'); else if(k==='tl'||k==='tl2') abrirTimeline(); else if(k==='cop') abrirCopiloto(); });
}

function abrirTimeline(){ const l=current;
  const msgs=currentMsgs||[];
  const ev=msgs.map(m=>({ic:'chat',t:(m.direction==='incoming'?'Cliente: ':'Tú: ')+esc(m.body||'[media]'),s:horaCorta(m.timestamp)}));
  if(!ev.length) ev.push({ic:'chat',t:'Sin actividad aún',s:''});
  openSheet('Timeline', `<div class="tl">${ev.map(({ic,t,s})=>`<div class="tl-i"><div class="tl-dot">${I(SVG[ic]||SVG.chat,15)}</div><div class="tl-txt"><strong>${t}</strong><span>${s}</span></div></div>`).join('')}</div>`);
}

function abrirCopiloto(){ const l=current; const nombre=l.customer_name||'Cliente'; const score=leadScore(l); const sug=`Hola ${nombre}, con gusto te resuelvo lo de la financiación: manejamos cuota inicial baja y plazos flexibles. ¿Agendamos una visita esta semana para que conozcas el lote?`;
  const proyecto = l.proyecto || 'nuestros proyectos';
  openSheet('Copiloto SP', `
    <div style="display:flex;justify-content:flex-end;margin-bottom:10px"><span class="cop-badge">${I(SVG.sparkles,11)} Fase IA</span></div>
    <div class="cop-card"><h5>${I(SVG.user,14)} Resumen</h5><p>${esc(nombre)} — ${l.messages_count||0} mensajes. Interesa en ${proyecto}. Conviene reforzar confianza y proponer visita.</p></div>
    <div class="cop-card"><h5>${I(SVG.target,14)} Sentimiento</h5><p class="cop-sent">${I(SVG.check,14)} Positivo · alta intención de compra</p></div>
    <div class="cop-card"><h5>${I(SVG.zap,14)} Objeciones</h5><div class="cop-obj">Duda sobre formas de pago / financiación.</div><div class="cop-obj">Quiere confirmar ubicación y legalidad.</div></div>
    <div class="cop-card"><h5>${I(SVG.checkSquare,14)} Probabilidad de cierre</h5><div style="display:flex;align-items:baseline;gap:10px"><span class="prob-num">${score}%</span><span style="font-size:12px;color:var(--text-3)">Mejor hora para responder: <b style="color:var(--gold)">6:00–8:00 PM</b></span></div><div class="prob-bar"><i style="width:${score}%"></i></div></div>
    <div class="cop-card"><h5>${I(SVG.chat,14)} Respuesta sugerida</h5><p id="copSug">${esc(sug)}</p><button class="cop-use" id="copUse">${I(SVG.sparkles,16)} Usar esta respuesta</button></div>
    <div class="cop-card"><h5>${I(SVG.building,14)} Propiedades recomendadas</h5>
      <div class="prop-scroll">${PROPS.map((p,i)=>`<div class="prop-c"><div class="ph">${p.emoji}</div><div class="in"><div class="nm">${p.nombre}</div><div class="lo">${I(SVG.mapPin,11)} ${p.ciudad} · ${p.m2} m²</div><div class="pr">${money(p.precio)}</div><div class="ft"><span class="mt">${p.match}% IA</span><button class="snd" data-prop="${i}">Enviar</button></div></div></div>`).join('')}</div>
    </div>`);
  $('#copUse').onclick=()=>{ if($('#scChat').classList.contains('show')){ const i=$('#cInput'); i.value=$('#copSug').textContent.trim(); updateSend(); } closeSheet(); haptic([10,20,10]); toast('Respuesta lista'); };
  $('#sheetBody').querySelectorAll('[data-prop]').forEach(b=>b.onclick=()=>{ const p=PROPS[b.dataset.prop]; if($('#scChat').classList.contains('show')){ const i=$('#cInput'); i.value=`Te recomiendo: ${p.nombre} — ${p.m2} m² por ${money(p.precio)}. ¿Más info o agendamos visita?`; updateSend(); } closeSheet(); haptic(10); toast('Propiedad lista para enviar'); });
}
const PROPS=[{emoji:'🏡',nombre:'Lote Campestre Tocaima',ciudad:'Tocaima',precio:48000000,m2:250,match:96},{emoji:'🏘️',nombre:'Parcelación Girardot',ciudad:'Girardot',precio:72000000,m2:320,match:88},{emoji:'🌄',nombre:'Lote Vista Valle',ciudad:'Melgar',precio:35000000,m2:180,match:79}];

function abrirNota(){ openSheet('Nota rápida', `<textarea id="ntx" class="c-pill" style="width:100%;min-height:120px;padding:14px;color:var(--text);background:var(--bg-3);border:1px solid var(--border);border-radius:14px;outline:none" placeholder="Ej: Llamar después de las 6 PM. Quiere financiación…"></textarea><button class="cop-use" id="ntok" style="margin-top:12px">Guardar nota</button>`);
  $('#ntok').onclick=async()=>{ const v=$('#ntx').value.trim(); if(!v) return; if(!DEMO&&current) await api(`/api/leads/${current.id}/notas`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({nota:v})}); haptic([10,20,10]); closeSheet(); toast('Nota guardada'); };
}
function abrirEtapa(){ const l=current; openSheet('Cambiar etapa', Object.entries(ETQ).map(([v,e])=>`<button class="lp-cell wide" style="display:flex;align-items:center;gap:10px;text-align:left;width:100%;margin-bottom:8px;color:var(--text)" data-etq="${v}"><span class="m-tag t-${e.cls}">${e.t}</span>${(l.etiqueta||'sin_clasificar')===v?'<span style="margin-left:auto;color:var(--gold)">✓</span>':''}</button>`).join(''));
  $('#sheetBody').querySelectorAll('[data-etq]').forEach(b=>b.onclick=async()=>{ const v=b.dataset.etq; if(!DEMO){ await api(`/api/leads/${l.id}/etiqueta`,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({etiqueta:v})}); } l.etiqueta=v; haptic([10,20,10]); closeSheet(); renderList(); if(!DEMO) cargar(); toast('Etapa actualizada'); });
}

function abrirNuevoLead(){
  openSheet('Nueva conversación', `
    <form id="nlForm" style="display:flex;flex-direction:column;gap:12px">
      <input name="phone" placeholder="Teléfono +573XXXXXXXXX" required inputmode="tel" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-3);color:var(--txt);font-size:15px;font-family:inherit;outline:none">
      <input name="name" placeholder="Nombre del cliente" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-3);color:var(--txt);font-size:15px;font-family:inherit;outline:none">
      <textarea name="message" placeholder="Mensaje inicial (opcional)" style="width:100%;min-height:60px;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-3);color:var(--txt);font-size:15px;font-family:inherit;outline:none;resize:none"></textarea>
      <button type="submit" class="cop-use" style="margin-top:4px">${I(SVG.send,16)} Iniciar conversación</button>
    </form>`);
  $('#nlForm').addEventListener('submit', async e=>{
    e.preventDefault(); const fd=new FormData(e.target); const phone=fd.get('phone').trim(); const name=fd.get('name').trim(); const message=fd.get('message').trim();
    if(!phone){ toast('Teléfono requerido','error'); return; }
    haptic(10); closeSheet(); toast('Creando lead...');
    const r=await api('/api/leads/proactive',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({phone,name:name||'Cliente',message:message||'Hola, me interesan sus proyectos'})});
    if(r&&r.leadId){ toast('Lead creado'); cargar(); } else toast('Error al crear lead','error');
  });
}

function abrirEditarPerfil(){
  const n = me || {};
  openSheet('Editar perfil', `
    <form id="editPerfilForm" style="display:flex;flex-direction:column;gap:14px">
      <div style="display:flex;flex-direction:column;align-items:center;gap:10px">
        <div class="m-avatar" id="editFotoPreview" style="width:80px;height:80px;border-radius:22px;font-size:30px;background:${avatarColor(n.nombre)};cursor:pointer;position:relative;overflow:hidden">
          ${n.foto ? `<img src="${n.foto}" alt="">` : initials(n.nombre)}
          <div style="position:absolute;inset:0;background:rgba(0,0,0,.4);display:grid;place-items:center;opacity:0;transition:opacity .2s;font-size:22px">📷</div>
        </div>
        <label style="font-size:12px;color:var(--text-3);cursor:pointer">Toca para cambiar foto
          <input type="file" id="editFotoInput" accept="image/*" style="display:none">
        </label>
      </div>
      <label style="font-size:12px;color:var(--text-3);font-weight:500">Nombre</label>
      <input name="nombre" value="${esc(n.nombre||'')}" style="width:100%;padding:14px;border-radius:12px;border:1px solid var(--border);background:var(--bg-3);color:var(--text);font-size:15px;font-family:inherit;outline:none" required>
      <button type="submit" class="cop-use" style="margin-top:4px">${I(SVG.check,16)} Guardar cambios</button>
    </form>`);
  // Preview foto al seleccionar
  const fi = document.getElementById('editFotoInput');
  if (fi) fi.addEventListener('change', function() {
    const file = this.files[0]; if (!file) return;
    const r = new FileReader();
    r.onload = function(e) {
      const prev = document.getElementById('editFotoPreview');
      if (prev) prev.innerHTML = '<img src="'+e.target.result+'" alt="">';
    };
    r.readAsDataURL(file);
  });
  // Submit
  const form = document.getElementById('editPerfilForm');
  if (form) form.addEventListener('submit', async function(e) {
    e.preventDefault(); haptic(10);
    const fd = new FormData(this);
    const nombre = fd.get('nombre').trim();
    if (!nombre) { toast('Nombre requerido','err'); return; }
    let ok = true;
    // Cambiar nombre
    const r = await api('/api/me/nombre', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ nombre }) });
    if (r) { me.nombre = nombre; toast('Nombre actualizado'); } else { ok = false; toast('Error al actualizar nombre','err'); }
    // Subir foto si se seleccionó
    const fotoFile = document.getElementById('editFotoInput').files[0];
    if (fotoFile && ok) {
      const toBase64 = f => new Promise((res,rej)=>{ const r=new FileReader(); r.onload=()=>res(r.result.split(',')[1]); r.onerror=rej; r.readAsDataURL(f); });
      const base64 = await toBase64(fotoFile);
      const fr = await api('/api/me/foto', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ foto:'data:image/jpeg;base64,'+base64 }) });
      if (fr) { me.foto = 'data:image/jpeg;base64,'+base64; toast('Foto actualizada'); } else { ok = false; toast('Error al subir foto','err'); }
    }
    closeSheet();
    if (ok) { irTab('perfil'); }
  });
}

/* ════════ Bottom Nav / tabs ════════ */
const TABS=[['chats','Chats',SVG.chat],['propiedades','Propiedades',SVG.building],['tareas','Tareas',SVG.checkSquare],['copiloto','Copiloto',SVG.sparkles],['perfil','Perfil',SVG.user]];
function renderNav(){ $('#nav').innerHTML = TABS.map(([k,l,ic])=>`<button class="m-nav__i ${k==='chats'?'active':''}" data-tab="${k}">${I(ic,23)}<span>${l}</span>${k==='chats'?'<span class="m-nav__dot" id="navDot" style="display:none"></span>':''}</button>`).join('');
  $('#nav').querySelectorAll('[data-tab]').forEach(b=>b.onclick=()=>irTab(b.dataset.tab)); }
async function irTab(t){ tab=t; haptic(8); $('#nav').querySelectorAll('.m-nav__i').forEach(x=>x.classList.toggle('active',x.dataset.tab===t));
  if(t==='chats'){ showArchivados=false; $('#navTitle').childNodes[0].nodeValue='Conversaciones'; $('#navSub').textContent='SP OS Enterprise'; renderList(); $('#fab').classList.remove('hidden'); mostrarLista(true); }
  else { $('#fab').classList.add('hidden'); mostrarLista(false); const [ , label ] = TABS.find(x=>x[0]===t);
    if(t==='perfil'){ const m = await api('/api/me/metricas'); if(m) metricas=m; }
    pantallaTab(t,label);
  }
}
function mostrarLista(v){ $('#list').style.display=v?'':'none'; $('#filters').style.display=v?'':'none'; let ph=$('#tabScreen'); if(ph) ph.remove(); }
function pantallaTab(t,label){ $('#navTitle').childNodes[0].nodeValue=label; $('#navSub').textContent='SP OS Enterprise';
  const box=document.createElement('div'); box.id='tabScreen'; box.className='m-scroll'; box.style.cssText='display:flex;';
  if(t==='perfil'){
    const n=me||{nombre:'Vendedor',rol:'vendedor',estado:'activo'};
    const m=metricas||{leadsActivos:0,leadsHoy:0,leadsCerrados:0,tasaRespuesta:0,ultimaActividad:null};
    const ec=estadoColores[n.estado||'activo']||estadoColores.activo;
    box.innerHTML=`
      <div style="padding:24px 18px;width:100%;max-width:400px;margin:0 auto">
        <div style="display:flex;flex-direction:column;align-items:center;gap:10px;margin-bottom:28px">
          <div class="m-avatar" style="width:76px;height:76px;border-radius:24px;font-size:28px;background:${avatarColor(n.nombre)};position:relative">
            ${n.foto ? `<img src="${n.foto}" alt="">` : initials(n.nombre)}
          </div>
          <div style="font-size:18px;font-weight:600;text-align:center">${esc(n.nombre)}</div>
          <div style="font-size:13px;color:var(--text-2)">${esc(n.telefono||n.email||'')}</div>
          <div style="display:flex;gap:8px;align-items:center">
            <span class="m-tag" style="text-transform:uppercase;letter-spacing:.08em;font-size:11px">${n.rol}</span>
            <span class="m-tag" style="background:${ec.bg};color:${ec.fg};border:1px solid ${ec.bd}">${(n.estado||'activo').toUpperCase()}</span>
          </div>
        </div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:16px">
          <div style="background:var(--bg-2);border-radius:14px;padding:14px;text-align:center"><div style="font-size:22px;font-weight:700">${m.leadsActivos}</div><div style="font-size:11px;color:var(--text-3);margin-top:2px">Activos</div></div>
          <div style="background:var(--bg-2);border-radius:14px;padding:14px;text-align:center"><div style="font-size:22px;font-weight:700">${m.leadsHoy}</div><div style="font-size:11px;color:var(--text-3);margin-top:2px">Hoy</div></div>
          <div style="background:var(--bg-2);border-radius:14px;padding:14px;text-align:center"><div style="font-size:22px;font-weight:700">${m.tasaRespuesta}%</div><div style="font-size:11px;color:var(--text-3);margin-top:2px">Tasa resp.</div></div>
          <div style="background:var(--bg-2);border-radius:14px;padding:14px;text-align:center"><div style="font-size:22px;font-weight:700">${m.leadsCerrados}</div><div style="font-size:11px;color:var(--text-3);margin-top:2px">Cerrados</div></div>
        </div>
        <div style="text-align:center;margin-bottom:20px">
          <div style="font-size:12px;color:var(--text-3);margin-bottom:5px">Última actividad</div>
          <div style="font-size:14px;color:var(--text-2);font-weight:500">${m.ultimaActividad ? horaCorta(m.ultimaActividad) : '—'}</div>
        </div>
        <div style="display:flex;gap:8px;margin-bottom:20px">
          <button id="btnEditarPerfil" style="flex:1;height:44px;border-radius:12px;border:1px solid var(--border-strong);background:var(--bg-2);color:var(--text);font-size:14px;font-weight:500;cursor:pointer;font-family:inherit">${I(SVG.settings,16)} Editar</button>
          <select id="selEstado" style="flex:1;height:44px;border-radius:12px;border:1px solid var(--border-strong);background:var(--bg-2);color:var(--text);font-size:13px;font-weight:500;cursor:pointer;font-family:inherit;padding:0 10px;outline:none;appearance:none;-webkit-appearance:none">
            ${['activo','ocupado','inactivo','vacaciones'].map(s => `<option value="${s}" ${n.estado===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
          </select>
        </div>
        <button id="btnLogout" style="width:100%;height:48px;border-radius:12px;border:1px solid rgba(229,72,77,.3);background:rgba(229,72,77,.08);color:var(--red);font-size:15px;font-weight:500;cursor:pointer;display:flex;align-items:center;justify-content:center;gap:8px;font-family:inherit">${I('M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4M16 17l5-5-5-5M21 12H9',18)} Cerrar sesión</button>
      </div>`;
    // Wire estado selector
    setTimeout(() => {
      const sel = document.getElementById('selEstado');
      if (sel) sel.addEventListener('change', async function() {
        if (!me || !me.vendedorId) return;
        haptic(8);
        await api('/api/vendedores/'+me.vendedorId+'/estado', { method:'POST', headers:{'Content-Type':'application/json'}, body:JSON.stringify({ estado: this.value }) });
        me.estado = this.value;
        toast('Estado actualizado');
      });
      const edBtn = document.getElementById('btnEditarPerfil');
      if (edBtn) edBtn.addEventListener('click', () => abrirEditarPerfil());
    }, 50);
  } else {
    const map={ propiedades:[SVG.building,'Propiedades','Catálogo inteligente de lotes y proyectos con coincidencia por IA.'], tareas:[SVG.checkSquare,'Tareas','Tu día organizado: prioridades, recordatorios y seguimiento de cada lead.'], copiloto:[SVG.sparkles,'Copiloto SP','El centro inteligente: resúmenes, objeciones y próxima mejor acción.'] };
    const [ic,ti,de]=map[t]||[SVG.user,'',''];
    box.innerHTML=`<div class="m-empty"><div class="ic">${I(ic,28)}</div><h3>${ti}</h3><p>${de}</p><span class="cop-badge">${I(SVG.sparkles,11)} Próximamente</span></div>`;
  }
  $('#scHome').insertBefore(box, $('#fab'));
}

/* ════════ Interacciones globales ════════ */
function wire(){
  $('#q').addEventListener('input',e=>{ term=e.target.value.trim(); renderList(); });
  $('#filters').addEventListener('click',e=>{ const b=e.target.closest('[data-f]'); if(!b) return; filtro=b.dataset.f; haptic(8); renderList(); });
  $('#fab').onclick=()=>abrirNuevoLead();
  $('#btnNotif').onclick=()=>abrirNotificaciones();
  $('#sheetX').onclick=closeSheet; $('#sheetBg').onclick=closeSheet;
  // Logout
  document.addEventListener('click', e=>{
    const btn=e.target.closest('#btnLogout');
    if(btn){ haptic(12); fetch('/api/logout',{method:'POST',credentials:'include'}).catch(()=>{}); location.href='/login.html'; }
  });
  // Pull to refresh
  const sc=$('#list'); let sy=0,pull=0,at=false;
  sc.addEventListener('touchstart',e=>{ at=sc.scrollTop<=0; sy=e.touches[0].clientY; pull=0; },{passive:true});
  sc.addEventListener('touchmove',e=>{ if(!at) return; pull=Math.max(0,Math.min(70,e.touches[0].clientY-sy)); const p=$('#ptr'); if(p&&pull>0) p.style.height=pull+'px'; },{passive:true});
  sc.addEventListener('touchend',async()=>{ if(pull>50){ haptic(12); await (DEMO?Promise.resolve():cargar()); } const p=$('#ptr'); if(p) p.style.height='0'; pull=0; });
}

function abrirNotificaciones(){ haptic(8);
  const sinResp = leads.filter(l => Number(l.unread_count||0) > 0).slice(0,10);
  const items = sinResp.length ? sinResp.map(l=>[l.unread_count>0?'chat':'bell',`${esc(l.customer_name||'Cliente')} — ${l.unread_count||0} mensaje(s) sin responder`,horaCorta(l.updated_at||l.created_at),'var(--red)']) : [['bell','Sin notificaciones nuevas','','var(--text-3)']];
  openSheet('Notificaciones', items.map(([ic,t,s,c])=>`<div class="tl-i" style="padding-bottom:14px"><div class="tl-dot" style="color:${c}">${I(SVG[ic]||SVG.bell,15)}</div><div class="tl-txt"><strong>${t}</strong><span>${s}</span></div></div>`).join(''));
}

/* ════════ Tiempo real ════════ */
function conectarStream(){ try{ const es=new EventSource('/api/stream');
  es.addEventListener('nuevo_mensaje',async ev=>{ await cargar(); const dot=$('#navDot'); if(dot) dot.style.display=''; if(current&&$('#scChat').classList.contains('show')){ const d=await api(`/api/leads/${current.id}/mensajes`); if(d){ currentMsgs=d.mensajes; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight; } } try{ let x={}; try{x=JSON.parse(ev.data);}catch(e){} if(x.tipo==='mensaje_cliente'){ haptic([100,50,100]); } }catch(e){} });
  es.addEventListener('lead_actualizado',async ev=>{ await cargar(); if(current&&$('#scChat').classList.contains('show')){ const d=await api(`/api/leads/${current.id}/mensajes`); if(d){ currentMsgs=d.mensajes; $('#cMsgs').innerHTML=msgsHTML(currentMsgs); const b=$('#cMsgs'); b.scrollTop=b.scrollHeight; } } });
  es.onerror=()=>{ es.close(); setTimeout(conectarStream,5000); };
  }catch(e){} }

/* ════════ Arranque (tras declarar todas las const) ════════ */
init();

})();
</script>
