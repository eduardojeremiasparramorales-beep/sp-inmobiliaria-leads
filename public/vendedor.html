<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SP Panel">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>SP Inmobiliaria — Mi Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@500;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  /* ── iOS 18 · WhatsApp-style · SP Inmobiliaria ── */
  :root{
    --black:#000000; --bg:#0B141A; --bg2:#111B21; --bg3:#1F2C33; --bg4:#2A3942;
    --nav:#1F2C33; --tab:#1F2C33; --sep:rgba(255,255,255,.06);
    --txt:#E9EDEF; --txt2:rgba(233,237,239,.5); --txt3:rgba(233,237,239,.25);
    --bubble-in:#1F2C33; --bubble-out:#005C4B;
    --tick:#53BDEB; --tick-gray:#667781;
    --gold:#C8A45A; --green:#4E7B46; --red:#FF453A;
    --grad-gold:linear-gradient(135deg,#C8A45A,#A8872B);
    /* Alias de marca SP (unifican con SP OS) */
    --oro:#C8A45A; --negro:#0A0A0A; --verde:#4E7B46; --gris:#8A9297; --marfil:#F5F2EB;
    --e1:0 1px 3px rgba(0,0,0,.4); --e2:0 4px 12px rgba(0,0,0,.5); --e3:0 12px 40px rgba(0,0,0,.6);
    --ease:cubic-bezier(.32,.72,0,1);
    --radius:12px; --radius-sm:8px; --radius-lg:20px;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  button{cursor:pointer;font-family:inherit}
  .ic{display:inline-block;vertical-align:middle;flex-shrink:0}
  body{font-family:'Inter',sans-serif;background:var(--black);color:var(--txt);height:100vh;height:100dvh;overflow:hidden;
    -webkit-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  .msg,.msg *,.nota-item,.nota-item *,input,textarea{
    -webkit-user-select:text;user-select:text;-webkit-touch-callout:default}
  button,.lead-item,.tpl-chip,a,select{touch-action:manipulation}
  button:active,.lead-item:active,.tpl-chip:active{transform:scale(.97)}
  ::selection{background:rgba(200,164,90,.25);color:#fff}

  /* ── iOS Status Bar ── */
  .ios-statusbar{height:44px;background:var(--black);display:flex;align-items:center;justify-content:space-between;padding:0 22px;font-size:13px;font-weight:600;flex-shrink:0}
  .ios-statusbar .s-time{font-weight:700;letter-spacing:.5px;color:var(--txt)}
  .ios-statusbar .s-icons{display:flex;align-items:center;gap:5px}
  .ios-statusbar .s-icons svg{display:block}

  /* ── iOS Tab Bar ── */
  .ios-tabbar{height:50px;padding-bottom:env(safe-area-inset-bottom);background:var(--tab);display:flex;align-items:center;justify-content:space-around;border-top:1px solid var(--sep);flex-shrink:0;position:relative;z-index:20}
  .ios-tabbar .tab{background:none;border:none;color:var(--txt3);display:flex;flex-direction:column;align-items:center;gap:1px;padding:4px 16px;font-size:9px;font-weight:500;letter-spacing:.3px;transition:color .15s ease;position:relative}
  .ios-tabbar .tab.active{color:var(--gold)}
  .ios-tabbar .tab svg{width:24px;height:24px}

  /* ── iOS Nav Bar ── */
  .ios-nav{height:52px;background:var(--nav);display:flex;align-items:center;justify-content:space-between;padding:0 16px;flex-shrink:0;border-bottom:1px solid var(--sep)}
  .ios-nav .nav-title{font-family:'Cinzel',serif;font-size:17px;font-weight:600;letter-spacing:.5px;
    background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent}
  .ios-nav .nav-right{display:flex;align-items:center;gap:12px}
  .ios-nav .nav-btn{background:none;border:none;color:var(--gold);padding:6px;border-radius:8px;font-size:13px;font-weight:500;transition:opacity .15s ease;display:flex;align-items:center;gap:4px}
  .ios-nav .nav-btn:hover{opacity:.7}

  /* ── App Layout ── */
  .app{display:grid;grid-template-columns:380px 1fr;grid-template-rows:1fr auto;height:100vh;height:100dvh;min-height:0}
  .sidebar{grid-row:1;grid-column:1;background:var(--black);overflow-y:auto;min-height:0;border-right:1px solid var(--sep)}
  .chat{grid-row:1;grid-column:2;display:flex;flex-direction:column;min-height:0;height:100%;overflow:hidden;background:var(--bg);position:relative}
  .chat-tab{grid-row:2;grid-column:1/3}

  /* ── Search ── */
  .search-wrap{padding:8px 14px 6px;position:sticky;top:0;background:var(--black);z-index:5;position:relative}
  .search-wrap input{width:100%;height:36px;background:var(--bg3);border:none;border-radius:10px;color:var(--txt);padding:0 36px 0 36px;font-family:inherit;font-size:15px;caret-color:var(--gold)}
  .search-wrap input::placeholder{color:var(--txt3);font-weight:400}
  .search-wrap input:focus{outline:none}
  .search-wrap .search-icon{position:absolute;left:28px;top:50%;transform:translateY(-50%);color:var(--txt3);pointer-events:none}

  #filtros{display:flex;gap:6px;padding:4px 14px 8px;overflow-x:auto;scrollbar-width:none}
  #filtros::-webkit-scrollbar{display:none}
  .filtro-chip{background:none;border:none;color:var(--txt3);height:30px;display:inline-flex;align-items:center;padding:0 14px;border-radius:15px;font-size:.75rem;cursor:pointer;white-space:nowrap;transition:all .15s ease;flex-shrink:0;font-weight:500}
  .filtro-chip:hover{color:var(--txt2)}
  .filtro-chip.active{background:rgba(200,164,90,.12);color:var(--gold);font-weight:600}

  .sidebar-hdr{display:flex;align-items:center;justify-content:space-between;padding:14px 18px 6px}
  .sidebar-hdr h3{font-family:'Cinzel',serif;font-size:.6rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.2em;font-weight:500}
  .sidebar-hdr span{font-family:'Inter',sans-serif;color:var(--txt2);font-size:.7rem;background:var(--bg3);padding:2px 10px;border-radius:10px;font-feature-settings:'tnum'}

  .date-sep{align-self:center;background:rgba(0,0,0,.4);color:var(--txt3);font-size:.65rem;padding:4px 14px;border-radius:10px;margin:8px 0 4px;font-weight:500}
  .msg .ticks{color:var(--tick-gray);font-size:.7rem;margin-left:3px;transition:color .3s ease}
  .msg .ticks.read{color:var(--tick)}

  /* ── Lead List (WA iOS style) ── */
  .lead-item{min-height:64px;padding:8px 16px;cursor:pointer;transition:background .15s ease;display:flex;gap:12px;align-items:center;border-bottom:1px solid var(--sep)}
  .lead-item:hover{background:rgba(255,255,255,.02)}
  .lead-item.active{background:rgba(200,164,90,.04)}
  .avatar{width:48px;height:48px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:1rem;color:#fff;letter-spacing:.02em;position:relative}
  .lead-main{flex:1;min-width:0}
  .lead-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .lead-item .name{font-weight:600;font-size:.92rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--txt)}
  .lead-time{font-size:.65rem;color:var(--txt3);flex-shrink:0;font-feature-settings:'tnum'}
  .lead-bottom{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:2px}
  .lead-item .preview{font-size:.78rem;color:var(--txt2);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .lead-item.unread .preview{color:var(--txt);font-weight:500}
  .lead-item.unread .name{font-weight:700}
  .unread-badge{background:var(--gold);color:#000;font-size:.62rem;font-weight:700;min-width:20px;height:20px;border-radius:10px;display:flex;align-items:center;justify-content:center;padding:0 6px;flex-shrink:0;font-feature-settings:'tnum'}
  .vend-tag{font-size:.58rem;color:var(--txt2);background:var(--bg3);padding:2px 8px;border-radius:10px;flex-shrink:0;font-weight:400}

  .conn-dot{width:8px;height:8px;border-radius:50%;background:var(--red);display:inline-block;transition:background .3s ease}
  .conn-dot.on{background:#30D158}

  /* ── Bottom Sheet Drawer (iOS style) ── */
  .drawer-overlay{position:fixed;inset:0;background:rgba(0,0,0,.4);z-index:90;display:none;-webkit-backdrop-filter:blur(2px);backdrop-filter:blur(2px)}
  .drawer-overlay.show{display:block}
  .drawer{position:fixed;bottom:-80vh;left:0;right:0;background:var(--bg2);z-index:95;
    border-radius:18px 18px 0 0;max-height:80vh;overflow-y:auto;
    transition:bottom .45s var(--ease);box-shadow:0 -10px 40px rgba(0,0,0,.6)}
  .drawer.show{bottom:0}
  .drawer .dw-handle{width:36px;height:5px;border-radius:3px;background:var(--txt3);margin:10px auto 0}
  .drawer .dw-head{padding:20px 24px 16px;text-align:center}
  .drawer .dw-head .avatar{width:72px;height:72px;font-size:1.5rem;margin:0 auto 12px}
  .drawer .dw-name{font-family:'Cinzel',serif;font-weight:600;font-size:1.1rem;
    background:var(--grad-gold);-webkit-background-clip:text;background-clip:text;-webkit-text-fill-color:transparent;letter-spacing:.04em}
  .drawer .dw-phone{color:var(--txt2);font-size:.82rem;margin-top:6px;display:flex;align-items:center;justify-content:center;gap:8px}
  .drawer .dw-phone button{background:var(--bg4);border:none;color:var(--txt);border-radius:var(--radius-sm);padding:4px 10px;cursor:pointer;font-size:.68rem}
  .drawer .dw-sec{padding:12px 24px 20px}
  .drawer .dw-sec h4{font-size:.6rem;color:var(--txt2);text-transform:uppercase;letter-spacing:.2em;margin-bottom:12px;font-family:'Cinzel',serif;font-weight:500}
  .drawer .dw-close{position:absolute;top:12px;left:14px;background:var(--bg4);border:none;color:var(--txt2);width:32px;height:32px;border-radius:50%;font-size:1.1rem;cursor:pointer;display:flex;align-items:center;justify-content:center;transition:color .15s ease}
  .drawer .dw-close:hover{color:var(--txt)}
  .drawer input[type=text]{width:100%;background:var(--bg4);border:none;border-radius:var(--radius-sm);color:var(--txt);padding:8px 12px;font-family:inherit;font-size:.85rem;transition:box-shadow .15s ease}
  .drawer input[type=text]:focus{outline:none;box-shadow:0 0 0 1.5px rgba(200,164,90,.3)}
  .msg .hl{background:rgba(200,164,90,.35);border-radius:3px;color:#fff}
  .badge{font-size:.56rem;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em}
  .b-nuevo{background:var(--gold);color:#000}
  .b-asignado{background:rgba(83,189,235,.12);color:#53BDEB}
  .b-contactado{background:rgba(78,123,70,.15);color:#9FD694}
  .b-cerrado{background:var(--bg4);color:var(--txt2)}
  .etq{font-size:.54rem;padding:2px 8px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.07em;margin-left:6px}
  .e-interesado{background:rgba(83,189,235,.12);color:#53BDEB}
  .e-negociacion{background:rgba(200,164,90,.1);color:var(--gold)}
  .e-cita{background:rgba(78,123,70,.15);color:#9FD694}
  .e-vendido{background:var(--gold);color:#000}
  .e-no_interesado{background:rgba(255,69,58,.1);color:var(--red)}
  .e-sin_clasificar{background:var(--bg4);color:var(--txt3)}

  /* ── Lead Tools ── */
  .chat-header{padding:10px 16px;background:var(--nav);display:flex;justify-content:space-between;align-items:center;position:relative;z-index:2}
  .chat-header .cname{font-weight:600;font-size:.95rem;color:var(--txt)}
  .chat-header .cphone{font-size:.7rem;color:var(--txt3)}
  .chat-header button{background:var(--bg4);border:none;color:var(--txt);padding:6px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:.72rem;font-family:inherit;transition:opacity .15s ease}
  .chat-header button:hover{opacity:.75}
  .lead-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 16px;background:var(--nav);font-size:.74rem;position:relative;z-index:1;border-top:1px solid var(--sep)}
  .lead-tools select{background:var(--bg4);color:var(--txt);border:none;border-radius:var(--radius-sm);padding:5px 10px;font-family:inherit;font-size:.72rem;appearance:none;cursor:pointer}
  .lead-tools select:focus{outline:none;box-shadow:0 0 0 1.5px rgba(200,164,90,.3)}
  .lead-tools label{color:var(--txt2);font-size:.65rem;letter-spacing:.02em}
  .notas-btn{background:var(--bg4);border:none;color:var(--txt);padding:5px 12px;border-radius:var(--radius-sm);cursor:pointer;font-size:.7rem;font-family:inherit;transition:opacity .15s ease;display:flex;align-items:center;gap:5px}
  .notas-btn:hover{opacity:.75}

  .notas-panel{display:none;padding:12px 16px;background:var(--nav);border-top:1px solid var(--sep)}
  .notas-panel.show{display:block}
  .notas-panel .nota-item{background:var(--bg4);border-left:2px solid var(--gold);padding:8px 12px;border-radius:var(--radius-sm);margin-bottom:6px;font-size:.8rem}
  .notas-panel .nota-item .meta{color:var(--txt2);font-size:.6rem;margin-top:4px;display:flex;justify-content:space-between}
  .notas-panel .nota-item .del{color:var(--red);opacity:.5;cursor:pointer;font-size:.6rem;transition:opacity .15s ease}
  .notas-panel .nota-item .del:hover{opacity:1}
  .notas-form{display:flex;gap:8px;margin-top:8px}
  .notas-form input{flex:1;height:36px;background:var(--bg4);border:none;border-radius:var(--radius-sm);color:var(--txt);padding:0 12px;font-family:inherit;font-size:.8rem;transition:box-shadow .15s ease}
  .notas-form input:focus{outline:none;box-shadow:0 0 0 1.5px rgba(200,164,90,.3)}
  .notas-form button{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);height:36px;padding:0 16px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.76rem;transition:opacity .15s ease}
  .notas-form button:hover{opacity:.85}

  /* ── Messages / Chat bubbles (WA iOS clone) ── */
  .messages{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:16px 14px;display:flex;flex-direction:column;gap:3px;background:var(--bg)}
  .msg{position:relative;max-width:78%;padding:7px 12px 6px;border-radius:12px;font-size:.86rem;line-height:1.45;word-wrap:break-word;animation:msgIn .25s var(--ease)}
  @keyframes msgIn{from{opacity:0;transform:translateY(6px) scale(.96)}to{opacity:1;transform:translateY(0) scale(1)}}
  .msg .time{display:inline-block;font-size:.58rem;color:rgba(255,255,255,.35);margin-top:3px;float:right;margin-left:10px;position:relative;top:4px;font-feature-settings:'tnum';white-space:nowrap}
  .msg.in{align-self:flex-start;background:var(--bubble-in);border-top-left-radius:4px}
  .msg.in::before{content:'';position:absolute;top:0;left:-8px;border:8px solid transparent;border-top-color:var(--bubble-in);border-right-color:var(--bubble-in);border-width:5px 8px 8px 0}
  .msg.out{align-self:flex-end;background:var(--bubble-out);border-top-right-radius:4px}
  .msg.out::before{content:'';position:absolute;top:0;right:-8px;border:8px solid transparent;border-top-color:var(--bubble-out);border-left-color:var(--bubble-out);border-width:5px 0 8px 8px}
  .empty{margin:auto;color:var(--txt3);text-align:center;font-size:.9rem}

  /* ── Skeleton ── */
  .skel{display:flex;gap:12px;align-items:center;padding:8px 16px;min-height:64px}
  .skel .sk-av{width:48px;height:48px;border-radius:50%;flex-shrink:0}
  .skel .sk-l1{height:11px;width:60%;border-radius:5px;margin-bottom:7px}
  .skel .sk-l2{height:9px;width:85%;border-radius:5px}
  .sk{background:linear-gradient(90deg,var(--bg3) 25%,var(--bg4) 50%,var(--bg3) 75%);background-size:200% 100%;animation:shimmer 1.2s infinite}
  @keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
  ::-webkit-scrollbar{width:3px;height:3px}
  ::-webkit-scrollbar-track{background:transparent}
  ::-webkit-scrollbar-thumb{background:rgba(255,255,255,.08);border-radius:2px}
  ::-webkit-scrollbar-thumb:hover{background:rgba(255,255,255,.15)}
  :focus-visible{outline:2px solid rgba(200,164,90,.4);outline-offset:2px}
  @media (prefers-reduced-motion: reduce){
    *,*::before,*::after{animation-duration:.01ms !important;animation-iteration-count:1 !important;transition-duration:.01ms !important}
  }

  /* ── Templates ── */
  .templates{display:flex;gap:5px;padding:6px 16px 0;flex-wrap:wrap}
  .tpl-chip{background:var(--bg4);border:none;color:var(--txt);height:30px;display:inline-flex;align-items:center;padding:0 12px;border-radius:15px;font-size:.68rem;cursor:pointer;white-space:nowrap;transition:background .15s ease;font-weight:400}
  .tpl-chip:hover{background:rgba(255,255,255,.06)}

  /* ── Composer (WA iOS style) ── */
  .composer{padding:8px 12px;padding-bottom:calc(8px + env(safe-area-inset-bottom));background:var(--nav);display:flex;gap:8px;align-items:flex-end;flex-shrink:0;position:relative;z-index:2}
  .composer.disabled{opacity:.3;pointer-events:none}
  .pill{flex:1;display:flex;align-items:flex-end;background:var(--bg3);border-radius:24px;padding:0 4px;min-height:48px;transition:box-shadow .15s ease;min-width:0}
  .pill:focus-within{box-shadow:0 0 0 1.5px rgba(200,164,90,.25)}
  .pill .icon-btn{background:none;border:none;color:var(--txt3);font-size:1.2rem;padding:12px 8px;cursor:pointer;border-radius:50%;line-height:1;flex-shrink:0;transition:color .15s ease,transform .1s ease}
  .pill .icon-btn:hover{color:var(--txt2)}
  .pill .icon-btn:active{transform:scale(.88)}
  .pill textarea{flex:1;resize:none;background:transparent;border:none;color:var(--txt);padding:13px 4px;font-family:inherit;font-size:16px;line-height:1.35;max-height:100px;outline:none;min-width:0}
  .pill textarea::placeholder{color:var(--txt3)}
  .fab{width:44px;height:44px;border-radius:50%;
    background:var(--gold);color:#000;border:none;font-size:1.2rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;
    transition:opacity .15s ease,transform .1s ease}
  .fab:hover{opacity:.85}
  .fab:active{transform:scale(.92)}
  .fab:disabled{opacity:.25;cursor:not-allowed;transform:none}
  .fab.grabando{background:var(--red);color:#fff;animation:micPulse 1s infinite}
  @keyframes micPulse{0%,100%{box-shadow:0 0 0 0 rgba(255,69,58,.3)}50%{box-shadow:0 0 0 10px rgba(255,69,58,0)}}
  .rec-strip{flex:1;display:flex;align-items:center;gap:14px;background:var(--bg3);border-radius:24px;padding:0 20px;min-height:48px;font-size:.82rem;cursor:pointer}
  .rec-dot{width:8px;height:8px;border-radius:50%;background:var(--red);animation:recPulse .8s infinite}
  @keyframes recPulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.8)}}
  .rec-strip .rec-hint{color:var(--txt2);font-size:.68rem;margin-left:auto}
  #recTimer{color:#FF9F94;font-weight:600;font-variant-numeric:tabular-nums}
  .emoji-panel{display:none;grid-template-columns:repeat(8,1fr);gap:2px;padding:10px 14px;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:var(--bg2);max-height:200px;overflow-y:auto;border-top:1px solid var(--sep)}
  .emoji-panel.show{display:grid}
  .emoji-panel button{background:none;border:none;font-size:1.4rem;padding:6px 0;cursor:pointer;border-radius:8px;line-height:1;transition:background .15s ease}
  .emoji-panel button:hover{background:var(--bg3)}

  .slash-menu{display:none;background:var(--bg2);border-radius:var(--radius);margin:0 12px 4px;max-height:220px;overflow-y:auto;box-shadow:var(--e3)}
  .slash-menu.show{display:block}
  .slash-item{padding:10px 16px;cursor:pointer;display:flex;flex-direction:column;gap:2px;transition:background .15s ease}
  .slash-item:hover,.slash-item.sel{background:rgba(200,164,90,.06)}
  .slash-item .st{color:var(--gold);font-weight:600;font-size:.8rem}
  .slash-item .sc{color:var(--txt2);font-size:.68rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}

  .audio-preview{display:none;align-items:center;gap:12px;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:var(--nav);flex-shrink:0;position:relative;z-index:2}
  .audio-preview.show{display:flex}
  .audio-preview audio{flex:1;height:36px}
  .audio-preview .ap-send{background:var(--gold);color:#000;border:none;border-radius:var(--radius-sm);height:36px;padding:0 16px;font-weight:600;cursor:pointer;font-size:.78rem;white-space:nowrap;transition:opacity .15s ease}
  .audio-preview .ap-send:hover{opacity:.85}
  .audio-preview .ap-cancel{background:var(--bg4);border:none;color:var(--txt2);border-radius:var(--radius-sm);height:36px;padding:0 12px;cursor:pointer;font-size:.78rem;transition:color .15s ease}
  .audio-preview .ap-cancel:hover{color:var(--txt)}

  .splash{position:fixed;inset:0;background:var(--black);

  .pill textarea{flex:1;resize:none;background:transparent;border:none;color:var(--marfil);padding:13px 4px;font-family:inherit;font-size:16px;line-height:1.35;max-height:120px;outline:none;min-width:0}
  .fab{width:48px;height:48px;border-radius:50%;background:var(--oro);color:#000;border:none;font-size:1.25rem;cursor:pointer;flex-shrink:0;display:flex;align-items:center;justify-content:center;transition:transform .15s,background .2s;box-shadow:0 2px 10px rgba(0,0,0,.45)}
  .fab:active{transform:scale(.9)}
  .fab:disabled{opacity:.5;cursor:not-allowed}
  .fab.grabando{background:#d84c4c;color:#fff;animation:micPulse 1s infinite}

  /* Franja de grabación (reemplaza la píldora mientras grabas) */

  /* Panel de emojis */

  /* Menú "/" de respuestas rápidas */

  .slash-item .sc{color:var(--gris);font-size:.76rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  /* Preview de audio antes de enviar */

  .audio-preview .ap-cancel{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--gris);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:.88rem}
  .rec-timer{font-size:.8rem;color:#f55;font-weight:600;min-width:36px;text-align:center}

  /* Multimedia dentro de los mensajes */
  .msg .media-img{max-width:230px;max-height:280px;border-radius:8px;display:block;cursor:pointer}
  .msg .media-video{max-width:240px;border-radius:8px;display:block}

  /* Pantalla de bienvenida (splash) */
  .splash{position:fixed;inset:0;background:radial-gradient(circle at 50% 40%, #161310, var(--negro));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .5s ease;gap:20px}
  .splash.hide{opacity:0;pointer-events:none}
  .splash img{width:120px;height:120px;border-radius:26px;object-fit:cover;box-shadow:0 8px 40px rgba(200,164,90,.25)}
  .splash .brand{font-family:'Cinzel',serif;color:var(--oro);letter-spacing:.18em;font-size:1.25rem;text-align:center}
  .splash .sub{color:var(--gris);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;margin-top:-10px}
  .splash .spin{width:26px;height:26px;border:3px solid rgba(200,164,90,.2);border-top-color:var(--oro);border-radius:50%;animation:spin 1s linear infinite;margin-top:6px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--oro);color:var(--marfil);padding:12px 22px;border-radius:8px;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:50}

</style>

<body>
  <!-- Barra de navegación -->
  <!-- iOS Navigation Bar -->
  <div class="ios-nav">
    <div class="nav-title">SP CRM</div>
    <div class="nav-right">
      <span class="conn-dot" id="connDot" title="Conexión" aria-label="Estado"></span>
      <span id="miNombre" style="color:var(--txt2);font-size:13px"></span>
      <button class="nav-btn" id="logoutBtn" title="Cerrar sesión">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" x2="9" y1="12" y2="12"/></svg>
      </button>
    </div>
  </div>

  <div class="app">
    <div class="sidebar" id="sidebar">
      <div class="sidebar-hdr">
        <h3 id="tituloLista">Chats</h3>
        <span id="leadCount">0</span>
      </div>
      <div class="search-wrap">
        <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/></svg>
        <input type="text" id="buscar" placeholder="Buscar" autocomplete="off" aria-label="Buscar leads">
      </div>
      <div class="filtros" id="filtros">
        <span class="filtro-chip active" data-f="todos">Todos</span>
        <span class="filtro-chip" data-f="nuevo">Nuevos</span>
        <span class="filtro-chip" data-f="interesado">Interesado</span>
        <span class="filtro-chip" data-f="negociacion">Negociación</span>
        <span class="filtro-chip" data-f="cita">Cita</span>
        <span class="filtro-chip" data-f="vendido">Vendido</span>
      </div>
      <div id="leadsList"></div>
    </div>

    <div class="chat hidden" id="chat">
      <div id="chatBody" style="flex:1;min-height:0;display:flex;flex-direction:column;height:100%">
        <div class="empty" id="emptyState">Selecciona un lead para ver la conversación</div>
      </div>
    </div>

    <!-- iOS Tab Bar -->
    <div class="chat-tab">
      <div class="ios-tabbar">
        <button class="tab active" onclick="location.href='/vendedor.html'">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
          <span>Chats</span>
        </button>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>
  <div class="drawer-overlay" id="drawerOverlay"></div>
  <div class="drawer" id="drawer" role="dialog" aria-label="Información del contacto">
    <div class="dw-handle"></div>
  </div>

<script>
  let me = null;
  let leads = [];
  let currentLead = null;
  let templates = [];
  let waTemplates = [];
  let vendedores = [];

  const ETIQUETAS = [
    {v:'sin_clasificar', t:'Sin clasificar'},
    {v:'interesado', t:'Interesado'},
    {v:'negociacion', t:'Negociación'},
    {v:'cita', t:'Cita agendada'},
    {v:'vendido', t:'Vendido'},
    {v:'no_interesado', t:'No interesado'},
  ];
  function etqLabel(v){ const e = ETIQUETAS.find(x=>x.v===v); return e?e.t:''; }

  const EMOJIS = ['😀','😂','😊','😍','🥰','😎','🤝','👍','👌','🙏','💪','👏','🎉','🔥','⭐','❤️','💛','💚','✅','❌','⏰','📍','📞','💬','🏡','🏠','🏘️','🌳','🌄','📐','📄','💰','💵','🤑','📈','🔑','🚪','🛣️','🚗','☀️','🌙','🎯','✨','💡','🙌','😅','🤔','😉','🥳','😇','🫡','👀','📸','🗺️','🏦','📝','🖊️','⚡','🌟','💎','🤗','🙋','👷','🧱'];

  // Íconos SVG (estilo Lucide) — nada de emojis como íconos de interfaz
  const ICONS = {
    mic: '<path d="M12 2a3 3 0 0 0-3 3v7a3 3 0 0 0 6 0V5a3 3 0 0 0-3-3Z"/><path d="M19 10v2a7 7 0 0 1-14 0v-2"/><line x1="12" x2="12" y1="19" y2="22"/>',
    send: '<path d="m22 2-7 20-4-9-9-4Z"/><path d="M22 2 11 13"/>',
    stop: '<rect x="6" y="6" width="12" height="12" rx="2" fill="currentColor" stroke="none"/>',
    clip: '<path d="m21.44 11.05-9.19 9.19a6 6 0 0 1-8.49-8.49l8.57-8.57A4 4 0 1 1 18 8.84l-8.59 8.57a2 2 0 0 1-2.83-2.83l8.49-8.48"/>',
    smile: '<circle cx="12" cy="12" r="10"/><path d="M8 14s1.5 2 4 2 4-2 4-2"/><line x1="9" x2="9.01" y1="9" y2="9"/><line x1="15" x2="15.01" y1="9" y2="9"/>',
    x: '<path d="M18 6 6 18"/><path d="m6 6 12 12"/>',
    pencil: '<path d="M17 3a2.85 2.83 0 1 1 4 4L7.5 20.5 2 22l1.5-5.5Z"/>',
    back: '<path d="m12 19-7-7 7-7"/><path d="M19 12H5"/>',
    note: '<path d="M15.5 3H5a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V8.5L15.5 3Z"/><path d="M15 3v6h6"/>',
    megaphone: '<path d="m3 11 18-5v12L3 14v-3z"/><path d="M11.6 16.8a3 3 0 1 1-5.8-1.6"/>',
    copy: '<rect width="14" height="14" x="8" y="8" rx="2" ry="2"/><path d="M4 16c-1.1 0-2-.9-2-2V4c0-1.1.9-2 2-2h10c1.1 0 2 .9 2 2"/>',
  };
  function I(name, size){
    size = size || 22;
    return `<svg class="ic" width="${size}" height="${size}" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">${ICONS[name]||''}</svg>`;
  }

  // --- Menú "/" de respuestas rápidas (estilo respond.io) ---
  let slashIdx = -1;
  function slashItems(){
    const input = document.getElementById('input');
    if(!input) return [];
    const v = input.value;
    if(!v.startsWith('/')) return [];
    const term = v.slice(1).toLowerCase();
    return templates.filter(t => !term || t.titulo.toLowerCase().includes(term));
  }
  function actualizarMenuSlash(){
    const menu = document.getElementById('slashMenu');
    if(!menu) return;
    const items = slashItems();
    if(!items.length){ menu.classList.remove('show'); slashIdx = -1; return; }
    if(slashIdx >= items.length) slashIdx = items.length - 1;
    if(slashIdx < 0) slashIdx = 0;
    menu.innerHTML = items.map((t,i) => `
      <div class="slash-item ${i===slashIdx?'sel':''}" data-i="${i}">
        <span class="st">${escapeHtml(t.titulo)}</span>
        <span class="sc">${escapeHtml(t.cuerpo.slice(0,60))}${t.cuerpo.length>60?'…':''}</span>
      </div>`).join('');
    menu.classList.add('show');
    menu.querySelectorAll('.slash-item').forEach(el =>
      el.addEventListener('click', () => elegirSlash(Number(el.dataset.i))));
  }
  function elegirSlash(i){
    const items = slashItems();
    const input = document.getElementById('input');
    const menu = document.getElementById('slashMenu');
    if(!items[i] || !input) return;
    input.value = items[i].cuerpo;
    input.style.height='auto'; input.style.height=input.scrollHeight+'px';
    input.focus();
    if(menu) menu.classList.remove('show');
    slashIdx = -1;
    input.dispatchEvent(new Event('input'));
  }
  function manejarTecladoSlash(e){
    const menu = document.getElementById('slashMenu');
    if(!menu || !menu.classList.contains('show')) return false;
    const items = slashItems();
    if(e.key === 'ArrowDown'){ e.preventDefault(); slashIdx = Math.min(slashIdx+1, items.length-1); actualizarMenuSlash(); return true; }
    if(e.key === 'ArrowUp'){ e.preventDefault(); slashIdx = Math.max(slashIdx-1, 0); actualizarMenuSlash(); return true; }
    if(e.key === 'Enter'){ e.preventDefault(); elegirSlash(slashIdx); return true; }
    if(e.key === 'Escape'){ menu.classList.remove('show'); slashIdx = -1; return true; }
    return false;
  }

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  function badgeClass(s){return 'badge b-' + (s||'nuevo');}

  // Iniciales para el avatar (máx 2 letras)
  function iniciales(nombre){
    const p = String(nombre||'C').trim().split(/\s+/);
    return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase() || 'C';
  }
  // Color de avatar estable según el nombre (paleta sobria de marca)
  function avatarColor(nombre){
    const cols = ['#4E7B46','#7a5c1e','#2b4d6b','#6b3f5b','#8a6d3b','#3b6b6b','#7a3b3b','#5b5b8a'];
    let h = 0; const s = String(nombre||'');
    for(let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) & 0xffffff;
    return cols[Math.abs(h) % cols.length];
  }
  // Hora corta para la lista (hoy: hora; otro día: dd/mm)
  function horaCorta(ts){
    if(!ts) return '';
    const d = new Date(ts.replace(' ','T') + 'Z');
    if(isNaN(d)) return '';
    const hoy = new Date();
    const mismoDia = d.getFullYear()===hoy.getFullYear()&&d.getMonth()===hoy.getMonth()&&d.getDate()===hoy.getDate();
    return mismoDia
      ? d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})
      : d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit'});
  }

  function fmtTime(ts){
    if(!ts) return '';
    const d = new Date(ts.replace(' ','T') + 'Z');
    if(isNaN(d)) return '';
    return d.toLocaleString('es-CO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }

  async function api(url, opts){
    const res = await fetch(url, opts);
    if(res.status === 401){ location.href = '/login.html'; throw new Error('no_auth'); }
    return res;
  }

  function mostrarSkeletons(){
    const cont = document.getElementById('leadsList');
    if(cont) cont.innerHTML = Array.from({length:6}, () => `
      <div class="skel">
        <div class="sk sk-av"></div>
        <div style="flex:1"><div class="sk sk-l1"></div><div class="sk sk-l2"></div></div>
      </div>`).join('');
  }

  // --- Carga inicial ---
  async function init(){
    mostrarSkeletons();
    const r = await api('/api/me');
    me = await r.json();
    document.getElementById('miNombre').textContent = me.nombre;
    const tl = document.getElementById('tituloLista');
    if(tl) tl.textContent = me.rol==='admin' ? 'Todos los chats' : 'Mis chats';
    await cargarTemplates();
    await cargarWATemplates();
    if(me.rol === 'admin') await cargarVendedores();
    await cargarLeads();
    conectarStream();
    wireFiltros();

    // Abrir lead desde URL (?lead=123) o desde notificación push
    const params = new URLSearchParams(location.search);
    const leadFromUrl = params.get('lead');
    if(leadFromUrl) abrirLead(Number(leadFromUrl));
  }

  async function cargarTemplates(){
    try{
      const r = await api('/api/templates');
      templates = await r.json();
    }catch(e){ templates = []; }
  }

  async function cargarWATemplates(){
    try{
      const r = await api('/api/wa-templates');
      waTemplates = await r.json();
    }catch(e){ waTemplates = []; }
  }

  async function cargarVendedores(){
    try{
      const r = await api('/api/vendedores');
      vendedores = await r.json();
    }catch(e){ vendedores = []; }
  }

  async function cargarLeads(){
    const r = await api('/api/mis-leads');
    leads = await r.json();
    renderLeads();
  }

  function wireFiltros(){
    const buscar = document.getElementById('buscar');
    if(buscar) buscar.addEventListener('input', () => {
      terminoBusqueda = buscar.value.trim();
      renderLeads();
    });
    document.querySelectorAll('#filtros .filtro-chip').forEach(chip =>
      chip.addEventListener('click', () => {
        document.querySelectorAll('#filtros .filtro-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        filtroActivo = chip.dataset.f;
        renderLeads();
      }));
  }

  let filtroActivo = 'todos';
  let terminoBusqueda = '';

  function leadsFiltrados(){
    let arr = leads;
    if(filtroActivo !== 'todos'){
      if(filtroActivo === 'nuevo'){
        arr = arr.filter(l => (l.status||'nuevo')==='nuevo' || (l.status||'')==='asignado');
      }else{
        arr = arr.filter(l => (l.etiqueta||'')===filtroActivo);
      }
    }
    if(terminoBusqueda){
      const t = terminoBusqueda.toLowerCase();
      arr = arr.filter(l =>
        (l.customer_name||'').toLowerCase().includes(t) ||
        (l.customer_phone||'').toLowerCase().includes(t));
    }
    return arr;
  }

  function renderLeads(){
    const cont = document.getElementById('leadsList');
    const lista = leadsFiltrados();
    document.getElementById('leadCount').textContent = lista.length;
    if(lista.length === 0){
      cont.innerHTML = leads.length === 0
        ? '<div class="empty" style="padding:30px 18px">Aún no tienes leads asignados. Llegarán automáticamente.</div>'
        : '<div class="empty" style="padding:30px 18px">Ningún lead coincide con la búsqueda.</div>';
      return;
    }
    cont.innerHTML = lista.map(l => {
      const nombre = l.customer_name||'Cliente';
      const noLeidos = Number(l.unread_count||0);
      const etq = l.etiqueta && l.etiqueta!=='sin_clasificar'
        ? `<span class="etq e-${l.etiqueta}">${etqLabel(l.etiqueta)}</span>` : '';
      const vend = (me && me.rol==='admin' && l.assigned_to_nombre)
        ? `<span class="vend-tag">${escapeHtml(l.assigned_to_nombre)}</span>` : '';
      return `
      <div class="lead-item ${currentLead && currentLead.id===l.id?'active':''} ${noLeidos>0?'unread':''}" data-id="${l.id}">
        <div class="avatar" style="background:${avatarColor(nombre)}">${iniciales(nombre)}</div>
        <div class="lead-main">
          <div class="lead-top">
            <span class="name">${escapeHtml(nombre)}</span>
            <span class="lead-time">${horaCorta(l.updated_at||l.created_at)}</span>
          </div>
          <div class="lead-bottom">
            <span class="preview">${escapeHtml(l.last_message||l.first_message||'')}</span>
            ${vend}${etq}
            ${noLeidos>0?`<span class="unread-badge">${noLeidos>99?'99+':noLeidos}</span>`:''}
          </div>
        </div>
      </div>`;
    }).join('');
    cont.querySelectorAll('.lead-item').forEach(el =>
      el.addEventListener('click', () => abrirLead(Number(el.dataset.id))));
  }

  async function abrirLead(id){
    const r = await api('/api/leads/'+id+'/mensajes');
    const data = await r.json();
    currentLead = data.lead;
    // Marcar como leído (sin bloquear la UI)
    api('/api/leads/'+id+'/leido', {method:'POST'}).catch(()=>{});
    const enLista = leads.find(l => l.id === id);
    if(enLista) enLista.unread_count = 0;
    currentLead.unread_count = 0;
    renderLeads();
    renderChat(data.lead, data.mensajes);
    if(window.innerWidth <= 760){
      document.getElementById('sidebar').classList.add('hidden');
      document.getElementById('chat').classList.remove('hidden');
    }
  }

  function renderChat(lead, mensajes){

          <div style="min-width:0">

        <div style="display:flex;gap:8px;align-items:center">

          ${waTemplates.length>0 ? `<button id="reactivarBtn" title="Enviar plantilla aprobada de Meta (para leads sin respuesta +24h)">${I('megaphone',15)} Reactivar</button>`:''}
        </div>
      </div>
      <div class="lead-tools">
        <label>Etiqueta:</label>
        <select id="etiquetaSelect">
          ${ETIQUETAS.map(e=>`<option value="${e.v}" ${(lead.etiqueta||'sin_clasificar')===e.v?'selected':''}>${e.t}</option>`).join('')}
        </select>
        ${me.rol==='admin' ? `
        <label style="margin-left:6px">Vendedor:</label>
        <select id="reasignarSelect">
          ${vendedores.map(v=>`<option value="${v.id}" ${Number(lead.assigned_to_id)===Number(v.id)?'selected':''}>${escapeHtml(v.nombre)}${v.estado!=='activo'?' ('+v.estado+')':''}</option>`).join('')}
        </select>`:''}
        <button type="button" class="notas-btn" id="notasBtn">${I('note',14)} Notas</button>
      </div>
      <div class="notas-panel" id="notasPanel">
        <div id="notasList" style="max-height:160px;overflow-y:auto"></div>
        <form class="notas-form" id="notasForm">
          <input type="text" id="notaInput" placeholder="Escribe una nota interna (solo la ve el equipo)…" maxlength="500">
          <button type="submit">Guardar</button>
        </form>
      </div>
      ${!cerrado && waTemplates.length>0 ? `
      <div id="reactivarPanel" style="display:none;padding:10px 18px;background:#1a1a1a;border-bottom:1px solid rgba(255,255,255,.08);font-size:.83rem">
        <span style="color:var(--gris);margin-right:10px">Plantilla a enviar:</span>
        ${waTemplates.map(t=>`<button onclick="enviarTemplate(${t.id},'${escapeHtml(t.nombre)}','${escapeHtml(t.idioma)}')"
          style="background:rgba(200,164,90,.15);border:1px solid rgba(200,164,90,.4);color:var(--oro);padding:5px 12px;border-radius:8px;cursor:pointer;font-size:.8rem;margin:2px">${escapeHtml(t.nombre)}</button>`).join('')}
      </div>`:''}
      <div class="messages" id="messages" role="log" aria-live="polite">
        ${renderMensajesHTML(mensajes)}
      </div>
      <div class="templates">${chips}</div>
      <div class="audio-preview" id="audioPreview">
        <button class="ap-cancel" id="apCancel" aria-label="Cancelar audio">${I('x',16)}</button>
        <audio id="audioPlayback" controls></audio>
        <button class="ap-send" id="apSend">Enviar audio</button>
      </div>
      <div class="slash-menu" id="slashMenu"></div>
      <form class="composer ${cerrado?'disabled':''}" onsubmit="enviarMensaje();return false;">
        <div class="pill" id="pill">
          <button type="button" id="emojiBtn" class="icon-btn" aria-label="Emojis" ${cerrado?'disabled':''}>${I('smile')}</button>
          <textarea id="input" rows="1" placeholder="${cerrado?'Lead cerrado':'Mensaje'}" ${cerrado?'disabled':''} aria-label="Escribe un mensaje"></textarea>
          <button type="button" id="adjuntar" class="icon-btn" aria-label="Adjuntar archivo" ${cerrado?'disabled':''}>${I('clip')}</button>
          <input type="file" id="fileInput" accept="image/*,audio/*,video/*,application/pdf,.doc,.docx,.xls,.xlsx,.txt" style="display:none">
        </div>
        <div class="rec-strip" id="recStrip" style="display:none">
          <span class="rec-dot"></span><span id="recTimer">0:00</span><span class="rec-hint">Grabando… toca para detener</span>
        </div>
        <button type="button" id="mainBtn" class="fab" aria-label="Grabar audio" ${cerrado?'disabled':''}>${I('mic')}</button>
      </form>
      <div class="emoji-panel" id="emojiPanel"></div>`;

    const msgs = document.getElementById('messages');
    msgs.scrollTop = msgs.scrollHeight;

    if(!cerrado){
      const input = document.getElementById('input');
      const mainBtn = document.getElementById('mainBtn');
      const pill = document.getElementById('pill');
      const recStrip = document.getElementById('recStrip');

      // Botón circular: mic cuando está vacío, enviar cuando hay texto (como WhatsApp)
      function updateMainBtn(){
        if(mediaRec && mediaRec.state === 'recording') return;
        const hayTexto = input.value.trim().length > 0;
        mainBtn.innerHTML = hayTexto ? I('send') : I('mic');
        mainBtn.setAttribute('aria-label', hayTexto ? 'Enviar mensaje' : 'Grabar audio');
      }

      input.addEventListener('input', () => {
        input.style.height='auto'; input.style.height=input.scrollHeight+'px';
        updateMainBtn();
        actualizarMenuSlash();
      });
      input.addEventListener('keydown', e => {
        if(manejarTecladoSlash(e)) return;
        if(e.key==='Enter' && !e.shiftKey){ e.preventDefault(); enviarMensaje(); }
      });

      const adjuntar = document.getElementById('adjuntar');
      const fileInput = document.getElementById('fileInput');
      if(adjuntar && fileInput){
        adjuntar.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', () => {
          if(fileInput.files && fileInput.files[0]) enviarMedia(fileInput.files[0]);
        });
      }

      // --- Panel de emojis ---
      const emojiBtn = document.getElementById('emojiBtn');
      const emojiPanel = document.getElementById('emojiPanel');
      if(emojiBtn && emojiPanel){
        emojiPanel.innerHTML = EMOJIS.map(e =>
          `<button type="button" aria-label="emoji ${e}">${e}</button>`).join('');
        emojiBtn.addEventListener('click', () => emojiPanel.classList.toggle('show'));
        emojiPanel.querySelectorAll('button').forEach(b =>
          b.addEventListener('click', () => {
            const pos = input.selectionStart ?? input.value.length;
            input.value = input.value.slice(0,pos) + b.textContent + input.value.slice(pos);
            input.focus();
            input.selectionStart = input.selectionEnd = pos + b.textContent.length;
            updateMainBtn();
          }));
      }

      // --- Grabación de audio ---
      const recTimer = document.getElementById('recTimer');
      const audioPreview = document.getElementById('audioPreview');
      const audioPlayback = document.getElementById('audioPlayback');
      const apSend = document.getElementById('apSend');
      const apCancel = document.getElementById('apCancel');
      let mediaRec = null, recChunks = [], recInterval = null, recBlob = null;

      function fmtSecs(s){ return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }

      function stopRecording(){
        if(mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
        clearInterval(recInterval);
        mainBtn.classList.remove('grabando');
        pill.style.display = 'flex';
        recStrip.style.display = 'none';
        updateMainBtn();
      }

      async function startRecording(){
        try{
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          // Elegir el mejor codec disponible
          const mime = ['audio/ogg;codecs=opus','audio/webm;codecs=opus','audio/webm','audio/mp4']
            .find(t => MediaRecorder.isTypeSupported(t)) || '';
          mediaRec = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
          recChunks = [];
          mediaRec.ondataavailable = e => { if(e.data.size > 0) recChunks.push(e.data); };
          mediaRec.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            const finalMime = mediaRec.mimeType || mime || 'audio/webm';
            recBlob = new Blob(recChunks, { type: finalMime });
            audioPlayback.src = URL.createObjectURL(recBlob);
            audioPreview.classList.add('show');
          };
          mediaRec.start(200);
          mainBtn.classList.add('grabando');
          mainBtn.innerHTML = I('stop');
          mainBtn.setAttribute('aria-label', 'Detener grabación');
          pill.style.display = 'none';
          if(emojiPanel) emojiPanel.classList.remove('show');
          recStrip.style.display = 'flex';
          let secs = 0;
          recTimer.textContent = '0:00';
          recInterval = setInterval(() => {
            secs++;
            recTimer.textContent = fmtSecs(secs);
            if(secs >= 120){ stopRecording(); toast('Máximo 2 minutos de audio'); }
          }, 1000);
        }catch(e){
          toast('No se pudo acceder al micrófono');
        }
      }

      mainBtn.addEventListener('click', () => {
        if(mediaRec && mediaRec.state === 'recording'){ stopRecording(); return; }
        if(input.value.trim()){ enviarMensaje(); return; }
        startRecording();
      });
      recStrip.addEventListener('click', () => {
        if(mediaRec && mediaRec.state === 'recording') stopRecording();
      });
      updateMainBtn();

      apCancel.addEventListener('click', () => {
        audioPreview.classList.remove('show');
        audioPlayback.src = '';
        recBlob = null;
        stopRecording();
      });

      apSend.addEventListener('click', async () => {
        if(!recBlob || !currentLead) return;
        apSend.disabled = true; apSend.textContent = 'Enviando…';
        try{
          const ext = recBlob.type.includes('ogg') ? 'ogg' : recBlob.type.includes('mp4') ? 'mp4' : 'webm';
          const dataBase64 = await new Promise((res, rej) => {
            const reader = new FileReader();
            reader.onload = () => res(String(reader.result).split(',')[1]);
            reader.onerror = rej;
            reader.readAsDataURL(recBlob);
          });
          const r = await api('/api/leads/'+currentLead.id+'/responder-media', {
            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ mime: recBlob.type, filename: 'audio.'+ext, dataBase64 }),
          });
          const data = await r.json();
          if(!r.ok) throw new Error(data.detalle || 'Error al enviar');
          audioPreview.classList.remove('show');
          audioPlayback.src = ''; recBlob = null;
          await abrirLead(currentLead.id);
          await cargarLeads();
        }catch(e){
          toast('Error: ' + e.message);
        }finally{
          apSend.disabled = false; apSend.textContent = 'Enviar audio';
        }
      });

      body.querySelectorAll('.tpl-chip').forEach(c =>
        c.addEventListener('click', () => {
          input.value = c.dataset.cuerpo; input.focus();
          input.style.height='auto'; input.style.height=input.scrollHeight+'px';
        }));
      const reactivarBtn = document.getElementById('reactivarBtn');
      const reactivarPanel = document.getElementById('reactivarPanel');
      if(reactivarBtn && reactivarPanel){
        reactivarBtn.addEventListener('click', () => {
          reactivarPanel.style.display = reactivarPanel.style.display==='none' ? 'block' : 'none';
        });
      }
    }
    // --- Etiqueta de pipeline ---
    const etiquetaSelect = document.getElementById('etiquetaSelect');
    if(etiquetaSelect) etiquetaSelect.addEventListener('change', async () => {
      try{
        await api('/api/leads/'+lead.id+'/etiqueta', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ etiqueta: etiquetaSelect.value }),
        });
        if(currentLead) currentLead.etiqueta = etiquetaSelect.value;
        toast('Etiqueta actualizada');
        await cargarLeads();
      }catch(e){ toast('Error al etiquetar'); }
    });

    // --- Reasignar (admin) ---
    const reasignarSelect = document.getElementById('reasignarSelect');
    if(reasignarSelect) reasignarSelect.addEventListener('change', async () => {
      const nombre = reasignarSelect.options[reasignarSelect.selectedIndex].text;
      if(!confirm('¿Reasignar este lead a '+nombre+'?')){ reasignarSelect.value = lead.assigned_to_id; return; }
      try{
        await api('/api/leads/'+lead.id+'/reasignar', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ vendedorId: reasignarSelect.value }),
        });
        toast('Lead reasignado a '+nombre);
        await cargarLeads();
      }catch(e){ toast('Error al reasignar'); }
    });

    // --- Notas internas ---
    const notasBtn = document.getElementById('notasBtn');
    const notasPanel = document.getElementById('notasPanel');
    const notasForm = document.getElementById('notasForm');
    const notaInput = document.getElementById('notaInput');
    if(notasBtn && notasPanel){
      notasBtn.addEventListener('click', async () => {
        const abrir = !notasPanel.classList.contains('show');
        notasPanel.classList.toggle('show', abrir);
        if(abrir) await cargarNotas(lead.id);
      });
    }
    if(notasForm) notasForm.addEventListener('submit', async (ev) => {
      ev.preventDefault();
      const nota = notaInput.value.trim();
      if(!nota) return;
      try{
        await api('/api/leads/'+lead.id+'/notas', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ nota }),
        });
        notaInput.value = '';
        await cargarNotas(lead.id);
      }catch(e){ toast('Error al guardar nota'); }
    });

    const volver = document.getElementById('volver');
    if(volver) volver.addEventListener('click', () => {
      document.getElementById('chat').classList.add('hidden');
      document.getElementById('sidebar').classList.remove('hidden');
    });

    const chatInfo = document.getElementById('chatInfo');
    if(chatInfo){
      chatInfo.addEventListener('click', abrirDrawer);
      chatInfo.addEventListener('keydown', e => { if(e.key==='Enter') abrirDrawer(); });
    }
  }

  async function cargarNotas(leadId){
    const cont = document.getElementById('notasList');
    if(!cont) return;
    try{
      const r = await api('/api/leads/'+leadId+'/notas');
      const notas = await r.json();
      if(!notas.length){ cont.innerHTML = '<div style="color:var(--gris);font-size:.8rem;padding:6px 0">Sin notas todavía.</div>'; return; }
      cont.innerHTML = notas.map(n => `
        <div class="nota-item">
          <div>${escapeHtml(n.nota)}</div>
          <div class="meta">
            <span>${escapeHtml(n.autor||'Equipo')} · ${fmtTime(n.created_at)}</span>
            <span class="del" data-id="${n.id}">Eliminar</span>
          </div>
        </div>`).join('');
      cont.querySelectorAll('.del').forEach(el =>
        el.addEventListener('click', async () => {
          if(!confirm('¿Eliminar esta nota?')) return;
          await api('/api/leads/'+leadId+'/notas/'+el.dataset.id, {method:'DELETE'});
          await cargarNotas(leadId);
        }));
    }catch(e){ cont.innerHTML = '<div style="color:#a55;font-size:.8rem">Error al cargar notas.</div>'; }
  }

    document.getElementById('dwEditar').addEventListener('click', async () => {
      const nuevo = prompt('Nombre del contacto:', currentLead.customer_name || '');
      if(!nuevo || !nuevo.trim()) return;
      try{
        const r = await api('/api/leads/'+currentLead.id+'/nombre', {
          method:'POST', headers:{'Content-Type':'application/json'},
          body: JSON.stringify({ nombre: nuevo.trim() }),
        });
        if(!r.ok) throw new Error();
        currentLead.customer_name = nuevo.trim();
        document.getElementById('dwNombre').textContent = nuevo.trim();
        toast('Nombre actualizado');
        await cargarLeads();
        await abrirLead(currentLead.id);
        abrirDrawer();
      }catch(e){ toast('Error al actualizar nombre'); }

    document.getElementById('dwBuscar').addEventListener('input', (ev) => buscarEnConversacion(ev.target.value));

  function cerrarDrawer(){
    document.getElementById('drawer').classList.remove('show');
    document.getElementById('drawerOverlay').classList.remove('show');
    buscarEnConversacion('');
  }
  // Resalta los mensajes que coinciden y atenúa el resto
  function buscarEnConversacion(term){
    const msgs = document.querySelectorAll('#messages .msg');
    const info = document.getElementById('dwBuscarInfo');
    const t = String(term||'').trim().toLowerCase();
    let hits = 0, primero = null;
    msgs.forEach(m => {
      if(!t){ m.style.opacity=''; m.style.outline=''; return; }
      const match = m.textContent.toLowerCase().includes(t);
      m.style.opacity = match ? '1' : '.25';
      m.style.outline = match ? '1px solid rgba(200,164,90,.5)' : '';
      if(match){ hits++; if(!primero) primero = m; }
    });
    if(info) info.textContent = t ? (hits ? hits+' mensaje(s) encontrados' : 'Sin coincidencias') : '';
    if(primero) primero.scrollIntoView({behavior:'smooth', block:'center'});
  }

  async function enviarMensaje(){
    const input = document.getElementById('input');
    const btn = document.getElementById('mainBtn');
    const mensaje = input ? input.value.trim() : '';
    if(!mensaje || !currentLead) return;
    if(btn) btn.disabled = true;

    const payload = JSON.stringify({ mensaje });

    try{
      const opts = {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json',
          'Accept': 'application/json',
          'X-Requested-With': 'XMLHttpRequest'
        },
        credentials: 'include',
        body: payload
      };

      console.log('📤 Enviando mensaje:', { leadId: currentLead.id, msgLen: mensaje.length });

      const r = await api('/api/leads/'+currentLead.id+'/responder', opts);
      const data = await r.json();

      if(!r.ok) {
        console.error('❌ Error respuesta:', { status: r.status, error: data });
        throw new Error(data.detalle || data.error || 'No se pudo enviar');
      }

      console.log('✅ Mensaje enviado correctamente');
      input.value='';
      input.style.height='auto';
      await abrirLead(currentLead.id);
      await cargarLeads();
      toast('Mensaje enviado ✓');
    }catch(e){
      console.error('❌ Error al enviar:', e);
      const errMsg = e.message.includes('no_auth') ? 'Sesión expirada' : (e.message || 'Error desconocido');
      toast('Error: ' + errMsg);
    }finally{
      const b = document.getElementById('mainBtn');
      if(b) b.disabled = false;
    }
  }

  // Etiqueta de fecha estilo WhatsApp (Hoy / Ayer / dd/mm/aaaa)
  function dateLabel(ts){
    if(!ts) return '';
    const d = new Date(ts.replace(' ','T') + 'Z');
    if(isNaN(d)) return '';
    const hoy = new Date(); const ayer = new Date(); ayer.setDate(hoy.getDate()-1);
    const sameDay = (a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
    if(sameDay(d,hoy)) return 'Hoy';
    if(sameDay(d,ayer)) return 'Ayer';
    return d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
  }
  function soloHora(ts){
    if(!ts) return '';
    const d = new Date(ts.replace(' ','T') + 'Z');
    if(isNaN(d)) return '';
    return d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  }

  // Construye el HTML de los mensajes con separadores de fecha y ticks
  function renderMensajesHTML(mensajes){
    if(!mensajes || !mensajes.length) return '<div class="empty">Sin mensajes todavía</div>';
    let html = ''; let ultimaFecha = '';
    for(const m of mensajes){
      const fecha = dateLabel(m.timestamp);
      if(fecha && fecha !== ultimaFecha){
        html += `<div class="date-sep">${fecha}</div>`;
        ultimaFecha = fecha;
      }
      const ticks = m.direction!=='incoming' ? '<span class="ticks">✓✓</span>' : '';
      html += `<div class="msg ${m.direction==='incoming'?'in':'out'}">
        ${msgInner(m)}
        <span class="time">${soloHora(m.timestamp)}${ticks}</span>
      </div>`;
    }
    return html;
  }

  // Render del contenido de un mensaje (texto o multimedia)
  function msgInner(m){
    if(m.media_type && m.id){
      const src = '/api/media/' + m.id;
      const cap = (m.body && !/^\[(image|audio|video|document|sticker)\]$/.test(m.body))
        ? `<div class="cap">${escapeHtml(m.body)}</div>` : '';
      if(m.media_type === 'image' || m.media_type === 'sticker')
        return `<a href="${src}" target="_blank"><img class="media-img" src="${src}" alt="imagen" loading="lazy"></a>${cap}`;
      if(m.media_type === 'audio')
        return `<audio class="media-audio" controls src="${src}"></audio>${cap}`;
      if(m.media_type === 'video')
        return `<video class="media-video" controls src="${src}"></video>${cap}`;
      const nombre = escapeHtml(m.media_filename || 'archivo');
      return `<a class="media-file" href="${src}" target="_blank">📄 ${nombre}</a>${cap}`;
    }
    return escapeHtml(m.body);
  }

  async function enviarMedia(file){
    if(!currentLead || !file) return;
    if(file.size > 18*1024*1024){ toast('Archivo muy grande (máx 18 MB)'); return; }
    toast('Enviando archivo…');
    try{
      const dataBase64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const r = await api('/api/leads/'+currentLead.id+'/responder-media', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ mime: file.type || 'application/octet-stream', filename: file.name, dataBase64 }),
      });
      const data = await r.json();
      if(!r.ok) throw new Error(data.detalle || 'No se pudo enviar el archivo');
      await abrirLead(currentLead.id);
      await cargarLeads();
    }catch(e){
      toast('Error: ' + e.message);
    }
  }

  async function enviarTemplate(id, nombre, idioma){
    if(!currentLead) return;
    if(!confirm(`¿Enviar la plantilla "${nombre}" a ${currentLead.customer_name || currentLead.customer_phone}?`)) return;
    try{
      const r = await api('/api/leads/'+currentLead.id+'/enviar-template', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ nombre, idioma }),
      });
      const d = await r.json();
      if(!r.ok) throw new Error(d.detalle || 'Error al enviar');
      toast('✅ Plantilla enviada');
      const panel = document.getElementById('reactivarPanel');
      if(panel) panel.style.display = 'none';
      await abrirLead(currentLead.id);
    }catch(e){
      toast('Error: ' + e.message);
    }
  }

  // --- Tiempo real (SSE) ---
  function conectarStream(){
    const es = new EventSource('/api/stream');
    const dot = document.getElementById('connDot');
    es.onopen = () => { if(dot) dot.classList.add('on'); };
    es.addEventListener('conectado', () => { if(dot) dot.classList.add('on'); });
    es.addEventListener('nuevo_mensaje', async (ev) => {
      try{
        const data = JSON.parse(ev.data);
        await cargarLeads();
        if(currentLead && data.leadId === currentLead.id){
          const r = await api('/api/leads/'+currentLead.id+'/mensajes');
          const d = await r.json();
          renderChat(d.lead, d.mensajes);
        }
        if(data.tipo === 'mensaje_cliente'){
          toast('Nuevo mensaje de un cliente');
          try{ new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=').play(); }catch(e){}
          try{ if(navigator.vibrate) navigator.vibrate([120,60,120]); }catch(e){}
        }
      }catch(err){ console.error('SSE handler error:', err); }
    });
    es.onerror = () => { if(dot) dot.classList.remove('on'); es.close(); setTimeout(conectarStream, 5000); };
  }

  // --- Auto-poll fallback (cada 30s si SSE se desconecta) ---
  setInterval(async () => {
    if(!currentLead) return;
    try{
      const r = await api('/api/leads/'+currentLead.id+'/mensajes');
      const d = await r.json();
      renderChat(d.lead, d.mensajes);
      await cargarLeads();
    }catch(e){}
  }, 30000);

  // --- Registro del Service Worker (PWA) ---
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js')
      .then(() => activarPush())
      .catch(e => console.log('SW no registrado', e));
    navigator.serviceWorker.addEventListener('message', (ev) => {
      if(ev.data && ev.data.type === 'open_lead' && ev.data.leadId) abrirLead(Number(ev.data.leadId));
    });
  }

  function urlBase64ToUint8Array(base64String){
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
    const raw = atob(base64);
    const arr = new Uint8Array(raw.length);
    for(let i=0;i<raw.length;i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }

  // Pide permiso y suscribe el dispositivo a notificaciones push
  async function activarPush(){
    try{
      if(!('Notification' in window) || !('PushManager' in window)) return;
      const r = await fetch('/api/push/clave');
      if(!r.ok) return;
      const { publicKey, enabled } = await r.json();
      if(!enabled || !publicKey) return;

      if(Notification.permission === 'denied') return;
      if(Notification.permission === 'default'){
        const perm = await Notification.requestPermission();
        if(perm !== 'granted') return;
      }
      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if(!sub){
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });
      }
      await fetch('/api/push/suscribir', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ subscription: sub }),
      });
    }catch(e){ console.log('Push no activado:', e.message); }
  }

  // iOS status bar clock

  // --- Estado de disponibilidad ---
  document.getElementById('estadoSelect')?.addEventListener('change', async (e) => {
    if(!me.vendedorId) return;
    await api('/api/vendedores/'+me.vendedorId+'/estado', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify({ estado: e.target.value }),
    });
    toast('Disponibilidad actualizada');
  });

  document.getElementById('logoutBtn').addEventListener('click', async () => {
    await fetch('/api/logout', {method:'POST'});
    location.href = '/login.html';
  });

  // --- Atajos de teclado estilo WhatsApp ---
  document.addEventListener('keydown', (e) => {
    const enCampo = /^(INPUT|TEXTAREA|SELECT)$/.test(document.activeElement.tagName);
    // "/" enfoca la búsqueda (si no estás escribiendo)
    if(e.key === '/' && !enCampo){
      e.preventDefault();
      const b = document.getElementById('buscar');
      if(b){ b.focus(); b.select(); }
      return;
    }
    // Esc: cierra el chat en móvil o limpia la búsqueda
    if(e.key === 'Escape'){
      if(window.innerWidth <= 760 && !document.getElementById('chat').classList.contains('hidden')){
        document.getElementById('chat').classList.add('hidden');
        document.getElementById('sidebar').classList.remove('hidden');
      }else if(document.activeElement === document.getElementById('buscar')){
        const b = document.getElementById('buscar'); b.value=''; terminoBusqueda=''; renderLeads(); b.blur();
      }
    }
  });

  function escapeHtml(s){
    return String(s==null?'':s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function ocultarSplash(){
    const s = document.getElementById('splash');
    if(s) setTimeout(() => s.classList.add('hide'), 400);
  }

  init()
    .then(ocultarSplash)
    .catch(e => { ocultarSplash(); if(e.message!=='no_auth') console.error(e); });
  // Respaldo: nunca dejar el splash pegado más de 4s
  setTimeout(ocultarSplash, 4000);
</script>
