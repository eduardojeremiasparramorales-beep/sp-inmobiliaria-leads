<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0A0A0A">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="SP Panel">
<link rel="manifest" href="/manifest.webmanifest">
<link rel="apple-touch-icon" href="/icons/icon-192.png">
<title>SP Inmobiliaria — Mi Panel</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cinzel:wght@600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --negro:#0A0A0A; --oro:#C8A45A; --verde:#4E7B46;
    --marfil:#F5F2EB; --gris:#6D6D6D; --panel:#121212; --panel2:#1a1a1a;
  }
  *{box-sizing:border-box;margin:0;padding:0}
  html,body{height:100%}
  body{font-family:'Inter',sans-serif;background:var(--negro);color:var(--marfil);height:100vh;height:100dvh;overflow:hidden;-webkit-text-size-adjust:100%;
    /* Bloqueo de selección estilo WhatsApp: la interfaz no se selecciona */
    -webkit-user-select:none;-moz-user-select:none;-ms-user-select:none;user-select:none;
    -webkit-touch-callout:none;-webkit-tap-highlight-color:transparent}
  /* Excepciones: el texto de los mensajes y los campos de escritura SÍ se pueden seleccionar/copiar */
  .msg, .msg *, .nota-item, .nota-item *, input, textarea{
    -webkit-user-select:text;-moz-user-select:text;-ms-user-select:text;user-select:text;-webkit-touch-callout:default}
  /* Táctil: sin retardo ni zoom por doble-toque en botones/listas */
  button,.lead-item,.tpl-chip,select,.notas-btn,a{touch-action:manipulation}
  button:active,.lead-item:active,.tpl-chip:active{opacity:.75}
  .app{display:grid;grid-template-columns:340px 1fr;height:100vh;height:100dvh;min-height:0}

  /* Barra superior */
  .topbar{
    grid-column:1/3;display:flex;align-items:center;justify-content:space-between;
    padding:12px 20px;background:var(--panel);border-bottom:1px solid rgba(200,164,90,.2);
  }
  .topbar .brand{font-family:'Cinzel',serif;color:var(--oro);letter-spacing:.1em;font-size:1.2rem}
  .topbar .right{display:flex;align-items:center;gap:14px;font-size:.85rem}
  .estado-select{background:var(--panel2);color:var(--marfil);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:6px 8px;font-family:inherit}
  .logout{color:var(--gris);cursor:pointer;text-decoration:none;font-size:.8rem}
  .logout:hover{color:var(--oro)}

  /* Layout principal bajo la topbar */
  .app{grid-template-rows:auto minmax(0,1fr)}
  .sidebar{grid-row:2;grid-column:1;background:var(--panel);border-right:1px solid rgba(255,255,255,.08);overflow-y:auto;min-height:0}
  .chat{grid-row:2;grid-column:2;display:flex;flex-direction:column;min-height:0;height:100%;overflow:hidden}

  .sidebar h3{font-size:.72rem;color:var(--gris);text-transform:uppercase;letter-spacing:.1em;padding:16px 18px 8px}
  /* Búsqueda + filtros */
  .search-wrap{padding:10px 14px 6px;position:sticky;top:0;background:var(--panel);z-index:5}
  .search-wrap input{width:100%;background:var(--panel2);border:1px solid rgba(255,255,255,.12);border-radius:20px;color:var(--marfil);padding:9px 14px;font-family:inherit;font-size:.88rem}
  .search-wrap input:focus{outline:none;border-color:var(--oro)}
  .filtros{display:flex;gap:6px;padding:2px 14px 10px;overflow-x:auto;background:var(--panel);scrollbar-width:none}
  .filtros::-webkit-scrollbar{display:none}
  .filtro-chip{background:var(--panel2);border:1px solid rgba(255,255,255,.12);color:var(--gris);padding:5px 12px;border-radius:14px;font-size:.74rem;cursor:pointer;white-space:nowrap}
  .filtro-chip.active{background:var(--oro);color:#000;border-color:var(--oro);font-weight:600}
  /* Separador de fecha estilo WhatsApp */
  .date-sep{align-self:center;background:rgba(0,0,0,.4);color:rgba(255,255,255,.6);font-size:.68rem;padding:3px 12px;border-radius:10px;margin:6px 0;text-transform:uppercase;letter-spacing:.05em}
  /* Ticks de estado del mensaje */
  .msg .ticks{color:rgba(255,255,255,.55);font-size:.72rem;margin-left:4px}
  .lead-item{padding:11px 16px;border-bottom:1px solid rgba(255,255,255,.05);cursor:pointer;transition:background .15s;display:flex;gap:12px;align-items:center}
  .lead-item:hover{background:var(--panel2)}
  .lead-item.active{background:var(--panel2)}
  .lead-item.active .avatar{box-shadow:0 0 0 2px var(--oro)}
  .avatar{width:46px;height:46px;border-radius:50%;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-weight:600;font-size:1rem;color:#fff;letter-spacing:.02em}
  .lead-main{flex:1;min-width:0}
  .lead-top{display:flex;justify-content:space-between;align-items:baseline;gap:8px}
  .lead-item .name{font-weight:600;font-size:.94rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
  .lead-time{font-size:.68rem;color:var(--gris);flex-shrink:0}
  .lead-bottom{display:flex;justify-content:space-between;align-items:center;gap:8px;margin-top:3px}
  .lead-item .preview{font-size:.8rem;color:#999;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;flex:1}
  .badge{font-size:.62rem;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
  .b-nuevo{background:var(--oro);color:#000}
  .b-asignado{background:#2b4d6b;color:#cfe3f5}
  .b-contactado{background:var(--verde);color:#dff3da}
  .b-cerrado{background:#444;color:#bbb}
  .dot{width:8px;height:8px;border-radius:50%;background:var(--oro);display:inline-block;margin-left:6px}
  /* Etiquetas de pipeline */
  .etq{font-size:.6rem;padding:2px 7px;border-radius:10px;font-weight:600;text-transform:uppercase;letter-spacing:.03em;margin-left:6px}
  .e-interesado{background:#2b4d6b;color:#cfe3f5}
  .e-negociacion{background:#7a5c1e;color:#f2dca0}
  .e-cita{background:#4E7B46;color:#dff3da}
  .e-vendido{background:#C8A45A;color:#000}
  .e-no_interesado{background:#5a2b2b;color:#f5c5c5}
  .e-sin_clasificar{background:#333;color:#999}

  /* Barra de gestión bajo el header */
  .lead-tools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;padding:8px 18px;background:#141414;border-bottom:1px solid rgba(255,255,255,.06);font-size:.8rem}
  .lead-tools select{background:var(--panel2);color:var(--marfil);border:1px solid rgba(255,255,255,.15);border-radius:6px;padding:5px 8px;font-family:inherit;font-size:.8rem}
  .lead-tools label{color:var(--gris);font-size:.72rem}
  .notas-btn{background:var(--panel2);border:1px solid rgba(200,164,90,.3);color:var(--oro);padding:5px 11px;border-radius:8px;cursor:pointer;font-size:.78rem;font-family:inherit}
  .notas-btn:hover{background:var(--oro);color:#000}

  /* Panel de notas internas */
  .notas-panel{display:none;padding:12px 18px;background:#101010;border-bottom:1px solid rgba(255,255,255,.08)}
  .notas-panel.show{display:block}
  .notas-panel .nota-item{background:var(--panel2);border-left:2px solid var(--oro);padding:8px 10px;border-radius:6px;margin-bottom:6px;font-size:.82rem}
  .notas-panel .nota-item .meta{color:var(--gris);font-size:.68rem;margin-top:3px;display:flex;justify-content:space-between}
  .notas-panel .nota-item .del{color:#a55;cursor:pointer;font-size:.68rem}
  .notas-form{display:flex;gap:8px;margin-top:8px}
  .notas-form input{flex:1;background:var(--panel2);border:1px solid rgba(255,255,255,.15);border-radius:8px;color:var(--marfil);padding:8px 10px;font-family:inherit;font-size:.85rem}
  .notas-form button{background:var(--oro);color:#000;border:none;border-radius:8px;padding:8px 14px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.82rem}

  /* Chat */
  .chat-header{padding:14px 22px;background:var(--panel);border-bottom:1px solid rgba(255,255,255,.08);display:flex;justify-content:space-between;align-items:center}
  .chat-header .cname{font-weight:600;font-size:1rem}
  .chat-header .cphone{font-size:.78rem;color:var(--gris)}
  .chat-header button{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--gris);padding:6px 12px;border-radius:6px;cursor:pointer;font-size:.78rem;font-family:inherit}
  .chat-header button:hover{border-color:var(--oro);color:var(--oro)}
  .messages{flex:1;min-height:0;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:24px;display:flex;flex-direction:column;gap:10px;background:linear-gradient(rgba(0,0,0,.2),rgba(0,0,0,.2))}
  .msg{max-width:70%;padding:10px 14px;border-radius:12px;font-size:.9rem;line-height:1.45;word-wrap:break-word}
  .msg .time{display:block;font-size:.65rem;color:rgba(255,255,255,.4);margin-top:4px;text-align:right}
  .msg.in{align-self:flex-start;background:var(--panel2);border-bottom-left-radius:3px}
  .msg.out{align-self:flex-end;background:var(--verde);border-bottom-right-radius:3px}
  .empty{margin:auto;color:var(--gris);text-align:center;font-size:.9rem}

  /* Respuestas rápidas */
  .templates{display:flex;gap:8px;padding:10px 18px 0;flex-wrap:wrap}
  .tpl-chip{background:var(--panel2);border:1px solid rgba(200,164,90,.3);color:var(--oro);padding:5px 11px;border-radius:14px;font-size:.74rem;cursor:pointer;white-space:nowrap}
  .tpl-chip:hover{background:var(--oro);color:#000}

  /* Composer */
  .composer{padding:12px 16px;padding-bottom:calc(12px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid rgba(255,255,255,.08);display:flex;gap:10px;align-items:flex-end;flex-shrink:0}
  .composer textarea{flex:1;resize:none;background:var(--panel2);border:1px solid rgba(255,255,255,.15);border-radius:12px;color:var(--marfil);padding:12px 14px;font-family:inherit;font-size:16px;line-height:1.35;max-height:120px}
  .composer textarea:focus{outline:none;border-color:var(--oro)}
  .composer button{background:var(--oro);color:#000;border:none;border-radius:12px;padding:12px 20px;font-weight:600;cursor:pointer;font-family:inherit;font-size:.95rem;min-height:46px;white-space:nowrap}
  .composer button:disabled{opacity:.5;cursor:not-allowed}
  .composer.disabled{opacity:.5;pointer-events:none}
  .composer .attach{background:var(--panel2);color:var(--oro);border:1px solid rgba(200,164,90,.3);padding:0 14px;min-height:46px;font-size:1.2rem;border-radius:12px}
  .composer .mic{background:var(--panel2);color:var(--oro);border:1px solid rgba(200,164,90,.3);padding:0 14px;min-height:46px;font-size:1.2rem;border-radius:12px;transition:all .2s}
  .composer .mic.grabando{background:rgba(200,30,30,.2);border-color:#e05;color:#f55;animation:micPulse 1s infinite}
  @keyframes micPulse{0%,100%{opacity:1}50%{opacity:.5}}
  /* Preview de audio antes de enviar */
  .audio-preview{display:none;align-items:center;gap:10px;padding:10px 16px;padding-bottom:calc(10px + env(safe-area-inset-bottom));background:var(--panel);border-top:1px solid rgba(255,255,255,.08);flex-shrink:0}
  .audio-preview.show{display:flex}
  .audio-preview audio{flex:1;height:36px}
  .audio-preview .ap-send{background:var(--oro);color:#000;border:none;border-radius:10px;padding:8px 16px;font-weight:600;cursor:pointer;font-size:.88rem;white-space:nowrap}
  .audio-preview .ap-cancel{background:transparent;border:1px solid rgba(255,255,255,.2);color:var(--gris);border-radius:10px;padding:8px 12px;cursor:pointer;font-size:.88rem}
  .rec-timer{font-size:.8rem;color:#f55;font-weight:600;min-width:36px;text-align:center}

  /* Multimedia dentro de los mensajes */
  .msg .media-img{max-width:230px;max-height:280px;border-radius:8px;display:block;cursor:pointer}
  .msg .media-video{max-width:240px;border-radius:8px;display:block}
  .msg .media-audio{width:230px;display:block}
  .msg .media-file{display:inline-block;color:#fff;text-decoration:underline;word-break:break-all}
  .msg .cap{margin-top:6px;font-size:.88rem}

  /* Pantalla de bienvenida (splash) */
  .splash{position:fixed;inset:0;background:radial-gradient(circle at 50% 40%, #161310, var(--negro));display:flex;flex-direction:column;align-items:center;justify-content:center;z-index:1000;transition:opacity .5s ease;gap:20px}
  .splash.hide{opacity:0;pointer-events:none}
  .splash img{width:120px;height:120px;border-radius:26px;object-fit:cover;box-shadow:0 8px 40px rgba(200,164,90,.25)}
  .splash .brand{font-family:'Cinzel',serif;color:var(--oro);letter-spacing:.18em;font-size:1.25rem;text-align:center}
  .splash .sub{color:var(--gris);font-size:.72rem;letter-spacing:.12em;text-transform:uppercase;margin-top:-10px}
  .splash .spin{width:26px;height:26px;border:3px solid rgba(200,164,90,.2);border-top-color:var(--oro);border-radius:50%;animation:spin 1s linear infinite;margin-top:6px}
  @keyframes spin{to{transform:rotate(360deg)}}

  .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:var(--panel2);border:1px solid var(--oro);color:var(--marfil);padding:12px 22px;border-radius:8px;font-size:.85rem;opacity:0;transition:opacity .3s;z-index:50}
  .toast.show{opacity:1}
  @media(max-width:760px){
    .app{grid-template-columns:1fr}
    .sidebar{grid-row:2;grid-column:1}
    .chat{grid-row:2;grid-column:1}
    .chat.hidden,.sidebar.hidden{display:none}
    .topbar{padding:10px 14px;padding-top:calc(10px + env(safe-area-inset-top))}
    .topbar .brand{font-size:1rem}
    .topbar .right{gap:8px;font-size:.78rem}
    .topbar #miNombre{display:none}
    .estado-select{padding:8px 6px;font-size:.8rem}
    .messages{padding:16px 14px}
    .chat-header{padding:12px 14px}
    .chat-header button{padding:8px 12px}
    .lead-item{padding:16px}
    .tpl-chip{padding:7px 13px;font-size:.8rem}
  }
</style>
</head>
<body>
  <div class="splash" id="splash">
    <img src="/icons/icon-512.png" alt="SP" onerror="this.style.display='none'">
    <div class="brand">SP LEONS GROUP</div>
    <div class="sub">Inmobiliaria</div>
    <div class="spin"></div>
  </div>
  <div class="app">
    <div class="topbar">
      <div class="brand">SP LEONS GROUP</div>
      <div class="right">
        <span id="miNombre"></span>
        <select class="estado-select" id="estadoSelect" title="Mi disponibilidad">
          <option value="activo">🟢 Activo</option>
          <option value="ocupado">🟡 Ocupado</option>
          <option value="vacaciones">🌴 Vacaciones</option>
          <option value="inactivo">⚪ Inactivo</option>
        </select>
        <a class="logout" id="logout">Salir</a>
      </div>
    </div>

    <div class="sidebar" id="sidebar">
      <div class="search-wrap">
        <input type="text" id="buscar" placeholder="🔍 Buscar por nombre o teléfono…" autocomplete="off">
      </div>
      <div class="filtros" id="filtros">
        <span class="filtro-chip active" data-f="todos">Todos</span>
        <span class="filtro-chip" data-f="nuevo">Nuevos</span>
        <span class="filtro-chip" data-f="interesado">Interesado</span>
        <span class="filtro-chip" data-f="negociacion">Negociación</span>
        <span class="filtro-chip" data-f="cita">Cita</span>
        <span class="filtro-chip" data-f="vendido">Vendido</span>
      </div>
      <h3><span id="tituloLista">Chats</span> (<span id="leadCount">0</span>)</h3>
      <div id="leadsList"></div>
    </div>

    <div class="chat hidden" id="chat">
      <div id="chatBody" style="flex:1;min-height:0;display:flex;flex-direction:column;height:100%">
        <div class="empty" id="emptyState">Selecciona un lead para ver la conversación</div>
      </div>
    </div>
  </div>
  <div class="toast" id="toast"></div>

<script>
  let me = null;
  let leads = [];
  let currentLead = null;
  let templates = [];
  let waTemplates = [];
  let vendedores = [];

  const ETIQUETAS = [
    {v:'sin_clasificar', t:'Sin clasificar'},
    {v:'interesado', t:'Interesado'},
    {v:'negociacion', t:'Negociación'},
    {v:'cita', t:'Cita agendada'},
    {v:'vendido', t:'Vendido'},
    {v:'no_interesado', t:'No interesado'},
  ];
  function etqLabel(v){ const e = ETIQUETAS.find(x=>x.v===v); return e?e.t:''; }

  function toast(msg){
    const t = document.getElementById('toast');
    t.textContent = msg; t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2600);
  }

  function badgeClass(s){return 'badge b-' + (s||'nuevo');}

  // Iniciales para el avatar (máx 2 letras)
  function iniciales(nombre){
    const p = String(nombre||'C').trim().split(/\s+/);
    return ((p[0]?.[0]||'')+(p[1]?.[0]||'')).toUpperCase() || 'C';
  }
  // Color de avatar estable según el nombre (paleta sobria de marca)
  function avatarColor(nombre){
    const cols = ['#4E7B46','#7a5c1e','#2b4d6b','#6b3f5b','#8a6d3b','#3b6b6b','#7a3b3b','#5b5b8a'];
    let h = 0; const s = String(nombre||'');
    for(let i=0;i<s.length;i++) h = (h*31 + s.charCodeAt(i)) & 0xffffff;
    return cols[Math.abs(h) % cols.length];
  }
  // Hora corta para la lista (hoy: hora; otro día: dd/mm)
  function horaCorta(ts){
    if(!ts) return '';
    const d = new Date(ts.replace(' ','T') + 'Z');
    if(isNaN(d)) return '';
    const hoy = new Date();
    const mismoDia = d.getFullYear()===hoy.getFullYear()&&d.getMonth()===hoy.getMonth()&&d.getDate()===hoy.getDate();
    return mismoDia
      ? d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'})
      : d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit'});
  }

  function fmtTime(ts){
    if(!ts) return '';
    const d = new Date(ts.replace(' ','T') + 'Z');
    if(isNaN(d)) return '';
    return d.toLocaleString('es-CO',{day:'2-digit',month:'2-digit',hour:'2-digit',minute:'2-digit'});
  }

  async function api(url, opts){
    const res = await fetch(url, opts);
    if(res.status === 401){ location.href = '/login.html'; throw new Error('no_auth'); }
    return res;
  }

  // --- Carga inicial ---
  async function init(){
    const r = await api('/api/me');
    me = await r.json();
    document.getElementById('miNombre').textContent = me.nombre;
    const tl = document.getElementById('tituloLista');
    if(tl) tl.textContent = me.rol==='admin' ? 'Todos los chats' : 'Mis chats';
    await cargarTemplates();
    await cargarWATemplates();
    if(me.rol === 'admin') await cargarVendedores();
    await cargarLeads();
    conectarStream();
    wireFiltros();

    // Abrir lead desde URL (?lead=123) o desde notificación push
    const params = new URLSearchParams(location.search);
    const leadFromUrl = params.get('lead');
    if(leadFromUrl) abrirLead(Number(leadFromUrl));
  }

  async function cargarTemplates(){
    try{
      const r = await api('/api/templates');
      templates = await r.json();
    }catch(e){ templates = []; }
  }

  async function cargarWATemplates(){
    try{
      const r = await api('/api/wa-templates');
      waTemplates = await r.json();
    }catch(e){ waTemplates = []; }
  }

  async function cargarVendedores(){
    try{
      const r = await api('/api/vendedores');
      vendedores = await r.json();
    }catch(e){ vendedores = []; }
  }

  async function cargarLeads(){
    const r = await api('/api/mis-leads');
    leads = await r.json();
    renderLeads();
  }

  function wireFiltros(){
    const buscar = document.getElementById('buscar');
    if(buscar) buscar.addEventListener('input', () => {
      terminoBusqueda = buscar.value.trim();
      renderLeads();
    });
    document.querySelectorAll('#filtros .filtro-chip').forEach(chip =>
      chip.addEventListener('click', () => {
        document.querySelectorAll('#filtros .filtro-chip').forEach(c => c.classList.remove('active'));
        chip.classList.add('active');
        filtroActivo = chip.dataset.f;
        renderLeads();
      }));
  }

  let filtroActivo = 'todos';
  let terminoBusqueda = '';

  function leadsFiltrados(){
    let arr = leads;
    if(filtroActivo !== 'todos'){
      if(filtroActivo === 'nuevo'){
        arr = arr.filter(l => (l.status||'nuevo')==='nuevo' || (l.status||'')==='asignado');
      }else{
        arr = arr.filter(l => (l.etiqueta||'')===filtroActivo);
      }
    }
    if(terminoBusqueda){
      const t = terminoBusqueda.toLowerCase();
      arr = arr.filter(l =>
        (l.customer_name||'').toLowerCase().includes(t) ||
        (l.customer_phone||'').toLowerCase().includes(t));
    }
    return arr;
  }

  function renderLeads(){
    const cont = document.getElementById('leadsList');
    const lista = leadsFiltrados();
    document.getElementById('leadCount').textContent = lista.length;
    if(lista.length === 0){
      cont.innerHTML = leads.length === 0
        ? '<div class="empty" style="padding:30px 18px">Aún no tienes leads asignados. Llegarán automáticamente.</div>'
        : '<div class="empty" style="padding:30px 18px">Ningún lead coincide con la búsqueda.</div>';
      return;
    }
    cont.innerHTML = lista.map(l => {

      // --- Grabación de audio ---
      const micBtn = document.getElementById('micBtn');
      const recTimer = document.getElementById('recTimer');
      const audioPreview = document.getElementById('audioPreview');
      const audioPlayback = document.getElementById('audioPlayback');
      const apSend = document.getElementById('apSend');
      const apCancel = document.getElementById('apCancel');
      let mediaRec = null, recChunks = [], recInterval = null, recBlob = null;

      function fmtSecs(s){ return Math.floor(s/60)+':'+(s%60<10?'0':'')+s%60; }

      function stopRecording(){
        if(mediaRec && mediaRec.state !== 'inactive') mediaRec.stop();
        clearInterval(recInterval);
        micBtn.classList.remove('grabando');
        micBtn.title = 'Grabar audio';
        recTimer.style.display = 'none';
      }

      micBtn.addEventListener('click', async () => {
        if(mediaRec && mediaRec.state === 'recording'){
          stopRecording(); return;
        }
        try{
          const stream = await navigator.mediaDevices.getUserMedia({ audio: true });
          // Elegir el mejor codec disponible
          const mime = ['audio/ogg;codecs=opus','audio/webm;codecs=opus','audio/webm','audio/mp4']
            .find(t => MediaRecorder.isTypeSupported(t)) || '';
          mediaRec = new MediaRecorder(stream, mime ? { mimeType: mime } : {});
          recChunks = [];
          mediaRec.ondataavailable = e => { if(e.data.size > 0) recChunks.push(e.data); };
          mediaRec.onstop = () => {
            stream.getTracks().forEach(t => t.stop());
            const finalMime = mediaRec.mimeType || mime || 'audio/webm';
            recBlob = new Blob(recChunks, { type: finalMime });
            audioPlayback.src = URL.createObjectURL(recBlob);
            audioPreview.classList.add('show');
          };
          mediaRec.start(200);
          micBtn.classList.add('grabando');
          micBtn.title = 'Detener grabación';
          let secs = 0;
          recTimer.textContent = '0:00';
          recTimer.style.display = 'inline';
          recInterval = setInterval(() => {
            secs++;
            recTimer.textContent = fmtSecs(secs);
            if(secs >= 120){ stopRecording(); toast('Máximo 2 minutos de audio'); }
          }, 1000);
        }catch(e){
          toast('No se pudo acceder al micrófono');
        }
      });

      apCancel.addEventListener('click', () => {
        audioPreview.classList.remove('show');
        audioPlayback.src = '';
        recBlob = null;

          const ext = recBlob.type.includes('ogg') ? 'ogg' : recBlob.type.includes('mp4') ? 'mp4' : 'webm';

            method:'POST', headers:{'Content-Type':'application/json'},
            body: JSON.stringify({ mime: recBlob.type, filename: 'audio.'+ext, dataBase64 }),
          });
          const data = await r.json();

          audioPlayback.src = ''; recBlob = null;
          await abrirLead(currentLead.id);

        }catch(e){
          toast('Error: ' + e.message);
        }finally{
          apSend.disabled = false; apSend.textContent = 'Enviar audio';

      body.querySelectorAll('.tpl-chip').forEach(c =>
        c.addEventListener('click', () => {

      const reactivarBtn = document.getElementById('reactivarBtn');

    }
    // --- Etiqueta de pipeline ---
    const etiquetaSelect = document.getElementById('etiquetaSelect');
    if(etiquetaSelect) etiquetaSelect.addEventListener('change', async () => {
      try{
        await api('/api/leads/'+lead.id+'/etiqueta', {

  // Etiqueta de fecha estilo WhatsApp (Hoy / Ayer / dd/mm/aaaa)
  function dateLabel(ts){
    if(!ts) return '';
    const d = new Date(ts.replace(' ','T') + 'Z');
    if(isNaN(d)) return '';
    const hoy = new Date(); const ayer = new Date(); ayer.setDate(hoy.getDate()-1);
    const sameDay = (a,b)=>a.getFullYear()===b.getFullYear()&&a.getMonth()===b.getMonth()&&a.getDate()===b.getDate();
    if(sameDay(d,hoy)) return 'Hoy';
    if(sameDay(d,ayer)) return 'Ayer';
    return d.toLocaleDateString('es-CO',{day:'2-digit',month:'2-digit',year:'numeric'});
  }
  function soloHora(ts){
    if(!ts) return '';
    const d = new Date(ts.replace(' ','T') + 'Z');
    if(isNaN(d)) return '';
    return d.toLocaleTimeString('es-CO',{hour:'2-digit',minute:'2-digit'});
  }

  // Construye el HTML de los mensajes con separadores de fecha y ticks
  function renderMensajesHTML(mensajes){
    if(!mensajes || !mensajes.length) return '<div class="empty">Sin mensajes todavía</div>';
    let html = ''; let ultimaFecha = '';
    for(const m of mensajes){
      const fecha = dateLabel(m.timestamp);
      if(fecha && fecha !== ultimaFecha){
        html += `<div class="date-sep">${fecha}</div>`;
        ultimaFecha = fecha;
      }
      const ticks = m.direction!=='incoming' ? '<span class="ticks">✓✓</span>' : '';
      html += `<div class="msg ${m.direction==='incoming'?'in':'out'}">
        ${msgInner(m)}
        <span class="time">${soloHora(m.timestamp)}${ticks}</span>
      </div>`;
    }
    return html;
  }

  // Render del contenido de un mensaje (texto o multimedia)
  function msgInner(m){
    if(m.media_type && m.id){
      const src = '/api/media/' + m.id;
      const cap = (m.body && !/^\[(image|audio|video|document|sticker)\]$/.test(m.body))
        ? `<div class="cap">${escapeHtml(m.body)}</div>` : '';
      if(m.media_type === 'image' || m.media_type === 'sticker')
        return `<a href="${src}" target="_blank"><img class="media-img" src="${src}" alt="imagen"></a>${cap}`;
      if(m.media_type === 'audio')
        return `<audio class="media-audio" controls src="${src}"></audio>${cap}`;
      if(m.media_type === 'video')
        return `<video class="media-video" controls src="${src}"></video>${cap}`;
      const nombre = escapeHtml(m.media_filename || 'archivo');
      return `<a class="media-file" href="${src}" target="_blank">📄 ${nombre}</a>${cap}`;
    }
    return escapeHtml(m.body);
  }

  async function enviarMedia(file){
    if(!currentLead || !file) return;
    if(file.size > 18*1024*1024){ toast('Archivo muy grande (máx 18 MB)'); return; }
    toast('Enviando archivo…');
    try{
      const dataBase64 = await new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload = () => resolve(String(reader.result).split(',')[1]);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
      const r = await api('/api/leads/'+currentLead.id+'/responder-media', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ mime: file.type || 'application/octet-stream', filename: file.name, dataBase64 }),
      });
      const data = await r.json();
      if(!r.ok) throw new Error(data.detalle || 'No se pudo enviar el archivo');
      await abrirLead(currentLead.id);
      await cargarLeads();
    }catch(e){
      toast('Error: ' + e.message);
    }
  }

  // --- Tiempo real (SSE) ---
  function conectarStream(){
    const es = new EventSource('/api/stream');
    es.addEventListener('nuevo_mensaje', async (ev) => {
      try{
        const data = JSON.parse(ev.data);
        await cargarLeads();
        if(currentLead && data.leadId === currentLead.id){
          const r = await api('/api/leads/'+currentLead.id+'/mensajes');
          const d = await r.json();
          renderChat(d.lead, d.mensajes);
        }
        if(data.tipo === 'mensaje_cliente'){
          toast('💬 Nuevo mensaje de un cliente');
          try{ new Audio('data:audio/wav;base64,UklGRl9vT19XQVZFZm10IBAAAAABAAEAQB8AAEAfAAABAAgAZGF0YQAAAAA=').play(); }catch(e){}
          try{ if(navigator.vibrate) navigator.vibrate([120,60,120]); }catch(e){}
        }
      }catch(err){ console.error('SSE handler error:', err); }
    });
    es.onerror = () => { es.close(); setTimeout(conectarStream, 5000); };
  }

  // --- Auto-poll fallback (cada 30s si SSE se desconecta) ---
  setInterval(async () => {

  // --- Registro del Service Worker (PWA) ---
  if('serviceWorker' in navigator){
    navigator.serviceWorker.register('/sw.js')
      .then(() => activarPush())
      .catch(e => console.log('SW no registrado', e));
    navigator.serviceWorker.addEventListener('message', (ev) => {
      if(ev.data && ev.data.type === 'open_lead' && ev.data.leadId) abrirLead(Number(ev.data.leadId));
    });
  }

  function urlBase64ToUint8Array(base64String){
    const padding = '='.repeat((4 - base64String.length % 4) % 4);
    const base64 = (base64String + padding).replace(/-/g,'+').replace(/_/g,'/');
    const raw = atob(base64);
    const arr = new Uint8Array(raw.length);
    for(let i=0;i<raw.length;i++) arr[i] = raw.charCodeAt(i);
    return arr;
  }

  // Pide permiso y suscribe el dispositivo a notificaciones push
  async function activarPush(){
    try{
      if(!('Notification' in window) || !('PushManager' in window)) return;
      const r = await fetch('/api/push/clave');
      if(!r.ok) return;
      const { publicKey, enabled } = await r.json();
      if(!enabled || !publicKey) return;

      if(Notification.permission === 'denied') return;
      if(Notification.permission === 'default'){
        const perm = await Notification.requestPermission();
        if(perm !== 'granted') return;
      }
      const reg = await navigator.serviceWorker.ready;
      let sub = await reg.pushManager.getSubscription();
      if(!sub){
        sub = await reg.pushManager.subscribe({
          userVisibleOnly: true,
          applicationServerKey: urlBase64ToUint8Array(publicKey),
        });
      }
      await fetch('/api/push/suscribir', {
        method:'POST', headers:{'Content-Type':'application/json'},
        body: JSON.stringify({ subscription: sub }),
      });
    }catch(e){ console.log('Push no activado:', e.message); }
  }

  document.addEventListener('keydown', (e) => {

    // "/" enfoca la búsqueda (si no estás escribiendo)

      if(window.innerWidth <= 760 && !document.getElementById('chat').classList.contains('hidden')){
        document.getElementById('chat').classList.add('hidden');
        document.getElementById('sidebar').classList.remove('hidden');
      }else if(document.activeElement === document.getElementById('buscar')){
        const b = document.getElementById('buscar'); b.value=''; terminoBusqueda=''; renderLeads(); b.blur();
      }
    }
  });

  function escapeHtml(s){
    return String(s==null?'':s).replace(/[&<>"']/g, c =>
      ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
  }

  function ocultarSplash(){
    const s = document.getElementById('splash');
    if(s) setTimeout(() => s.classList.add('hide'), 400);
  }

  init()
    .then(ocultarSplash)
    .catch(e => { ocultarSplash(); if(e.message!=='no_auth') console.error(e); });
  // Respaldo: nunca dejar el splash pegado más de 4s
  setTimeout(ocultarSplash, 4000);
</script>
</body>
</html>
